    payload:
      reason:
        type: String
        optional: true
  InvalidClientError:
    kind: error
    description: クライアント認証が失敗した、または未登録のクライアント (RFC 6749 §5.2 invalid_client)。client_id の存在有無を開示しないため詳細は返さない。
