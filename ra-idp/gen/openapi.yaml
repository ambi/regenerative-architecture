    TokenRequest:
      type: object
      additionalProperties: false
      description: "application/x-www-form-urlencoded で送信される token endpoint リクエスト。"
      properties:
        grant_type:
          type: string
          enum:
            - authorization_code
            - refresh_token
            - client_credentials
            - "urn:ietf:params:oauth:grant-type:device_code"
        code:
          type: string
        redirect_uri:
          type: string
        code_verifier:
          type: string
        refresh_token:
          type: string
        device_code:
          type: string
        client_id:
          type: string
        client_secret:
          type: string
        client_assertion:
          type: string
        client_assertion_type:
          type: string
        scope:
          type: string
      required:
        - grant_type
    TokenResponse:
      type: object
      additionalProperties: false
      description: /token 成功時のレスポンスボディ (RFC 6749 §5.1)。発行されたトークン一式と種別を返す。
      properties:
        access_token:
          type: string
        token_type:
          type: string
        expires_in:
          type: integer
        refresh_token:
          type: string
        id_token:
          type: string
        scope:
          type: string
      required:
        - access_token
        - token_type
    IntrospectionRequest:
      type: object
      additionalProperties: false
      description: /introspect リクエスト (RFC 7662 §2.1)。ResourceServer がトークンの有効性を AuthorizationServer に問い合わせる。
      properties:
        token:
          type: string
        token_type_hint:
          type: string
          enum:
            - access_token
            - refresh_token
      required:
        - token
    IntrospectionResponse:
      type: object
      additionalProperties: false
      description: /introspect レスポンス (RFC 7662 §2.2)。トークンの active 状態と有効時のメタデータを返す。
      properties:
        active:
          type: boolean
        scope:
          type: string
        client_id:
          type: string
        sub:
          type: string
        exp:
          type: integer
        iat:
          type: integer
        token_type:
          type: string
        jti:
          type: string
        cnf:
          $ref: "#/components/schemas/SenderConstraintCnf"
      required:
        - active
    RevokeRequest:
      type: object
      additionalProperties: false
      description: /revoke リクエスト (RFC 7009 §2.1)。指定したトークンを失効させる。
      properties:
        token:
          type: string
        token_type_hint:
          type: string
          enum:
            - access_token
            - refresh_token
      required:
        - token
    ParRequest:
      type: object
      additionalProperties: false
      description: 任意の authorize パラメータを form で受け取る。
      properties:
        parameters:
          type: object
          additionalProperties:
            type: string
      required:
        - parameters
    ParResponse:
      type: object
      additionalProperties: false
      description: /par レスポンス (RFC 9126 §2.2)。短命の request_uri を発行し、後続の /authorize から参照される。
      properties:
        request_uri:
          type: string
        expires_in:
          type: integer
      required:
        - request_uri
        - expires_in
    DeviceAuthorizationRequest:
      type: object
      additionalProperties: false
      description: /device_authorization リクエスト (RFC 8628 §3.1)。入力制約のあるデバイスからのフロー開始要求。
      properties:
        scope:
          type: string
        client_id:
          type: string
        client_secret:
          type: string
        client_assertion:
          type: string
        client_assertion_type:
          type: string
    DeviceAuthorizationResponse:
      type: object
      additionalProperties: false
      description: /device_authorization レスポンス (RFC 8628 §3.2)。device_code・user_code・verification_uri を返し、デバイスはポーリングへ移行する。
      properties:
        device_code:
          type: string
        user_code:
          type: string
        verification_uri:
          type: string
          format: uri
        verification_uri_complete:
          type: string
          format: uri
        expires_in:
          type: integer
        interval:
          type: integer
      required:
        - device_code
        - user_code
        - verification_uri
        - expires_in
    AuthorizeParameters:
      type: object
      additionalProperties: false
      description: GET /authorize クエリパラメータ。
      properties:
        response_type:
          type: string
          enum:
            - code
        client_id:
          type: string
        redirect_uri:
          type: string
        scope:
          type: string
        state:
          type: string
        nonce:
          type: string
        code_challenge:
          type: string
        code_challenge_method:
          type: string
          enum:
            - S256
        prompt:
          type: string
        max_age:
          type: integer
        id_token_hint:
          type: string
        request_uri:
          type: string
      required:
        - response_type
        - client_id
        - redirect_uri
        - code_challenge
        - code_challenge_method
    BrowserLoginRequest:
      type: object
      additionalProperties: false
      description: "SPA が POST /api/auth/login に送る JSON。通常は authorization request id を HttpOnly transaction cookie から解決する。管理画面への直接ログインでは同一 realm の /admin 配下だけを return_to に指定できる。CSRF は X-CSRF-Token header から解決する。"
      properties:
        username:
          type: string
        password:
          type: string
        return_to:
          type: string
      required:
        - username
        - password
    BrowserConsentRequest:
      type: object
      additionalProperties: false
      description: SPA が POST /api/auth/consent に送る同意判断。
      properties:
        action:
          type: string
      required:
        - action
    BrowserDeviceRequest:
      type: object
      additionalProperties: false
      description: SPA が POST /api/auth/device に送る device user_code の承認判断。
      properties:
        user_code:
          type: string
        action:
          type: string
      required:
        - user_code
        - action
    BrowserTotpRequest:
      type: object
      additionalProperties: false
      description: "Browser client が POST /api/auth/totp に送る TOTP コード。authorization request id は HttpOnly transaction cookie、CSRF は X-CSRF-Token header から解決する。他 factor (WebAuthn 等) はHTTP形が大きく異なるため、別endpointと別value objectとして独立に定義する。"
      properties:
        code:
          type: string
        return_to:
          type: string
      required:
        - code
    BrowserChangePasswordRequest:
      type: object
      additionalProperties: false
      description: "SPA が POST /api/auth/change_password に送る JSON。認証済みセッション cookie が sub を解決し、CSRF は X-CSRF-Token header で検証する。"
      properties:
        current_password:
          type: string
        new_password:
          type: string
      required:
        - current_password
        - new_password
    BrowserForgotPasswordRequest:
      type: object
      additionalProperties: false
      description: "SPA が POST /api/auth/forgot_password に送る JSON。未認証経路。anti-enumeration のため email 存在有無に関わらず常に 204 を返す (ADR-030)。"
      properties:
        email:
          type: string
      required:
        - email
    BrowserResetPasswordRequest:
      type: object
      additionalProperties: false
      description: "SPA が POST /api/auth/reset_password に送る JSON。email リンクに含まれた単発消費 token と新パスワードを受ける (ADR-030)。"
      properties:
        token:
          type: string
        new_password:
          type: string
      required:
        - token
        - new_password
    PasswordResetTokenRecord: null
    BrowserTransactionResponse:
      type: object
      additionalProperties: false
      description: "SPA が現在の browser authorization transaction を描画するための no-store JSON。"
      properties:
        kind:
          type: string
        csrf_token:
          type: string
        client_name:
          type: string
        scopes:
          type: array
          items:
            type: string
      required:
        - kind
        - csrf_token
    BrowserDeviceContextResponse:
      type: object
      additionalProperties: false
      description: "SPA が device user_code 画面を描画するための no-store JSON。"
      properties:
        kind:
          type: string
        user_code:
          type: string
        csrf_token:
          type: string
      required:
        - kind
        - csrf_token
    BrowserFlowResponse:
      type: object
      additionalProperties: false
      description: SPA の認証操作後に表示する次画面またはクライアント redirect URI。
      properties:
        next:
          type: string
        redirect_to:
          type: string
          format: uri
    EndSessionParameters:
      type: object
      additionalProperties: false
      description: "RP-Initiated Logout v1 のクエリ / form パラメータ。client_id で post_logout_redirect_uri を検証する。"
      properties:
        client_id:
          type: string
        id_token_hint:
          type: string
        post_logout_redirect_uri:
          type: string
          format: uri
        state:
          type: string
    UserInfoResponse:
      type: object
      additionalProperties: false
      description: OIDC Core §5.3。可変な OIDC クレームを含む。
      properties:
        sub:
          type: string
        claims: {}
      required:
        - sub
    OAuthError:
      type: object
      properties:
        type:
          const: OAuthError
          type: string
        error:
          type: string
          enum:
            - invalid_request
            - invalid_client
            - invalid_grant
            - unauthorized_client
            - unsupported_grant_type
            - invalid_scope
            - invalid_token
            - server_error
            - invalid_dpop_proof
            - access_denied
            - expired_token
            - slow_down
            - insufficient_scope
            - authorization_pending
        error_description:
          type: string
        error_uri:
          type: string
      required:
        - type
        - error
    InvalidRequestError:
      type: object
      properties:
        type:
          const: InvalidRequestError
