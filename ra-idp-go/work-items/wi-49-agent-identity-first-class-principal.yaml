id: wi-49-agent-identity-first-class-principal
title: AI エージェントを第一級の非人間プリンシパルとして導入する
created_at: 2026-06-22
status: completed
authors: [tn]

motivation: |
  AI エージェント (LLM ベースの自律・半自律ソフトウェア) が企業内で API を呼び、
  データを取得し、ユーザーに代わって行動する利用が広がっている。現代の IdP は
  エージェントを「人間でもなければ従来のサービスアカウントでもない」第一級の
  プリンシパル種別として扱い始めた。Microsoft は Entra Agent ID (2026-04 GA) で
  エージェントにディレクトリ上の ID を自動付与し、Okta / Auth0・Google・Ping も
  非人間 ID (Non-Human Identity, NHI) としてのエージェント管理を提供する。

  ra-idp-go は現状 User と OAuth2Client (machine 含む) しか持たず、エージェント固有の
  「所有者 (人間 / 組織) との結びつき」「目的・用途の宣言」「ライフサイクルと即時
  停止 (kill switch)」「人間の関与レベル (自律 / 監督下)」を一級概念として表現できない。
  本 WI は後続の委譲 ([[wi-50-token-exchange-delegation-actor-chain]])・代行・ガバナンス
  ([[wi-59-agent-governance-guardrails-audit-inventory]]) の土台として、Agent 集約を
  導入する。エージェントの資格情報そのものは既存の OAuth2Client (client_credentials)
  を再利用し、Agent はその上位に立つ統制・所有・来歴のための集約とする。

scope:
  decision:
    - >-
      新規 ADR [[ADR-048]]: Agent を User / OAuth2Client と別の第一級プリンシパルとする根拠、
      所有者モデル (human owner / owning group / 組織)、エージェントと OAuth2Client
      の関係 (Agent は 1 つ以上の client 資格情報を所有)、status / kill-switch の
      セマンティクス、tenant 帰属を確定する。
  scl:
    - >-
      新規 model: Agent / AgentStatus / AgentOwner / AgentKind (autonomous /
      supervised) / AgentCredentialBinding。AccessTokenClaims に発行先が Agent で
      あることを示す principal type を追加する。
    - >-
      新規 event: AgentRegistered / AgentUpdated / AgentDisabled / AgentEnabled /
      AgentDeleted / AgentOwnerChanged。
    - >-
      新規 interface: admin の Agent CRUD と一覧 (registry)、kill-switch 操作。
      permission `AdminAgentsManage`。
  go:
    - Agent 集約と Postgres adapter (agents テーブル、owner / client への外部キー、tenant scope)。
    - >-
      token 発行経路で principal が Agent の場合に Agent の status を fail-closed で
      確認し、disabled / killed のエージェントには発行しない。
  http:
    - /admin/agents の CRUD と kill-switch エンドポイント。
  ui:
    - admin: エージェント登録・一覧 (registry)・所有者表示・無効化 / kill-switch。

out_of_scope:
  - 委譲・代行トークン (Token Exchange) 自体の実装 ([[wi-50-token-exchange-delegation-actor-chain]] で扱う)。
  - workload attestation によるエージェント起動時ブートストラップ ([[wi-54-workload-identity-federation-spiffe]])。
  - エージェントの予算・レート上限などガードレール ([[wi-59-agent-governance-guardrails-audit-inventory]])。
  - エージェント検証可能クレデンシャル / agent passport (将来 WI、[[wi-47-verifiable-credentials-oid4vci-oid4vp]] の延長)。

affected_guarantees:
  - 所有の明確化: すべてのエージェントは人間または組織の所有者に紐づき、孤立した非人間 ID を作らない。
  - 即時停止: kill-switch を立てたエージェントには新規トークンを発行しない (fail-closed)。
  - tenant isolation: エージェントの登録・参照・操作は tenant-scoped。
  - 監査: エージェントの登録・変更・無効化・所有者変更を監査イベントに残す。

verification:
  - cmd: 'go test ./...'
    in: ra-idp-go
    reason: Agent status による発行可否、kill-switch の fail-closed、tenant scope の境界。
  - cmd: 'golangci-lint run ./...'
    in: ra-idp-go
  - cmd: 'go build ./...'
    in: ra-idp-go
  - cmd: 'bun --cwd ra-idp-go/ui typecheck'
  - cmd: 'bun --cwd ra-idp-go/ui lint'
  - cmd: 'bun --cwd ra-idp-go/ui build'
  - '手動: エージェントを登録 → トークン発行 → kill-switch → 同じエージェントのトークン発行が拒否されることを確認する。'

risk: medium
risk_notes: |
  Agent をプリンシパルとして導入するとトークンの主体種別が増え、認可判断 (AuthZEN)
  と監査の前提が広がる。エージェントの資格情報は新設せず既存 OAuth2Client に集約し、
  Agent は所有・統制・来歴の層に限定することで攻撃面の二重化を避ける。status / kill
  の確認は発行経路で fail-closed とし、判定漏れがあっても「発行しない」側に倒す。

completion:
  completed_at: 2026-06-22
  summary: |
    ADR-048 に基づき、Agent を User / OAuth2Client と別の第一級プリンシパルとして
    spec-first で end-to-end 実装した。SCL に Agent 系 model / enum (AgentStatus =
    Active/Disabled/Killed, AgentKind)、9 イベント、AgentLifecycle 状態機械、10 admin
    interface、AdminAgentsManage 権限、vocabulary を追加し、Authentication component の
    owns_* と Go の policy action / interface マッピングを更新した。Go は domain 型・
    検証・repository port・Postgres / in-memory adapter・migration 0013・admin CRUD
    use case / HTTP ハンドラ (register / update / disable・enable / kill / delete /
    credential bind・unbind) を実装。トークン発行経路 (client_credentials) に、束縛
    client から Agent を解決し !IsActive() なら invalid_client で拒否する fail-closed
    ゲートを入れ、束縛時は agent_id / principal_type=agent クレームを付与する。管理 UI
    (一覧・登録・所有者表示・無効化 / kill / 削除・資格情報束縛) は groups を踏襲して追加した。
  semantic_diff:
    before:
      principals: User と OAuth2Client のみ。エージェント固有の所有・統制・即時停止を一級で表現できない。
      token_issuance: client_credentials は principal の運用状態ゲートを持たない。
    after:
      principals: Agent (tenant-scoped 非人間 identity) を追加。owner 必須、status は active/disabled/killed (kill は一方向終端)。
      token_issuance: 束縛 Agent が Active 以外なら client_credentials を fail-closed で拒否し、agent_id を token に刻む。
  verification:
    - cmd: 'go build ./...'
      in: ra-idp-go
      result: ok
    - cmd: 'go test ./...'
      in: ra-idp-go
      result: ok, no failures (admin_agents use case / FindByClientID / kill 一方向性 / cross-tenant / enum coherence を含む)
    - cmd: 'golangci-lint run ./...'
      in: ra-idp-go
      result: ok, 0 issues
    - cmd: 'bun --cwd ra-idp-go/ui typecheck'
      result: ok
    - cmd: 'bun --cwd ra-idp-go/ui lint'
      result: ok, 59 files no issues
    - cmd: 'bun --cwd ra-idp-go/ui build'
      result: ok
    - cmd: 'bun run yaml-check:scl'
      in: tools
      result: ok
    - 'manual: register → token 発行 → kill → 同一エージェントの token 発行拒否 の live e2e は本環境 (DB 未起動) では未実行。'
  affected_guarantees_state:
    - 所有の明確化: pass。owner_sub は non_empty 必須で、RegisterAgent は未指定時に実行者を所有者とする。
    - 即時停止: pass (logic)。client_credentials ゲートが FindByClientID で束縛 Agent を解決し Disabled/Killed を invalid_client で拒否する。use case / repo は単体テスト済、ゲート自体は build 検証のみ (HTTP レベルテストは未追加 → residual)。
    - tenant isolation: pass。repository は全メソッド tenant 引数を取り、cross-tenant 参照拒否をテストで確認した。
    - 監査: pass。Agent ライフサイクル 9 イベントを outbox (iam.agents.v1) / kafka partition key 経由で emit する。
  residual_risk:
    - トークン発行ゲートの HTTP レベルテストと live Postgres での手動 e2e は未実施。ゲートのロジックは use case / repository 単体テストと build で裏付けたが、エンドツーエンドの自動テストは今後追加する。
    - killed の Agent は delete も拒否される (監査保持を優先)。将来 purge 経路を別途検討する。
    - owner は現状 human User の sub のみ。owning Group / 組織所有は将来拡張 (ADR-048 の射程内)。
    - AgentCredentialBinding は client_id 文字列の束縛に留め、bind 時の client 存在・tenant 一致の強検証は今後強化する。
  traceability:
    spec: spec/scl.yaml (Agent / AgentCredentialBinding / AgentStatus / AgentKind / 9 events / AgentLifecycle / 10 interfaces / AdminAgentsManage)
    domain: internal/spec/{agents,enums,events,validation,policy}.go
    port: internal/authentication/ports/agent_repository.go
    usecase: internal/authentication/usecases/admin_agents.go (+ _test.go)
    adapters: internal/adapters/persistence/{postgres,memory}/agents.go, internal/adapters/http/admin_agent_handler.go, internal/adapters/http/token_handler.go (発行ゲート), infra/migrations/0013_agents.sql
    ui: ra-idp-go/ui/src/pages/AdminAgentsPage.tsx (+ types.ts / api.ts / router.tsx / lib/adminNav.ts)
  human_decisions:
    - イベント名は ADR-048 §7 準拠 (AgentRegistered 等)、権限は AdminClientsManage と同型の単一 AdminAgentsManage とする。
    - enum の wire 値は既存 UserStatus / TenantStatus 慣習に合わせ小文字 (active / disabled / killed, autonomous / supervised)。
    - 状態機械 transition は既存 SCL schema に従い from / event / to 表記を用いる。
