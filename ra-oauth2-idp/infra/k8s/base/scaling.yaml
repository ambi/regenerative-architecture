apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ra-oauth2-idp
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ra-oauth2-idp
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Pods
      pods:
        metric:
          name: oauth2_token_requests_per_second  # PromAdapter で oauth2_token_requests_total から導出
        target:
          type: AverageValue
          averageValue: "100"
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ra-oauth2-idp
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ra-oauth2-idp
