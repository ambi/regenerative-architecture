apiVersion: apps/v1
kind: Deployment
metadata:
  name: ra-idp
  labels:
    app.kubernetes.io/name: ra-idp
    app.kubernetes.io/component: identity-provider
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: ra-idp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ra-idp
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
    spec:
      serviceAccountName: ra-idp
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: idp
          image: ghcr.io/example/ra-idp:latest  # overlay で上書き
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: PORT
              value: "3000"
            - name: PERSISTENCE
              value: postgres
            - name: EVENT_SINK
              value: outbox
            - name: OBSERVABILITY
              value: otel
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.observability.svc.cluster.local:4318
            - name: OTEL_SERVICE_NAME
              value: ra-idp
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ra-idp-secrets
                  key: database_url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: ra-idp-secrets
                  key: redis_url
            - name: ISSUER
              valueFrom:
                configMapKeyRef:
                  name: ra-idp-config
                  key: issuer
            - name: SKIP_DEMO_SEED
              value: "1"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          startupProbe:
            httpGet: { path: /health, port: http }
            periodSeconds: 2
            failureThreshold: 30
          readinessProbe:
            httpGet: { path: /health, port: http }
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet: { path: /health, port: http }
            periodSeconds: 10
            failureThreshold: 6
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
