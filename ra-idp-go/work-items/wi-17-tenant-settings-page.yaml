id: wi-17-tenant-settings-page
title: 管理画面に「設定」ページを追加してテナント単位の設定を集約する
created_at: 2026-06-16
status: completed
authors: [tn]

motivation: |
  現状、管理画面に "設定" の入口が無い。テナント単位で admin が触れる
  設定項目は以下のように散らばっている:

  - **テナント表示名 (display_name)**: `/admin/tenants` の中で
    system_admin かつ default tenant の場合のみ編集可。所属テナント
    自体の表示名を変えるのに別経路が必要。
  - **パスワードポリシー上書き (password_policy_override)**: 同じく
    `/admin/tenants` 経由でしか触れない。テナント内 admin (system_admin
    でない普通の admin) は触る経路を持たない。
  - **メール送信設定 / 監査保持期間 / セッションタイムアウト**: 環境
    変数や SCL 経由でのみ調整でき、UI から見えない。

  admin が "うちのテナントの設定を見たい・直したい" と思ったとき、
  まず開く想定の場所が無いことが UX 上の摩擦になっている。
  Okta は "Account" / "Customization" / "Security" の sidebar セクション、
  Google Admin は "Account settings"、Microsoft 365 admin は "Settings"
  にそれぞれ集約している。

  本 WI は専用の `/admin/settings` ページを新設し、テナント内 admin が
  触れる設定 (まずは表示名 + パスワードポリシー override) を集約する。
  将来 wi-15 の RBAC inspection、メール送信設定、監査保持期間と
  同列の設定タブが増える前提の枠を作る。

scope:
  decision:
    - 新規 ADR は不要。既存 ADR-032 (tenant aggregate) と ADR-026
      (password policy) の範囲で、UI を 1 ページ足すだけ。

  scl:
    - 変更なし。Tenant model / password_policy_override / DisplayName
      の wire 形式はそのまま流用する。

  go:
    http:
      - >-
        既存 `/admin/tenants` (system_admin scope) が tenant CRUD を
        提供している。本 WI では新規 endpoint を作らず、テナント内
        admin が自身の所属テナントを **GET + PATCH** できる経路を
        どう開くかを設計する。選択肢:
          A. 既存 `/admin/tenants/{tenant_id}` の RBAC を緩める
             (admin が自テナントのみ触れる)。system_admin との二重
             権限になり ADR-032 の境界が緩む。
          B. 新規 `/api/admin/settings` を追加し、内部で
             `actor.tenant_id` 固定の GetTenant / UpdateTenant を呼ぶ。
             tenant の境界は守られ、UI 側からは単純な GET / PATCH。
        本 WI は **選択肢 B** を採用する。
      - >-
        新規 endpoint:
          GET   `/api/admin/settings`  → 自テナントの display_name と
                                         password_policy_override を返す。
          PATCH `/api/admin/settings`  → display_name (任意) と
                                         password_policy_override (任意) を
                                         pointer-optional で受ける。
        既存 `requireAdmin` + CSRF + tenant scope を継承する。
        `UpdateTenant` use case を内部で呼ぶ (新規 use case は作らない)。
    usecases:
      - 既存 `tenancyusecases.UpdateTenant` を流用する。actor が
        system_admin かどうかではなく `actor.tenant_id == target.id`
        を最低要件として呼ぶための薄い wrapper を bridge する。

  ui:
    pages:
      - >-
        新規 AdminSettingsPage at `/admin/settings`。タブ風の縦並び:
          - 一般 (General): tenant.display_name の編集。
          - パスワードポリシー (Password policy): min_length / max_length /
            history_depth を pointer-optional で編集。空欄なら global
            default を継承することをラベルで示す。
          - 後続のタブ枠を 1 つ "メール送信" (disabled) として置いて
            おき、将来の wi で実装する旨を示す。
      - 保存は per-tab。各 tab に独立した form と CTA "保存"。
      - system_admin かつ default tenant の場合は、ページ上部に
        "テナント一覧から他テナントの設定を編集する場合は `/admin/tenants`
        を使ってください" の補足リンクを出す。
    navigation:
      - >-
        `adminNavItems` の末尾 (テナント nav 項目より下、もしくは
        sidebar の "Settings" セクションを新設するなら最下段) に
        "設定" を追加する。AdminNavKey に `settings` を追加。
    routing:
      - >-
        `/admin/settings` を router.tsx に追加し、loadPageData で
        `kind: 'admin-settings'` を返す。
      - loadPageData は `/api/admin/settings` を取得して初期値を埋める。

  documentation:
    - ra-idp-go/README.md "範囲" 節に "テナント内 admin 向けの設定
      ページ" を 1 行追加する。詳細は ADR に書かない (既存 ADR で
      十分)。

out_of_scope:
  - 個人 (admin 自身) 用の設定 (display name / MFA 切り替え /
    notification preferences)。これは end user 側 `/account/*` の
    拡張で扱う別 WI に分離する。
  - メール送信設定 (SMTP host / from / DKIM 等) の UI。ADR-035 で
    決定済みの環境変数経由を維持し、UI からの変更は別 WI。
  - 監査保持期間 / セッションタイムアウトの UI。
  - tenant の作成・無効化・削除。`/admin/tenants` の system_admin 経路を
    継続して使う。
  - tenant 横断 / 統合 admin ダッシュボード。
  - branding (logo / theme color / custom domain)。Phase 5+ のスコープ。
  - i18n の追加。

affected_guarantees:
  - >-
    tenant isolation: 新規 `/api/admin/settings` は内部で actor.tenant_id
    固定の `UpdateTenant` を呼ぶ。cross-tenant 書き込みはできない。
  - >-
    admin RBAC: 既存 `requireAdmin` + CSRF + Origin の検証を継承。
    system_admin だけが触れた password_policy_override を admin にも
    解放するため、ADR-032 の "テナント内権限は admin、テナント境界
    管理は system_admin" の方針を強化する形になる (policy override は
    境界変更ではなく境界内の policy なので admin が触ってよい)。
  - >-
    SCL coherence: 新規 model / event を追加しない。新規 interface
    (`GetAdminSettings` / `UpdateAdminSettings`) と permission
    (`AdminSettingsRead` / `AdminSettingsUpdate`) を SCL に追加する。
    Authentication or Tenancy component の所有割り当てを決める
    (本 WI は **Tenancy** に所有させる: tenant の表示名と policy の
    設定であり、user lifecycle ではない)。
  - >-
    backend 既存挙動: `/admin/tenants` の挙動は不変。

verification:
  - cmd: 'go test ./...'
    in: ra-idp-go
    reason: 新規 handler のテスト (admin が自テナント設定を GET /
      PATCH できる、cross-tenant への書き込みは tenancy 境界で失敗、
      system_admin と admin の両方で同じレスポンスを返す)。
  - cmd: 'go vet ./...'
    in: ra-idp-go
  - cmd: 'go build ./...'
    in: ra-idp-go
  - cmd: 'bun --cwd ra-idp-go/ui typecheck'
  - cmd: 'bun --cwd ra-idp-go/ui lint'
  - cmd: 'bun --cwd ra-idp-go/ui build'
  - >-
    手動 1: admin (default tenant) で `/admin/settings` を開く →
    display_name と password_policy_override が現在値で表示される。
  - >-
    手動 2: password_policy_override.min_length を変更して保存 →
    再ロードで反映されている。
  - >-
    手動 3: 同 tenant 内の別 user 作成時に新しい min_length が
    適用される。
  - >-
    手動 4: system_admin かつ default tenant 以外のテナントで
    `/admin/settings` を触っても自テナントだけが対象。

risk: low
risk_notes: |
  既存 `UpdateTenant` use case を流用するため、新規 business logic は
  ほぼ無い。最大のリスクは "admin に password_policy_override を
  解放することで policy を弱める方向に変えられる" 点。本 WI では
  下限 (min_length の最低値・max_length の上限値) を SCL の global
  default で gating し、override が global より弱い場合は use case
  側で reject する制約を追加する。

  別途、tenant 内 admin が誤って強すぎる policy (例:
  history_depth=100) を入れると、その tenant 内のパスワード変更が
  事実上できなくなる。これは UI 側の上限制約 (フォームの max 値) で
  防御する。

completion:
  completed_at: 2026-06-17

  summary: |
    テナント内 admin と system_admin が自テナントの表示名・パスワードポリシー上書きを
    閲覧・更新できる `/api/admin/settings` (GET / PATCH) と `/admin/settings` ページを
    追加した。対象は actor.tenant_id に固定し cross-tenant 操作は構造的に発生しない。
    password_policy_override が objectives.PasswordPolicy の標準値より弱い値を含む
    場合は use case 側で reject する。既存 `/admin/tenants` (system_admin) の挙動は
    不変だが、password_policy_override が UpdateTenant に到達しなかった既存バグも
    併せて修正した。
    続いて UX 整理のフォローアップで、`AdminSettingsResponse` に
    `password_policy_defaults` を埋め込み、UI に「標準 最小長 12 / 最大長 128 /
    履歴件数 5」のサマリと具体数字の hint・placeholder を表示するようにした。
    「global default」というユーザ向け文言を「標準値」に統一し、weaker policy の
    エラー文言にも具体数値 (`min_length≥12 / max_length≤128 / history_depth≥5`) を
    含めた。

  semantic_diff:
    before: |
      admin は所属テナントの表示名と password_policy_override を UI から触れない。
      UpdateTenant は display_name しか反映せず、AdminTenantsPage が送る
      password_policy_override は silently に無視されていた。設定 UI / エラー文言で
      「global default」と言うだけで具体値が見えない。
    after: |
      admin が `/admin/settings` から自テナントの表示名と password_policy_override を
      変更できる。標準値より弱い override は HTTP 400 policy_override_weaker で
      具体的な閾値とともに拒否される。system_admin の `/admin/tenants` 経由でも
      override が反映される。設定 UI には objectives.PasswordPolicy の現行値が
      具体数字で表示され、数値入力は標準値で制約される。

  traceability:
    specification:
      - ra-idp-go/spec/scl.yaml interfaces.GetAdminSettings
      - ra-idp-go/spec/scl.yaml interfaces.UpdateAdminSettings
      - ra-idp-go/spec/scl.yaml permissions.AdminSettingsRead
      - ra-idp-go/spec/scl.yaml permissions.AdminSettingsUpdate
      - ra-idp-go/spec/scl.yaml models.AdminSettingsResponse
      - ra-idp-go/spec/scl.yaml models.PasswordPolicyDefaults
      - ra-idp-go/spec/scl.yaml components.Tenancy.owns_models
      - ra-idp-go/spec/scl.yaml components.Tenancy.owns_interfaces
      - ra-idp-go/spec/scl.yaml components.Tenancy.owns_permissions
    implementation:
      - ra-idp-go/internal/tenancy/usecases/manage_tenants.go
      - ra-idp-go/internal/adapters/http/admin_settings_handler.go
      - ra-idp-go/internal/adapters/http/admin_tenant_handler.go
      - ra-idp-go/internal/adapters/http/routes.go
      - ra-idp-go/internal/spec/policy.go
      - ra-idp-go/internal/oauth2/usecases/role_policies.go
      - ra-idp-go/ui/src/pages/AdminSettingsPage.tsx
      - ra-idp-go/ui/src/lib/adminNav.ts
      - ra-idp-go/ui/src/router.tsx
      - ra-idp-go/ui/src/api.ts
      - ra-idp-go/ui/src/types.ts
      - ra-idp-go/README.md
    tests:
      - ra-idp-go/internal/tenancy/usecases/manage_tenants_test.go
      - ra-idp-go/internal/adapters/http/admin_settings_handler_test.go

  affected_guarantees_state:
    - "tenant isolation: GET / PATCH /api/admin/settings は actor.tenant_id に固定。cross-tenant 書き込みは存在しない。"
    - "admin RBAC: AdminSettingsRead / AdminSettingsUpdate は admin / system_admin に限定。requireTenantAdmin が actor.tenant_id == request tenant を強制する。"
    - "CSRF: PATCH は verifyBrowserRequest を継承し double-submit を要求する。"
    - "SCL coherence: 新規 interface 2 件 / permission 2 件 / value_object 2 件 (AdminSettingsResponse, PasswordPolicyDefaults) を追加し、TenantUpdated event / TenantUpdateRequest model を流用。Tenancy component の owns_* に追加済み。SCLPermissionsCoverage テストで Go action マッピングを検証。"
    - "policy floor: password_policy_override は objectives.PasswordPolicy の標準値より弱い場合 ErrPolicyOverrideWeaker / HTTP 400 policy_override_weaker で reject。閾値は AdminSettingsResponse.password_policy_defaults として UI にも返却される。"
    - "UX: UI / エラー文言ともに「標準値」表記に統一。「global default」のような SCL 用語をユーザに露出しない。"

  verification:
    - cmd: "GOCACHE=/tmp/ra-idp-go-cache go test -race ./..."
      in: ra-idp-go
      result: ok
    - cmd: "GOCACHE=/tmp/ra-idp-go-cache go vet ./..."
      in: ra-idp-go
      result: ok
    - cmd: "GOCACHE=/tmp/ra-idp-go-cache go build ./..."
      in: ra-idp-go
      result: ok
    - cmd: "bun --cwd ra-idp-go/ui typecheck"
      result: ok
    - cmd: "bun --cwd ra-idp-go/ui lint"
      result: "ok (43 files)"
    - cmd: "bun --cwd ra-idp-go/ui build"
      result: "ok (6350 modules)"
    - "実ブラウザでの 4 手動テストケース (admin 編集 / min_length 反映確認 / cross-tenant ガード / system_admin alert) と、パスワードポリシータブで標準値カードが具体数値で表示されることの目視確認は未実施。"

  residual_risk:
    - "policy floor 比較は MinLength≥standard / MaxLength≤standard / HistoryDepth≥standard の 3 軸のみで、objectives.PasswordPolicy が将来増えても自動追従しない。新フィールド追加時に enforcePolicyFloor と PasswordPolicyDefaults を併せて更新する必要がある。"
    - "メール送信タブは disabled 状態で枠だけ提供。実装は別 WI で行う。"
    - "UI の数値入力に min/max と placeholder を標準値で設定したが、HTML form の制約のみで強制力は弱い。サーバ側 use case が最終 gate。"
    - "AdminSettingsResponse は password_policy_override が無いテナントでも password_policy_defaults を毎回返す。SCL からの解決が増えるが、d.SCL.ObjectiveInt は O(1) で in-memory なため latency 影響は軽微。"

  human_decisions:
    - "WI-17 が言及する \"既存 UpdateTenant を流用\" の解釈として、Update のシグネチャを UpdateInput / PolicyFloor を受け取る形に拡張した。これにより `/admin/tenants` 経由でも password_policy_override が反映されるようになった (既存の silent ignore バグの解消)。"
    - "AdminSettings* permission の allow_when は admin OR system_admin にしている。system_admin が default tenant で /api/admin/settings を呼ぶときは自テナント (default) を対象とする。`/admin/tenants` (system_admin 専用 / 他テナント編集可) との棲み分けは UI 上の補助リンクで明示。"
    - "policy override の解除手段として、空の object `{}` を送ると override が nil に戻る挙動を採用した。null 明示削除は SCL の TenantUpdateRequest 説明にあるが、本 WI ではフィールドの個別解除よりまとめて標準値に戻す経路だけを公開している。"
    - "ユーザに対しては「global default」の語を露出させない方針に揃えた。SCL 内部 (PasswordPolicyOverride / Tenant の description) では従来通り「global default」を使うが、UI 表示・HTTP エラーメッセージは「標準値」+ 具体数字に統一する。"
