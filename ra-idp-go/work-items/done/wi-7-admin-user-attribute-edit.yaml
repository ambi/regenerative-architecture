id: wi-7-admin-user-attribute-edit
title: 管理画面でユーザ属性 (preferred_username / name / email / email_verified) を編集できるようにする
created_at: 2026-06-15
status: completed
authors: [tn]

motivation: |
  ra-idp-go の `UpdateUser` use case と HTTP endpoint
  (`PATCH /admin/users/:sub`) は `PreferredUsername` / `Name` / `Email` /
  `EmailVerified` / `Roles` を受け取れる。ところが UI 側 (AdminUsersPage)
  は `RoleEditorDialog` (ロールのみ) と Disable / Enable しか叩いておらず、
  実運用で発生する次のオペレーションが UI からできない:
    - メールアドレス変更 (人事異動・タイポ訂正)
    - 表示名 (`name`) / 表示用ユーザ名 (`preferred_username`) の修正
    - メールドメイン移管後の `email_verified` 再フラグ
  結果として、admin は API を直叩きするか DB に SQL を当てるしかなく、
  操作の追跡 (CSRF + audit event) も外れる。backend は完成済なので、
  UI に属性編集ダイアログを 1 つ足すだけで、本番運用に必要な
  user maintenance 作業が監査経路つきで解禁される。

  本 WI のスコープは UI のみ。新規 backend endpoint・新規 SCL field・
  新規 event は導入しない (既存 `user.updated` event を流用)。

scope:
  ui:
    pages:
      - >-
        AdminUsersPage の詳細パネル (`UserDetails`) に "属性を編集" ボタンを
        足し、`AttributeEditorDialog` を開く。
      - >-
        AttributeEditorDialog は次のフィールドを編集可能とする:
        `preferred_username` (required、unique 違反は server error として表示)、
        `name`、`email`、`email_verified` (checkbox)。
      - >-
        既存 `RoleEditorDialog` と並ぶ独立ダイアログとし、保存ボタン押下で
        PATCH `/admin/users/:sub` を呼ぶ。
      - >-
        メールアドレスを変更した場合、`email_verified` を勝手に true にしない
        (チェックを外す既定動作)。ADR-030 の email 検証規約を破らない。
    api:
      - >-
        api.ts に `updateAdminUserAttributes(csrf, sub, attrs)` を追加し、
        既存 `updateAdminUserRoles` と同じく PATCH `/admin/users/:sub` を呼ぶ。
        ロール更新と属性更新の同時送信は許可しない (ダイアログを分けるため)。
      - 既存 `updateAdminUserRoles` は変更しない (call site が増えるだけ)。
    types:
      - 既存 `AdminUser` 型を流用し、新規型は追加しない。
    navigation:
      - 既存 sidebar navigation は変更しない (新規ページ無し)。
    a11y:
      - >-
        ダイアログは `role="dialog" aria-modal="true"`、`aria-labelledby` を
        付け、既存 `RoleEditorDialog` のパターンを揃える。

  scl:
    - >-
      変更なし。`UpdateUser` interface / `user.updated` event の wire 形式は維持。

  documentation:
    - >-
      ra-idp-go/README.md の Phase 4 「ユーザ属性編集 UI」行は、本 WI 完了後
      `完了済` として除去する (completion で反映を記録する)。

out_of_scope:
  - 新規 backend endpoint / use case の追加。
  - SCL の `User` モデル拡張 (新規 attribute はこの WI では追加しない)。
  - パスワードリセットを admin が代行する経路 (別 WI 候補)。
  - >-
    email 変更時に確認メール (verification) を自動で送る連携 (Phase 0 の
    Email verification WI と統合する)。
  - >-
    監査イベントの schema 拡張。既存 `user.updated` の changed-fields 表示を
    AdminAuditEventsPage で構造化する話は別 WI とする。

affected_guarantees:
  - >-
    admin RBAC は既存 `verifyBrowserRequest` + `requireAdmin` を維持する。
    UI 側でボタンを出すかは `actor.roles.includes('admin')` で gating する
    が、最終判定は backend が行う。
  - >-
    CSRF は既存通り `X-CSRF-Token` + cookie ペアで保護する。新規 endpoint は
    無いため CSRF 仕様は不変。
  - >-
    email 変更時に `email_verified` を勝手に維持しない。UI 側で email を
    編集した瞬間 checkbox を強制 false にし、admin が明示的に true へ戻した
    時のみ true を送る (ADR-030 §4 anti-enumeration の前提を維持する)。
  - >-
    tenant 境界: 既存 `requireAdmin` が user.TenantID と request tenant の
    一致を確認しているため、本 WI で追加の境界チェックは不要。
  - >-
    SCL coherence は不変 (interface / permissions / owned_models / objectives
    すべて変更なし)。SCLPermissionsCoverage 等の coherence test は無影響。

verification:
  - cmd: 'bun --cwd ra-idp-go/ui typecheck'
  - cmd: 'bun --cwd ra-idp-go/ui lint'
  - cmd: 'bun --cwd ra-idp-go/ui build'
  - cmd: 'go test ./internal/adapters/http/... ./internal/authentication/usecases/...'
    in: ra-idp-go
    reason: backend に変更は無いが、既存の admin user handler テストの
      回帰を確認する。
  - >-
    手動: dev サーバで admin としてログイン → `/admin/users` で alice を選択 →
    属性編集ダイアログを開いて `name` と `email` を変更 → 保存 → 一覧で反映、
    `/admin/audit_events` に `user.updated` が表示される。

risk: low
risk_notes: |
  純粋な UI 追加。新規ファイル + 既存ページ内の 1 セクション追加で完結
  する。誤動作が起きても backend 側の validation で弾かれる (Zog + use case
  の email 形式チェックがある)。回帰範囲は AdminUsersPage に閉じる。

completion:
  completed_at: 2026-06-15

  summary: |
    AdminUsersPage の詳細パネルに「属性を編集」ボタンと AttributeEditorDialog
    を追加し、既に backend に存在する `PATCH /admin/users/:sub` から
    `preferred_username` / `name` / `email` / `email_verified` を編集できる
    経路を解禁した。新規 backend endpoint / 新規 SCL field / 新規 event は
    追加していない (既存 `UpdateUser` use case + `user.updated` event を流用)。

  decision_changes:
    - 新規 ADR なし。本 WI は UI のみで完結し、既存 ADR-031 の admin user API
      範囲の中で UI ギャップを埋めた。

  go_changes:
    - 変更なし。backend (use case / HTTP handler / SCL) は wi-7 のスコープから
      意図的に除外。既存の `UpdateUser` を呼び出すだけで属性編集が成立する
      ことを確認した。

  ui_changes:
    - >-
      src/api.ts に `updateAdminUserAttributes(csrfToken, sub, input)` と
      `UpdateAdminUserAttributesInput` 型を追加。既存 `updateAdminUserRoles`
      と同じ PATCH `/api/admin/users/:sub` を別の payload で叩く形に揃えた。
    - >-
      src/pages/AdminUsersPage.tsx に `AttributeEditorDialog` コンポーネントを
      追加。フィールドは preferred_username (required、trim 後の空チェック)、
      name、email、email_verified (checkbox)。
    - >-
      `UserDetails` の Profile 見出し横に "属性を編集" ボタン (IconPencil) を
      配置。既存の "ロールを変更" ボタンとは別ダイアログに分離 (wi-7 scope
      のとおりロール編集との同時送信は許可しない)。
    - >-
      email を変更したタイミングで `email_verified` を既定で false にリセット
      し、admin が明示的にチェックを戻した場合のみ true として送信する。
      UI 側に "メールを変更したため、確認済みフラグを既定で解除しています"
      のヒントを表示する (ADR-030 の anti-enumeration / 検証規約を破らない)。
    - >-
      AdminUsersPage の状態に `showAttributeEditor` と `handleAttributes`
      アクションを追加。busy / error / notice の流れは既存 `run()` ヘルパに
      乗せたため、エラー文言・通知文言の表示パターンはロール編集と同一。

  documentation_changes:
    - ra-idp-go/README.md の Phase 4 表から「ユーザ属性編集 UI」の行を削除し、
      リード文に「属性編集 (`preferred_username` / `name` / `email` /
      `email_verified`) の管理 UI も実装済」を追記。残タスクは「ユーザ削除」
      と「グループ」のみになった。

  scl_changes:
    - 変更なし。`User` model / `UpdateUser` interface / `user.updated` event の
      wire 形式は維持。SCL coherence test は無影響。

  semantic_diff:
    before:
      admin_ui_user_attributes: 編集不可 (ロール / disable / enable のみ)
      backend_update_user: 4 attributes + roles を PATCH で受け取れるが UI が叩かない
    after:
      admin_ui_user_attributes: AttributeEditorDialog で 4 attributes すべて編集可能
      backend_update_user: UI から実利用される (admin の DB 直叩き運用が不要)

  affected_guarantees_state:
    - >-
      admin RBAC: 既存 `verifyBrowserRequest` + `requireAdmin` を流用するだけ
      なので回帰は無し。HTTP handler に変更が無いことを backend test の
      pass で再確認した (admin_user_handler.go テスト群)。
    - >-
      CSRF: 既存の `X-CSRF-Token` + cookie ペアで保護される PATCH を流用。
      新規 endpoint は無いため CSRF 仕様は不変。
    - >-
      email verification 規約: email を編集すると UI が email_verified を
      既定で false にリセットする。admin が改めて true にする場合は明示
      操作が必要で、無意識のうちに未確認のメールを「確認済み」にできない。
    - >-
      tenant 境界: 既存 `requireAdmin` が user.TenantID と request tenant の
      一致を確認しているため、本 WI で追加の境界チェックは不要だった。
    - SCL coherence は不変。

  verification:
    - cmd: 'bun --cwd ra-idp-go/ui typecheck'
      result: ok (tsc --noEmit pass)
    - cmd: 'bun --cwd ra-idp-go/ui lint'
      result: ok (biome lint pass, 39 files)
    - cmd: 'bun --cwd ra-idp-go/ui build'
      result: ok (vite build pass, 6283 modules)
    - cmd: 'go test ./internal/adapters/http/... ./internal/authentication/usecases/...'
      in: ra-idp-go
      result: ok (admin_user_handler / admin_users 既存テストの回帰なし)
    - >-
      手動確認 (residual): dev サーバを起動した実ブラウザ操作は本セッションで
      は実施していない。AdminUsersPage の他ダイアログ (RoleEditor /
      CreateUser) と同パターンで実装したため typecheck / lint / build 緑で
      動作する見込み。実環境での操作確認は次回 dev 起動時に行う。

  residual_risk:
    - >-
      backend が JSON null と "値なし" を区別しないため、UI から空文字列で
      "クリア" を表現すると `*string("")` が DB に残る (元 ADR-031 / backend の
      既存仕様)。本 WI のスコープ外で、必要なら別 WI で backend に
      `*string` → `*null` の正規化を追加する。
    - >-
      email_verified の自動 false リセットは UI 側だけで強制する。
      backend は引き続き任意の値を受け付けるため、admin が curl で直接
      PATCH を叩けば email を変更しつつ email_verified=true を送れる。
      本格的な強制は use case 側の制約が必要だが、wi-7 のスコープ外。
    - >-
      手動の e2e ブラウザ確認を本セッションで実施していない。dev サーバを
      上げ直したタイミングで実画面操作を行う。

  approver_note: |
    backend に変更を入れず、UI dialog 1 つ追加するだけで wi-7 のスコープは
    完了。次の WI は wi-8 (ユーザ削除 + anonymize cascade) を予定。
