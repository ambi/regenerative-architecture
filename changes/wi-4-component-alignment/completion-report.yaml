id: wi-4-component-alignment
title: ra-idp-go の package 構成と scl.yaml components の整合性を取る
completed_at: 2026-06-14
work_item: work-item.yaml
status: completed

summary: |
  SCL components を Tenancy / Authentication / OAuth2 の 3 つに再編し、
  ra-idp-go の package 構造と 1:1 に対応させた。Go 側は invented vocabulary の
  internal/administration/ を解体し、Authentication / OAuth2 配下に再配置した。
  LoginSession を扱う SessionStore port を SCL の所有関係に合わせて
  oauth2/ports から authentication/ports へ移動した。

scl_changes:
  - >-
    components.Identity を components.Authentication にリネーム。owns_* は
    そのまま引き継いだ。description には Go 特有概念を入れない。
  - >-
    components.Authorization / Token / Trust / ClientRegistry の 4 つを
    components.OAuth2 単一に統合。
    owns_models: union (47 + 16 + 21 + 13 = 4 つの list を結合)。
    owns_states: AuthorizationCode 系 / Consent / PAR / DeviceCode /
    RefreshTokenLifecycle / SigningKeyLifecycle を結合。
    owns_events: ClientRegistered / Authorization / Token 系 / SigningKeyRotated。
    owns_interfaces: RegisterClient / Authorize 系 / Token 系 / Trust 系を結合。
    owns_invariants: ClientAuthFailureUniformity / Pkce 系 / Refresh 系 /
    SigningKeyMaxAge までを結合。
    owns_permissions: AdminClientsManage / AuthorizeInitiate /
    AdminConsentsManage / Token 系 / Admin 系を結合。
    owns_objectives: Register / Authorize / Token / Userinfo / Discovery /
    SigningKey 系を結合。
    depends_on: Tenancy と Authentication への外部依存のみに集約。
  - >-
    annotations.component: Trust → OAuth2 に 6 箇所一括置換。
    Identity / Authorization / Token / ClientRegistry を annotations に
    使う箇所は元から無かったため追加置換は不要。

go_changes:
  - >-
    internal/administration/usecases/users.go と users_test.go を
    internal/authentication/usecases/admin_users{,_test}.go に移設。
    package usecases の中で名前の generic な type Deps を AdminUserDeps に
    rename。errors.New("user not found") は既存の ErrUserNotFound を
    再利用する形に整理した。
  - >-
    internal/administration/usecases/clients.go を
    internal/oauth2/usecases/admin_clients.go に移設。
    administration が持っていた normalizedNow / equalOptionalString は
    adminNow / adminEqualOptionalString として oauth2/usecases ローカルに
    持たせた (oauth2/usecases の他の usecase は now.IsZero() を inline
    展開する流儀のため、影響を局所化)。
  - >-
    internal/administration/usecases/consents.go を
    internal/oauth2/usecases/admin_consents.go に移設。emit / adminNow は
    oauth2/usecases 内のものを共有する。
  - internal/administration/ パッケージを削除。
  - >-
    internal/oauth2/ports/session_store.go を
    internal/authentication/ports/session_store.go に移動。
    session_manager.go の import を authentication/ports に切替。
    bootstrap/deps.go の SessionStore フィールド型を
    oauthports.SessionStore から authports.SessionStore に変更。
  - >-
    上記に伴う import 文を internal/adapters/http/admin_user_handler.go /
    admin_client_handler.go / admin_consent_handler.go で更新した。

semantic_diff:
  before:
    scl_components: 6 (Tenancy / Identity / ClientRegistry / Authorization / Token / Trust)
    go_packages_with_domain_logic: 4 (tenancy / authentication / oauth2 / administration)
    mapping: not 1:1, 4 SCL components materialized as 1 Go package (oauth2)
  after:
    scl_components: 3 (Tenancy / Authentication / OAuth2)
    go_packages_with_domain_logic: 3 (tenancy / authentication / oauth2)
    mapping: 1:1

verification:
  - cmd: go build ./...
    result: ok
  - cmd: go vet ./...
    result: ok
  - cmd: go test ./...
    result: ok
  - cmd: 'grep -rE "component: (Identity|Authorization|ClientRegistry|Token|Trust)\b" ra-idp-go/spec/scl.yaml'
    result: empty (旧名は残らない)
  - cmd: 'ls ra-idp-go/internal/administration'
    result: not found

remaining_guarantees_state:
  - >-
    SCL coherence: PascalCase permission mapping と interface 名は変えていない
    ため SCLPermissionsCoverage 等は影響を受けず pass。
  - '認可ロジック (AuthZ rules): action 名・rule 名は無変更。'
  - >-
    HTTP 経路: 変更なし。すべての /api/admin/* / /token / /authorize 等は
    動作する。
  - '永続層 (Postgres / Redis / Memory): port のシグネチャを変えていない。'

residual_risk:
  - >-
    OAuth2 component が DDD 観点で粒度を失った。将来 SAML / WS-Federation 等
    別プロトコルを追加する場合は、protocol-family 単位の component を
    増やすのが自然になる (例: SAML component)。今 OAuth2 単体に集約しているのは
    ra-idp-go が現状 OAuth/OIDC 専用であることに由来する局所最適。
  - >-
    admin_users.go / admin_clients.go / admin_consents.go が各 protocol-family
    package の中に admin operations を混ぜる形になった。後で Phase 4 残課題の
    DCR 管理 / Token Exchange を実装する際、admin 系ファイルが肥大化したら
    package 内のサブディレクトリ化を検討する。

approver_note: |
  ユーザは "今の Go 実装を尊重し SCL 側を合わせる" 判断と "SCL に言語特有概念
  (Go package path) を入れない" 判断を明示した。本完了レポートはこれらに
  従い、description から internal/* 表現を取り除いている。
