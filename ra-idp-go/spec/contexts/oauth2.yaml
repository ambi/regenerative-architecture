      occurredAt:
        type: Timestamp
      tenantId:
        type: String
        description: 同意が起きたテナント ID。
      sub:
        type: String
      clientId:
        type: String
      scopes:
        type: "String[]"
  ConsentRevoked:
    kind: event
    description: ResourceOwner または所属テナントの Administrator が既存の同意を撤回した (GDPR Art.7(3) 同意撤回権)。以後の発行はブロックされる。
    payload:
      occurredAt:
        type: Timestamp
      tenantId:
        type: String
        description: 同意が属するテナント ID。
      actorSub:
        type: String
        optional: true
        description: 管理 API からの撤回時の Administrator sub。ResourceOwner 自身の撤回では省略可。
      sub:
        type: String
      clientId:
        type: String
  AuthorizationDetailsRequested:
    kind: event
    description: RFC 9396 — クライアントが /authorize・/par・/token で authorization_details を要求し、登録 type 適合検証を通過した (ADR-050)。
    payload:
      occurredAt:
        type: Timestamp
      tenantId:
        type: String
      clientId:
        type: String
      sub:
        type: String
        optional: true
        description: 要求時点で確定していれば principal の sub。
      detailTypes:
        type: "String[]"
        description: 要求された詳細の type 一覧。
  AuthorizationDetailsConsented:
    kind: event
    description: RFC 9396 — ResourceOwner が提示された authorization_details に同意した。発行・交換の部分集合判定の基準となる (ADR-050)。
    payload:
      occurredAt:
        type: Timestamp
      tenantId:
        type: String
      sub:
        type: String
      clientId:
        type: String
      detailTypes:
        type: "String[]"
  AuthorizationDetailsRejected:
    kind: event
    description: "RFC 9396 — authorization_details の構文不正・未登録 type・スキーマ不適合・同意逸脱・ダウンスコープ超過により要求を拒否した (fail-closed, ADR-050)。"
    payload:
      occurredAt:
        type: Timestamp
      tenantId:
        type: String
      clientId:
        type: String
      reason:
        type: String
        description: 拒否理由 (invalid_authorization_details 等)。
  AuthorizationCodeIssued:
    kind: event
    description: /authorize 完了時に AuthorizationCode を発行した。/token への交換まで 60 秒以内に行う必要がある。
    payload:
      occurredAt:
        type: Timestamp
      tenantId:
        type: String
        description: 認可コードを発行したテナント ID。
      clientId:
        type: String
      sub:
        type: String
      scopes:
        type: "String[]"
      codeChallengeMethod:
        type: String
        optional: true
  AuthorizationCodeRedeemed:
    kind: event
    description: AuthorizationCode が /token で正しく交換された。同一コードの再使用はファミリー失効を引き起こす。
    payload:
      occurredAt:
        type: Timestamp
      tenantId:
        type: String
        description: 交換が起きたテナント ID。
      clientId:
        type: String
      sub:
        type: String
  AccessTokenIssued:
    kind: event
    description: AccessToken (JWT) を発行した。senderConstraint がある場合は所有証明（DPoP/mTLS）バインド済み。
    payload:
      occurredAt:
        type: Timestamp
      tenantId:
        type: String
        description: トークンを発行したテナント ID。
      jti:
        type: String
      clientId:
        type: String
      sub:
        type: String
      scopes:
        type: "String[]"
      senderConstraint:
        type: AccessTokenSenderConstraint
        default: None
  RefreshTokenIssued:
    kind: event
    description: RefreshToken を発行した。familyId は元の認可コード由来のファミリーを識別し、ローテーションで継承される。
    payload:
      occurredAt:
        type: Timestamp
      tenantId:
        type: String
        description: トークンを発行したテナント ID。
      tokenId:
        type: String
      familyId:
        type: String
      parentId:
        type: String
        optional: true
      clientId:
        type: String
      sub:
        type: String
  RefreshTokenRotated:
    kind: event
    description: RefreshToken を /token で交換し、新しい子トークンを発行して親を Rotated 状態にした (ADR-004)。
    payload:
      occurredAt:
        type: Timestamp
      tenantId:
        type: String
        description: ローテーションが起きたテナント ID。
      oldTokenId:
        type: String
      newTokenId:
        type: String
      familyId:
        type: String
  TokenRevoked:
    kind: event
    description: /revoke もしくは管理操作によってトークンが失効された (RFC 7009)。監査・即時性要件あり。
    payload:
      occurredAt:
        type: Timestamp
      tenantId:
        type: String
        description: 失効が起きたテナント ID。
      tokenType:
        type: TokenType
      tokenId:
        type: String
      reason:
        type: String
        optional: true
  TokenIntrospected:
    kind: event
    description: /introspect が呼ばれてトークン状態を返した (RFC 7662)。ResourceServer の利用パターン分析に使用。
    payload:
      occurredAt:
        type: Timestamp
      tenantId:
        type: String
        description: introspection が起きたテナント ID。
      rsClientId:
        type: String
      tokenId:
        type: String
      active:
        type: Boolean
  TokenExchanged:
    kind: event
    description: RFC 8693 — トークン交換による委任トークンを発行した。delegationDepth は発行トークンの act 入れ子の深さ (ADR-049 の DelegationChainExtended はこのフィールドへ折り畳んだ)。
    payload:
      occurredAt:
        type: Timestamp
      tenantId:
        type: String
        description: トークン交換が起きたテナント ID。
      actorSub:
        type: String
        description: 発行トークンの現在アクター (act.sub)。
      subjectSub:
        type: String
        description: 発行トークンの subject (sub)。subject_token の sub を維持する。
      audience:
        type: String
        description: resource パラメータ由来の発行トークン aud。
      delegationDepth:
        type: Integer
        description: 発行トークンの act 入れ子の深さ。
  TokenExchangeRejected:
    kind: event
    description: RFC 8693 — トークン交換要求をポリシー違反・検証失敗により拒否した (fail-closed)。
    payload:
      occurredAt:
        type: Timestamp
      tenantId:
        type: String
        description: トークン交換が拒否されたテナント ID。
      actorSub:
        type: String
        optional: true
        description: 拒否時に判明している現在アクター。不明な場合は空。
      reason:
        type: String
        description: 拒否理由 (OAuth error code 等)。
  RefreshTokenReuseDetected:
    kind: event
    description: Rotated 状態の RefreshToken が再提示された。ファミリー全失効をトリガーする (RFC 9700 §4.14)。
    payload:
      occurredAt:
        type: Timestamp
      tenantId:
        type: String
        description: 再利用が検出されたテナント ID。
      familyId:
        type: String
      tokenId:
        type: String
      clientId:
        type: String
        optional: true
  PARStored:
    kind: event
    description: /par に届いた authorize パラメータをサーバー側に格納し短命の request_uri を発行した (RFC 9126)。
    payload:
      occurredAt:
        type: Timestamp
      tenantId:
        type: String
        description: PAR を受け付けたテナント ID。
      requestUri:
        type: String
      clientId:
        type: String
  DeviceAuthorizationRequested:
    kind: event
    description: RFC 8628 §3.1 — device_code/user_code を発行した。user_code は監査ログに残さない。
    payload:
      occurredAt:
        type: Timestamp
      tenantId:
        type: String
        description: デバイス認可を受け付けたテナント ID。
      clientId:
        type: String
      scopes:
        type: "String[]"
  DeviceAuthorizationApproved:
    kind: event
    description: RFC 8628 §3.3 — ユーザーが承認した。
    payload:
      occurredAt:
        type: Timestamp
      tenantId:
        type: String
        description: 承認が起きたテナント ID。
      clientId:
        type: String
      sub:
        type: String
  DeviceAuthorizationDenied:
    kind: event
    description: RFC 8628 §3.3 — ユーザーが拒否、または user_code 誤り続けた。
    payload:
      occurredAt:
        type: Timestamp
      tenantId:
        type: String
        description: 拒否が起きたテナント ID。
      clientId:
        type: String
      sub:
        type: String
        optional: true
states:
  AuthorizationCodeFlow:
    description: /authorize から /token に至る authorization request のライフサイクル。
    target: AuthorizationRequest
    initial: Received
    terminal:
      - Exchanged
      - Rejected
      - Expired
    transitions:
      - from: Received
        event: Validate
        to: AuthenticationPending
      - from: Received
        event: Reject
        to: Rejected
      - from: AuthenticationPending
        event: AuthenticateUser
        to: Authenticated
      - from: AuthenticationPending
        event: Reject
        to: Rejected
      - from: AuthenticationPending
        event: Expire
        to: Expired
      - from: Authenticated
        event: RequestConsent
        to: ConsentPending
      - from: Authenticated
        event: IssueCode
        to: CodeIssued
      - from: Authenticated
        event: Reject
        to: Rejected
      - from: ConsentPending
        event: GrantConsent
        to: Consented
      - from: ConsentPending
        event: Reject
        to: Rejected
      - from: ConsentPending
        event: Expire
        to: Expired
      - from: Consented
        event: IssueCode
        to: CodeIssued
      - from: Consented
        event: Reject
        to: Rejected
      - from: CodeIssued
        event: RedeemCode
        to: Exchanged
      - from: CodeIssued
        event: Expire
        to: Expired
  DeviceCodeFlow:
    description: RFC 8628 デバイス認可グラントのライフサイクル。device_code と user_code がペアで進む。
    target: DeviceAuthorization
    initial: Issued
    terminal:
      - Exchanged
      - Denied
      - Expired
    transitions:
      - from: Issued
        event: EnterUserCode
        to: UserCodeEntered
      - from: Issued
        event: Expire
        to: Expired
      - from: UserCodeEntered
        event: Approve
        to: Approved
      - from: UserCodeEntered
        event: Deny
        to: Denied
      - from: UserCodeEntered
        event: Expire
        to: Expired
      - from: Approved
        event: Exchange
        to: Exchanged
      - from: Approved
        event: Expire
        to: Expired
  RefreshTokenLifecycle:
    description: RefreshToken のライフサイクル。Rotate で子トークンに引き継がれ、Revoke で失効、Expire で期限切れ。Rotated 後も家族失効により Revoked へ遷移しうる（RFC 9700 §4.14）。
    target: RefreshTokenRecord
    initial: Active
    terminal:
      - Revoked
      - Expired
    transitions:
      - from: Active
        event: Rotate
        to: Rotated
      - from: Active
        event: RevokeToken
        to: Revoked
      - from: Active
        event: Expire
        to: Expired
      - from: Rotated
        event: RevokeToken
        to: Revoked
      - from: Rotated
        event: Expire
        to: Expired
  AuthorizationCodeRecordLifecycle:
    description: 発行された AuthorizationCode 本体のライフサイクル。AuthorizationCodeFlow（AuthorizationRequest 側）の Exchanged に対応するのが Redeemed。
    target: AuthorizationCodeRecord
    initial: Issued
    terminal:
      - Redeemed
      - Expired
    transitions:
      - from: Issued
        event: RedeemCode
        to: Redeemed
      - from: Issued
        event: Expire
        to: Expired
  ConsentLifecycle:
    description: 同意レコードのライフサイクル。GDPR Art.7(3) により Granted → Revoked が可能。
    target: Consent
    initial: Granted
    terminal:
      - Revoked
      - Expired
    transitions:
      - from: Granted
        event: RevokeConsent
        to: Revoked
      - from: Granted
        event: Expire
        to: Expired
  PARRecordLifecycle:
    description: PAR で発行された request_uri のライフサイクル。/authorize から一度だけ参照可能（RFC 9126）。
    target: PARRecord
    initial: Stored
    terminal:
      - Used
      - Expired
    transitions:
      - from: Stored
        event: Use
        to: Used
      - from: Stored
        event: Expire
        to: Expired
interfaces:
  RegisterClient:
    description: Dynamic Client Registration (RFC 7591)
    steps:
      - "{client_type} クライアント {client_name} を redirect_uri {redirect_uris} で登録する"
    input:
      request:
        type: ClientRegistrationRequest
    output:
      client:
        type: OAuth2Client
    errors:
      - InvalidRequestError
    emits:
      - ClientRegistered
    bindings:
      - kind: http
        method: POST
        path: /register
  Authorize:
    description: Authorization endpoint (RFC 6749 §4.1.1)
    steps:
      - "{client_id} として scope {scope} で認可リクエストを送る"
      - "{client_id} として redirect_uri {redirect_uri} で認可リクエストを送る"
      - "{client_id} として prompt {prompt} で認可リクエストを送る"
      - "request_uri {request_uri} で認可リクエストを送る"
    input:
      params:
        type: AuthorizeParameters
    errors:
      - InvalidRequestError
      - InvalidClientError
      - AccessDeniedError
    emits:
      - AuthorizationCodeIssued
      - ConsentGranted
    bindings:
      - kind: http
        method: GET
        path: /authorize
        request_form: query
        successful_status_codes:
          - "302"
  GetBrowserTransaction:
    description: SPA が HttpOnly transaction cookie に対応するログイン・同意コンテキストを取得する。
    output:
      response:
        type: BrowserTransactionResponse
    errors:
      - InvalidRequestError
    read_only: true
    bindings:
      - kind: http
        method: GET
        path: /api/auth/transaction
  SubmitBrowserConsent:
    description: SPA JSON API から authorization request の同意・拒否を確定する。
    input:
      request:
        type: BrowserConsentRequest
    output:
      response:
        type: BrowserFlowResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - ConsentGranted
      - AuthorizationCodeIssued
    bindings:
      - kind: http
        method: POST
        path: /api/auth/consent
        request_body: json
  SubmitBrowserDevice:
    description: SPA JSON API から device user_code を承認または拒否する。
    input:
      request:
        type: BrowserDeviceRequest
    output:
      response:
        type: BrowserFlowResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - DeviceAuthorizationApproved
      - DeviceAuthorizationDenied
    bindings:
      - kind: http
        method: POST
        path: /api/auth/device
        request_body: json
  GetBrowserDeviceContext:
    description: SPA が device user_code と CSRF token を取得する。
    output:
      response:
        type: BrowserDeviceContextResponse
    read_only: true
    bindings:
      - kind: http
        method: GET
        path: /api/auth/device
  EndSession:
    description: RP-Initiated Logout endpoint (OIDC RP-Initiated Logout 1.0)。redirect 検証は OAuth2/OIDC bounded context が行い、session revocation は Authentication bounded context の SessionManager に委譲する。
    steps:
      - "{client_id} として post_logout_redirect_uri {post_logout_redirect_uri} でログアウトする"
    input:
      params:
        type: EndSessionParameters
    errors:
      - InvalidRequestError
    bindings:
      - kind: http
        method: GET
        path: /end_session
        request_form: query
        successful_status_codes:
          - "200"
          - "302"
      - kind: http
        method: POST
        path: /end_session
        request_form: form
        successful_status_codes:
          - "200"
          - "302"
  PushAuthorizationRequest:
    description: Pushed Authorization Request (RFC 9126)
    steps:
      - "{client_id} として認可リクエストを事前送信する"
    input:
      request:
        type: ParRequest
    output:
      response:
        type: ParResponse
    errors:
      - InvalidRequestError
      - InvalidClientError
    emits:
      - PARStored
    bindings:
      - kind: http
        method: POST
        path: /par
        request_form: form
  Token:
    description: Token endpoint (RFC 6749 §3.2 + 9068 + 9449)
    steps:
      - "認可コード {code} を verifier {code_verifier} で交換する"
      - "リフレッシュトークン {refresh_token} を交換する"
      - "device_code {device_code} を交換する"
      - "client_credentials で scope {scope} のトークンを取得する"
      - "subject_token {subject_token} を resource {resource} 向けに交換する"
    input:
      request:
        type: TokenRequest
    output:
      response:
        type: TokenResponse
    errors:
      - InvalidRequestError
      - InvalidClientError
      - InvalidGrantError
      - UnsupportedGrantTypeError
      - InvalidScopeError
      - InvalidDpopProofError
      - AuthorizationPendingError
      - SlowDownError
      - AccessDeniedError
      - ExpiredTokenError
    emits:
      - AccessTokenIssued
      - RefreshTokenIssued
      - RefreshTokenRotated
      - RefreshTokenReuseDetected
      - AuthorizationCodeRedeemed
      - TokenExchanged
      - TokenExchangeRejected
    bindings:
      - kind: http
        method: POST
        path: /token
        request_form: form
        headers:
          dpop:
            type: String
            optional: true
  Introspect:
    description: Token Introspection (RFC 7662)
    steps:
      - "トークン {token} を検査する"
    input:
      request:
        type: IntrospectionRequest
    output:
      response:
        type: IntrospectionResponse
    errors:
      - InvalidClientError
      - InvalidTokenError
    emits:
      - TokenIntrospected
    bindings:
      - kind: http
        method: POST
        path: /introspect
        request_form: form
  Revoke:
    description: Token Revocation (RFC 7009)
    steps:
      - "トークン {token} を失効させる"
    input:
      request:
        type: RevokeRequest
    errors:
      - InvalidClientError
    emits:
      - TokenRevoked
    bindings:
      - kind: http
        method: POST
        path: /revoke
        request_form: form
        successful_status_codes:
          - "200"
  UserInfo:
    description: UserInfo (OIDC Core §5.3)
    steps:
      - "トークン {access_token} でユーザー情報を取得する"
    output:
      response:
        type: UserInfoResponse
    errors:
      - InvalidTokenError
      - InsufficientScopeError
    bindings:
      - kind: http
        method: GET
        path: /userinfo
        headers:
          authorization:
            type: String
  PostUserInfo:
    description: UserInfo の POST binding (OIDC Core §5.3)
    steps:
      - "トークン {access_token} でユーザー情報を取得する"
    output:
      response:
        type: UserInfoResponse
    errors:
      - InvalidTokenError
      - InsufficientScopeError
    bindings:
      - kind: http
        method: POST
        path: /userinfo
        headers:
          authorization:
            type: String
  DeviceAuthorization:
    description: Device Authorization Request (RFC 8628 §3.1)
    steps:
      - "{client_id} として scope {scope} でデバイス認可を開始する"
    input:
      request:
        type: DeviceAuthorizationRequest
    output:
      response:
        type: DeviceAuthorizationResponse
    errors:
      - InvalidRequestError
      - InvalidClientError
    emits:
      - DeviceAuthorizationRequested
    bindings:
      - kind: http
        method: POST
        path: /device_authorization
        request_form: form
  GetOpenidConfiguration:
    description: OIDC Discovery
    steps:
      - Discovery 文書を取得する
    output:
      discovery:
        type: DiscoveryDocument
    read_only: true
    bindings:
      - kind: http
        method: GET
        path: /.well-known/openid-configuration
  GetOauthAuthorizationServer:
    description: OAuth 2.0 Authorization Server Metadata (RFC 8414)
    steps:
      - Authorization Server メタデータを取得する
    output:
      discovery:
        type: DiscoveryDocument
    read_only: true
    bindings:
      - kind: http
        method: GET
        path: /.well-known/oauth-authorization-server
  Health:
    description: Health check
    read_only: true
    bindings:
      - kind: http
        method: GET
        path: /health
        successful_status_codes:
          - "200"
  ListAuthorizationDetailTypes:
    description: 管理者が所属テナントの authorization_details type を一覧する (RFC 9396 / ADR-050)。
    output:
      response:
        type: AuthorizationDetailTypeListResponse
    errors:
      - AccessDeniedError
    read_only: true
    bindings:
      - kind: http
        method: GET
        path: /api/admin/authorization-detail-types
  GetAuthorizationDetailType:
    description: 管理者が単一 type を取得する。別テナントの type は未存在として扱う (ADR-050)。
    input:
      type:
        type: String
    output:
      response:
        type: AuthorizationDetailTypeResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    read_only: true
    bindings:
      - kind: http
        method: GET
        path: "/api/admin/authorization-detail-types/{type}"
  CreateAuthorizationDetailType:
    description: 管理者が所属テナントに authorization_details type を登録する (ADR-050)。
    input:
      request:
        type: AuthorizationDetailTypeRequest
    output:
      response:
        type: AuthorizationDetailTypeResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    bindings:
      - kind: http
        method: POST
        path: /api/admin/authorization-detail-types
        request_form: body
        successful_status_codes:
          - "201"
  UpdateAuthorizationDetailType:
    description: 管理者が type の schema / display_template / description / state を更新する (ADR-050)。
    input:
      type:
        type: String
      request:
        type: AuthorizationDetailTypeRequest
    output:
      response:
        type: AuthorizationDetailTypeResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    bindings:
      - kind: http
        method: PATCH
        path: "/api/admin/authorization-detail-types/{type}"
        request_form: body
  DeleteAuthorizationDetailType:
    description: 管理者が type を削除する (ADR-050)。発行済みトークンは失効まで有効。
    input:
      type:
        type: String
    errors:
      - InvalidRequestError
      - AccessDeniedError
    bindings:
      - kind: http
        method: DELETE
        path: "/api/admin/authorization-detail-types/{type}"
        successful_status_codes:
          - "204"
  ListAdminClients:
    description: 管理者が所属テナントの client を一覧する。
    output:
      response:
        type: AdminClientListResponse
    errors:
      - AccessDeniedError
    read_only: true
    bindings:
      - kind: http
        method: GET
        path: /api/admin/clients
  GetAdminClient:
    description: 管理者が所属テナントの client を取得する。別テナントの client は未存在として扱う。
    input:
      client_id:
        type: String
    output:
      client:
        type: AdminClientResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    read_only: true
    bindings:
      - kind: http
        method: GET
        path: "/api/admin/clients/{client_id}"
  CreateAdminClient:
    description: 管理者が所属テナントに client を作成する。
    input:
      request:
        type: AdminClientCreateRequest
    output:
      response:
        type: AdminClientCreateResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - AdminClientCreated
    bindings:
      - kind: http
        method: POST
        path: /api/admin/clients
        request_form: body
        successful_status_codes:
          - "201"
  UpdateAdminClient:
    description: 管理者が所属テナントの client metadata を更新する。
    input:
      client_id:
        type: String
      request:
        type: AdminClientUpdateRequest
    output:
      client:
        type: AdminClientResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - AdminClientUpdated
    bindings:
      - kind: http
        method: PATCH
        path: "/api/admin/clients/{client_id}"
        request_form: body
  DeleteAdminClient:
    description: 管理者が所属テナントの client を削除する。
    input:
      client_id:
        type: String
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - AdminClientDeleted
    bindings:
      - kind: http
        method: DELETE
        path: "/api/admin/clients/{client_id}"
        successful_status_codes:
          - "204"
  ListAdminConsents:
    description: 管理者が所属テナントの Consent を監査目的で一覧する。
    output:
      response:
        type: AdminConsentListResponse
    errors:
      - AccessDeniedError
    read_only: true
    bindings:
      - kind: http
        method: GET
        path: /admin/consents
  GetAdminConsent:
    description: 管理者が所属テナントの Consent を subject と client_id で取得する。別テナントの Consent は未存在として扱う。
    input:
      sub:
        type: String
      client_id:
        type: String
    output:
      consent:
        type: AdminConsentResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    read_only: true
    bindings:
      - kind: http
        method: GET
        path: "/admin/consents/{sub}/{client_id}"
  RevokeAdminConsent:
    description: 管理者が所属テナントの Consent を論理撤回する。管理者による Consent の作成・scope 拡張は許可しない。
    input:
      sub:
        type: String
      client_id:
        type: String
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - ConsentRevoked
    bindings:
      - kind: http
        method: DELETE
        path: "/admin/consents/{sub}/{client_id}"
        successful_status_codes:
          - "204"
  ListMyConsents:
    description: "認証済みユーザーが自身の接続済みアプリ (active な Consent) 一覧を取得する\n(self-service, wi-21)。対象は actor.sub に固定し、他人の Consent は返さない。\n"
    output:
      response:
        type: AccountConsentListResponse
    errors:
      - AccessDeniedError
    read_only: true
    bindings:
      - kind: http
        method: GET
        path: /api/account/consents
  RevokeMyConsent:
    description: "認証済みユーザーが自身の Consent を client_id 指定で論理撤回する (self-service)。\nactor.sub == target.sub に固定。次回その client の認可では consent が再要求される。\n"
    input:
      client_id:
        type: String
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - ConsentRevoked
    bindings:
      - kind: http
        method: POST
        path: "/api/account/consents/{client_id}/revoke"
        successful_status_codes:
          - "204"
  ListAdminAuditEvents:
    description: "管理者が所属テナントの監査用 DomainEvent を時系列降順で取得する。SOC / コンプライアンス\n用途を想定し、ページング (after / before / limit) と type / sub による絞り込みを提供する。\n認証イベント (ログイン成功 / 失敗 / MFA / セッション / 集約) も同一ストアに属し、category\n(authentication / success / fail / aggregated / user / group / client / consent / token /\ntenant / key) で絞り込んでセキュリティ調査や運用調査に使える (wi-44 で認証イベント専用\nビューを本検索に統合)。system_admin であれば default tenant 経路から全テナント横断、admin は\n所属テナント内に閉じる。\n"
    input:
      query:
        type: AuditEventQuery
    output:
      response:
        type: AdminAuditEventListResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    read_only: true
    bindings:
      - kind: http
        method: GET
        path: /api/admin/audit_events
  ExportAdminAuditEvents:
    description: "管理者が監査イベント (認証イベントを含む) を期間 / フィルタ指定でエクスポートする (wi-44)。\nSIEM への streaming は別 WI で、本 interface は 1 回分のダウンロードを返すのみ。\nフィルタは ListAdminAuditEvents と同じ AuditEventQuery。permission は AdminAuditEventsRead。\n"
    input:
      query:
        type: AuditEventQuery
    output:
      response:
        type: AdminAuditEventListResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    read_only: true
    bindings:
      - kind: http
        method: GET
        path: /api/admin/audit_events/export
  GetAdminAuditEvent:
    description: 管理者が監査イベント 1 件を ID で取得する。別テナントのイベントは未存在として扱う。
    input:
      id:
        type: String
    output:
      event:
        type: AdminAuditEventResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    read_only: true
    bindings:
      - kind: http
        method: GET
        path: "/api/admin/audit_events/{id}"
invariants:
  PkceRoundTrip:
    description: "任意の verifier in [A-Za-z0-9._~-]{43,128} に対して、\nchallenge = base64url(SHA256(verifier)) としたとき、verifyPkce(verifier, challenge, S256) は true。\n反例: PKCE が壊れている。認可コード横取り攻撃の防御がない。\n"
    always: "verifyPkce(verifier, base64url(sha256(verifier)), S256) == true"
  AuthCodeStateSafety:
    description: 任意のイベント列を AuthorizationCodeFlow に逐次適用しても、状態は宣言された値の部分集合に留まる。
    target: AuthorizationRequest
    always:
      in:
        - state
        - AuthorizationCodeState.values
  DeviceCodeStateSafety:
    description: 任意のイベント列を DeviceCodeFlow に逐次適用しても、状態は宣言された値の部分集合に留まる。
    target: DeviceAuthorization
    always:
      in:
        - state
        - DeviceCodeState.values
  RefreshFamilyTransitiveRevoke:
    description: "RevokeFamily(f) 後、family_id == f のすべての RefreshToken の state が Revoked になる。\n反例: ファミリー失効の取りこぼし。RFC 9700 §4.14 違反。\n"
    target: RefreshTokenRecord
    assuming: event == RevokeFamily
    eventually:
      forall:
        in: RefreshTokenRecords
        satisfies: x.family_id != event.family_id or x.state == Revoked
    within: 1s
  RefreshRotationParentInvariants:
    description: "親 p を rotate(p, child) した直後の不変条件。\n反例: absolute TTL が延長され、攻撃者が refresh chain を無限延長可能になる。\n"
    target: RefreshTokenRecord
    assuming: event == RotateRefreshToken
    always:
      and:
        - next.parent.state == Rotated
        - next.child.parent_id == prev.parent.id
        - next.child.family_id == prev.parent.family_id
        - next.child.absolute_expires_at == prev.parent.absolute_expires_at
  DpopJtiUniquenessWithinWindow:
    description: "window 秒以内に同一 jti を含む DPoP proof は受理されない。\n反例: DPoP リプレイ攻撃の成功。RFC 9449 違反。\n"
    assuming: event == AcceptDpopProof
    never:
      exists:
        in: SeenJtis
        satisfies: x.jti == event.jti and (event.at - x.seen_at) <= window
  TokenHashOneWay:
    description: "RefreshTokenRecord にはハッシュのみが保存され、平文が残らない。\n反例: トークン平文漏洩、horizontal escalation の可能性。\n"
    target: RefreshTokenRecord
    always:
      and:
        - exists: hash
        - not_exists: plaintext
  AuthorizationCodeSingleUse:
    description: 発行された AuthorizationCode は最大1回だけ Redeemed に到達する。再使用は InvalidGrant。
    target: AuthorizationCodeRecord
    assuming: event == RedeemCode
    never: prev.state != Issued
  ParRequestUriSingleUse:
    description: PAR で発行された request_uri は使用直後に無効化される。
    target: PARRecord
    assuming: event == Use
    never: prev.state != Stored
  AuthorizationCodeTtl:
    description: AuthorizationCode の TTL は最大 60 秒（RFC 9700 §4.10）。
    target: AuthorizationCodeRecord
    always: expires_at - issued_at <= 60s
  AuthorizationCodeEventuallyResolves:
    description: 発行された AuthorizationCode は必ず Redeemed または Expired に到達する。
    target: AuthorizationCodeRecord
    eventually:
      in:
        - state
        - - Redeemed
          - Expired
    within: 60s
  DeviceCodeEventuallyResolves:
    description: 発行された DeviceCode は必ず Exchanged / Denied / Expired のいずれかに到達する。
    target: DeviceAuthorization
    eventually:
      in:
        - state
        - - Exchanged
          - Denied
          - Expired
    within: 15m
  RefreshTokenAbsoluteTtl:
    description: RefreshToken の絶対 TTL は通常 TTL 以上（ローテーション越境不可、ADR-004）。
    target: RefreshTokenRecord
    always: absolute_expires_at >= expires_at
  RedirectUriExactMatch:
    description: 認可リクエストの redirect_uri は登録 URI のいずれかと完全文字列一致しなければならない（RFC 9700 §4.1.3）。
    assuming: event == ValidateAuthorizeRequest
    always:
      exists:
        in: client.redirect_uris
        satisfies: x == request.redirect_uri
  PkceMandatory:
    description: 認可コードフローのすべての要求に対して code_challenge を必須とする（例外なし、ADR-002）。
    assuming: event == ValidateAuthorizeRequest
    always: exists(request.code_challenge) and request.code_challenge_method == S256
  AccessTokenIssuedOnlyAfterConsent:
    description: Authorization Code Grant の AccessToken は、対応する Subject × Client × Scope の Consent が Granted の場合のみ発行される。
    assuming: event == AccessTokenIssued and event.grant_type == AuthorizationCode
    always:
      exists:
        in: Consents
        satisfies: "x.subject == event.subject\nand x.client_id == event.client_id\nand x.state == Granted\nand forall: { in: event.scope, satisfies: \"x in x.scopes\" }\n"
  AllAccessTokensCarryAudience:
    description: 発行されたすべての AccessToken は非空の audience を持つ（RFC 8707 / RFC 9068）。
    target: AccessToken
    always: exists(audience) and len(audience) >= 1
  ClientAuthFailureUniformity:
    description: クライアント認証失敗時、client_id の存在有無を開示しない（タイミング差・エラーメッセージ差を出さない）。
    assuming: event == ClientAuthenticationFailed
    always:
      and:
        - error == InvalidClient
        - len(error_description) == len(error_description_constant)
permissions:
  TokenGrantAuthorizationCode:
    description: 認可コード交換による access_token / id_token / refresh_token 発行
    actor: Client
    resource: AuthorizationCodeRecord
    allow_when:
      and:
        - AuthorizationCode in actor.grant_types
        - sha256(context.code_verifier) == resource.code_challenge
        - context.redirect_uri == resource.redirect_uri
        - resource.state == Issued
        - now() < resource.expires_at
  TokenGrantRefresh:
    description: リフレッシュトークンによる再発行
    actor: Client
    resource: RefreshTokenRecord
    allow_when:
      and:
        - RefreshToken in actor.grant_types
        - resource.state == Active
        - now() < resource.absolute_expires_at
        - "sender_constraint_satisfied(resource, context)"
  TokenGrantClientCredentials:
    description: クライアント自己認可フロー
    actor: Client
    resource: AccessTokenClaims
    allow_when:
      and:
        - actor.client_type == Confidential
        - ClientCredentials in actor.grant_types
  TokenGrantDeviceCode:
    description: デバイスコードフロー
    actor: Client
    resource: DeviceAuthorization
    allow_when:
      and:
        - resource.state == Approved
        - now() < resource.expires_at
  TokenGrantTokenExchange:
    description: トークン交換 (RFC 8693) による委任トークン発行
    actor: Client
    resource: AccessTokenClaims
    allow_when:
      and:
        - TokenExchange in actor.grant_types
  TokenIntrospect:
    description: /introspect の呼び出し
    actor: Client
    resource: AccessTokenClaims
    allow_when: actor.type == Client and context.authenticated == true
  TokenRevoke:
    description: /revoke の呼び出し
    actor: Client
    resource: AccessTokenClaims
    allow_when: actor.client_id == resource.client_id
  UserInfoRead:
    description: /userinfo の呼び出し
    actor: Client
    resource: User
    allow_when:
      and:
        - openid in context.token_scopes
        - context.token_active == true
  AuthorizeInitiate:
    description: /authorize でフローを開始する
    actor: Client
    resource: AuthorizationRequest
    allow_when:
      and:
        - actor.registered == true
        - context.redirect_uri in actor.redirect_uris
        - "subset(context.requested_scopes, actor.scopes)"
        - (actor.require_pkce == false) or (context.code_challenge != null)
        - (actor.require_pushed_authorization_requests == false) or (context.par_used == true)
  AdminAuthorizationDetailTypesManage:
    description: 細粒度な認可詳細 (authorization_details) の種類定義を、検証ルールと同意画面の表示文とあわせて登録・更新・削除します。
    actor: User
    resource: AuthorizationDetailType
    allow_when:
      and:
        - admin in actor.roles
        - actor.disabled_at == null
        - context.authenticated == true
        - actor.tenant_id == resource.tenant_id
  AdminClientsManage:
    description: 所属テナント内の client 一覧・作成・更新・削除。
    actor: User
    resource: OAuth2Client
    allow_when:
      and:
        - admin in actor.roles
        - actor.disabled_at == null
        - context.authenticated == true
        - actor.tenant_id == resource.tenant_id
  AdminConsentsManage:
    description: 所属テナント内の Consent 一覧・取得・撤回。同意の付与と scope 拡張は ResourceOwner に限定する。
    actor: User
    resource: Consent
    allow_when:
      and:
        - admin in actor.roles
        - actor.disabled_at == null
        - context.authenticated == true
        - actor.tenant_id == resource.tenant_id
  AdminAuditEventsRead:
    description: "管理者による所属テナントの監査イベント読み出し。admin は所属テナントに閉じ、\nsystem_admin は default tenant 経路から全テナント横断的に参照できる。\n書き込みエンドポイントは存在しないため Read のみ。\n"
    actor: User
    resource: AdminAuditEventResponse
    allow_when:
      and:
        - (admin in actor.roles) or (system_admin in actor.roles)
        - actor.disabled_at == null
        - context.authenticated == true
objectives:
  AuthorizeLatency:
    kind: slo
    description: /authorize の p99 レイテンシ目標。ブラウザリダイレクトを介す対話的フローのため、人間が体感する遅延の上限を 500ms に置く。
    metric: latency_p99
    interface: Authorize
    target: "<500ms"
    window: 30d
  ParLatency:
    kind: slo
    description: /par の p99 レイテンシ目標。FAPI クライアントが /authorize 前段で同期的に呼ぶため、追加遅延を最小化する。
    metric: latency_p99
    interface: PushAuthorizationRequest
    target: "<200ms"
    window: 30d
  TokenLatency:
    kind: slo
    description: /token の p99 レイテンシ目標。トークン交換は機械対機械の同期処理が多いため、300ms 以内に抑える。
    metric: latency_p99
    interface: Token
    target: "<300ms"
    window: 30d
  IntrospectLatency:
    kind: slo
    description: /introspect の p99 レイテンシ目標。ResourceServer が API リクエストごとにインライン検証するため、最も厳しい 50ms を要求する。
    metric: latency_p99
    interface: Introspect
    target: "<50ms"
    window: 30d
  RevokeLatency:
    kind: slo
    description: /revoke の p99 レイテンシ目標。失効処理は遅延すると侵害時の影響範囲が広がるため 100ms に抑える。
    metric: latency_p99
    interface: Revoke
    target: "<100ms"
    window: 30d
  UserInfoLatency:
    kind: slo
    description: /userinfo の p99 レイテンシ目標。ResourceServer 経由ではなくクライアントが直接呼ぶことが多いため 100ms 以内。
    metric: latency_p99
    interface: UserInfo
    target: "<100ms"
    window: 30d
  DiscoveryLatency:
    kind: slo
    description: /.well-known/openid-configuration の p99 レイテンシ目標。クライアント起動時の自動検出に使われるため CDN キャッシュ前提で 20ms。
    metric: latency_p99
    interface: GetOpenidConfiguration
    target: "<20ms"
    window: 30d
  RegisterLatency:
    kind: slo
    description: /register の p99 レイテンシ目標。Dynamic Client Registration (RFC 7591) はレアパスなので Authorize と同水準で良い。
    metric: latency_p99
    interface: RegisterClient
    target: "<500ms"
    window: 30d
  DeviceAuthorizationLatency:
    kind: slo
    description: /device_authorization の p99 レイテンシ目標 (RFC 8628 §3.1)。デバイス起動直後のユーザー体験のため Token と同等。
    metric: latency_p99
    interface: DeviceAuthorization
    target: "<300ms"
    window: 30d
  AuthorizeErrorRate:
    kind: slo
    description: /authorize の 5xx 比率上限。0.1% を超えるとクライアントのフロー全体が失敗するため対話的経路の許容下限。
    metric: error_rate
    interface: Authorize
    target: "<0.001"
    window: 30d
  ParErrorRate:
    kind: slo
    description: /par の 5xx 比率上限。FAPI クライアントの /authorize 前段なので、失敗は即座にフロー全停止につながる。
    metric: error_rate
    interface: PushAuthorizationRequest
    target: "<0.001"
    window: 30d
  TokenErrorRate:
    kind: slo
    description: /token の 5xx 比率上限。トークン交換失敗はアプリログイン全停止に等価のため 0.1% を上限とする。
    metric: error_rate
    interface: Token
    target: "<0.001"
    window: 30d
  IntrospectErrorRate:
    kind: slo
    description: /introspect の 5xx 比率上限。ResourceServer のリクエスト毎に呼ばれるため、Token より一桁厳しい 0.01% を要求。
    metric: error_rate
    interface: Introspect
    target: "<0.0001"
    window: 30d
  RevokeErrorRate:
    kind: slo
    description: /revoke の 5xx 比率上限。失効処理の信頼性は侵害時のリスク許容に直結するため 0.1% を死守する。
    metric: error_rate
    interface: Revoke
    target: "<0.001"
    window: 30d
  UserInfoErrorRate:
    kind: slo
    description: /userinfo の 5xx 比率上限。クライアントの「ログイン後ユーザー表示」失敗を防ぐため 0.1% に置く。
    metric: error_rate
    interface: UserInfo
    target: "<0.001"
    window: 30d
  DiscoveryErrorRate:
    kind: slo
    description: /.well-known/* の 5xx 比率上限。クライアント自動構成の起点なので、JWKS と同水準の 0.01% を要求。
    metric: error_rate
    interface: GetOpenidConfiguration
    target: "<0.0001"
    window: 30d
  RegisterErrorRate:
    kind: slo
    description: /register の 5xx 比率上限。利用頻度は低いが新規クライアント登録の信頼性のため 0.1% に抑える。
    metric: error_rate
    interface: RegisterClient
    target: "<0.001"
    window: 30d
  DeviceAuthorizationErrorRate:
    kind: slo
    description: /device_authorization の 5xx 比率上限。デバイスログイン体験の入口なので 0.1% を下限とする。
    metric: error_rate
    interface: DeviceAuthorization
    target: "<0.001"
    window: 30d
  TokenEndpointAvailability:
    kind: slo
    description: /token の月次可用性目標。FAPI 2.0 §6.2 が AS に要求する水準（99.95%）に整合させる。
    metric: availability
    interface: Token
    target: ">=99.95%"
    window: 30d
  OverallAvailability:
    kind: slo
    description: サービス全体の月次可用性目標。エンドポイントを跨いだ統合 SLO（個別 SLO よりやや緩めの 99.9%）。
    metric: availability
    target: ">=99.9%"
    window: 30d
  TokenThroughput:
    kind: slo
    description: /token のピーク処理能力目標。ログイン集中時間帯にトークン発行が詰まらない水平スケール容量。
    metric: throughput
    interface: Token
    target: ">=5000rps"
  AuthorizeThroughput:
    kind: slo
    description: /authorize のピーク処理能力目標。対話的フローの並列セッション数に応じて要求される。
    metric: throughput
    interface: Authorize
    target: ">=1000rps"
  IntrospectThroughput:
    kind: slo
    description: /introspect のピーク処理能力目標。ResourceServer 毎リクエスト検証の母数を捌くため、最大ボリュームを想定。
    metric: throughput
    interface: Introspect
    target: ">=20000rps"
  AuthorizationCodeLifetime:
    kind: lifetime
    target: AuthorizationCodeRecord
    ttl: 60s
    single_use: true
    reference: RFC 9700 §4.10
  ParRequestUriLifetime:
    kind: lifetime
    target: PARRecord
    ttl: 600s
    single_use: true
    reference: RFC 9126
  AccessTokenLifetime:
    kind: lifetime
    target: AccessTokenClaims
    ttl: 600s
    reference: ADR-002
  IdTokenLifetime:
    kind: lifetime
    target: IdTokenClaims
    ttl: 3600s
  RefreshTokenLifetime:
    kind: lifetime
    target: RefreshTokenRecord
    ttl: 14d
  RefreshTokenAbsoluteLifetime:
    kind: lifetime
    target: RefreshTokenRecord
    ttl: 30d
    reference: ADR-004
    description: ローテーション越境不可
  DeviceCodeLifetime:
    kind: lifetime
    target: DeviceAuthorization
    ttl: 600s
  UserCodeLifetime:
    kind: lifetime
    target: DeviceAuthorization
    ttl: 600s
  DeviceCodePollingDefaultInterval:
    kind: lifetime
    target: DeviceAuthorization
    ttl: 5s
    description: 既定ポーリング間隔
  ClientAuthFailureRateLimit:
    kind: security
    policy: rate_limit_per_minute
    value: 10
  AuthorizationCodeRedemptionFailureRateLimit:
    kind: security
    policy: rate_limit_per_minute
    value: 5
  DpopProofClockSkewPast:
    kind: security
    policy: clock_skew_seconds
    value: 60
  DpopProofClockSkewFuture:
    kind: security
    policy: clock_skew_seconds
    value: 5
  DpopJtiReplayWindow:
    kind: security
    policy: replay_window_minutes
    value: 10
  DpopNonceLifetime:
    kind: security
    policy: ttl_seconds
    value: 60
  RefreshReuseAlertWindow:
    kind: security
    policy: alert_window_seconds
    value: 60
  DeviceCodePollingSlowDownIncrement:
    kind: security
    policy: polling_slow_down_increment_seconds
    target: DeviceAuthorization
    value: 5
    reference: RFC 8628 §3.5
  AuditLogRetention:
    kind: retention
    target: DomainEvent
    policy: append_only
    retention: 7y
    reference: GDPR Art. 30
  ConsentRecordsRetention:
    kind: retention
    target: Consent
    policy: keep
    retention: 7y
scenarios:
  認可コードフローでアクセストークンと ID トークンを取得できる:
    description: 認可リクエスト→認可コード交換と進み、PKCE 検証を経てトークン一式を得る。
    steps:
      - "confidential クライアント \"web-app\" を redirect_uri \"https://app.example.com/callback\" で登録する"
      - "ユーザー \"alice\" が \"web-app\" に scope \"openid profile\" を同意済みである"
      - "\"web-app\" として scope \"openid profile\" で認可リクエストを送る"
      - 発行された認可コードを正しい PKCE verifier で交換する
      - 応答に access_token・id_token・refresh_token が含まれ token_type は Bearer
      - "\"UserAuthenticated\" が発行される"
      - "\"AuthorizationCodeIssued\" が発行される"
      - "\"AuthorizationCodeRedeemed\" が発行される"
      - "\"AccessTokenIssued\" が発行される"
      - "\"RefreshTokenIssued\" が発行される"
  PKCE verifier が不一致なら拒否される:
    description: 400 invalid_grant で拒否される。
    steps:
      - 認可コードを誤った code_verifier で交換する
      - "エラー \"InvalidGrantError\""
  認可コードを 2 回交換するとトークンファミリーが全失効する:
    steps:
      - "発行済み認可コード \"AC1\"（family_id \"F1\"）を用意する"
      - "認可コード \"AC1\" を verifier \"v\" で交換する"
      - "認可コード \"AC1\" を verifier \"v\" で交換する"
      - 1 回目の応答には access_token が含まれる
      - "2 回目はエラー \"InvalidGrantError\""
      - "family_id \"F1\" のトークンがすべて失効する"
      - "\"RefreshTokenReuseDetected\" が発行される"
      - "\"TokenRevoked\" が発行される"
  リフレッシュトークンを使うと新トークンが返り旧トークンは無効化される:
    steps:
      - "有効な refresh token \"RT1\" を用意する"
      - "リフレッシュトークン \"RT1\" を交換する"
      - 応答に新しい access_token と refresh_token が含まれる
      - "\"RT1\" の状態は \"Rotated\""
      - "\"RefreshTokenRotated\" が発行される"
      - "\"AccessTokenIssued\" が発行される"
      - "\"RefreshTokenIssued\" が発行される"
  旧リフレッシュトークンの再使用はファミリー全体を失効させる:
    steps:
      - "有効な refresh token \"RT1\"（family_id \"F1\"）を用意する"
      - "リフレッシュトークン \"RT1\" を交換する"
      - "リフレッシュトークン \"RT1\" を交換する"
      - ローテーションの応答には access_token と refresh_token が含まれる
      - "再使用はエラー \"InvalidGrantError\""
      - "\"RT1\" の状態は \"Revoked\""
      - "family_id \"F1\" のトークンがすべて失効する"
      - "\"RefreshTokenRotated\" が発行される"
      - "\"RefreshTokenReuseDetected\" が発行される"
      - "\"TokenRevoked\" が発行される"
  不正な client_secret は invalid_client で拒否される:
    description: client_id の存在有無は開示しない。
    steps:
      - 既知のクライアントを誤った client_secret で認可コードを交換する
      - "エラー \"InvalidClientError\""
  未知の client_id も一律 invalid_client で拒否される:
    description: タイミング差が出ないよう一律に拒否する。
    steps:
      - 未知の client_id で認可コードを交換する
      - "エラー \"InvalidClientError\""
  未登録の redirect_uri へはリダイレクトしない:
    steps:
      - "\"web-app\" として redirect_uri \"https://evil.example/cb\" で認可リクエストを送る"
      - "エラー \"InvalidRequestError\""
      - リダイレクトは行われず IdP がエラーページを表示する
  既存の同意があれば同意画面はスキップされる:
    steps:
      - "ユーザー \"alice\" が \"web-app\" に scope \"openid profile\" を同意済みである"
      - "\"web-app\" として scope \"openid profile\" で認可リクエストを送る"
      - 認可リクエストの状態は Consented
      - 同意 UI は表示されない
  prompt=consent は既存同意があっても再同意を求める:
    steps:
      - "ユーザー \"alice\" が \"web-app\" に scope \"openid profile\" を同意済みである"
      - "\"web-app\" として prompt \"consent\" で認可リクエストを送る"
      - 認可リクエストの状態は ConsentPending
  PAR 経由の request_uri は一度だけ参照できる:
    description: RFC 9126。使用直後に無効化される。
    steps:
      - "クライアント \"web-app\" を用意する"
      - "\"web-app\" として認可リクエストを事前送信する"
      - "request_uri \"<返された値>\" で認可リクエストを送る"
      - PAR 応答に request_uri が含まれ expires_in は 600 以下
      - "その PAR レコードの状態は \"Used\""
      - "\"PARStored\" が発行される"
      - "\"AuthorizationCodeIssued\" が発行される"
  FAPI クライアントは PAR なしの直接認可リクエストを拒否される:
    steps:
      - "PAR 必須の FAPI クライアント \"fapi-app\" を用意する"
      - "\"fapi-app\" として scope \"openid\" で認可リクエストを送る"
      - "エラー \"InvalidRequestError\""
  DPoP 証明付き要求はセンダー制約付きトークンを発行する:
    steps:
      - 有効な DPoP 証明を付けて認可コードを交換する
      - 発行された access token は DPoP 鍵サムプリントに cnf でバインドされる
      - 発行された refresh token のセンダー制約は Dpop
  iat が 60 秒以上古い DPoP 証明は拒否される:
    description: RFC 9449。
    steps:
      - "iat \"2026-01-01T00:00:00Z\" の DPoP 証明を用意する"
      - "時刻が \"2026-01-01T00:01:30Z\" になる"
      - その DPoP 証明を付けて認可コードを交換する
      - "エラー \"InvalidDpopProofError\""
  同一 DPoP jti の再使用はリプレイとして拒否される:
    steps:
      - "jti \"ABC\" の DPoP 証明を用意する"
      - その証明を付けて認可コードを交換する
      - "同じ jti \"ABC\" の DPoP 証明を付けて認可コードを交換する"
      - 1 回目の応答には access_token が含まれる
      - "2 回目はエラー \"InvalidDpopProofError\""
  失効済みトークンの introspection は active=false のみ返す:
    steps:
      - "失効済み access token \"AT1\" を用意する"
      - "トークン \"AT1\" を検査する"
      - 応答は active=false のみで他のフィールドを含まない
  openid スコープ付きトークンでユーザー情報は sub を返す:
    steps:
      - "scope \"openid profile\" の access token \"AT1\" を用意する"
      - "トークン \"AT1\" でユーザー情報を取得する"
      - 応答に sub・name・preferred_username が含まれる
  openid スコープのないトークンのユーザー情報取得は拒否される:
    description: 403 insufficient_scope。
    steps:
      - "scope \"profile\" のみの access token \"AT1\" を用意する"
      - "トークン \"AT1\" でユーザー情報を取得する"
      - "エラー \"InsufficientScopeError\""
  Discovery 文書は宣言された全エンドポイントを広告する:
    steps:
      - Discovery 文書を取得する
      - 応答に issuer・authorization_endpoint・token_endpoint・userinfo_endpoint・jwks_uri・introspection_endpoint・revocation_endpoint・pushed_authorization_request_endpoint・device_authorization_endpoint・registration_endpoint が含まれる
  認可コードの並行交換はちょうど一方だけ成功する:
    description: "互いに観測しない並行呼び出しのうち一方のみ成功し、\n成功側のファミリーも再使用検出により最終的に全失効する。\n"
    tags:
      - concurrency
    steps:
      - "発行済み認可コード \"AC1\"（family_id \"F1\"）を用意する"
      - "認可コード \"AC1\" を verifier \"v\" で並行に 2 回交換する"
      - "ちょうど一方が成功し、もう一方はエラー \"InvalidGrantError\""
      - "family_id \"F1\" のトークンがすべて失効する"
      - "\"AuthorizationCodeRedeemed\" が発行される"
      - "\"RefreshTokenReuseDetected\" が発行される"
      - "\"TokenRevoked\" が発行される"
  動的クライアント登録は client_id を採番して返す:
    description: RFC 7591 §3.2.1 — 成功応答は client_id と client_metadata を返す。
    steps:
      - "confidential クライアント \"web-app\" を redirect_uri \"https://app.example.com/callback\" で登録する"
      - 応答に client_id と client_secret が含まれる
      - "\"ClientRegistered\" が発行される"
  redirect_uri が無いクライアント登録は拒否される:
    steps:
      - "confidential クライアント \"web-app\" を redirect_uri \"\" で登録する"
      - "エラー \"InvalidRequestError\""
  60 秒経過した認可コードの交換は拒否される:
    description: RFC 9700 §4.10 — TTL 60 秒を超えると invalid_grant。
    steps:
      - "issued_at \"2026-01-01T00:00:00Z\" の認可コード \"AC1\" を用意する"
      - "時刻が \"2026-01-01T00:01:30Z\" になる"
      - "認可コード \"AC1\" を verifier \"v\" で交換する"
      - "エラー \"InvalidGrantError\""
      - "\"AC1\" の状態は \"Expired\""
  absolute_expires_at を超えた refresh token はローテーション不可:
    description: ADR-004 — ローテーションで延長されない絶対 TTL。
    steps:
      - "absolute_expires_at \"2026-01-01T00:00:00Z\" の refresh token \"RT1\" を用意する"
      - "時刻が \"2026-01-02T00:00:00Z\" になる"
      - "リフレッシュトークン \"RT1\" を交換する"
      - "エラー \"InvalidGrantError\""
  /revoke でリフレッシュトークンを失効できる:
    steps:
      - "有効な refresh token \"RT1\" を用意する"
      - "トークン \"RT1\" を失効させる"
      - "\"RT1\" の状態は \"Revoked\""
      - "\"TokenRevoked\" が発行される"
  他クライアントの所有トークンの失効要求は静かに無視される:
    description: RFC 7009 §2.2 — 所有者でないクライアントからの失効要求は 200 OK のみ返し、実際の失効は行わない（盗難検知防止）。
    steps:
      - "クライアント \"client-A\" が所有する refresh token \"RT1\" を用意する"
      - "\"client-B\" としてトークン \"RT1\" を失効させる"
      - "\"RT1\" の状態は \"Active\""
  失効した access_token でユーザー情報取得は invalid_token で拒否される:
    steps:
      - "有効な access token \"AT1\" を用意する"
      - "トークン \"AT1\" を失効させる"
      - "トークン \"AT1\" でユーザー情報を取得する"
      - "エラー \"InvalidTokenError\""
  offline_access スコープがあれば refresh_token も発行される:
    description: OIDC Core §11 — refresh_token は offline_access 付与時のみ。
    steps:
      - "confidential クライアント \"web-app\" を grant_types に \"authorization_code\"・\"refresh_token\" 含めて登録する"
      - "\"web-app\" として scope \"openid offline_access\" で認可リクエストを送る"
      - "発行された認可コードを verifier \"v\" で交換する"
      - 応答に refresh_token が含まれる
      - "\"RefreshTokenIssued\" が発行される"
  offline_access が無いと refresh_token は発行されない:
    steps:
      - "\"web-app\" として scope \"openid profile\" で認可リクエストを送る"
      - "発行された認可コードを verifier \"v\" で交換する"
      - 応答に refresh_token は含まれない
  認可リクエストの nonce は ID トークンに伝播する:
    description: OIDC Core §3.1.2.1 — リプレイ防止のため nonce は id_token に必須で含む。
    steps:
      - "\"web-app\" として scope \"openid\"、nonce \"n-12345\" で認可リクエストを送る"
      - "発行された認可コードを verifier \"v\" で交換する"
      - "応答の id_token の nonce クレームは \"n-12345\""
  RP-Initiated Logout は登録済み post_logout_redirect_uri にだけリダイレクトする:
    description: OIDC RP-Initiated Logout 1.0 — logout 後の redirect URI はクライアント登録済み URI に限定する。
    steps:
      - "confidential クライアント \"web-app\" を redirect_uri \"https://app.example.com/cb\" で登録する"
      - "\"web-app\" として post_logout_redirect_uri \"https://app.example.com/cb\" でログアウトする"
      - state が post_logout_redirect_uri に伝播する
  未登録 post_logout_redirect_uri は拒否される:
    description: open redirect を避けるため、logout redirect も登録済み URI のみ許可する。
    steps:
      - "confidential クライアント \"web-app\" を redirect_uri \"https://app.example.com/cb\" で登録する"
      - "\"web-app\" として post_logout_redirect_uri \"https://evil.example.com/cb\" でログアウトする"
      - "エラー \"InvalidRequestError\""
  client_credentials グラントで M2M トークンが発行される:
    description: RFC 6749 §4.4 — confidential クライアント自身のリソースアクセス。
    steps:
      - "confidential クライアント \"backend\" を grant_types に \"client_credentials\" 含めて登録する"
      - "\"backend\" として client_credentials で scope \"api:read\" のトークンを取得する"
      - 応答に access_token が含まれ refresh_token は含まれない
      - 発行された access_token の sub は client_id と一致する
      - "\"AccessTokenIssued\" が発行される"
  public クライアントは client_credentials を登録できない:
    description: client_credentials は confidential 限定（TokenGrantClientCredentials 認可ルール）。
    steps:
      - "public クライアント \"spa-app\" を grant_types に \"client_credentials\" 含めて登録する"
      - "エラー \"InvalidRequestError\""
  デバイス認可フローでアクセストークンを取得できる:
    description: RFC 8628 §3 — TV 等の入力制約デバイス向けの完全な正常系。
    steps:
      - "confidential クライアント \"tv-app\" を grant_types に \"urn:ietf:params:oauth:grant-type:device_code\" 含めて登録する"
      - "\"tv-app\" として scope \"openid profile\" でデバイス認可を開始する"
      - 応答に device_code・user_code・verification_uri・interval が含まれる
      - "ユーザー \"alice\" が verification_uri で user_code を入力し承認する"
      - "device_code \"DC1\" を交換する"
      - 応答に access_token と id_token が含まれる
      - "\"DeviceAuthorizationRequested\" が発行される"
      - "\"DeviceAuthorizationApproved\" が発行される"
      - "\"AccessTokenIssued\" が発行される"
  承認前のデバイス交換は authorization_pending を返す:
    description: RFC 8628 §3.5 — ユーザー承認前のポーリングは authorization_pending。
    steps:
      - "Issued 状態の device_code \"DC1\" を用意する"
      - "device_code \"DC1\" を交換する"
      - "エラー \"AuthorizationPendingError\""
  ポーリング間隔より短い再試行は slow_down を返す:
    description: RFC 8628 §3.5 — interval 秒未満での再試行は slow_down で interval+5 秒に増やす。
    steps:
      - "interval 5 秒の device_code \"DC1\" を Issued 状態で用意する"
      - "device_code \"DC1\" を交換する"
      - "\"2s\" 経過する"
      - "device_code \"DC1\" を交換する"
      - "2 回目はエラー \"SlowDownError\""
  期限切れの device_code は expired_token を返す:
    description: RFC 8628 §3.5 — expires_in を超えた device_code 交換は expired_token。
    steps:
      - "issued_at \"2026-01-01T00:00:00Z\"・expires_at \"2026-01-01T00:10:00Z\" の device_code \"DC1\" を用意する"
      - "時刻が \"2026-01-01T00:11:00Z\" になる"
      - "device_code \"DC1\" を交換する"
      - "エラー \"ExpiredTokenError\""
  改ざんされた client_assertion は invalid_client で拒否される:
    steps:
      - "confidential クライアント \"fapi-app\" を token_endpoint_auth_method \"private_key_jwt\"・jwks 登録で用意する"
      - "認可コード \"AC1\" を verifier \"v\"・改ざんされた client_assertion で交換する"
      - "エラー \"InvalidClientError\""
  mTLS バインド AT は同じ証明書のリクエストでのみ受理される:
    description: "RFC 8705 §3。cnf.x5t#S256 が AT に埋め込まれ、resource access では同一証明書の thumbprint 一致を要求する。"
    steps:
      - "confidential クライアント \"mtls-app\" を token_endpoint_auth_method \"tls_client_auth\" で用意する"
      - mTLS 証明書バインドされた access_token を発行する
      - 同じ証明書を提示して userinfo を取得すると 200 を返す
      - 別の証明書を提示すると invalid_token で拒否される
  RFC 8414 メタデータ文書は OIDC Discovery と同等の内容を返す:
    description: 同一のメタデータを別パスでも取得できる。
    steps:
      - Authorization Server メタデータを取得する
      - 応答に issuer・authorization_endpoint・token_endpoint・jwks_uri・grant_types_supported が含まれる
  管理者は所属テナントの同意を参照・撤回できるが付与は代行できない:
    steps:
      - "tenant_id \"acme\" の roles=[\"admin\"] のユーザー \"operator\" が認証済みである"
      - "tenant_id \"acme\" のユーザー \"alice\" と client \"portal\" の Consent が Granted で存在する"
      - "管理者 \"operator\" が Consent 一覧と単一 Consent を取得する"
      - "管理者 \"operator\" がユーザー \"alice\" と client \"portal\" の Consent を撤回する"
      - Consent の state は Revoked で revoked_at が記録される
      - "\"ConsentRevoked\" が actorSub \"operator\" で発行される"
      - 管理者が Consent を作成または scope 拡張する interface は存在しない
  ユーザーは接続済みアプリの同意を自分で撤回できる:
    steps:
      - "ユーザー \"alice\" が client \"web-app\" に scope \"openid profile\" を同意済みである"
      - "ユーザー \"alice\" が認証済みで接続済みアプリ画面を開く"
      - "一覧に \"web-app\" が表示される"
      - "ユーザー \"alice\" が \"web-app\" の同意を撤回する"
      - Consent の state は Revoked になり一覧から消える
  "/realms/{id}/.well-known/openid-configuration は同 prefix の issuer を返す":
    steps:
      - "tenant_id \"acme\" を Active で作成する"
      - /realms/acme/.well-known/openid-configuration を取得する
      - 応答の issuer は base URL + /realms/acme
      - 応答の authorization_endpoint は base URL + /realms/acme/authorize
  他テナントの client_id を使うと invalid_client で拒否される:
    description: ADR-034 のクロステナントガード。クライアントの所属テナントとリクエストテナントが一致しない場合は existence を漏らさず拒否する。
    steps:
      - "tenant_id \"acme\" に client_id \"web-app\" を登録する"
      - "\"/realms/default/token\" に client_id \"web-app\" で交換を要求する"
      - "エラー \"InvalidClientError\""
  他テナントの認可コードを別テナントの token endpoint で交換できない:
    description: ADR-034。code 解決時に record.tenant_id != ctx.tenant_id を確認。
    steps:
      - "tenant_id \"acme\" で認可コード \"AC1\" を発行する"
      - "\"/realms/default/token\" で認可コード \"AC1\" を交換する"
      - "エラー \"InvalidGrantError\""
  他テナントのリフレッシュトークンを別テナントの token endpoint で再発行できない:
    description: ADR-034。refresh_token 解決時に record.tenant_id != ctx.tenant_id を確認し、存在しないトークンと同じ応答にする。
    steps:
      - "tenant_id \"acme\" でリフレッシュトークン \"RT1\" を発行する"
      - "\"/realms/default/token\" でリフレッシュトークン \"RT1\" を再発行する"
      - "エラー \"InvalidGrantError\""
  他テナントの device_code を別テナントの token endpoint で交換できない:
    description: ADR-034。device flow の record.tenant_id != ctx.tenant_id を確認。
    steps:
      - "tenant_id \"acme\" で device_code \"DC1\" を発行し承認する"
      - "\"/realms/default/token\" で device_code \"DC1\" を交換する"
      - "エラー \"InvalidGrantError\""
