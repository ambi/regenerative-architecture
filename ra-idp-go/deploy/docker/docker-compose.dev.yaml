services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ra_idp
      POSTGRES_USER: ra_idp
      POSTGRES_PASSWORD: ra_idp
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ra_idp"]
      interval: 2s
      timeout: 2s
      retries: 20
    ports: ["5432:5432"]

  valkey:
    image: valkey/valkey:8-alpine
    command: ["valkey-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 20
    ports: ["6379:6379"]

  kafka:
    image: redpandadata/redpanda:v24.3.18
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=0.0.0.0:9092
      - --advertise-kafka-addr=kafka:9092
    ports: ["9092:9092"]

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.153.0
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otel-collector.yaml:/etc/otelcol/config.yaml:ro
    ports: ["4318:4318"]

  idp:
    build:
      context: ../../..
      dockerfile: ra-idp-go/deploy/docker/Dockerfile
    environment:
      ADDR: :8081
      ISSUER: http://localhost:8080
      PERSISTENCE: postgres
      DATABASE_URL: postgres://ra_idp:ra_idp@postgres:5432/ra_idp?sslmode=disable
      VALKEY_URL: valkey://valkey:6379/0
      EVENT_SINK: outbox
      OBSERVABILITY: otel
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      SCL_PATH: /app/spec/scl.yaml
    depends_on:
      postgres: { condition: service_healthy }
      valkey: { condition: service_healthy }
      otel-collector: { condition: service_started }

  ui:
    build:
      context: ../../ui
      dockerfile: Dockerfile
    environment:
      BACKEND_ADDRESS: http://idp:8081
    depends_on:
      idp: { condition: service_started }
    ports: ["8080:8080"]

  event-relay:
    build:
      context: ../../..
      dockerfile: ra-idp-go/deploy/docker/Dockerfile
    entrypoint: ["/app/ra-idp-relay"]
    environment:
      DATABASE_URL: postgres://ra_idp:ra_idp@postgres:5432/ra_idp?sslmode=disable
      KAFKA_BROKERS: kafka:9092
    depends_on:
      postgres: { condition: service_healthy }
      kafka: { condition: service_started }
