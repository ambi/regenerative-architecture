id: wi-51-rich-authorization-requests-agent-scopes
title: Rich Authorization Requests (RFC 9396) でエージェント権限を細粒度に束縛する
created_at: 2026-06-22
status: completed
authors: [tn]

motivation: |
  エージェントへの権限付与は粗い OAuth scope (例: `payments`) では危険で、
  「口座 X から最大 $100 まで送金」「この 3 文書のみ閲覧」のように対象・上限・
  条件を構造的に束縛したい。これを表現する標準が Rich Authorization Requests
  (RFC 9396) の `authorization_details` で、最小権限 (least privilege) と
  ダウンスコープを構造化 JSON で要求・同意・トークン反映できる。

  ra-idp-go は scope ベースの同意までで、構造化された細粒度権限を持たない。本 WI は
  /authorize と /par、および token-exchange
  ([[wi-50-token-exchange-delegation-actor-chain]]) で `authorization_details` を
  受理・検証・同意・トークンへ反映し、エージェントが「必要な分だけ」を要求できる
  ようにする。これにより人間の関与 (CIBA、[[wi-52-ciba-async-human-approval]]) や
  ガバナンス ([[wi-59-agent-governance-guardrails-audit-inventory]]) と組み合わせた
  「上限つき委譲」が成立する。

scope:
  decision:
    - >-
      新規 ADR [[ADR-050]]: 対応する authorization_details type の定義方法 (tenant ごとに登録可能な
      type スキーマ)、同意 UI での提示方法、token への反映と検証点 (resource server が
      何を信頼するか)、token-exchange 時の details ダウンスコープ規則を確定する。
  scl:
    - >-
      新規 model: AuthorizationDetail / AuthorizationDetailType / AuthorizationDetailsSchema。
      AuthorizationRequest / Consent / AccessTokenClaims に authorization_details を追加する。
    - 新規 event: AuthorizationDetailsRequested / AuthorizationDetailsConsented / AuthorizationDetailsRejected。
    - 新規 permission: AdminAuthorizationDetailTypesManage。
  go:
    - >-
      authorization_details の構文・登録済み type 適合・ダウンスコープ (要求は
      同意済みの部分集合か) を Zog schema で fail-closed に検証する。
    - token-exchange で交換後 details を元 details の部分集合に限定する。
  http:
    - /authorize・/par・/token が authorization_details を受理し、discovery に対応 type を広告する。
  ui:
    - end-user 同意 UI で authorization_details を人間が読める形で提示する。

out_of_scope:
  - 個別業務ドメインの type スキーマ (口座・送金等) の網羅的定義。
  - resource server 側の details 解釈実装 (ra-idp は発行と検証点の提供まで)。

affected_guarantees:
  - 最小権限: エージェントは authorization_details で対象・上限を束縛した token しか得られない。
  - 同意の一致: token の details は user が同意した範囲の部分集合に限る (fail-closed)。
  - ダウンスコープ: 交換後トークンの details は元 token を超えない。
  - 監査: details の要求・同意・拒否を監査イベントに残す。

verification:
  - cmd: 'go test ./...'
    in: ra-idp-go
    reason: details の構文検証、type 適合、同意との部分集合判定、交換時ダウンスコープの境界。
  - cmd: 'golangci-lint run ./...'
    in: ra-idp-go
  - cmd: 'go build ./...'
    in: ra-idp-go
  - cmd: 'bun --cwd ra-idp-go/ui typecheck'
  - cmd: 'bun --cwd ra-idp-go/ui build'
  - '手動: authorization_details つきで認可 → 同意 UI で内容確認 → token に反映 → 同意外の details 要求が拒否されることを確認する。'

risk: medium
risk_notes: |
  authorization_details は自由度が高く、検証が緩いと過大な権限付与や同意逸脱を招く。
  受理する type を事前登録スキーマに限定し、同意との部分集合判定・交換時のダウンスコープを
  fail-closed で強制する。粗い scope との重複は ADR で優先順位を定める。

completion:
  completed_at: 2026-06-24
  summary: |
    ADR-050 に基づき RFC 9396 Rich Authorization Requests を spec-first で実装した。
    テナントが事前登録した AuthorizationDetailType の検証スキーマ (フィールドごとに
    set / at_most / enum / exact の半順序) に対し、各 authorization_details を
    構文・必須・許可値・未登録フィールド拒否で fail-closed に検証する (ValidateAgainstType)。
    /authorize・/par・/token で受理し、検証済み詳細を AuthorizationRequest → 同意 Consent →
    AuthorizationCodeRecord → access token の authorization_details claim まで貫通させる。
    構造化詳細があるときは粗い scope の過去同意で自動スキップせず明示同意を必須とする。
    token-exchange (RFC 8693) では要求詳細を subject_token の詳細の部分集合に限定し
    (DetailsSubsetOf)、詳細なしの交換は元の詳細を保持のみ・決して拡張しない。introspection は
    検証済み JWT から詳細を抽出して返し (RS の検証点)、discovery は Enabled な type を
    authorization_details_types_supported として広告する。type 定義は新 permission
    AdminAuthorizationDetailTypesManage 配下の admin API / 管理 UI で CRUD でき、同意画面は
    登録 type の表示テンプレートで詳細を人間可読に提示する。
  slices:
    - spec + model — scl.yaml に AuthorizationDetail / AuthorizationDetailType /
      AuthorizationDetailsSchema / AuthorizationDetailFieldRule、各エンティティ・トークンへの
      authorization_details (optional)、events 3 種、discovery フィールドを追加。internal/spec を
      Zog 検証込みでミラー。ADR-050 を採用へ。
    - domain — ValidateAgainstType / DetailsSubsetOf (fail-closed 検証・ダウンスコープ半順序)。
    - registry — port + memory/postgres adapter (schema は JSONB) + 0015 migration + DI 配線 +
      サンプル payment_initiation seed。
    - pipeline — /authorize・/par が受理・検証し request→consent→code→token claim へ貫通。
    - exchange/discovery/introspect — token-exchange の詳細ダウンスコープ、discovery 広告、
      introspection 反映。
    - admin API + UI — AdminAuthorizationDetailTypesManage 配下の CRUD と管理画面。
    - consent UI — 表示テンプレートで詳細を人間可読に提示。
  verification:
    - cmd: 'go build ./...'
      in: ra-idp-go
      result: ok
    - cmd: 'go test ./...'
      in: ra-idp-go
      result: ok, no failures (検証の拒否境界・同意との部分集合・交換ダウンスコープ・token claim・admin API の各テストを含む)
    - cmd: 'golangci-lint run ./...'
      in: ra-idp-go
      result: ok, 0 issues
    - cmd: 'bun --cwd ra-idp-go/ui typecheck'
      result: ok
    - cmd: 'bun --cwd ra-idp-go/ui build'
      result: ok
    - cmd: 'bun run yaml-check:scl'
      in: tools
      result: ok
  affected_guarantees_state:
    - 最小権限: pass。エージェントは登録 type の検証スキーマで対象・上限を束縛した詳細しか得られず、未登録 type・スキーマ不適合は拒否する。
    - 同意の一致: pass。発行トークンの詳細は同意済み詳細に基づき、構造化詳細があるときは明示同意を必須化して過去 scope 同意での自動承認を許さない。
    - ダウンスコープ: pass。token-exchange は要求詳細を subject_token の部分集合に限定し、詳細なしの交換は保持のみで拡張しない。
    - 監査: pass。AuthorizationDetailsRequested / Consented / Rejected を emit する。
  residual_risk:
    - 個別業務ドメインの type スキーマ (送金・文書アクセス等) は網羅的に定義せず、サンプル payment_initiation のみ seed する (out_of_scope どおり)。
    - resource server 側の詳細解釈は実装しない。ra-idp は発行と検証点 (JWT claim / introspection) の提供まで。
    - token claim はアプリ固有の shape (type + 標準フィールド + fields マップ) で署名する。RFC 9396 の型固有フィールドをトップレベルへ平坦化する相互運用は将来。
    - 詳細の発行・交換許可判定は use case 層の fail-closed 強制で担保し、AuthZEN authorize() には admin 管理 permission のみ登録する (発行時の subset 判定はドメイン不変条件として実装)。
  traceability:
    spec: spec/scl.yaml (AuthorizationDetail / AuthorizationDetailType / AuthorizationDetailsSchema / AuthorizationDetailFieldRule / *.authorization_details / AuthorizationDetails{Requested,Consented,Rejected} / AdminAuthorizationDetailTypesManage / DiscoveryDocument.authorization_details_types_supported / 管理 interface 5 種)
    domain: internal/spec/{schemas,enums,events,policy,validation}.go, internal/oauth2/domain/authorization_details.go (+ _test.go)
    registry: internal/oauth2/ports/authorization_detail_type_repository.go, internal/platform/persistence/{memory,postgres}/authorization_detail_types.go, infra/migrations/0015_authorization_detail_types.sql
    usecase: internal/oauth2/usecases/{authorization_details,authorize,complete_login,exchange_code,exchange_token,introspect_token,push_authorization_request}.go (+ _test.go)
    crypto: internal/platform/crypto/jwt_signer.go (authorization_details claim の署名・抽出)
    http: internal/oauth2/adapters/http/{authorize_handler,par_handler,token_handler,discovery_handler,admin_authorization_detail_type_handler}.go (+ _test.go)
    ui: ra-idp-go/ui/src/features/auth-flow/ConsentPage.tsx, ra-idp-go/ui/src/features/admin-authz-detail-types/AdminAuthorizationDetailTypesPage.tsx
  human_decisions:
    - admin の type 管理は API だけでなく管理画面まで提供する (ユーザー指示)。
    - 各層をスライス単位でコミットし、spec↔impl coherence が常に green になるよう permission/interface は admin API スライスでまとめて導入した。
    - 同意 UI に加え admin UI も含めるため、UI スコープを WI 記載 (同意 UI) から拡張した。
