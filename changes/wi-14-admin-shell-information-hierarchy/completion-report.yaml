id: wi-14-admin-shell-information-hierarchy
title: 管理画面ヘッダと UserDetails の情報階層を直す
completed_at: 2026-06-16
work_item: work-item.yaml
status: completed

summary: |
  AdminShell のブランドを `/admin` へのリンクにし、ユーザー名とアバターを
  Radix DropdownMenu のトリガに変更した。ログアウト単独アイコンは廃止し、
  アカウント概要、パスワード変更、ログアウトをメニューに集約した。
  UserDetails は編集を primary action にし、無効化・再有効化・削除を
  kebab menu に移した。

semantic_diff:
  before: "ブランドとアバターは非操作、破壊的操作が詳細パネル下部に常設"
  after: "ブランドは管理トップへのリンク、アカウント操作はメニュー、編集だけを常設"

traceability:
  implementation:
    - ra-idp-go/ui/src/components/AdminShell.tsx
    - ra-idp-go/ui/src/components/ui/dropdown-menu.tsx
    - ra-idp-go/ui/src/pages/AdminUsersPage.tsx
  specification: "表示階層のみ。SCL / backend endpoint 変更なし"

affected_guarantees_state:
  - "admin RBAC、CSRF、ユーザー操作 API は不変"
  - "DropdownMenu のフォーカス・キーボード操作は Radix primitive に委譲"
  - "無効化と削除は menu 選択後も既存確認ダイアログを経由"

verification:
  - cmd: "bun --cwd ra-idp-go/ui typecheck"
    result: ok
  - cmd: "bun --cwd ra-idp-go/ui lint"
    result: "ok (42 files)"
  - cmd: "bun --cwd ra-idp-go/ui build"
    result: ok
  - cmd: "GOCACHE=/tmp/ra-idp-go-cache go test -race ./..."
    in: ra-idp-go
    result: ok
  - "実ブラウザでの DropdownMenu フォーカス復帰と目視確認は未実施。"

residual_risk:
  - "アカウント概要とパスワード変更は現状同じ `/account/password` を指す。"
  - "Radix DropdownMenu 追加後の production JS は約 519 kB で、Vite の 500 kB warning が出る。"

human_decisions:
  - "単一カテゴリしかない sidebar の英語見出しは情報量がないため削除した。"
