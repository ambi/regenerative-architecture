name: ra-idp-go CI

on:
  push:
    branches: [main]
    paths:
      - ra-idp-go/**
      - .github/workflows/ra-idp-go-ci.yaml
  pull_request:
    paths:
      - ra-idp-go/**
      - .github/workflows/ra-idp-go-ci.yaml

permissions:
  contents: read
  security-events: write
  packages: write

jobs:
  verify:
    name: Verify backend, SCL, and UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ra-idp-go/go.mod
          cache-dependency-path: ra-idp-go/go.sum
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Go vet
        working-directory: ra-idp-go
        run: go vet ./...
      - name: Go tests and SCL coherence
        working-directory: ra-idp-go
        run: go test -race ./...
      - name: Install UI dependencies
        working-directory: ra-idp-go/ui
        run: bun install --frozen-lockfile
      - name: UI lint
        working-directory: ra-idp-go/ui
        run: bun run lint
      - name: UI type check
        working-directory: ra-idp-go/ui
        run: bun run typecheck
      - name: UI build
        working-directory: ra-idp-go/ui
        run: bun run build

  sast:
    name: CodeQL
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: go,javascript-typescript
      - uses: github/codeql-action/analyze@v3

  container:
    name: Container build + Trivy scan
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./ra-idp-go/infra/docker/Dockerfile
          push: false
          tags: ra-idp-go:ci
          load: true
          platforms: linux/amd64
      - name: Trivy scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ra-idp-go:ci
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'
      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif
