        optional: true
        default:
          - urn:ra-idp:acr:pwd
          - urn:ra-idp:acr:mfa
      ui_locales_supported:
        type: "String[]"
        optional: true
        default:
          - en
          - ja
      authorization_details_types_supported:
        type: "String[]"
        optional: true
        description: "RFC 9396 — 当テナントで受理する authorization_details の type 一覧 (Enabled な AuthorizationDetailType から導出, ADR-050)。"
  ClientRegistrationRequest:
