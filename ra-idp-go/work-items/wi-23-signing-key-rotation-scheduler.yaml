id: wi-23-signing-key-rotation-scheduler
title: 署名鍵 rotation を運用で自動化する (scheduler + grace 期間中の旧鍵保持)
created_at: 2026-06-19
status: pending
authors: [tn]

motivation: |
  `RotateSigningKey` use case と admin endpoint
  `POST /api/admin/keys/rotate` は実装済 (ADR-009 = 90 日 cadence /
  旧鍵を JWKS に最低 7 日間残す) だが、運用面が抜けている:

    - 定期実行する scheduler / Kubernetes CronJob が無い。admin が
      手動で叩く前提だと、運用者の作業忘れが期限切れリスクに直結する。
    - grace 期間中の旧鍵が `KeyStore` で「retired だが保持」状態として
      明示されていない。`/jwks` は active 鍵だけを返す実装になっている
      可能性が高く、grace 期間内の既発行 JWT の検証が壊れる潜在リスク
      がある (RP 側の `kid` lookup が落ちる)。
    - rotation 後の旧鍵を grace 期間経過後に物理的に dispose する
      経路が無く、archive table が単調増加する。

  ADR-009 で決めた cadence / grace の運用面を、追加 ADR なしで実装に
  落とし切るのが本 WI のゴール。実 KMS / HSM への差し替えは Phase 8 で
  別 WI として扱う。

scope:
  decision:
    - 新規 ADR は不要。ADR-009 (key rotation strategy) の運用実装。

  scl:
    - >-
      `objectives` の `SigningKeyLifecycle` に `rotation_cadence_days`
      (既定 90) と `signing_key_grace_days` (既定 7) を value として
      宣言する (ADR-009 と整合)。`signing_key_archive_days = 2555`
      は別物 (compliance archive) として残す。

  go:
    domain:
      - >-
        `internal/oauth2/ports/key_store.go` の `SigningKey` 値型に
        `RetiredAt *time.Time` と `ExpiresAt *time.Time` を追加。
        `RetiredAt != nil` の鍵は「signing には使わないが、verify
        (JWKS) には公開する」状態。`ExpiresAt < now` の鍵は dispose
        対象。
      - >-
        `KeyStore` interface に以下を追加: `ListPublicKeys(ctx)` (active
        + retired-not-expired を返す)、`PruneExpired(ctx, before time.Time)`。
        既存 `Rotate(ctx)` は既存鍵を `RetiredAt = now` /
        `ExpiresAt = now + grace_days` で印を付けてから新鍵を生成する
        ように改修する。
    usecases:
      - >-
        新規 `PruneExpiredSigningKeys(ctx, deps, now)` を追加。
        `KeyStore.PruneExpired` を呼び、削除した kid を
        `SigningKeyArchived` event として発火する。
      - >-
        既存 `RotateSigningKey` は変更なし (内部で `Rotate` が retired
        印を付ける改修に乗る)。
    http:
      - >-
        `/jwks` (`internal/adapters/http/discovery_handler.go` 近辺) を
        `ListPublicKeys` を呼ぶ実装に変更する。active と retired の両方
        を返すことで、grace 期間内の既発行 JWT 検証が落ちないようにする。
    cmd:
      - >-
        新規 `cmd/ra-idp-go-key-rotator/main.go` を追加。引数:
          --cadence-days   (default 90)
          --grace-days     (default 7)
          --tick-interval  (default 1h: 観測周期)
        起動時に `RotateSigningKey` の最終実行時刻を確認し、`cadence-days`
        を超えていれば rotate。毎 tick で `PruneExpiredSigningKeys` を
        呼んで grace 経過鍵を dispose する。
    persistence:
      - >-
        `deploy/schema/postgres.sql` を更新し、`signing_keys` テーブルに
        `retired_at TIMESTAMPTZ NULL` と `expires_at TIMESTAMPTZ NULL`
        を追加。`psqldef --dry-run` で差分をレビューしてからデプロイ前に適用する。
        既存行は両カラム NULL で active 扱い。memory adapter にも対応フィールドを反映する。
    audit:
      - >-
        `SigningKeyRotated` (既存) に加え、新規 `SigningKeyArchived`
        (kid / retiredAt / expiresAt / disposedAt) を `spec/events.json`
        に追加する。outbox 経由で publish。

  infra:
    - >-
      `infra/k8s/ra-idp-go-key-rotator.cronjob.yaml` を skeleton として
      追加する (1 日 1 回 tick)。本 WI は雛形までで、本番クラスタへの
      投入は Phase 8 の操作タスク。

  documentation:
    - >-
      `ra-idp-go/README.md` の Phase 1 「署名鍵 rotation の自動化」行を
      completion で除去を記録する。`/jwks` が retired 鍵も返す挙動を README
      §マルチテナンシー の鍵節と合わせて言及する。

out_of_scope:
  - >-
    HSM / KMS への鍵移管。`KeyStore` は in-memory + PostgreSQL のまま。
    実 KMS は Phase 8。
  - >-
    Per-tenant 鍵化 (README §マルチテナンシー が Phase 8 と明示)。
  - >-
    rotation 失敗時の自動 retry / alert (本 WI は失敗を log + event で
    可視化するに留め、運用通知は Phase 8 の observability で扱う)。
  - >-
    旧鍵で署名された access token の forced revocation (rotation は
    backward verify を許す設計。Token Denylist 系は別 WI)。

affected_guarantees:
  - >-
    Token integrity: grace 期間中の旧鍵で署名された JWT は `/jwks` から
    引ける kid で RP 側で検証成立する。grace 経過後は kid が引けず
    `invalid_token` 扱いになる (fail-close)。
  - >-
    Rotation cadence: rotator が止まると JWT 署名が固定鍵で継続する
    リスクは残るが、admin endpoint は手動 fallback として残るため
    `/api/admin/keys/rotate` で復旧可能。
  - >-
    Audit: rotation と prune の両方が `SigningKeyRotated` /
    `SigningKeyArchived` として残り、後続調査で「いつ rotate された
    か」「いつ prune されたか」を再現できる。
  - >-
    SCL coherence: `objectives.SigningKeyLifecycle` に cadence / grace
    の数値を持ち、ADR-009 と値が一致することを `SCLObjectivesCoverage`
    テストで照合する。
  - >-
    Multi-tenant: 現状 (Phase 8 まで) は鍵が tenant 間共有のため、
    rotation の影響は全 tenant に同時に及ぶ。本 WI で挙動は変えない。

verification:
  - cmd: 'go test ./...'
    in: ra-idp-go
    reason: >-
      KeyStore.Rotate が retired/expires を埋めること、PruneExpired
      が grace 経過鍵だけを消すこと、ListPublicKeys が active+retired
      を返すこと、cmd の tick で rotate / prune が想定通り発火する
      こと。
  - cmd: 'golangci-lint run ./...'
    in: ra-idp-go
  - cmd: 'go build ./...'
    in: ra-idp-go
  - >-
    手動 1: rotator を `--cadence-days=0 --grace-days=0 --tick-interval=1s`
    で起動し、tick ごとに新 kid が `/jwks` に並び、次の tick で旧 kid が
    prune されることを確認する。
  - >-
    手動 2: rotator を `--cadence-days=0 --grace-days=300s --tick-interval=1s`
    で起動し、grace 期間中は旧 kid が `/jwks` に残ること、旧 kid で
    署名された access token の `/introspect` / RS 側検証が成立すること
    を確認する。
  - >-
    手動 3: PostgreSQL adapter で migrate → rotator 起動 → 再起動して
    state が永続化されていることを確認する。

risk: medium
risk_notes: |
  鍵 lifecycle は安全側 fail-close で倒すべき領域だが、本 WI の主リスクは
  「rotate のタイミングが揃わない」「旧鍵を消し過ぎる」の 2 点:

    (1) cadence + grace の関係: grace_days < cadence_days を不変条件と
        して持ち、`cmd` 起動時に違反したら exit。grace > cadence は
        archive 表が単調増加する。

    (2) /jwks の retired 公開: retired 鍵を返さないと grace 内の RP 検証が
        落ちる。逆に retired を返し続けると JWKS が肥大化する。
        `ExpiresAt` 経過の鍵は `/jwks` から外す処理を ListPublicKeys に
        埋め、PruneExpired で物理 dispose を別経路にする (公開と dispose
        を分ける)。

    (3) Multi-tenant 共有鍵: 現状の共有鍵を rotate する影響は全 tenant に
        及ぶ。本 WI ではこれを既存制約として明記し、per-tenant 化は
        Phase 8 の前提条件として残す。
