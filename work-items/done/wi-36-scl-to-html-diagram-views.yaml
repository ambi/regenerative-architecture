  affected_guarantees_state:
    - 可視化可能性: passed — 3 種の関係構造を SVG 図で表示する。
    - 単一上流ソース性: passed — 図は SCL の context_map / states / user_experience から派生する。
    - 検証可能性: passed — 代表 fixture の diagram 出力を render.test.ts で固定した。
