        - GetAdminClient
        - CreateAdminClient
        - UpdateAdminClient
        - DeleteAdminClient
    - id: UX-ADMIN-CONTROL-PLANE
      category: security
      adoption: required
      statement: テナント管理画面はcontrol plane(/realms/default配下)かつsystem_adminロールでのみ到達でき、通常テナントの管理者には導線も操作も提供しない。
      screens:
        - AdminTenants
      interfaces:
        - ListTenants
        - GetTenant
        - CreateTenant
        - UpdateTenant
        - DisableTenant
        - EnableTenant
      scenarios:
        - system_admin だけが /realms/default/admin/tenants を呼べ admin は 403
    - id: UX-ACCOUNT-SELF-SCOPE
      category: security
      adoption: required
      statement: マイアカウント画面は呼び出しユーザー自身のリソースだけを表示・変更し、他者のプロフィール、セッション、同意、データへはアクセスできない。
