affected_guarantees_state:
  - "tenant isolation: GET / PATCH /api/admin/settings は actor.tenant_id に固定。cross-tenant 書き込みは存在しない。"
  - "admin RBAC: AdminSettingsRead / AdminSettingsUpdate は admin / system_admin に限定。requireTenantAdmin が actor.tenant_id == request tenant を強制する。"
  - "CSRF: PATCH は verifyBrowserRequest を継承し double-submit を要求する。"
  - "SCL coherence: 新規 interface 2 件と permission 2 件を追加し、TenantUpdated event / TenantUpdateRequest model を流用。Tenancy component の owns_* に追加済み。SCLPermissionsCoverage テストで Go action マッピングを検証。"
  - "policy floor: password_policy_override は global PasswordPolicy より弱い場合 ErrPolicyOverrideWeaker / HTTP 400 policy_override_weaker で reject。"

