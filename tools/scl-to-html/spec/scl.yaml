# scl-to-html — Specification Core Language (SCL) Document
#
# 「SCL を HTML に変換するツール」自身を一つの RA として記述したもの。
# Layer 1（仕様核）。実装（Layer 3）はこの仕様から派生する。
#
# 語彙規約: 型/インターフェース = PascalCase、フィールド = snake_case。

system: scl-to-html
spec_version: "1.0"

# =================================================================
# 1. vocabulary
# =================================================================

vocabulary:

  SclDocument:
    definition: 入力となる SCL 形式の YAML 文書。
    aliases: [scl]

  HtmlDocument:
    definition: SclDocument から派生する単一の HTML 文書。
    aliases: [html]

  Section:
    definition: |
      SCL 文書の論理単位。
      vocabulary / models / interfaces / states /
      invariants / scenarios / permissions / objectives の 8 種。

  Render:
    definition: SclDocument を HtmlDocument に変換する射影。決定的で副作用を持たない。

  CrossReference:
    definition: |
      ある宣言が他の宣言を名前で参照する関係。
      interfaces.errors / interfaces.emits、および scenarios の自然文ステップ中に
      引用された既知の名前（interface / model）が該当する。
    aliases: [xref, cross-ref]

# =================================================================
# 2. models
# =================================================================

models:

  SectionKind:
    kind: enum
    values:
      - vocabulary
      - models
      - interfaces
      - states
      - invariants
      - scenarios
      - permissions
      - objectives

  SclDocument:
    kind: value_object
    description: 本ツールが解釈する SCL 文書の最小構造。各 Section の中身は SCL 自身が再帰的に定義する。
    fields:
      system:         { type: String, constraints: [non_empty] }
      spec_version:   { type: String, constraints: [non_empty] }
      annotations:    { type: Map, optional: true }
      vocabulary:          { type: Map, optional: true }
      models:         { type: Map, optional: true }
      interfaces:     { type: Map, optional: true }
      states:         { type: Map, optional: true }
      invariants:     { type: Map, optional: true }
      scenarios:      { type: Map, optional: true }
      permissions:    { type: Map, optional: true }
      objectives:     { type: Map, optional: true }

  HtmlDocument:
    kind: value_object
    fields:
      content: { type: String, constraints: [non_empty] }

# =================================================================
# 3. interfaces
# =================================================================

interfaces:

  Render:
    description: 入力 SCL YAML を読み込み、単一の HtmlDocument を返す。
    steps:
      - "{input_path} を HTML に変換する"
    input:
      input_path:  { type: Path, description: 入力 SCL YAML のパス }
      output_path: { type: Path, optional: true, description: 未指定なら標準出力へ }
    output:
      html: { type: HtmlDocument }
    idempotent: true
    read_only: true
    bindings:
      - kind: cli
        command: scl-to-html
        args:
          - { name: input_path,  position: 1 }
          - { name: output_path, position: 2 }
        stdout: HtmlDocument          # output_path 省略時はここに書き出す
        exit_codes: { success: 0 }

# =================================================================
# 4. invariants
# =================================================================

invariants:

  presence_preserved:
    description: 入力に存在するセクションは、出力に対応する <section id="..."> を持つ。
    target: Render
    always: "∀ S ∈ keys(scl) ∩ SectionKind : output contains '<section id=\"S\">'"
    severity: must

  absence_preserved:
    description: 入力に存在しないセクションは、出力にも現れない。
    target: Render
    never: "output contains '<section id=\"S\">' where S ∉ keys(scl)"
    severity: must

  user_text_escaped:
    description: 入力 SCL 由来の文字列は HTML として安全にエスケープされる。
    target: Render
    never: "output contains unescaped '<' '>' '&' or '\"' originating from scl values"
    severity: must

  deterministic:
    description: 同一入力からは常に同一の HTML を返す。時刻・乱数・環境変数に依存しない。
    target: Render
    always: "Render(x) ≡ Render(x)"
    severity: must

  self_contained:
    description: HtmlDocument は単一ファイルで表示でき、外部資産（ネットワーク / 別ファイル）に依存しない。
    target: Render
    always: "rendering HtmlDocument requires no external network resource or sidecar file"
    severity: must

  navigable_to_each_section:
    description: 閲覧者は HtmlDocument 上の任意の地点から、入力に存在する各 Section に直接遷移できる。
    target: Render
    always: "from any point in HtmlDocument, the reader can reach each present Section without leaving the document"
    severity: must

  cross_references_are_navigable:
    description: CrossReference は閲覧者がひとつの操作で参照先定義へ遷移できる形で描画される。
    target: Render
    always: "∀ CrossReference c : c is presented as a control that navigates the reader to the definition of c"
    severity: must

  reading_position_is_indicated:
    description: 閲覧者が長い HtmlDocument 上を移動するとき、現在読まれている Section がナビゲーション側で視覚的に区別される。
    target: Render
    always: "the Section currently in view is visually distinguished within the navigation"
    severity: must

  color_scheme_adapts_to_reader:
    description: HtmlDocument の配色は、閲覧者の環境が示すライト/ダーク設定に追随する。
    target: Render
    always: "HtmlDocument's visual presentation follows the reader's light/dark preference"
    severity: must

# =================================================================
# 5. scenarios
# =================================================================

scenarios:

  最小の SCL でも HTML になり、無いセクションは出力されない:
    steps:
      - vocabulary だけを持つ最小の SCL を用意して変換する
      - 出力に vocabulary セクションが含まれる
      - 出力に models セクションは現れない

  ユーザ文字列の HTML 特殊文字はエスケープされる:
    steps:
      - 'definition に特殊文字 "<script>" を含む SCL を用意して変換する'
      - 出力では特殊文字がエスケープされている
      - 出力に生の script タグは現れない

# =================================================================
# 6. objectives
# =================================================================

objectives:

  fast_render:
    kind: slo
    metric: latency_p95
    target: 100ms
    interface: Render
    description: 数百 KiB 以下の SCL を p95 100ms 以内で変換する。
