id: wi-61-ws-federation-passive-requestor-idp
title: WS-Federation Passive Requestor Profile の IP-STS としてブラウザ SSO に対応する
created_at: 2026-06-24
status: completed
authors: [tn]

motivation: |
  Microsoft 系のエンタープライズ連携 (Microsoft 365 / Entra ID、SharePoint、
  オンプレ AD FS 連携アプリ) は今も WS-Federation Passive Requestor Profile を
  最低ラインの SSO 入口として要求する。Okta・OneLogin の「Microsoft Office 365」
  連携も、PingFederate の WS-Federation IdP アダプタも、まず passive プロファイル
  (ブラウザリダイレクトと signed token) を IdP/IP-STS として提供する。

  本 WI は ra-idp-go を WS-Federation の IP-STS として振る舞えるようにし、AD FS の
  `/adfs/ls/` 相当のブラウザ sign-in / sign-out を実装する。`wa=wsignin1.0` で
  受理し、`wtrealm` で識別した relying party 向けに署名済み RSTR (Request Security
  Token Response) に包んだ SAML assertion を返す。これは最終ゴールである Entra
  との domain federation ([[wi-64-entra-domain-federation-m365-sso]]) の passive
  ログオン経路 (PassiveLogOnUri) になる。能動的 (rich client / device 登録) 経路は
  WS-Trust STS ([[wi-62-ws-trust-active-sts]]) が担い、両者は共通の federation
  metadata と claim mapping ([[wi-63-federation-metadata-and-claims-mapping]]) を
  使う。assertion 生成・XML 署名の基盤は SAML 2.0 IdP ([[wi-29-saml2-idp]]) と共有する。

  本 WI はフォーム認証 (ra-idp のログイン UI) で完結し、Kerberos には依存しない。
  ドメイン参加 PC をフォーム無しで通す無音サインイン (WIA / Negotiate バリアント) は
  [[wi-65-kerberos-spnego-inbound-silent-sso]] が本 WI の passive
  エンドポイントの上に追加する。依存の向きは wi-65 → 本 WI。本 WI では認証方式を
  差し替え可能にする拡張点を設けるところまでとする。

scope:
  decision:
    - >-
      新規 ADR: WS-Federation passive の対応範囲を確定する。初期対応は Web (passive)
      Requestor Profile、`wsignin1.0` / `wsignout1.0` / `wsignoutcleanup1.0`、
      RSTR に包む SAML 1.1 assertion (Entra 互換) を既定とし SAML 2.0 assertion を
      任意対応、署名は RSTR (assertion) に対して付与、`wtrealm` による RP 識別と
      `wreply` / `wctx` / `wfresh` / `wauth` / `whr` の検証・尊重規則を定める。SAML 2.0 IdP との
      assertion / 署名基盤の共有方針も明記する。
  scl:
    - >-
      新規 model: WsFedRelyingParty / WsFedSignInRequest / WsFedSignInResponse。
      RSTR・SAML assertion は SAML 2.0 IdP の assertion model を再利用または拡張する。
    - 新規 interface: WsFederationSignIn / WsFederationSignOut。
    - 新規 event: WsFedSignInIssued / WsFedSignInRejected / WsFedSignOut。
    - client metadata に WS-Federation RP 種別 (wtrealm / wreply / token type / NameID format) を追加する。
  go:
    - >-
      passive エンドポイント (`wa=wsignin1.0`) を realm 配下に公開し、未ログイン時は
      ra-idp のログイン UI に誘導してから RSTR を発行する。認証方式は差し替え可能にし、
      WIA/Negotiate を後から足せる拡張点を設ける (実装は wi-65)。
    - >-
      `wtrealm` を登録済み RP に解決し、`wreply` を RP metadata の許可 URI に限定する
      (open redirect 防止、fail-closed)。`wfresh` による再認証要求と `wauth` で要求された
      認証方式 (auth method URI) を尊重する。
    - RSTR / assertion の XML 署名・canonicalization は実績ある library を使い自前実装しない (SAML 2.0 IdP と共有)。
    - sign-out (`wsignout1.0` / `wsignoutcleanup1.0`) で RP への logout 通知とローカルセッション破棄を行う。
  http:
    - '`/{realm}/wsfed` (passive) と federation metadata への広告。'
  ui:
    - admin clients に WS-Federation RP 種別と wtrealm / wreply / claim mapping の編集を追加する。
  documentation:
    - README に WS-Federation 対応範囲、passive エンドポイント URL、RP 設定例を書く。

out_of_scope:
  - WS-Trust active (RST/RSTR over SOAP) は [[wi-62-ws-trust-active-sts]] で扱う。
  - >-
    WIA / Negotiate による無音サインインバリアントは
    [[wi-65-kerberos-spnego-inbound-silent-sso]] が追加する。
    本 WI はフォーム認証と拡張点まで。
  - federation metadata 公開と claim 発行ルールは [[wi-63-federation-metadata-and-claims-mapping]] で扱う。
  - Entra / Microsoft 365 への実接続検証は [[wi-64-entra-domain-federation-m365-sso]] で扱う。
  - encrypted assertion の初期必須化。必要なら追加 WI とする。

affected_guarantees:
  - XML signature safety: 署名は RSTR / assertion に必ず付与し、未署名・改竄を受け入れない。
  - redirect safety: wreply は RP metadata の許可 URI に限定し open redirect を防ぐ (fail-closed)。
  - RP 識別: wtrealm は登録済み RP にのみ解決し、未登録 realm は拒否する。
  - tenant isolation: WS-Fed エンドポイントと RP metadata は realm ごとに分離する。
  - audit: passive sign-in / sign-out / 拒否を監査に残す。

verification:
  - cmd: 'go test ./...'
    in: ra-idp-go
    reason: wtrealm 解決・wreply 許可判定・wfresh 再認証・RSTR 署名・sign-out の境界。
  - cmd: 'golangci-lint run ./...'
    in: ra-idp-go
  - cmd: 'go build ./...'
    in: ra-idp-go
  - cmd: 'bun --cwd ra-idp-go/ui typecheck'
  - cmd: 'bun --cwd ra-idp-go/ui build'
  - >-
    手動: test RP から `wa=wsignin1.0` で passive sign-in を開始し、RSTR の署名・wtrealm・
    NameID と claim が正しいこと、未登録 wreply が拒否されることを確認する。

risk: high
risk_notes: |
  WS-Federation は XML signature wrapping と open redirect (`wreply`) が主要リスク。
  署名検証・canonicalization は library に委ね、`wtrealm` / `wreply` は登録済み RP
  metadata に対して fail-closed で検証する。SAML 2.0 IdP の assertion / 署名基盤を
  先に整えるか並行させ、XML 処理の重複実装を避ける。

completion:
  completed_at: 2026-06-26

  summary: |
    WsFederation bounded context (ADR-064) と宣言的 claim 発行 (ADR-059) に沿って、WS-Federation passive requestor
    profile の IP-STS を実装した。`/{realm}/wsfed` で `wa=wsignin1.0` /
    `wsignout1.0` / `wsignoutcleanup1.0` を受理する。未認証は既存ログイン UI へ
    return_to つきで誘導し、認証済みなら RP の宣言的 claim policy で claim を発行し、
    goxmldsig (ADR-060) で署名した SAML assertion を WS-Trust RSTR に包んで自動 POST
    する。token は既定で SAML 1.1 (Entra / AD FS の WS-Fed 互換)、RP 設定で SAML 2.0
    も選択可。`wfresh` を尊重して古い認証は再認証へ誘導し (ログイン往復を吸収する短い
    猶予つき)、`wauth` を尊重して満たせる password 系は反映、満たせない統合 Windows
    認証等は fail-closed で拒否する (無音サインインは wi-65)。relying party は
    `/api/admin/wsfed/relying-parties` と管理 UI 「WS-Federation 連携先」で CRUD でき、
    許可 wreply 閉集合・audience・token type・claim mapping を編集する。

  semantic_diff:
    before: "ra-idp-go は OAuth2 / OIDC IdP のみ。WS-Federation RP を連携できない"
    after: "wtrealm で登録した RP へ署名済み SAML (1.1 既定 / 2.0) を passive で発行し、wfresh / wauth を尊重する WS-Fed IP-STS として振る舞える"

  traceability:
    specification:
      - ra-idp-go/spec/scl.yaml  # WsFederation context, WsFedRelyingParty.token_type, WsFedTokenType, WsFederationSignIn/SignOut
      - ra-idp-go/decisions/ADR-059-federation-bounded-context-and-claim-issuance.md
      - ra-idp-go/decisions/ADR-060-xml-signature-library-and-saml-assertion-signing.md
    implementation:
      - ra-idp-go/internal/spec/federation.go
      - ra-idp-go/internal/wsfederation/domain/  # claims, wsfed (wfresh / wauth), attributes
      - ra-idp-go/internal/wsfederation/adapters/samltoken/assertion.go  # SAML 1.1 / 2.0
      - ra-idp-go/internal/wsfederation/adapters/wsfed/rstr.go
      - ra-idp-go/internal/wsfederation/adapters/http/  # wsfed_handler, admin_relying_party_handler
      - ra-idp-go/internal/wsfederation/ports/relying_party_repository.go
      - ra-idp-go/internal/platform/persistence/memory/wsfed_relying_parties.go
      - ra-idp-go/internal/oauth2/adapters/http/authorize_handler.go  # validReturnTo allows /wsfed
      - ra-idp-go/ui/src/features/admin-wsfed/AdminWsFedRelyingPartiesPage.tsx

  affected_guarantees_state:
    - "XML signature: assertion は goxmldsig で enveloped 署名し、改竄は検証失敗 (round-trip test)"
    - "redirect safety: wreply は RP の許可集合と完全一致のみ。sign-in / sign-out とも open redirect を拒否"
    - "RP 識別: 未登録 wtrealm は 400 で拒否し WsFedSignInRejected を発行"
    - "tenant isolation: RP リポジトリとエンドポイントは realm ごとに分離"
    - "audit: WsFedSignInIssued / WsFedSignInRejected / WsFedSignOut を発行"
    - "freshness: wfresh が示す最大経過時間より古い認証は再認証へ誘導"
    - "auth method: wauth が満たせない方式 (統合 Windows 等) は fail-closed で拒否"

  verification:
    - cmd: "go build ./..."
      in: ra-idp-go
      result: ok
    - cmd: "go test ./..."
      in: ra-idp-go
      result: ok
    - cmd: "golangci-lint run ./..."
      in: ra-idp-go
      result: "0 issues"
    - cmd: "bun --cwd ra-idp-go/ui typecheck"
      result: ok
    - cmd: "bun --cwd ra-idp-go/ui build"
      result: ok
    - "手動: 実サーバで未認証→login→/wsfed 復帰、SAML 1.1 既定 (MajorVersion 1.1 / am:password / claim namespace 分割)、wauth=windows→400、wauth=Password→200、wfresh の往復ループ無しを curl で確認"

  residual_risk:
    - "Entra / Microsoft 365 の実テナント接続検証は未実施 ([[wi-64-entra-domain-federation-m365-sso]])。"
    - "federation metadata の公開は未実施 ([[wi-63-federation-metadata-and-claims-mapping]])。"
    - "wfresh=0 はログイン往復を吸収する短い猶予 (30s) 内のセッション再利用を許容する。"
    - "署名証明書は開発用自己署名。ライフサイクル / ローテーション / metadata 掲載は後続。"

  human_decisions:
    - "ui scope の『admin clients に追加』ではなく専用ページ『WS-Federation 連携先』として実装した (RP は OAuth client と別概念のため)。"
    - "wauth の統合 Windows 認証は fail-closed 拒否とし、無音サインインは wi-65 に委ねた。"
