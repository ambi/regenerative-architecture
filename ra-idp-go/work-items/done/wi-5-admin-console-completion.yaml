id: wi-5-admin-console-completion
title: 管理画面 (admin console) の機能を完成させる
created_at: 2026-06-14
status: completed
authors: [tn]

motivation: |
  ra-idp-go の HTTP 層には admin API がほぼ全領域揃ったが、ra-idp-go/ui の
  React 管理画面は users と clients の 2 ページのみで、残り 4 領域 (consents
  / audit_events / keys / tenants) は API しかなく操作 UI が無い。完成形と
  して 6 ページを揃え、サイドバーから相互遷移できる状態にする。

scope:
  ui:
    pages:
      - >-
        AdminConsentsPage: ListConsents / GetConsent / RevokeConsent を操作する。
        テーブルでテナント内の Consent を一覧し、行選択で詳細パネル、Revoke
        ボタンを提供する。Consent の Create / Update は SCL 上意図的に存在
        しないので UI でも提供しない。
      - >-
        AdminAuditEventsPage: ListAdminAuditEvents / GetAdminAuditEvent を操作
        する。type / sub / after / before / limit のフィルタフォームと結果
        テーブルを提供する。system_admin の場合のみ all_tenants トグルを
        出す。行選択で payload JSON を展開表示する。
      - >-
        AdminKeysPage: ListAdminKeys / GetAdminKey / RotateAdminKey を操作
        する。鍵一覧 (kid / alg / active / created_at)、行選択で公開鍵 JWK
        の展開、Rotate ボタン (確認ダイアログ付き) を提供する。Rotate は
        system_admin かつ default tenant でのみ表示。
      - >-
        AdminTenantsPage: ListTenants / GetTenant / CreateTenant /
        UpdateTenant / DisableTenant / EnableTenant を操作する。
        /realms/default 経由でのみアクセスする画面とし、default tenant でない
        場合はナビゲーション自体を隠す。PasswordPolicyOverride の編集も含む。
    types:
      - >-
        AdminConsent / AdminAuditEvent / AdminKey / AdminTenant と
        対応する Page 型を types.ts に追加する。
    api:
      - >-
        api.ts に list / get / revoke / rotate / create / update / disable /
        enable の関数を追加し、loadPageData の URL ディスパッチを追加する。
    routing:
      - >-
        router.tsx に /admin/consents, /admin/audit_events, /admin/keys,
        /admin/tenants の 4 ルートを追加する。
    navigation:
      - >-
        既存 AdminUsersPage / AdminClientsPage と新ページの sidebar navigation
        を統一する。disabled 項目だった「監査ログ」「概要」を解消し、新項目
        「Consents」「鍵」「テナント」を追加する。テナントは control plane
        (default tenant 経路) でのみ表示する。

out_of_scope:
  - admin 以外の画面の改修。
  - >-
    既存 AdminUsersPage / AdminClientsPage のロジック変更 (navigation 配列の
    更新のみ)。
  - 多言語化や a11y の大規模見直し。
  - audit event payload の field レベルでの構造化表示 (生 JSON 表示で十分)。

affected_guarantees:
  - >-
    admin RBAC: 画面側で role 判定をしてボタン表示を切り替えるが、最終的な
    認可は backend の verifyBrowserRequest + requireXxx に委譲する。
  - >-
    CSRF: 既存と同じく /api/auth/account から csrf_token を取り、destructive
    POST/PATCH/DELETE は X-CSRF-Token と cookie のペアで保護する。

verification:
  - cmd: 'bun --cwd ra-idp-go/ui typecheck'
  - cmd: 'bun --cwd ra-idp-go/ui lint'
  - cmd: 'bun --cwd ra-idp-go/ui build'
  - cmd: 'go test ./internal/adapters/http/... ./internal/spec/...'
    in: ra-idp-go
    reason: バックエンドハンドラに変更は無いが回帰を確認する。
  - >-
    手動: dev サーバを起動し、admin user でログイン → /admin/users から
    nav 経由で 6 画面が遷移できる。/admin/consents で revoke 確認、
    /admin/audit_events でフィルタ動作、/admin/keys で rotate 確認、
    /realms/default/admin/tenants で create/update/disable 確認。

risk: medium
risk_notes: |
  純粋なフロントエンド追加だが、CSRF とテナント境界を踏み外すと既存の
  admin 画面まで壊れる。pages 配下に新ファイルを追加するのを基本とし、
  既存ページの編集は navigation 配列のみに留める。

completion:
  completed_at: 2026-06-14

  summary: |
    ra-idp-go/ui に AdminConsentsPage / AdminAuditEventsPage / AdminKeysPage /
    AdminTenantsPage の 4 ページを追加し、admin console を全 6 領域
    (users / clients / consents / audit_events / keys / tenants) で操作可能に
    した。サイドバー navigation は lib/adminNav.ts に単一の source of truth を
    作り、6 ページから共通参照する形に整理した。tenants は control plane
    (/realms/default) 経路でのみ navigation に出す。backend は
    /api/auth/account に tenant_id と roles を追加し、UI 側のロールゲート
    (rotate / all_tenants) の根拠を提供する。

  scope_delivered:
    ui_pages:
      - >-
        AdminConsentsPage: sub / client_id / scope フィルタ付きテーブル、
        行選択で詳細パネル表示、確認ダイアログ付き revoke。
      - >-
        AdminAuditEventsPage: type / sub / after / before / limit フィルタ
        フォーム、結果テーブル、行選択で payload JSON を pre 表示。
        system_admin かつ default tenant のときのみ all_tenants チェック
        ボックスを描画。
      - >-
        AdminKeysPage: keys 一覧 (kid / alg / active / created_at) +
        公開鍵 JWK 表示。Rotate ボタンは system_admin かつ default tenant
        で表示し、確認ダイアログ後に rotate。
      - >-
        AdminTenantsPage: tenants 一覧 + 詳細カード、新規 tenant ダイアログ
        (id / display_name)、TenantEditor で display_name と
        PasswordPolicyOverride (min_length / max_length / history_depth) を
        編集。default tenant は無効化不可とし行末ボタン非表示。
    shared_components:
      - >-
        components/AdminShell.tsx: header (Brand + actor + logout) と sidebar
        (adminNavItems) と main slot をまとめた layout 部品。新 4 ページが
        利用する。AdminUsersPage / AdminClientsPage は既存レイアウトに
        navigation 配列だけ統一する形で吸収した。
      - >-
        lib/adminNav.ts: AdminNavKey と AdminNavItem を export し、
        adminNavItems(active) を呼ぶと現在 active の navigation 配列を返す。
        tenantBasePath() が /realms/default の時のみ tenants を追加する。
    types:
      - >-
        types.ts に AdminConsent / AdminConsentsPage / AdminAuditEvent /
        AdminAuditEventsPage / AdminKey / AdminKeysPage / AdminTenant /
        AdminTenantsPage を追加。PageData union を拡張。
    api:
      - >-
        api.ts に listAdminConsents / revokeAdminConsent /
        listAdminAuditEvents (AdminAuditEventQuery 付き) / listAdminKeys /
        rotateAdminKey / listAdminTenants / createAdminTenant /
        updateAdminTenant / setAdminTenantDisabled を追加。
        loadPageData に /admin/consents, /admin/audit_events, /admin/keys,
        /admin/tenants の 4 分岐を追加。tenants API は /admin/tenants の
        flat path で呼び出す (control plane の /realms/default 配下に
        mount される実装に合わせる)。
    routing:
      - >-
        router.tsx に adminConsentsRoute / adminAuditEventsRoute /
        adminKeysRoute / adminTenantsRoute を追加し、routeTree に登録。
    navigation_alignment:
      - >-
        AdminUsersPage.tsx / AdminClientsPage.tsx は hardcode navigation 配列
        を捨て adminNavItems('users') / adminNavItems('clients') を使用。
        残骸の icon import (IconActivity / IconLayoutDashboard) を整理。
    backend:
      - >-
        internal/adapters/http/authorize_handler.go の
        accountContextResponse に tenant_id と roles を追加し、
        handleAccountContext で user.TenantID / user.Roles を反映。これに
        より UI 側で actorTenantID === 'default' と
        actorRoles.includes('system_admin') による rotate / all_tenants の
        ゲートが破綻なくクライアントサイドで判断できる (最終認可は backend)。
    ui_primitive_extension:
      - >-
        components/ui/alert.tsx に variant プロップ (destructive | success)
        を追加。既存呼び出し箇所はデフォルト destructive で従来挙動を維持。

  out_of_scope_confirmed:
    - admin 以外の画面の改修は行わなかった。
    - >-
      既存 AdminUsersPage / AdminClientsPage の UI ロジック改修は navigation
      関連のみに限定した。RoleEditorDialog 等の挙動は未変更。
    - 多言語化や全面 a11y 見直しは行っていない。
    - >-
      audit event payload は raw JSON 表示で確定した。field 単位の構造化
      表示は今後の課題。

  affected_guarantees_state:
    - >-
      admin RBAC: 画面側のボタン表示ロジックは追加されたが、destructive 操作
      (revoke / rotate / disable / create / update) の認可判断は
      全て backend 側で requireAdminUser / requireSystemAdmin を呼ぶ
      既存経路に乗っている。
    - >-
      CSRF: 全ての POST/PATCH/DELETE は X-CSRF-Token と csrf cookie の
      ペアを要求する既存契約に従う。新 API helper はすべて csrfToken を
      引数で受け取り、AuthenticationAPI 経由でヘッダに乗せる。
    - >-
      Tenant isolation: AdminTenantsPage は /realms/default の navigation
      でのみ露出し、tenants エンドポイントが non-default tenant 経路から
      呼ばれないようにフロント側でも遮断する。backend 側でも /admin/tenants
      は default tenant 配下でしか mount されない。
    - >-
      SCL coherence: SCL 側は変更していない。components / interfaces /
      permissions の wording は影響なし。

  verification:
    - cmd: 'bun --cwd ra-idp-go/ui typecheck'
      result: ok
    - cmd: 'bun --cwd ra-idp-go/ui lint'
      result: 'Checked 39 files. No fixes applied.'
    - cmd: 'bun --cwd ra-idp-go/ui build'
      result: 'vite build ok (428.97 kB / 123.33 kB gzip)'
    - cmd: 'go test ./internal/adapters/http/... ./internal/spec/...'
      in: ra-idp-go
      result: ok
    - cmd: 'go build ./...'
      in: ra-idp-go
      result: ok
    - cmd: 'go vet ./...'
      in: ra-idp-go
      result: ok

  residual_risk:
    - admin console 上の手動 smoke test は本作業ではまだ完了していない。
      dev サーバ起動後に admin user で 6 画面の遷移と revoke / rotate /
      disable の 3 つの destructive flow を確認する必要がある。
    - AdminAuditEventsPage の payload 表示は raw JSON のみで構造化されない。
      将来 RFC 8417 SET など正規化された監査イベント形式を採用した場合に
      field 単位レンダリングを追加する余地がある。
    - admin operations の UI と backend の RBAC ゲートは二重化しているが、
      backend が正であるため、UI 側の actorRoles / actorTenantID 判定は
      UX の問題に過ぎない。スプーフィングしても backend が拒否する。

  approver_note: |
    Alert に variant を追加したのは新 4 ページが success / destructive を
    使い分けるための最小拡張。既存呼び出しは default variant で挙動不変。
