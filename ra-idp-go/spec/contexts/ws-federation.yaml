# ra-idp WsFederation — SCL
# Generated from ra-idp-go/spec/scl.yaml during SCL 2.0 context split.

system: ra-idp
spec_version: "2.0"
context: WsFederation
standards:
  WsFederationPassiveRequestorProfile:
    title: Web Services Federation Language (WS-Federation) Version 1.2
    version: "1.2"
    url: https://docs.oasis-open.org/wsfed/federation/v1.2/ws-federation.html
    roles: [IdentityProvider, SecurityTokenService]
    scope: Passive Requestor Profile の sign-in / sign-out と federation metadata
    requirements:
      - id: WSFed-PassiveSignIn
        section: "§13"
        strength: MUST
        adoption: required
        statement: wsignin1.0 で登録済み wtrealm と許可済み wreply にだけ token を返す
        relates_to:
          interfaces: [WsFederationSignIn]
          invariants: [WsFedReplyAndRealmClosed]
      - id: WSFed-SilentSignIn
        section: "§13"
        strength: MAY
        adoption: excluded
        statement: silent sign-in / prompt=none 相当の無音認証
        reason: 初期範囲では利用者の明示的な認証状態だけを使い、無音サインインは提供しない
  WsTrust13:
    title: WS-Trust 1.3
    version: "1.3"
    url: https://docs.oasis-open.org/ws-sx/ws-trust/v1.3/ws-trust.html
    roles: [SecurityTokenService]
    scope: Issue binding / RequestSecurityToken / RequestSecurityTokenResponse
    requirements:
      - id: WSTrust13-IssueBearer
        section: "§4, §8"
        strength: MUST
        adoption: required
        statement: Issue 要求に対して Bearer SAML assertion を RSTR で返す
        relates_to:
          interfaces: [WsTrustIssue]
          invariants: [WsTrustRSTClosed]
      - id: WSTrust13-WindowsTransport
        section: "§8"
        strength: MAY
        adoption: excluded
        statement: WindowsTransport / Kerberos based active profile
        reason: 初期範囲では UsernameToken のみを受理する
  WsSecurityUsernameToken:
    title: Web Services Security UsernameToken Profile 1.1.1
    version: "1.1.1"
    url: https://docs.oasis-open.org/wss-m/wss/v1.1.1/os/wss-UsernameTokenProfile-v1.1.1-os.html
    roles: [SecurityTokenService]
    scope: UsernameToken username / password credential
    requirements:
      - id: WSS-UsernameTokenPassword
        section: "§3"
        strength: MUST
        adoption: required
        statement: WS-Trust active STS は UsernameToken username/password を認証する
        relates_to:
          interfaces: [WsTrustIssue]
  WsAddressing:
    title: Web Services Addressing 1.0 - Core
    version: "1.0"
    url: https://www.w3.org/TR/ws-addr-core/
    roles: [SecurityTokenService]
    scope: MessageID / To / Action
    requirements:
      - id: WSAddressing-MessageIDToAction
        section: "§3"
        strength: MUST
        adoption: required
        statement: MessageID は replay 防止、To は active STS endpoint、Action は Issue として検証する
        relates_to:
          interfaces: [WsTrustIssue]
          invariants: [WsTrustRSTClosed, WsTrustMessageIDReplay]
glossary:
  WsFederation:
    definition: WS-Federation Passive Requestor Profile と WS-Trust active STS を組み合わせた WS-* protocol family。UsernameToken による Issue、WS-Addressing の MessageID / To / Action、Bearer SAML assertion 発行を扱う。WindowsTransport / Kerberos、silent sign-in は初期範囲外。
    aliases:
      - WS-Federation
      - WS-Trust
      - WS-Fed
models:
  WsFedTokenType:
    kind: enum
    description: WS-Federation で発行する assertion の SAML バージョン (RSTR の TokenType にもなる)。 SAML 1.1 (urn:oasis:names:tc:SAML:1.0:assertion) は Entra / AD FS の WS-Fed 既定 (wi-61)。
    values:
      - urn:oasis:names:tc:SAML:1.0:assertion
      - urn:oasis:names:tc:SAML:2.0:assertion
  WsFedRelyingParty:
    kind: entity
    description: "WS-Federation passive の relying party (RP) 登録。wtrealm で識別し、許可する wreply (返信先) の閉集合、audience、claim 発行 policy を束ねる。未登録 wtrealm・許可外 wreply は拒否する (open redirect 防止, fail-closed, ADR-059)。"
    identity:
      - tenant_id
      - wtrealm
    fields:
      tenant_id:
        type: String
        default: default
        description: 所属テナント ID (ADR-034)。
      wtrealm:
        type: String
        constraints:
          - non_empty
        description: RP の識別子 (WS-Fed wtrealm / SAML audience)。
      display_name:
        type: String
        optional: true
        description: 管理 UI 表示名。
      reply_urls:
        type: "String[]"
        constraints:
          - non_empty
        description: 許可する wreply の閉集合。wreply はこの集合との完全一致のみ受理する。
      audience:
        type: String
        optional: true
        description: 発行 assertion の audience。空なら wtrealm を用いる。
      token_type:
        type: WsFedTokenType
        optional: true
        description: 発行 assertion の SAML バージョン。空なら SAML 1.1 (Entra WS-Fed 互換の既定)。
      claim_policy:
        type: ClaimMappingPolicy
        description: この RP 向けの claim 発行 policy (ADR-059)。
      entra_profile:
        type: EntraFederationProfile
        optional: true
        description: Microsoft Entra domain federation preset。設定時に required claims と sourceAnchor 変換を束ねる (wi-64)。
      created_at:
        type: Timestamp
      updated_at:
        type: Timestamp
  EntraFederationProfile:
    kind: value_object
    description: Microsoft Entra domain federation 用 profile。IssuerUri、sourceAnchor 属性、 passive / active / MEX endpoint を束ね、UPN / ImmutableID / persistent NameID の claim preset を WS-Fed RP に適用する (wi-64)。
    fields:
      domain:
        type: String
        constraints:
          - non_empty
        description: Entra で検証済みの DNS domain。
      issuer_uri:
        type: String
        constraints:
          - non_empty
        description: Entra に登録する IssuerUri。発行 token の issuer / RP wtrealm と一致させる。
      source_anchor_attribute:
        type: String
        constraints:
          - non_empty
        description: ImmutableID の元になる不変 user 属性。objectGUID の GUID 文字列または既に base64 化済みの値。
      immutable_id_attribute:
        type: String
        constraints:
          - non_empty
        description: 変換後 ImmutableID を格納する合成属性名。既定 entra_immutable_id。
      passive_logon_uri:
        type: Uri
        description: Entra PassiveLogOnUri。通常 /wsfed。
      active_logon_uri:
        type: Uri
        description: Entra ActiveLogOnUri。通常 /trust/usernamemixed。
      metadata_exchange_uri:
        type: Uri
        description: Entra MetadataExchangeUri。通常 /trust/mex。
  SecurityTokenEndpoint:
    kind: value_object
    description: WS-Trust / WS-Federation metadata に広告する STS endpoint。受理する認証方式と binding を表す (wi-62)。
    fields:
      url:
        type: Uri
        description: 公開 endpoint URL。
      binding:
        type: String
        constraints:
          - non_empty
        description: "例: usernamemixed, mex, passive。"
      auth_methods:
        type: "String[]"
        constraints:
          - non_empty
        description: "受理する認証方式。例: UsernameToken。"
  WsTrustRequestSecurityToken:
    kind: value_object
    description: WS-Trust 1.3 Issue binding の RST から検証対象を抽出した中間表現 (wi-62)。
    fields:
      message_id:
        type: String
        constraints:
          - non_empty
        description: WS-Addressing MessageID。replay 防止に使う。
      to:
        type: Uri
        description: WS-Addressing To。要求先 STS endpoint。
      action:
        type: String
        description: WS-Addressing Action。Issue のみ受理する。
      username:
        type: String
        constraints:
          - non_empty
        description: WS-Security UsernameToken username。
      password:
        type: String
        constraints:
          - non_empty
        description: WS-Security UsernameToken password credential。
      created_at:
        type: Timestamp
        description: WS-Security Timestamp Created。
      expires_at:
        type: Timestamp
        description: WS-Security Timestamp Expires。
      applies_to:
        type: String
        constraints:
          - non_empty
        description: 対象 RP / audience。登録済み WsFedRelyingParty に解決する。
      token_type:
        type: WsFedTokenType
        optional: true
        description: 要求 token type。空なら RP 既定。
      request_type:
        type: String
        optional: true
        description: WS-Trust RequestType。空または Issue のみ受理する。
      key_type:
        type: String
        optional: true
        description: WS-Trust KeyType。空または Bearer のみ受理する。
  WsTrustResponse:
    kind: value_object
    description: WS-Trust Issue に対する RSTR。署名済み SAML assertion と lifetime / appliesTo を含む (wi-62)。
    fields:
      relates_to:
        type: String
        optional: true
        description: 元 RST の MessageID。
      applies_to:
        type: String
        constraints:
          - non_empty
      token_type:
        type: WsFedTokenType
      issued_at:
        type: Timestamp
      expires_at:
        type: Timestamp
      assertion_id:
        type: String
        optional: true
  WsFedSignInIssued:
    kind: event
    description: WS-Federation passive sign-in で署名済み assertion を RP へ発行した (wi-61)。
    payload:
      occurredAt:
        type: Timestamp
      tenantId:
        type: String
        description: 発行したテナント ID。
      wtrealm:
        type: String
        description: 発行先 RP の wtrealm。
      sub:
        type: String
        description: subject (NameID 由来の user)。
  WsFedSignInRejected:
    kind: event
    description: "WS-Federation passive sign-in を拒否した (未登録 wtrealm・許可外 wreply・検証失敗など, wi-61)。"
    payload:
      occurredAt:
        type: Timestamp
      tenantId:
        type: String
        description: 拒否したテナント ID。
      wtrealm:
        type: String
        optional: true
        description: 要求された wtrealm (判明していれば)。
      reason:
        type: String
        description: 拒否理由の要約。
  WsFedSignOut:
    kind: event
    description: WS-Federation sign-out でローカルセッションを破棄した (wi-61)。
    payload:
      occurredAt:
        type: Timestamp
      tenantId:
        type: String
        description: sign-out したテナント ID。
      wtrealm:
        type: String
        optional: true
        description: sign-out を要求した RP の wtrealm (判明していれば)。
  WsTrustTokenIssued:
    kind: event
    description: WS-Trust active STS で署名済み assertion を発行した (wi-62)。
    payload:
      occurredAt:
        type: Timestamp
      tenantId:
        type: String
        description: 発行したテナント ID。
      appliesTo:
        type: String
        description: 発行先 RP / audience。
      sub:
        type: String
        description: subject user。
  WsTrustTokenRejected:
    kind: event
    description: WS-Trust active STS の Issue 要求を拒否した (wi-62)。
    payload:
      occurredAt:
        type: Timestamp
      tenantId:
        type: String
        description: 拒否したテナント ID。
      appliesTo:
        type: String
        optional: true
        description: 要求された AppliesTo (判明していれば)。
      reason:
        type: String
        description: 拒否理由の要約。
  EntraFederationConfigured:
    kind: event
    description: Microsoft Entra domain federation preset を設定し、対応する WS-Fed RP trust を upsert した (wi-64)。
    payload:
      occurredAt:
        type: Timestamp
      tenantId:
        type: String
        description: 設定したテナント ID。
      domain:
        type: String
        description: Entra 検証済み domain。
      issuerUri:
        type: String
        description: Entra に登録する IssuerUri。
interfaces:
  WsFederationSignIn:
    description: WS-Federation passive requestor profile の sign-in (wi-61)。wtrealm で relying party を解決し、 wreply を許可集合に限定する (open redirect 防止)。未認証はログインへ誘導し、認証済みなら relying party の claim policy で発行した claim を署名済み SAML assertion (既定 SAML 1.1 / Entra 互換、RP 設定で SAML 2.0、ADR-060) に 載せ、RSTR に包んで自動 POST する。wfresh が示す最大経過時間より認証が古ければ再認証へ誘導し、wauth が要求する 認証方式を尊重する (満たせない統合 Windows 認証等は fail-closed で拒否、無音サインインは wi-65)。
    steps:
      - "wtrealm {wtrealm} へ wreply {wreply} で sign-in する"
    input:
      wa:
        type: String
        description: wsignin1.0。
      wtrealm:
        type: String
        description: relying party 識別子。
      wreply:
        type: String
        optional: true
        description: 返信先。許可集合との完全一致のみ。
      wctx:
        type: String
        optional: true
        description: RP が往復させる不透明コンテキスト。
      wfresh:
        type: String
        optional: true
        description: 再認証の最大経過時間 (分)。古ければ再認証へ誘導する。
      wauth:
        type: String
        optional: true
        description: 要求された認証方式 URI。満たせなければ拒否する。
      whr:
        type: String
        optional: true
        description: home realm のヒント。
    bindings:
      - kind: http
        method: GET
        path: /wsfed
        request_form: query
        successful_status_codes:
          - "200"
          - "303"
  WsFederationSignOut:
    description: WS-Federation sign-out (wi-61)。ローカルセッションを破棄する。wsignout1.0 は許可済み wreply への リダイレクトまで行い、wsignoutcleanup1.0 は破棄のみで 200 を返す。
    steps:
      - "wtrealm {wtrealm} へ wreply {wreply} で sign-out する"
    input:
      wa:
        type: String
        description: wsignout1.0 または wsignoutcleanup1.0。
      wtrealm:
        type: String
        optional: true
      wreply:
        type: String
        optional: true
        description: 返信先。許可集合との完全一致のみ。
    bindings:
      - kind: http
        method: GET
        path: /wsfed
        request_form: query
        successful_status_codes:
          - "200"
          - "303"
  WsTrustIssue:
    description: WS-Trust 1.3 active STS Issue endpoint (wi-62)。UsernameToken を検証し、 To を現在 realm の active STS endpoint、Action / RequestType を Issue、KeyType を Bearer に限定し、AppliesTo を登録済み WsFedRelyingParty に解決する。RP の claim policy で組み立てた claim を署名済み SAML assertion に載せ、RSTR として返す。未登録 AppliesTo、期限切れ Timestamp、不正な To / Action / RequestType / KeyType / TokenType は fail-closed で拒否する。
    steps:
      - "username {username} と applies_to {applies_to} で security token を要求する"
    input:
      request:
        type: WsTrustRequestSecurityToken
    output:
      response:
        type: WsTrustResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - WsTrustTokenIssued
      - WsTrustTokenRejected
    bindings:
      - kind: http
        method: POST
        path: /trust/usernamemixed
        request_body: xml
  WsTrustMetadataExchange:
    description: WS-Trust MEX endpoint (wi-62)。active STS の usernamemixed endpoint、UsernameToken policy、WS-Addressing / SOAP binding を realm issuer から派生して広告する。
    output:
      endpoint:
        type: SecurityTokenEndpoint
    read_only: true
    bindings:
      - kind: http
        method: GET
        path: /trust/mex
        successful_status_codes:
          - "200"
  PublishWsFederationMetadata:
    description: WS-Federation / WS-Trust metadata publication (wi-63)。realm entityID、passive endpoint、 active STS endpoint、MEX endpoint、token 署名検証用証明書を AD FS 互換 federationmetadata.xml として公開する。
    output:
      endpoint:
        type: SecurityTokenEndpoint
    read_only: true
    bindings:
      - kind: http
        method: GET
        path: /federationmetadata/2007-06/federationmetadata.xml
        successful_status_codes:
          - "200"
  ConfigureEntraFederation:
    description: Microsoft Entra domain federation preset を設定する (wi-64)。検証済み domain、 IssuerUri、sourceAnchor 属性を受け取り、sourceAnchor が既存 user で欠落・重複しないこと、 GUID または base64 ImmutableID として正規化できることを検証する。成功時は UPN / ImmutableID / persistent NameID の claim preset を持つ WsFedRelyingParty を upsert し、Entra に登録する PassiveLogOnUri / ActiveLogOnUri / MetadataExchangeUri を返す。 Hybrid Azure AD Join device registration は windowstransport + コンピュータアカウント Kerberos を要するため未提供として診断に含める。
    input:
      domain:
        type: String
        description: Entra で検証済みの DNS domain。
      issuer_uri:
        type: String
        optional: true
        description: 空なら domain から安定生成する IssuerUri。
      source_anchor_attribute:
        type: String
        description: ImmutableID の元になる不変 user 属性。
      reply_url:
        type: Uri
        optional: true
        description: Entra が wreply に使う URL。空なら Microsoft Online の既定 URL。
    output:
      profile:
        type: EntraFederationProfile
      relying_party:
        type: WsFedRelyingParty
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - EntraFederationConfigured
    bindings:
      - kind: http
        method: POST
        path: /api/admin/wsfed/entra-federation
        request_body: json
  RegisterWsFedRelyingParty:
    description: 管理者が WS-Federation relying party trust を登録または更新する。wtrealm、reply_urls、audience、token_type、claim_policy を契約として保存し、reply_urls は空でない閉集合にする。管理操作は AdminFederationTrustsManage で保護する。
    input:
      relying_party:
        type: WsFedRelyingParty
    output:
      relying_party:
        type: WsFedRelyingParty
    errors:
      - InvalidRequestError
      - AccessDeniedError
    bindings:
      - kind: http
        method: POST
        path: /api/admin/wsfed/relying-parties
        request_body: json
        successful_status_codes:
          - "201"
          - "200"
  ListWsFedRelyingParties:
    description: 管理者が所属テナントの WS-Federation relying party trust を一覧する。管理操作は AdminFederationTrustsManage で保護する。
    output:
      relying_parties:
        type: "WsFedRelyingParty[]"
    read_only: true
    errors:
      - AccessDeniedError
    bindings:
      - kind: http
        method: GET
        path: /api/admin/wsfed/relying-parties
        successful_status_codes:
          - "200"
  DeleteWsFedRelyingParty:
    description: 管理者が所属テナントの WS-Federation relying party trust を wtrealm で削除する。管理操作は AdminFederationTrustsManage で保護する。
    input:
      wtrealm:
        type: String
    errors:
      - InvalidRequestError
      - AccessDeniedError
    bindings:
      - kind: http
        method: DELETE
        path: /api/admin/wsfed/relying-parties
        request_form: query
        successful_status_codes:
          - "204"
invariants:
  WsFedReplyAndRealmClosed:
    description: WS-Fed passive sign-in / sign-out の wtrealm は登録済み RP、wreply は RP の reply_urls と完全一致しなければならない。wreply 省略時は登録済み既定 reply URL のみを使う。
    target: WsFedRelyingParty
    always: wtrealm_registered and resolved_wreply in relying_party.reply_urls
  WsFedFreshRequiresRecentAuthentication:
    description: wfresh が要求する最大経過時間より認証が古い場合は token を発行せずログインへ戻す。wfresh=0 は再認証を要求する。
    target: WsFederationSignIn
    always: wfresh_present implies auth_time_within_wfresh
  WsFedContextRoundTrip:
    description: wctx は不透明値として改変せず、RSTR form に同値で返す。
    target: WsFederationSignIn
    always: returned_wctx == received_wctx
  WsTrustMessageIDReplay:
    description: WS-Trust MessageID は assertion lifetime 内で一度だけ受理する。再送は token を発行せず拒否する。
    target: WsTrustRequestSecurityToken
    always: message_id_not_seen_within_replay_window
  WsTrustRSTClosed:
    description: RST の To は現在 realm の active STS endpoint、Action / RequestType は Issue、KeyType は空または Bearer、AppliesTo は登録済み RP と一致しなければならない。
    target: WsTrustRequestSecurityToken
    always: to == active_sts_endpoint and action == Issue and request_type in [empty, Issue] and key_type in [empty, Bearer] and applies_to_registered
  FederationApplicationAssignmentGate:
    description: SAML / WS-Federation trust が Application binding に属する場合、未割当 subject には token / assertion を発行しない。
    target: WsFedSignInIssued
    always: application_binding_absent or subject_assigned_to_application
scenarios:
  WS-Federation passive sign-in succeeds:
    description: WsFederationSignIn で、登録済み wtrealm、許可 wreply、必要なら wfresh を満たす認証、割当済み subject なら RSTR form を発行し wctx を同値で返す。
    steps:
      - 登録済み RP の wsignin1.0 を受信する
      - wtrealm / wreply / wfresh / subject assignment を検証する
      - 署名済み assertion を RSTR form で返す
  WS-Federation passive sign-in rejects untrusted target:
    description: WsFederationSignIn で、未登録 wtrealm、許可外 wreply、未割当 subject は token を発行せず拒否する。
    steps:
      - 不正な wsignin1.0 を受信する
      - fail-closed で拒否する
  WS-Trust Issue succeeds:
    description: WsTrustIssue で、UsernameToken、MessageID、To、Action、RequestType、KeyType、AppliesTo が有効なら Bearer SAML assertion を RSTR で返す。
    steps:
      - WS-Trust Issue RST を受信する
      - UsernameToken と RST の閉集合条件を検証する
      - RSTR を返す
  WS-Trust Issue rejects invalid envelope:
    description: WsTrustIssue で、To 不一致、MessageID replay、未登録 AppliesTo、Issue 以外の Action / RequestType、Bearer 以外の KeyType は拒否する。
    steps:
      - 不正な RST を受信する
      - WsTrustTokenRejected を emit して 400 または 401 を返す
user_experience:
  screens:
    AdminEntraFederation:
      route: /admin/federation/entra
      purpose: "管理者がテナント単位で Microsoft Entra domain federation を設定する。検証済みドメイン・\nIssuerUri・sourceAnchor 属性を入力すると、UPN / ImmutableID / persistent NameID の\nclaim preset を持つ relying party を upsert し、Entra に登録する PassiveLogOnUri /\nActiveLogOnUri / MetadataExchangeUri を提示する。個別アプリの設定ではなくドメイン連携の\nため、Application 編集ではなくテナント設定として扱う。\n"
      interfaces:
        - ConfigureEntraFederation
      states:
        - ready
        - loading
        - submitting
        - access_denied
        - service_error
