    TenantCreateRequest:
      type: object
      additionalProperties: false
      description: "管理者が新規テナントを登録する JSON リクエスト (ADR-032)。`id` は URL-safe slug。"
      properties:
        id:
          type: string
          minLength: 1
          maxLength: 63
          pattern: "^[a-z0-9][a-z0-9-]{0,62}$"
        display_name:
          type: string
          minLength: 1
          maxLength: 200
      required:
        - id
        - display_name
    TenantUpdateRequest:
      type: object
      additionalProperties: false
      description: "管理者がテナントの表示名を更新する JSON リクエスト (ADR-032)。`id` と status は変更しない。status 変更は disable/enable 専用 endpoint を経由。"
      properties:
        display_name:
          type: string
          minLength: 1
          maxLength: 200
    TenantSummaryResponse:
      type: object
      additionalProperties: false
      description: "テナント表現。管理 UI の一覧と詳細で同じ表現を返す (ADR-032)。"
      properties:
        id:
          type: string
        display_name:
          type: string
        status:
          type: string
          enum:
            - active
            - disabled
        created_at:
          type: string
          format: "date-time"
        updated_at:
          type: string
          format: "date-time"
        disabled_at:
          type: string
          format: "date-time"
      required:
        - id
        - display_name
        - status
        - created_at
    TenantListResponse:
      type: object
      additionalProperties: false
      description: "管理 API のテナント一覧 (ADR-032)。"
      properties:
        tenants:
          type: array
          items:
            $ref: "#/components/schemas/TenantSummaryResponse"
      required:
        - tenants
    AdminUserCreateRequest:
