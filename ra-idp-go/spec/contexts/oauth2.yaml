# ra-idp OAuth2 — SCL
# Generated from ra-idp-go/spec/scl.yaml during SCL 2.0 context split.

system: ra-idp
spec_version: "2.0"
context: OAuth2
models:
  ClientType:
    kind: enum
    description: クライアントが client_secret を安全に保持できるかどうかの分類。Public はモバイル/SPA など秘匿不可、Confidential はサーバーサイドで秘密鍵を保持可能。
    values:
      - Public
      - Confidential
  GrantType:
    kind: enum
    description: トークン発行の方式。本アプリがサポートする 5 種を列挙する。各値の意味は glossary を参照。
    values:
      - AuthorizationCode
      - RefreshToken
      - ClientCredentials
      - DeviceCode
      - TokenExchange
  TokenEndpointAuthMethod:
    kind: enum
    description: /token エンドポイントにおけるクライアント認証方式 (RFC 6749 §2.3 / RFC 7523 / RFC 8705)。None は public client 専用。
    values:
      - ClientSecretBasic
      - ClientSecretPost
      - PrivateKeyJwt
      - TlsClientAuth
      - None
  ResponseType:
    kind: enum
    description: /authorize で要求できる応答種別。本アプリでは Authorization Code フロー専用なので Code のみサポート。
    values:
      - Code
  ResponseMode:
    kind: enum
    description: 認可レスポンスのパラメータをクライアントへ返す方式 (OIDC Multiple Response Types §3)。
    values:
      - Query
      - FormPost
  FapiProfile:
    kind: enum
    description: クライアントに適用される FAPI セキュリティプロファイル。None は通常クライアント、Fapi2SecurityProfile は金融グレード API 向け（PAR 必須 / DPoP 必須 等の追加制約）。
    values:
      - None
      - Fapi2SecurityProfile
  TokenType:
    kind: enum
    description: /introspect / /revoke の token_type_hint で指定されるトークン種別。
    values:
      - AccessToken
      - RefreshToken
  SenderConstraintKind:
    kind: enum
    description: トークンを所有者にバインドする方式 (RFC 7800)。Dpop は DPoP 公開鍵サムプリント、Mtls は mTLS クライアント証明書サムプリント。
    values:
      - Dpop
      - Mtls
  AccessTokenSenderConstraint:
    kind: enum
    description: 発行された AccessToken に適用されているセンダー制約。None は Bearer トークン。
    values:
      - None
      - Dpop
      - Mtls
  CodeChallengeMethod:
    kind: enum
    description: PKCE (RFC 7636) の code_challenge ハッシュ方式。本アプリでは S256 のみ許容（plain は脆弱なため拒否）。
    values:
      - S256
  AuthorizationCodeState:
    kind: enum
    description: AuthorizationCodeFlow 状態機械の取りうる状態列挙。状態機械セクションも参照。
    values:
      - Received
      - AuthenticationPending
      - Authenticated
      - ConsentPending
      - Consented
      - CodeIssued
      - Exchanged
      - Rejected
      - Expired
  DeviceCodeState:
    kind: enum
    description: DeviceCodeFlow (RFC 8628) 状態機械の取りうる状態列挙。状態機械セクションも参照。
    values:
      - Issued
      - UserCodeEntered
      - Approved
      - Denied
      - Exchanged
      - Expired
  RefreshTokenState:
    kind: enum
    description: RefreshTokenLifecycle 状態機械の取りうる状態列挙。Rotated は子トークンへ消費済み、Revoked は失効済み、Expired は期限切れ。
    values:
      - Active
      - Rotated
      - Revoked
      - Expired
  AuthorizationCodeRecordState:
    kind: enum
    description: AuthorizationCodeRecordLifecycle 状態機械の取りうる状態列挙。AuthorizationCodeFlow とは別軸でコード本体のライフサイクルを表す。
    values:
      - Issued
      - Redeemed
      - Expired
  ConsentState:
    kind: enum
    description: ConsentLifecycle 状態機械の取りうる状態列挙。GDPR Art.7(3) 撤回権により Granted → Revoked が可能。
    values:
      - Granted
      - Revoked
      - Expired
  PARRecordState:
    kind: enum
    description: PARRecordLifecycle 状態機械の取りうる状態列挙。Stored から /authorize での参照で Used、期限切れで Expired。
    values:
      - Stored
      - Used
      - Expired
  AuthorizationDetailFieldSemantics:
    kind: enum
    description: authorization_details の登録スキーマで各フィールドが担うダウンスコープ半順序 (ADR-050)。 set は集合包含 (要求 ⊆ 同意/元)、at_most は単調減少 (要求 ≤ 同意/元)、enum は許可列挙からの完全一致、 exact は不透明値の完全一致。判定不能はすべて拒否側へ倒す (fail-closed)。
    values:
      - set
      - at_most
      - enum
      - exact
  AuthorizationDetailTypeState:
    kind: enum
    description: AuthorizationDetailType の運用状態列挙。Enabled のみ受理対象、Disabled は新規要求を拒否する (既存トークンは失効まで有効)。
    values:
      - Enabled
      - Disabled
  OAuthErrorCode:
    kind: enum
    description: OAuth 2.0 / OIDC / DPoP / FAPI / RFC 8628 で規定された標準エラーコード一式。HTTP レスポンスの error フィールド値となる。
    values:
      - InvalidRequest
      - InvalidClient
      - InvalidGrant
      - UnauthorizedClient
      - UnsupportedGrantType
      - InvalidScope
      - InvalidToken
      - ServerError
      - InvalidDpopProof
      - AccessDenied
      - ExpiredToken
      - SlowDown
      - InsufficientScope
      - AuthorizationPending
  OAuth2Client:
    kind: entity
    description: RFC 7591 + FAPI 2.0 拡張のクライアント。
    identity:
      - tenant_id
      - client_id
    fields:
      tenant_id:
        type: String
        default: default
        description: "所属テナント ID (ADR-032 / ADR-034)。客は (tenant_id, client_id) で一意。"
      client_id:
        type: String
        constraints:
          - non_empty
          - max_length: 128
      client_secret_hash:
        type: String
        optional: true
        annotations:
          sensitive: true
      client_name:
        type: String
        optional: true
        constraints:
          - max_length: 200
      client_type:
        type: ClientType
      redirect_uris:
        type: "Uri[]"
        optional: true
        description: redirect 系グラント (authorization_code) のとき必須。client_credentials のみの M2M クライアントは持たない (RFC 6749 §3.1.2)。
      grant_types:
        type: "GrantType[]"
        constraints:
          - non_empty
      response_types:
        type: "ResponseType[]"
      token_endpoint_auth_method:
        type: TokenEndpointAuthMethod
      scope:
        type: String
      jwks_uri:
        type: Uri
        optional: true
      jwks:
        type: JSON
        optional: true
      tls_client_auth_subject_dn:
        type: String
        optional: true
      id_token_signed_response_alg:
        type: SignatureAlgorithm
        default: PS256
      require_pushed_authorization_requests:
        type: Boolean
        default: false
      require_pkce:
        type: Boolean
        optional: true
      dpop_bound_access_tokens:
        type: Boolean
        default: false
      fapi_profile:
        type: FapiProfile
        default: None
      first_party:
        type: Boolean
        default: false
      created_at:
        type: Timestamp
  Consent:
    kind: entity
    description: GDPR 同意取得記録。状態は ConsentLifecycle 状態機械に従う。
    identity:
      - tenant_id
      - sub
      - client_id
    fields:
      tenant_id:
        type: String
        default: default
        description: 所属テナント ID (ADR-034)。
      sub:
        type: String
      client_id:
        type: String
      scopes:
        type: "String[]"
        constraints:
          - non_empty
          - unique
      state:
        type: ConsentState
      granted_at:
        type: Timestamp
      expires_at:
        type: Timestamp
        description: 通常 granted_at + 365 日
      revoked_at:
        type: Timestamp
        optional: true
        description: state == Revoked になった時刻（監査）。
      authorization_details:
        type: "AuthorizationDetail[]"
        optional: true
        description: RFC 9396 — ユーザーが同意した構造化詳細。発行・交換時の部分集合判定の基準 (ADR-050)。
  AuthorizationDetail:
    kind: value_object
    description: RFC 9396 authorization_details の 1 要素。type で識別される構造化された細粒度権限を表す。 要求・同意・トークン反映を通じて一貫して扱い、登録済み AuthorizationDetailType に対し fail-closed に検証する (ADR-050)。
    fields:
      type:
        type: String
        constraints:
          - non_empty
        description: "登録済み AuthorizationDetailType の識別子 (例: payment_initiation)。"
      locations:
        type: "String[]"
        optional: true
        description: RFC 9396 — 詳細が向く resource server の URI 群。
      actions:
        type: "String[]"
        optional: true
        description: RFC 9396 — 対象に対して許可する操作群。
      datatypes:
        type: "String[]"
        optional: true
        description: RFC 9396 — アクセスするデータ種別群。
      identifier:
        type: String
        optional: true
        description: RFC 9396 — 対象リソースの識別子。
      privileges:
        type: "String[]"
        optional: true
        description: RFC 9396 — 対象に対する権限レベル群。
      fields:
        type: "Map<String, JSON>"
        optional: true
        description: "type 固有の構造化フィールド (例: instructedAmount, creditorAccount)。登録スキーマで意味論を束縛する。"
  AuthorizationDetailFieldRule:
    kind: value_object
    description: AuthorizationDetailsSchema の 1 フィールド規則。ダウンスコープ半順序と許可値を定義する (ADR-050)。
    fields:
      name:
        type: String
        constraints:
          - non_empty
        description: 対象フィールド名。標準フィールド (actions 等) または fields マップ内のキー。
      semantics:
        type: AuthorizationDetailFieldSemantics
        description: 部分集合判定に使う半順序。
      required:
        type: Boolean
        default: false
        description: true のとき詳細にこのフィールドが必須。
      allowed:
        type: "String[]"
        optional: true
        description: semantics が set / enum のとき許可される値の閉集合 (空なら無制限)。
  AuthorizationDetailsSchema:
    kind: value_object
    description: "ある type の構造的スキーマ。受理するフィールドと各フィールドのダウンスコープ半順序を列挙する。 未登録フィールド・スキーマ不適合・許可外値はすべて拒否する (fail-closed, ADR-050)。"
    fields:
      rules:
        type: "AuthorizationDetailFieldRule[]"
        constraints:
          - non_empty
        description: フィールド規則の集合。
  AuthorizationDetailType:
    kind: entity
    description: テナントが登録する authorization_details の type 定義。type 識別子・検証スキーマ・同意 UI の 表示テンプレートを束ねる。Enabled な type のみ受理する (ADR-050)。管理は AdminAuthorizationDetailTypesManage で保護する。
    identity:
      - tenant_id
      - type
    fields:
      tenant_id:
        type: String
        default: default
        description: 所属テナント ID (ADR-034)。
      type:
        type: String
        constraints:
          - non_empty
        description: authorization_details の type 識別子。
      description:
        type: String
        optional: true
      schema:
        type: AuthorizationDetailsSchema
      display_template:
        type: String
        description: "同意 UI で詳細を人間可読に提示するテンプレート (例: '{identifier} へ最大 {fields.instructedAmount} まで')。"
      state:
        type: AuthorizationDetailTypeState
        default: Enabled
      created_at:
        type: Timestamp
      updated_at:
        type: Timestamp
  RefreshTokenRecord:
    kind: entity
    description: リフレッシュトークンのストアレコード。プレーン値は保存しない。状態は RefreshTokenLifecycle 状態機械に従う。
    identity: id
    fields:
      id:
        type: UUID
      tenant_id:
        type: String
        default: default
        description: 所属テナント ID (ADR-034)。/token のリプレイ検出を join なしで効かせるため明示する。
      hash:
        type: String
        description: SHA-256 ハッシュ。
        annotations:
          sensitive: true
      family_id:
        type: UUID
        description: 認可コード交換から派生したすべてのトークンが共有する識別子。
      parent_id:
        type: UUID
        optional: true
      client_id:
        type: String
      sub:
        type: String
      scopes:
        type: "String[]"
      state:
        type: RefreshTokenState
      issued_at:
        type: Timestamp
      expires_at:
        type: Timestamp
      absolute_expires_at:
        type: Timestamp
        description: ローテーションされても延長されない絶対期限。
      sender_constraint:
        type: RefreshTokenSenderConstraint
        optional: true
  AuthorizationRequest:
    kind: entity
    description: フロー追跡用のサーバー内部中間ステート。
    identity: id
    fields:
      id:
        type: UUID
      tenant_id:
        type: String
        default: default
        description: 所属テナント ID (ADR-034)。
      state:
        type: AuthorizationCodeState
      client_id:
        type: String
      redirect_uri:
        type: Uri
      response_type:
        type: ResponseType
      scope:
        type: String
      state_param:
        type: String
        optional: true
      nonce:
        type: String
        optional: true
      code_challenge:
        type: String
      code_challenge_method:
        type: CodeChallengeMethod
      prompt:
        type: String
        optional: true
      max_age:
        type: Integer
        optional: true
        constraints:
          - min: 0
      par_request_uri:
        type: String
        optional: true
      sub:
        type: String
        optional: true
      auth_time:
        type: Integer
        optional: true
      amr:
        type: "String[]"
        optional: true
        description: 認証成功時のメソッド列。advance(authenticate_user) で AuthenticationContext から伝搬。
      acr:
        type: String
        optional: true
        description: amr から AuthenticationContextPolicy に従って導出した URN。
      acr_values:
        type: String
        optional: true
        description: クライアントが /authorize に与えた acr_values パラメータ (RFC 8176)。step-up 判定に使う。
      authorization_details:
        type: "AuthorizationDetail[]"
        optional: true
        description: RFC 9396 — クライアントが要求した構造化詳細。検証済み・登録 type 適合済みのものを保持する (ADR-050)。
      created_at:
        type: Timestamp
      expires_at:
        type: Timestamp
  AuthorizationCodeRecord:
    kind: entity
    description: 発行済み認可コードの永続レコード。code 本体は短命。状態は AuthorizationCodeRecordLifecycle に従う（AuthorizationCodeFlow とは別軸でコード自体のライフサイクルを表す）。
    identity: code
    fields:
      code:
        type: String
        annotations:
          sensitive: true
      tenant_id:
        type: String
        default: default
        description: 所属テナント ID (ADR-034)。
      authorization_request_id:
        type: UUID
      client_id:
        type: String
      sub:
        type: String
      scopes:
        type: "String[]"
      redirect_uri:
        type: Uri
      code_challenge:
        type: String
      code_challenge_method:
        type: CodeChallengeMethod
      nonce:
        type: String
        optional: true
      auth_time:
        type: Integer
      amr:
        type: "String[]"
        optional: true
        description: 認可リクエストから引き継いだ認証メソッド列。id_token / access_token に emit する。
      acr:
        type: String
        optional: true
        description: 認可リクエストから引き継いだ ACR URN。id_token / access_token に emit する。
      authorization_details:
        type: "AuthorizationDetail[]"
        optional: true
        description: RFC 9396 — 同意済み構造化詳細。交換で発行トークンへ反映する (ADR-050)。
      state:
        type: AuthorizationCodeRecordState
      issued_at:
        type: Timestamp
      expires_at:
        type: Timestamp
      redeemed_at:
        type: Timestamp
        optional: true
        description: state == Redeemed になった時刻（監査）。
      issued_family_id:
        type: UUID
        optional: true
        description: 成功交換で発行された refresh family（不正リプレイ検知時のファミリー失効に使う）
  PARRecord:
    kind: entity
    description: Pushed Authorization Request の格納レコード。状態は PARRecordLifecycle に従う。
    identity: request_uri
    fields:
      request_uri:
        type: String
      tenant_id:
        type: String
        default: default
        description: 所属テナント ID (ADR-034)。
      client_id:
        type: String
      parameters:
        type: "Map<String, String>"
      state:
        type: PARRecordState
      issued_at:
        type: Timestamp
      expires_at:
        type: Timestamp
  DeviceAuthorization:
    kind: entity
    description: RFC 8628 デバイス認可レコード。device_code はハッシュのみで保存する。
    identity: device_code_hash
    fields:
      device_code_hash:
        type: String
        annotations:
          sensitive: true
      tenant_id:
        type: String
        default: default
        description: 所属テナント ID (ADR-034)。
      user_code:
        type: String
        description: 紛らわしい文字を避けた短いコード。
      client_id:
        type: String
      scopes:
        type: "String[]"
      state:
        type: DeviceCodeState
      sub:
        type: String
        optional: true
      auth_time:
        type: Integer
        optional: true
      interval_seconds:
        type: Integer
        constraints:
          - min: 1
      last_polled_at:
        type: Timestamp
        optional: true
      issued_family_id:
        type: UUID
        optional: true
      issued_at:
        type: Timestamp
      expires_at:
        type: Timestamp
  SenderConstraintCnf:
    kind: value_object
    description: Sender-Constrained 証明 (RFC 7800)。
    fields:
      jkt:
        type: String
        optional: true
        description: DPoP 鍵の SHA-256 サムプリント (RFC 9449 §6.1)。
      x5t_s256:
        type: String
        optional: true
        description: "mTLS クライアント証明書のサムプリント (x5t#S256, RFC 8705)。"
  RefreshTokenSenderConstraint:
    kind: value_object
    description: RefreshToken に紐づくセンダー制約。発行時のバインド先（DPoP 鍵サムプリントまたは mTLS 証明書サムプリント）を保持する。
    fields:
      type:
        type: SenderConstraintKind
      jkt:
        type: String
        optional: true
      x5t_s256:
        type: String
        optional: true
  AccessTokenClaims:
    kind: value_object
    description: JWT Access Token クレーム (RFC 9068)。TTL 600 秒。
    fields:
      iss:
        type: Uri
      sub:
        type: String
        description: client_credentials 時は client_id と一致。
      aud:
        type: Audience
      client_id:
        type: String
      scope:
        type: String
        description: スペース区切りスコープ列。
      exp:
        type: Integer
        description: Unix epoch seconds
      iat:
        type: Integer
      nbf:
        type: Integer
        optional: true
      jti:
        type: String
      auth_time:
        type: Integer
        optional: true
      acr:
        type: String
        optional: true
      amr:
        type: "String[]"
        optional: true
      cnf:
        type: SenderConstraintCnf
        optional: true
      act:
        type: JSON
        optional: true
        description: RFC 8693 §4.1 actor claim。委任の現在アクターを表す。subject_token に act があれば入れ子で連結される。
      may_act:
        type: JSON
        optional: true
        description: RFC 8693 §4.4 may_act claim。許可された委任先アクターを表す。
      authorization_details:
        type: "AuthorizationDetail[]"
        optional: true
        description: RFC 9396 — トークンに束縛された構造化詳細。RS の検証点 (ADR-050)。optional で後方互換 (ADR-012)。
  IdTokenClaims:
    kind: value_object
    description: OIDC ID Token クレーム。TTL 3600 秒。
    fields:
      iss:
        type: Uri
      sub:
        type: String
      aud:
        type: Audience
      exp:
        type: Integer
      iat:
        type: Integer
      auth_time:
        type: Integer
      nonce:
        type: String
        optional: true
      acr:
        type: String
        optional: true
      amr:
        type: "String[]"
        optional: true
      azp:
        type: String
        optional: true
      at_hash:
        type: String
        optional: true
      c_hash:
        type: String
        optional: true
      name:
        type: String
        optional: true
        annotations:
          pii: true
      preferred_username:
        type: String
        optional: true
        annotations:
          pii: true
      email:
        type: String
        optional: true
        constraints:
          - format: email
        annotations:
          pii: true
      email_verified:
        type: Boolean
        optional: true
  Audience:
    kind: value_object
    description: 文字列または1つ以上の文字列の配列（JWT RFC 7519 §4.1.3）。
    fields:
      one_or_many:
        type: JSON
        description: JSON string または1つ以上の JSON string の配列。
  Uri:
    kind: value_object
    description: URI 形式の文字列。
    fields:
      value:
        type: String
        constraints:
          - format: uri
  DiscoveryDocument:
    kind: value_object
    description: RFC 8414 / OIDC Discovery 1.0 メタデータ。
    fields:
      issuer:
        type: Uri
      authorization_endpoint:
        type: Uri
      token_endpoint:
        type: Uri
      userinfo_endpoint:
        type: Uri
      jwks_uri:
        type: Uri
      introspection_endpoint:
        type: Uri
      revocation_endpoint:
        type: Uri
      pushed_authorization_request_endpoint:
        type: Uri
      device_authorization_endpoint:
        type: Uri
      registration_endpoint:
        type: Uri
      end_session_endpoint:
        type: Uri
        optional: true
      scopes_supported:
        type: "String[]"
        default:
          - openid
          - profile
          - email
          - phone
          - address
          - custom_attribute
          - offline_access
          - ra.admin
          - ra.account
      response_types_supported:
        type: "ResponseType[]"
      response_modes_supported:
