    - id: UX-NO-CREDENTIAL-ECHO
      category: privacy
      adoption: required
      statement: password、token、内部request idを画面、URL、エラーメッセージへ表示しない。
      screens:
        - Login
        - Totp
        - Consent
        - Device
        - Status
        - Callback
    - id: UX-ADMIN-CLIENT-SECRET
      category: security
      adoption: required
      statement: AdminApplicationsはOIDCアプリ作成で生成されたclient_secretを作成成功直後に一度だけ表示し、再取得できないことを明示する。client_secret_hashは表示しない。
      screens:
        - AdminApplications
      interfaces:
        - CreateAdminApplication
        - GetAdminApplication
    - id: UX-ADMIN-CLIENT-DELETE-CONFIRMATION
      category: usability
      adoption: required
      statement: AdminApplicationsはアプリケーション削除前に対象を示す確認操作を要求する。
      screens:
        - AdminApplications
      interfaces:
        - DeleteAdminApplication
    - id: UX-ADMIN-TENANT-SCOPE
      category: security
      adoption: required
      statement: 管理画面は現在のrealm prefixを維持し、所属テナント内のリソース(User、Group、Agent、Application/Client、Consent、AuditEvent、Key、設定、属性スキーマ)だけを表示・変更する。
      screens:
        - AdminDashboard
        - AdminUsers
        - AdminGroups
        - AdminAgents
        - AdminRoles
        - AdminApplications
        - AdminAuthorizationDetailTypes
        - AdminConsents
        - AdminAuditEvents
