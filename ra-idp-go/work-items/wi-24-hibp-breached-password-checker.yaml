id: wi-24-hibp-breached-password-checker
title: HIBP k-anonymity による漏洩パスワード検査 adapter を投入する
created_at: 2026-06-19
status: pending
authors: [tn]

motivation: |
  ADR-026 (password policy) は長さ・類似禁止・共通辞書を、ADR-027
  (password history) は履歴再利用禁止をそれぞれ実装済だが、これらは
  「攻撃者がどの password を試すか」のうち静的な事前知識しか弾けない。
  実運用では「過去に他サイトで漏洩した password」を当てるクレデンシャル
  スタッフィング攻撃が主流であり、辞書だけでは届かない。

  ADR-028 (breached password checker) は port + HIBP Range API
  (k-anonymity) を採用すると既に決めているが、実装は
  `NoopBreachedPasswordChecker` のみで、本番 adapter (`hibp`) と
  `BREACHED_PASSWORD_CHECKER` 環境変数の bootstrap 配線が未だ無い。
  本 WI で ADR-028 の実装側を完成させる。

scope:
  decision:
    - 新規 ADR は不要。ADR-028 の実装 (HIBP Range API + bootstrap
      wiring) のみ。

  scl:
    - >-
      `objectives.PasswordPolicy` の breached check 関連 value
      (例: `breached_password_check_enabled`) が既に SCL に乗っている
      場合は本 WI で実装が真値を満たす状態にする。乗っていなければ、
      本 WI で `breached_password_check_enabled: bool` を追加する
      (default false。env で hibp を選んだときに動的に true 扱いと
      しても良いが、SCL 側は宣言的 default を持つ)。

  go:
    adapters:
      - >-
        `internal/adapters/policy/hibp_breached_password_checker.go`
        を新設し `ports.BreachedPasswordChecker` を実装する。
        構成:
          - SHA-1 prefix 5 文字を `https://api.pwnedpasswords.com/range/{prefix}`
            に GET (k-anonymity)。生 password を外部送信しない。
          - timeout 2 秒 (ADR-028 §3 に従う)。
          - `User-Agent: ra-idp-go/<version>` を設定する (HIBP の
            etiquette)。
          - 結果 (suffix list) を in-memory LRU で TTL 10 分 cache。
            cache キーは prefix 5 文字、cache 値は suffix の set。
          - HTTP error / timeout / 5xx は `false` を返す (fail-open)。
            failure を application log の `warn` で出し、metric 1 本
            (`breached_password_checker_failures_total{reason=...}`)
            を OpenTelemetry に乗せる。
    bootstrap:
      - >-
        `internal/bootstrap/server.go` で `BREACHED_PASSWORD_CHECKER`
        環境変数 (`noop` / `hibp`、default `noop`) を読み、対応する
        adapter を `Deps.BreachedPasswordChecker` に注入する。
      - >-
        起動 log に `breached password checker: hibp` /
        `breached password checker: noop` を 1 行出す。SMTP adapter
        と同じ pattern。
    usecases:
      - >-
        変更なし。`authentication/usecases/password_policy.go` の
        既存の `breachedChecker.IsBreached(...)` 呼び出しがそのまま
        本 adapter を通る。

  documentation:
    - >-
      `ra-idp-go/README.md` §設定 に `BREACHED_PASSWORD_CHECKER` を
      追記する。`hibp` 選択時の外部依存 (api.pwnedpasswords.com への
      egress) と fail-open 挙動を明記する。
    - >-
      README §Phase 0 の HIBP 行をcompletion で除去を記録する。

out_of_scope:
  - >-
    self-hosted bloom filter / 全 hash dump の同梱。online 依存をなくす
    運用は別 WI で扱う。
  - >-
    HIBP 以外の漏洩 DB (SpyCloud / FlareID 等) 連携。port が同じなので
    将来 adapter を増やすのは容易だが本 WI ではしない。
  - >-
    過去に保存済の password に対する遡及検査。本 WI が影響するのは
    本 WI 投入後に新しく set される password のみ。
  - >-
    fail-open の判定を tenant policy で fail-close に倒すオプション。
    本 WI は global fail-open 固定。可用性を最優先する判断 (ADR-028 §3)。
  - >-
    Pwned password の count 閾値を usecase に持ち込む (ADR-028 §却下案
    に従い、count は adapter 内部で見ない)。

affected_guarantees:
  - >-
    privacy: 生 password を外部送信しない。送信するのは SHA-1 prefix
    5 文字のみ。adapter は plaintext / hash の 5 文字以降を log に
    出さない。
  - >-
    availability: HIBP の障害で IdP の password 設定 / 変更経路が
    落ちないこと。HTTP error / timeout / 5xx は false を返す (fail-open)。
  - >-
    observability: 障害を application log の warn と metric 1 本で
    可視化する。ADR-028 §影響 で要求された運用可視化を満たす。
  - >-
    SCL coherence: `PasswordPolicy` objective の breached check 値と
    実装の有効化状態が一致する。SCLObjectivesCoverage 系テストで
    照合する。
  - >-
    backward compatibility: `BREACHED_PASSWORD_CHECKER` を未設定の
    既存環境は `noop` のままで挙動が不変。

verification:
  - cmd: 'go test ./...'
    in: ra-idp-go
    reason: >-
      mock HTTP server (httptest) を立て、(a) prefix 一致して
      breached、(b) prefix 一致せず未漏洩、(c) timeout、(d) 5xx、
      (e) connection error の 5 経路で IsBreached の戻り値と
      metric 加算を確認する。LRU cache が同一 prefix の二度目を
      HTTP 経由せず返すことも確認する。
  - cmd: 'golangci-lint run ./...'
    in: ra-idp-go
  - cmd: 'go build ./...'
    in: ra-idp-go
  - >-
    手動 1: `BREACHED_PASSWORD_CHECKER=hibp` で起動し、`/api/auth/login`
    にも使わない既知の breached password (例: `password`) で
    `POST /api/auth/register` または admin の password 設定経路に
    投げ、`password_breached` で reject されることを確認する。
  - >-
    手動 2: `BREACHED_PASSWORD_CHECKER=noop` (default) で同じ
    password を試し、辞書ヒットが無ければ通ることを確認する
    (既存挙動の維持)。
  - >-
    手動 3: `BREACHED_PASSWORD_CHECKER=hibp` で起動した状態で、
    `/etc/hosts` で `api.pwnedpasswords.com` を 127.0.0.1 に向けた
    blackhole に倒し、設定経路が timeout で reject されず通る
    (fail-open) ことと、warn log + metric 増分を確認する。

risk: medium
risk_notes: |
  主リスクは 3 点:

    (1) 外部依存追加: HIBP への egress を許す環境でしか hibp は使えない。
        proxy 環境では `HTTP_PROXY` を尊重する std net/http 設定で済む
        はずだが、proxy 経由でも timeout 2 秒に収まるか確認する。

    (2) fail-open の運用上ノイズ: 障害時に password が通ってしまう。
        metric `breached_password_checker_failures_total` を SLO 監視に
        積む前提で運用する (本 WI で metric 出力までは入れる。alert 化は
        Phase 8)。

    (3) HIBP API のレート / 利用規約: 個人で叩く分には rate limit に
        達しないが、本番運用では User-Agent と利用目的を明示する。
        本 WI で `User-Agent: ra-idp-go/<version>` を固定する。

  辞書 + history + HIBP の 3 段で覆える範囲が運用最低ラインで、本 WI
  でその最低ラインに到達する。
