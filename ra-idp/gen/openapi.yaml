    ClientRegistrationRequest:
      type: object
      additionalProperties: false
      description: /register への動的クライアント登録リクエスト本体 (RFC 7591)。登録後の OAuth2Client は本リクエストの内容から派生する。
      properties:
        redirect_uris:
          type: array
          items:
            type: string
            format: uri
          minItems: 1
        client_name:
          type: string
        client_type:
          type: string
          enum:
            - public
            - confidential
        grant_types:
          type: array
          items:
            type: string
            enum:
              - authorization_code
              - refresh_token
              - client_credentials
              - "urn:ietf:params:oauth:grant-type:device_code"
          minItems: 1
        response_types:
          type: array
          items:
            type: string
            enum:
              - code
        token_endpoint_auth_method:
          type: string
          enum:
            - client_secret_basic
            - client_secret_post
            - private_key_jwt
            - tls_client_auth
            - none
        scope:
          type: string
        jwks_uri:
          type: string
          format: uri
        jwks: {}
        tls_client_auth_subject_dn:
          type: string
        id_token_signed_response_alg:
          type: string
          enum:
            - PS256
            - ES256
        fapi_profile:
          type: string
          enum:
            - none
            - fapi_2_security_profile
        require_pkce:
          type: boolean
        require_pushed_authorization_requests:
          type: boolean
        dpop_bound_access_tokens:
          type: boolean
      required:
