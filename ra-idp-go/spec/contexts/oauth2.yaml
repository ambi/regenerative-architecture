    kind: error
    description: 認可コード・リフレッシュトークン・device_code 等の付与が無効、期限切れ、再利用、あるいは redirect_uri/PKCE 不一致 (RFC 6749 §5.2 invalid_grant)。
    payload:
      reason:
        type: String
        optional: true
  UnauthorizedClientError:
    kind: error
    description: クライアントがこの grant_type を使用する権限を持たない (RFC 6749 §5.2 unauthorized_client)。
  UnsupportedGrantTypeError:
    kind: error
    description: AuthorizationServer がこの grant_type をサポートしていない (RFC 6749 §5.2 unsupported_grant_type)。
  InvalidScopeError:
    kind: error
    description: 要求された scope が不正、未知、またはクライアントに許可されていない (RFC 6749 §5.2 invalid_scope)。
  InvalidTokenError:
    kind: error
    description: アクセストークンが期限切れ、改ざん、不正、または失効済み (RFC 6750 §3.1 invalid_token)。
  InvalidDpopProofError:
    kind: error
    description: DPoP Proof JWT の検証に失敗した（署名・jti・htu/htm・nonce・clock skew 等、RFC 9449 §7.1 invalid_dpop_proof）。
  InsufficientScopeError:
    kind: error
    description: 提示されたトークンの scope では要求された操作に不足している (RFC 6750 §3.1 insufficient_scope)。
  AccessDeniedError:
    kind: error
    description: ResourceOwner が認可を拒否した、またはサーバーポリシーが許可しなかった (RFC 6749 §4.1.2.1 access_denied)。
  ExpiredTokenError:
    kind: error
    description: Device Authorization Grant において device_code が有効期限を過ぎた (RFC 8628 §3.5 expired_token)。
  SlowDownError:
    kind: error
    description: Device Authorization Grant のポーリングが速すぎる。クライアントは interval を 5 秒延長する必要がある (RFC 8628 §3.5 slow_down)。
  AuthorizationPendingError:
    kind: error
    description: Device Authorization Grant においてユーザーがまだ承認していない (RFC 8628 §3.5 authorization_pending)。クライアントは interval 秒待ってから再試行する。
