          - ClientSecretBasic
          - PrivateKeyJwt
          - TlsClientAuth
      revocation_endpoint_auth_methods_supported:
        type: "TokenEndpointAuthMethod[]"
        default:
          - ClientSecretBasic
          - PrivateKeyJwt
          - TlsClientAuth
      id_token_signing_alg_values_supported:
        type: "SignatureAlgorithm[]"
      code_challenge_methods_supported:
        type: "CodeChallengeMethod[]"
      require_pushed_authorization_requests:
        type: Boolean
      require_pkce:
        type: Boolean
      authorization_response_iss_parameter_supported:
        type: Boolean
        optional: true
      dpop_signing_alg_values_supported:
        type: "SignatureAlgorithm[]"
        optional: true
      tls_client_certificate_bound_access_tokens:
        type: Boolean
        optional: true
      subject_types_supported:
        type: "String[]"
        default:
          - public
      claims_supported:
        type: "String[]"
        optional: true
        default:
          - sub
          - iss
          - aud
          - exp
          - iat
          - auth_time
          - nonce
          - acr
          - amr
          - azp
          - name
          - given_name
          - family_name
          - preferred_username
          - email
          - email_verified
          - updated_at
