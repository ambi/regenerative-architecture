# Repository command map for humans and AI agents.
#
# Run tasks from the repository root:
#   mise run verify
#   mise run verify:go
#   mise run verify:ui
#   mise run verify:tools
#
# Keep task names intent-based. The task definitions pin the correct working
# directory so callers do not have to remember the monorepo layout.

[tools]
go = "1.26.4"
bun = "1.3.14"
golangci-lint = "2.12.2"

[tasks.setup]
description = "Install local dependencies for all Bun workspaces"
depends = ["install:tools", "install:ui"]

[tasks."install:tools"]
description = "Install dependencies for RA repository tools"
dir = "tools"
run = "bun install --frozen-lockfile"

[tasks."install:ui"]
description = "Install dependencies for the ra-idp-go React UI"
dir = "ra-idp-go/ui"
run = "bun install --frozen-lockfile"

[tasks.verify]
description = "Run the standard repository verification suite"
depends = ["verify:tools", "verify:go", "verify:ui"]

[tasks."verify:go"]
description = "Verify the ra-idp-go backend with lint and race-enabled tests"
dir = "ra-idp-go"
run = "golangci-lint run ./... && go test -race ./..."

[tasks."lint:go"]
description = "Run Go lint for ra-idp-go"
dir = "ra-idp-go"
run = "golangci-lint run ./..."

[tasks."test:go"]
description = "Run Go tests for ra-idp-go"
dir = "ra-idp-go"
run = "go test ./..."

[tasks."test:go:race"]
description = "Run race-enabled Go tests for ra-idp-go"
dir = "ra-idp-go"
run = "go test -race ./..."

[tasks."verify:ui"]
description = "Verify the ra-idp-go UI with lint, typecheck, and build"
dir = "ra-idp-go/ui"
run = "bun run lint && bun run typecheck && bun run build"

[tasks."lint:ui"]
description = "Run UI lint"
dir = "ra-idp-go/ui"
run = "bun run lint"

[tasks."typecheck:ui"]
description = "Run UI typecheck"
dir = "ra-idp-go/ui"
run = "bun run typecheck"

[tasks."build:ui"]
description = "Build the UI"
dir = "ra-idp-go/ui"
run = "bun run build"

[tasks."test:ui:e2e"]
description = "Run the UI golden-path E2E smoke test"
dir = "ra-idp-go/ui"
run = "bun run test:e2e"

[tasks."verify:tools"]
description = "Verify RA tools and repository YAML/SCL files"
dir = "tools"
run = "bun run typecheck && bun run lint && bun test && bun run yaml-check:all"

[tasks."lint:tools"]
description = "Run lint for RA tools"
dir = "tools"
run = "bun run lint"

[tasks."typecheck:tools"]
description = "Run typecheck for RA tools"
dir = "tools"
run = "bun run typecheck"

[tasks."test:tools"]
description = "Run tests for RA tools"
dir = "tools"
run = "bun test"

[tasks."yaml-check"]
description = "Validate work-item and SCL YAML files"
dir = "tools"
run = "bun run yaml-check:all"

[tasks."scl:render"]
description = "Regenerate SCL HTML artifacts"
dir = "tools"
run = "bun run scl-to-html:ra-idp-go && bun run scl-to-html:self"

[tasks."dev:api"]
description = "Start the ra-idp-go API for local UI development"
dir = "ra-idp-go"
env = { ADDR = ":8081", ISSUER = "http://localhost:5173" }
run = "go run ./cmd/ra-idp-go"

[tasks."dev:ui"]
description = "Start the ra-idp-go UI dev server"
dir = "ra-idp-go/ui"
run = "bun run dev"

[tasks."dev:compose"]
description = "Start the Docker Compose development stack"
dir = "ra-idp-go"
run = "docker compose -f infra/docker/docker-compose.dev.yaml up --build"
