# 署名鍵ローテーション CronJob (ADR-009 / ADR-024)
#
# active 署名鍵の最大寿命は 90 日 (slo.yaml signing_key_max_age_days)。
# 余裕をもって毎月 1 日 03:00 に回転し、旧鍵は JWKS に残して検証オーバーラップを確保する。
# 鍵漏洩時はこの Job を手動 trigger するか、別途緊急回転オペレーションを実行する。
#
# 同じイメージ (bun + ソース) を使い、ENTRYPOINT を rotate スクリプトに上書きする。
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ra-oauth2-idp-key-rotation
  labels:
    app.kubernetes.io/name: ra-oauth2-idp
    app.kubernetes.io/component: key-rotation
spec:
  schedule: "0 3 1 * *"        # 毎月 1 日 03:00 (ADR-009 の 90 日上限に対し十分な余裕)
  timeZone: "Asia/Tokyo"
  concurrencyPolicy: Forbid     # 回転の同時実行を禁止
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 600
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 300
      template:
        metadata:
          labels:
            app.kubernetes.io/name: ra-oauth2-idp
            app.kubernetes.io/component: key-rotation
        spec:
          restartPolicy: OnFailure
          serviceAccountName: ra-oauth2-idp
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            fsGroup: 65532
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: rotate
              image: ghcr.io/example/ra-oauth2-idp:latest  # overlay で上書き
              imagePullPolicy: IfNotPresent
              workingDir: /app
              command: ["bun", "run", "infra/scripts/rotate-signing-key.ts"]
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              env:
                - name: PERSISTENCE
                  value: postgres
                - name: EVENT_SINK
                  value: outbox     # SigningKeyRotated を outbox → Kafka → SIEM へ
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: ra-oauth2-idp-secrets
                      key: database_url
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: tmp
              emptyDir: {}
