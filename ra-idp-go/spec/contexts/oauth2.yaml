        type: Timestamp
      tenantId:
        type: String
        description: クライアントが属するテナント ID。actor と一致する。
      actorSub:
        type: String
      clientId:
        type: String
  ConsentGranted:
    kind: event
    description: ResourceOwner がクライアントに対する scope の同意を与えた (GDPR Art.6 法的根拠の取得記録)。
