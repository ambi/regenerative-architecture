id: wi-62-ws-trust-active-sts
title: WS-Trust 1.3 Active Requestor STS (RST/RSTR・MEX) で能動クライアント認証に対応する
created_at: 2026-06-24
status: completed
authors: [tn]

motivation: |
  ブラウザを介さない rich client・レガシー認証・デバイス登録は WS-Federation の
  passive プロファイルでは賄えず、SOAP ベースの WS-Trust active requestor を必要と
  する。PingFederate の Security Token Service (STS) はこの領域の代表で、RST
  (RequestSecurityToken) を受けて token generator が SAML assertion を発行する。
  Okta・OneLogin も Microsoft 365 連携でレガシー / active 認証のために WS-Trust の
  `usernamemixed` を提供する。AD FS は `/adfs/services/trust/...` 配下に MEX・
  `usernamemixed`・`windowstransport` を公開する。

  本 WI は ra-idp-go を WS-Trust 1.3 の IP-STS として振る舞えるようにする。WS-Security
  / WS-Addressing を伴う SOAP の RST を受理し、WS-Security UsernameToken (username +
  password) で認証して署名済み SAML assertion を RSTR で返す。MEX (Metadata Exchange)
  で endpoint と policy を広告し、Entra の federation 設定 (ActiveLogOnUri /
  MetadataExchangeUri) の能動経路を成立させる。passive 経路は
  [[wi-61-ws-federation-passive-requestor-idp]] が、metadata と claim 発行ルールは
  [[wi-63-federation-metadata-and-claims-mapping]] が担う。

  本 WI は UsernameToken 認証 (`usernamemixed`) だけで完結し、Kerberos には依存しない。
  これは Okta の Office 365 向け WS-Trust が username/password の active 認証に絞っているのと
  同じ到達点である。Kerberos/IWA 認証の `windowstransport` (Entra Hybrid Join のデバイス登録
  経路) は本シリーズのスコープ外とする (Okta も cloud STS では正面提供しない)。将来必要なら
  別 WI とし、その際に再利用できるよう Issue パイプラインは認証方式から独立させておく。

scope:
  decision:
    - >-
      新規 ADR: WS-Trust の対応範囲を確定する。初期対応は WS-Trust 1.3 (`Issue` binding)、
      `usernamemixed` (WS-Security UsernameToken による username/password 認証) を必須、
      MEX 公開、SAML 1.1 assertion (Entra 互換) を既定・SAML 2.0 を任意とする。WS-Security
      / WS-Addressing の必須ヘッダ (Timestamp・To・Action・MessageID・ReplyTo) の検証点を定める。
      Issue パイプラインは認証方式から独立させ、将来 `windowstransport` (Kerberos/IWA) を
      別 WI で足せる拡張点として切る (本シリーズでは windowstransport は範囲外)。
  scl:
    - >-
      新規 model: WsTrustRequestSecurityToken / WsTrustResponse / SecurityTokenEndpoint。
      assertion は SAML IdP の assertion model を再利用する。
    - 新規 interface: WsTrustIssue / WsTrustMetadataExchange。
    - 新規 event: WsTrustTokenIssued / WsTrustTokenRejected。
    - endpoint ごとの受理する認証方式 (UsernameToken / Windows) を表す model を追加する。
  go:
    - >-
      SOAP + WS-Security + WS-Addressing の RST を解析し、Timestamp の有効期限・replay・
      `AppliesTo` (対象 RP) を検証して RSTR を発行する。XML 署名は SAML IdP と共有 library を使う。
    - >-
      UsernameToken の username/password を既存の認証ユースケースで検証する
      (パスワードハッシャ・ロックアウト・監査を再利用)。
    - >-
      `AppliesTo` を登録済み RP に解決し、未登録対象は拒否する (fail-closed)。発行 assertion の
      AudienceRestriction / Recipient を `AppliesTo` に束縛する。
    - MEX で endpoint・binding・policy (UsernameToken 必須等) を広告する。
  http:
    - '`/{realm}/trust/mex`・`/{realm}/trust/usernamemixed` を公開する。windowstransport は範囲外。'
  documentation:
    - README に WS-Trust 対応範囲、active エンドポイント URL、RST/RSTR 例を書く。

out_of_scope:
  - WS-Federation passive は [[wi-61-ws-federation-passive-requestor-idp]] で扱う。
  - >-
    `windowstransport` の Integrated Windows Auth (Kerberos / SPNEGO) と Hybrid Join の
    デバイス登録。Okta 同様に本シリーズでは未提供とし、必要なら将来別 WI とする。本 WI は
    認証方式から独立した Issue パイプラインと、その将来拡張点の提供まで。
  - WS-Trust の `Validate` / `Renew` / `Cancel` binding。初期は `Issue` のみ。
  - federation metadata 公開と claim 発行ルールは [[wi-63-federation-metadata-and-claims-mapping]] で扱う。

affected_guarantees:
  - XML signature safety: 発行 assertion は必ず署名し、受信 RST の必須 WS-Security ヘッダを検証する。
  - audience restriction: assertion は `AppliesTo` で解決した登録済み RP に限定する (fail-closed)。
  - replay protection: WS-Security Timestamp / MessageID を短期 replay store で管理する。
  - credential safety: UsernameToken 認証は既存のロックアウト・監査・ハッシャ方針を再利用する。
  - audit: token 発行・拒否を監査に残す。

verification:
  - cmd: 'go test ./...'
    in: ra-idp-go
    reason: RST 解析・Timestamp/replay・AppliesTo 解決・UsernameToken 認証・RSTR 署名の境界。
  - cmd: 'golangci-lint run ./...'
    in: ra-idp-go
  - cmd: 'go build ./...'
    in: ra-idp-go
  - >-
    手動: SOAP クライアントから `usernamemixed` に UsernameToken つき RST を送り、
    RSTR の署名・AudienceRestriction・claim が正しいこと、未登録 AppliesTo と
    期限切れ Timestamp が拒否されることを確認する。
  - '手動: MEX を取得し endpoint / policy が正しく広告されることを確認する。'

risk: high
risk_notes: |
  WS-Trust は SOAP / WS-Security / WS-Addressing の手書き処理が XML signature wrapping・
  replay・canonicalization のリスクを生む。署名検証は library に委ね、Timestamp・
  MessageID・AppliesTo を fail-closed で検証する。windowstransport (Kerberos/IWA) は
  本シリーズでは範囲外とし、Issue パイプラインを認証方式から独立させて将来別 WI で
  足せる拡張点に留める。

completion:
  completed_at: 2026-06-27

  summary: |
    ADR-063 を追加し、WS-Trust 1.3 active STS の初期対応を Issue binding /
    `usernamemixed` に限定して実装した。`/{realm}/trust/usernamemixed` は SOAP 1.2 RST を受理し、
    WS-Addressing `MessageID` / `To` / `Action`、WS-Security UsernameToken、Timestamp、
    `AppliesTo` を fail-closed に検証する。`MessageID` は短期 replay store に記録し、
    `AppliesTo` は登録済み WS-Fed RP に解決する。username/password は既存 UserRepository /
    PasswordHasher / LoginAttemptThrottle を使って検証し、RP の ClaimMappingPolicy と SAML
    署名器を再利用して署名済み assertion を SOAP RSTR で返す。MEX は wi-63 の `trust/mex` が
    `usernamemixed` endpoint を広告する。

  semantic_diff:
    before: "WS-Fed passive はあるが、rich client / legacy active authentication が使う WS-Trust active endpoint は無い"
    after: "`/trust/usernamemixed` が UsernameToken 認証の WS-Trust Issue RST を受け、登録済み RP 向けの署名済み SAML assertion を RSTR で返す"

  traceability:
    specification:
      - ra-idp-go/decisions/ADR-059-federation-bounded-context-and-claim-issuance.md
      - ra-idp-go/decisions/ADR-060-xml-signature-library-and-saml-assertion-signing.md
      - ra-idp-go/decisions/ADR-062-federation-metadata-publication.md
      - ra-idp-go/decisions/ADR-063-ws-trust-active-sts-scope.md
    implementation:
      - ra-idp-go/internal/federation/adapters/wstrust/rst.go
      - ra-idp-go/internal/federation/adapters/http/wstrust_handler.go
      - ra-idp-go/internal/federation/adapters/http/routes.go
      - ra-idp-go/internal/spec/federation.go
      - ra-idp-go/internal/federation/adapters/metadata/federation_metadata.go
      - ra-idp-go/ui/src/features/admin-wsfed/AdminWsFedRelyingPartiesPage.tsx
      - ra-idp-go/README.md

  affected_guarantees_state:
    - "XML signature safety: RSTR に含める SAML assertion は samltoken/goxmldsig で署名"
    - "audience restriction: AppliesTo は登録済み RP に解決し、assertion Audience / Recipient に束縛"
    - "replay protection: WS-Addressing MessageID を ClientAssertionReplayStore に `wstrust:` prefix で短期記録"
    - "credential safety: UsernameToken password は既存 PasswordHasher / SentinelPasswordHash / LoginAttemptThrottle を利用"
    - "audit: WsTrustTokenIssued / WsTrustTokenRejected を発行"

  verification:
    - cmd: "GOCACHE=/tmp/ra-idp-go-cache go test ./internal/federation/..."
      in: ra-idp-go
      result: ok
    - cmd: "GOCACHE=/tmp/ra-idp-go-cache go test ./..."
      in: ra-idp-go
      result: ok
    - cmd: "bun run yaml-check --schema=work-item ../ra-idp-go/work-items/wi-62-ws-trust-active-sts.yaml ../ra-idp-go/work-items/wi-63-federation-metadata-and-claims-mapping.yaml"
      in: tools
      result: ok
    - cmd: "golangci-lint run ./..."
      in: ra-idp-go
      result: "ok: 0 issues (run outside sandbox after package loading failed inside sandbox)"
    - cmd: "bun --cwd ra-idp-go/ui typecheck"
      result: ok
    - cmd: "bun --cwd ra-idp-go/ui build"
      result: ok

  residual_risk:
    - "SOAP / WS-Security parsing は Issue / UsernameToken に必要な要素だけを正規化する最小実装。より広い WS-* 相互運用は wi-64 の実テナント検証で確認する。"
    - "WS-Trust Validate / Renew / Cancel は未対応。"
    - "windowstransport / Kerberos / Hybrid Azure AD Join デバイス登録は未提供。必要なら別 WI。"
    - "MessageID replay store は既存 ClientAssertionReplayStore を prefix 付きで再利用している。専用 port は将来の永続化設計時に分離可能。"

  human_decisions:
    - "初期 WS-Trust は Okta 同等の username/password active auth に限定し、Kerberos windowstransport は実装しない。"
    - "MEX 公開は wi-63 側の metadata adapter に置き、RST/RSTR 本体だけを wi-62 の wstrust adapter に置いた。"
