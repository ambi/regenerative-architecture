id: wi-15-roles-and-permissions-inspection-page
title: 管理画面にロールと権限の閲覧ページを追加する
completed_at: 2026-06-16
work_item: work-item.yaml
status: completed

summary: |
  GET `/api/admin/policy/roles` と `/admin/roles` を追加した。ロール説明、
  aliases、permission、allow_when 条件、関連 HTTP interface を SCL から
  read-only で表示する。admin には tenant 管理・鍵回転を公開せず、
  default tenant の system_admin にだけ control-plane permission を返す。

semantic_diff:
  before: "ロールの意味と許可操作は SCL を直接読む必要がある"
  after: "管理画面でロール、付与人数、permission、HTTP endpoint を確認できる"

traceability:
  specification:
    - ra-idp-go/spec/scl.yaml
  implementation:
    - ra-idp-go/internal/oauth2/usecases/role_policies.go
    - ra-idp-go/internal/adapters/http/admin_role_policy_handler.go
    - ra-idp-go/ui/src/pages/AdminRolesPage.tsx
  tests:
    - ra-idp-go/internal/oauth2/usecases/role_policies_test.go
    - ra-idp-go/internal/adapters/http/admin_role_policy_handler_test.go

affected_guarantees_state:
  - "新規 endpoint は GET only、認証済み admin / system_admin に限定"
  - "system_admin 専用 permission は default control-plane 以外で非表示"
  - "permission の説明・条件は SCL、interface の binding も SCL から取得"

verification:
  - cmd: "bun --cwd ra-idp-go/ui typecheck"
    result: ok
  - cmd: "bun --cwd ra-idp-go/ui lint"
    result: "ok (42 files)"
  - cmd: "bun --cwd ra-idp-go/ui build"
    result: ok
  - cmd: "GOCACHE=/tmp/ra-idp-go-cache go test -race ./..."
    in: ra-idp-go
    result: ok
  - cmd: "go vet ./..."
    in: ra-idp-go
    result: ok
  - cmd: "go build ./..."
    in: ra-idp-go
    result: ok
  - "実ブラウザによるテーブル選択と詳細パネルの目視確認は未実施。"

residual_risk:
  - >-
    SCL permission には interface への直接参照がないため、
    permission→interface 名の対応表を use case に保持する。参照先の存在と
    HTTP binding は実行時に検証するが、新 permission 追加時は対応表更新が必要。

human_decisions:
  - >-
    パンくずは `管理コンソール / 現在ページ` とした。管理コンソールは
    アプリケーション境界へのリンクであり、ダッシュボードを親階層にはしない。
