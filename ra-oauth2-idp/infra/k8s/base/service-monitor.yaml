# Prometheus Operator の ServiceMonitor。
# scrape は OTel Collector 経由ではなく、IdP の Prometheus exporter を直接 (代替路)。
# 本アプリでは IdP が直接 Prometheus エンドポイントを持たないため、
# OTel Collector の /metrics (8889) を scrape する想定で別 ServiceMonitor を持つ。
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: ra-oauth2-idp
  labels:
    app.kubernetes.io/name: ra-oauth2-idp
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: otel-collector
  namespaceSelector:
    matchNames: [observability]
  endpoints:
    - port: prometheus
      interval: 15s
      path: /metrics
