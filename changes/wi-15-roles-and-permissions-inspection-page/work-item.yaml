id: wi-15-roles-and-permissions-inspection-page
title: 管理画面に「ロールと権限」閲覧ページを追加する
created_at: 2026-06-16
status: completed
authors: [tn]

motivation: |
  現状、ra-idp の admin が「どんなロールが存在するか」「各ロールが
  どの操作を許されているか」を知る経路が UI 上に無い。spec/scl.yaml の
  `permissions` セクションと vocabulary (Administrator /
  SystemAdministrator など) を直接読むしかない。

  実運用上、role を user に付与するときに admin は
    - そのロール名で何ができるのか
    - 同じロールを持つ user が他に何人いるのか
    - どの API endpoint が gating されているのか
  を確認したい場面が頻繁にある。SCL に既に静的定義されている情報を
  read-only で UI に出すだけで、admin の運用判断と監査側の説明責任を
  両方助けられる。

  AdminUsersPage のロール編集ダイアログ (wi-10 part 2) も、
  admin が「`support` ロールって結局どこまで触れる?」を確認できないと
  自信を持って付与できない。本 WI はそのギャップを埋める。

scope:
  decision:
    - 新規 ADR は不要。SCL `permissions` を権威 source として扱う既存
      の決定 (ADR-031 / ADR-010 = AuthZEN as spec) の範囲で完結する。

  scl:
    - 変更なし。`permissions` / `vocabulary` / `Administrator` /
      `SystemAdministrator` / `interfaces` をそのまま read-only で
      公開する。

  go:
    http:
      - >-
        新規 endpoint: GET `/api/admin/policy/roles`。response shape:
          {
            "roles": [
              {
                "name": "admin",
                "description": "...",
                "aliases": ["管理者", ...],
                "permissions": [
                  { "name": "AdminUserCreate",
                    "action": "admin:user_create",
                    "description": "...",
                    "interfaces": ["CreateAdminUser"] },
                  ...
                ]
              },
              { "name": "system_admin", ... }
            ]
          }
        SCL を loader 経由で読み、permissions セクションの actor /
        action / allow_when から role 名を抽出する (今は actor=User の
        permissions の allow_when に `admin in actor.roles` 等の文字列
        条件で書かれているため、最低限 admin / system_admin の 2 ロール
        を hard-code して引いて返す)。読み出しのみで CSRF 不要。
      - >-
        `requireAdmin` + tenant scope の既存ガードを継承する。
        system_admin かつ default tenant のときは control-plane
        permissions も併せて返す。
    usecases:
      - >-
        新規: oauth2usecases (or 別の RBAC ドメイン場所) に
        `ListRolePolicies(ctx, sclDoc, actorRoles)` を作る。
        SCL からの抽出と filtering (system_admin only permissions を
        admin に見せるかどうか) を一箇所に集める。
    domain:
      - 変更なし。

  ui:
    pages:
      - >-
        新規 `AdminRolesPage` at `/admin/roles`。構成: (a) 上段は
        メトリクスカード (該当 role を持つ user 数の集計)。既存
        `listAdminUsers` を Promise.all で叩いて UI 側で count する
        (wi-10 part 3 と同じパターン)。(b) 中段はロール一覧テーブル。
        行: role 名 (admin / system_admin)、列: 説明・付与人数・関連
        permissions 数。行クリックで右側パネルに詳細を表示する。
        (c) 右パネルは選択 role の詳細: 説明 / aliases、関連
        permissions のリスト (action 名 + 説明 + allow_when から派生
        した要件)、関連 interfaces (HTTP path) のリスト、該当 role を
        持つ user 一覧 (link to AdminUsersPage で filter applied)。
        (d) tenant-scoped: 現テナント内の user count のみ表示。
        system_admin かつ default tenant のときは "全テナント横断"
        の補助 view を出してもよいが、本 WI ではテナント内に閉じる。
    navigation:
      - >-
        `adminNav.ts` の `AdminNavKey` に `roles` を追加し、
        sidebar 項目 "ロールと権限" (icon: IconKey or IconUserShield
        相当) を Identity management セクション、ユーザの下に挿入する。
    routing:
      - >-
        `/admin/roles` を router.tsx に追加し、loadPageData で
        `kind: 'admin-roles'` を返す。

  documentation:
    - ra-idp-go/README.md "範囲" 節に "ロール・権限の閲覧 UI" 行を
      追加。Phase 4 ロードマップにも追加する場合は、wi-9 (group) と
      対をなす形で「RBAC 透明性」軸として並べる。

out_of_scope:
  - ロールの追加・編集・削除 (RBAC は SCL で静的に管理する設計を
    維持する)。
  - カスタムロールの動的定義。
  - role hierarchy (admin > system_admin の含意関係) の可視化。
  - permissions の編集 UI (AuthZEN policy のオンライン書き換えは
    別 phase)。
  - グループ (wi-9) との統合。グループが入った段階で
    `Group → roles → permissions` の二段階リンクを足すのは別 WI。
  - 監査ログとの連動 (このロールを使った最新の操作 N 件など) は
    Phase 5 のスコープ。
  - i18n の追加。SCL の description は ja を権威にする。

affected_guarantees:
  - >-
    admin RBAC: `/api/admin/policy/roles` は GET only / read-only。
    `requireAdmin` + tenant 一致を継承する。情報漏洩リスクは無い
    (system_admin のみが見える項目は actor.roles で filter する)。
  - >-
    CSRF: GET なので CSRF token 不要。
  - >-
    SCL coherence: SCL を変更しないため SCLPermissionsCoverage 系の
    coherence test は無影響。
  - >-
    既存 endpoint への影響: 無し。新規 endpoint 追加のみ。
  - >-
    AuthZEN: 既存の permissions セクションを source of truth に
    据えるため、ADR-010 の "AuthZEN as spec" の原則は維持される。

verification:
  - cmd: 'go test ./...'
    in: ra-idp-go
    reason: ListRolePolicies の unit test (admin role に対して
      AdminUserRead / AdminUserCreate / AdminUserUpdate /
      AdminUserDelete が含まれること、system_admin に対して
      AdminTenantsManage / AdminKeysRotate が含まれることを
      テーブルテストで確認)。HTTP handler は requireAdmin がかかる
      ことと、system_admin のみの permission が admin から見えない
      ことを確認。
  - cmd: 'go vet ./...'
    in: ra-idp-go
  - cmd: 'go build ./...'
    in: ra-idp-go
  - cmd: 'bun --cwd ra-idp-go/ui typecheck'
  - cmd: 'bun --cwd ra-idp-go/ui lint'
  - cmd: 'bun --cwd ra-idp-go/ui build'
  - >-
    手動 1: `/admin/roles` を開く → admin / system_admin の 2 行が
    並ぶ。admin 行をクリック → 右パネルに AdminUser* permissions と
    関連 interfaces (CreateAdminUser など) が出る。
  - >-
    手動 2: system_admin かつ default tenant でログインすると
    AdminTenantsManage / AdminKeysRotate が system_admin 行の詳細に
    出るが、admin ロール側には出ない。
  - >-
    手動 3: 該当 role を持つ user の数が、AdminUsersPage の
    role filter (将来 wi-9 で group も含む形に拡張) と一致する。

risk: low
risk_notes: |
  read-only な静的データの可視化なので回帰範囲は狭い。リスクは:
    - SCL を loader 経由でリクエスト時に読むと latency が増える。
      memoize して一度だけ抽出する。
    - permissions の allow_when は自然言語に近い式で表現されており、
      自動 parsing で要件 (admin in roles, tenant 一致 など) を抽出
      するのは脆い。本 WI では `allow_when` 全文を文字列として出す
      + 別途 `actionRules` (internal/spec/policy.go の既存 map) を
      利用して check 名を出すハイブリッドで済ます。
    - admin と system_admin の 2 ロール固定で hard-code するが、
      group (wi-9) や任意 role の追加が来たら再設計が必要になる。
      その時点で別 WI でリファクタする前提とする。
