id: wi-22-spa-e2e-smoke-test
title: SPA E2E スモークテストを Playwright で 1 本だけ導入する
created_at: 2026-06-19
status: pending
authors: [tn]

motivation: |
  現状の検証層 (`go test`, `bun typecheck` / `lint` / `build`) では次の
  2 つの回帰を捕まえられない:
    - TanStack Router 配下の SPA dispatcher (login / consent / device /
      error のいずれを描画するかを `meta[name="ra-idp:page"]` で表明する
      層)。過去 dispatcher の分岐ミスで login URL を開いても空白画面
      になる事故があった。
    - `/authorize` → 認可コードを乗せた callback URL への遷移における
      cross-origin redirect 挙動。`fetch` の redirect モードや
      `Same-Site` 設定で `code=...` と `iss=...` の片方が落ちる事故が
      過去に発生している (RFC 9207 と整合させた経緯)。

  Go 側のユニットテストは「正しい HTTP レスポンスを返す」ことは保証
  するが、ブラウザの DOM が実際に描画され `fetch` が想定の挙動を取って
  いることは別レイヤでしか確認できない。Playwright スモーク 1 本で
  golden path を縛り、上記 2 領域の回帰を機械的に検知する。

  本 WI はテスト戦略の足場 (Playwright runtime / fixture / 1 シナリオ)
  を入れるところまで。シナリオの拡充や consent 拒否経路、`error` page
  の検証は別 WI で積み増す。

scope:
  decision:
    - 新規 ADR は不要。テスト戦略の段階導入は README §Phase 9 の
      "SPA E2E スモークテスト" の最小要件をそのまま実装する範囲。

  go:
    - >-
      変更なし。Playwright fixture から `cmd/ra-idp-go` を
      `PERSISTENCE=memory ISSUER=http://localhost:<port>` で起動する
      ので、追加の起動オプションは設けない。

  ui:
    dependencies:
      - >-
        `ra-idp-go/ui/package.json` の devDependency に
        `@playwright/test` を追加する。`bun install` で取得し、
        `npx playwright install chromium` で chromium だけ取得する
        方針 (Firefox / WebKit は本 WI では入れない)。
    layout:
      - >-
        `ra-idp-go/ui/tests/e2e/` 配下に Playwright 設定 (`playwright.config.ts`)
        と shared fixture (`fixtures.ts`) を置く。`bun.lock` に新規依存が
        追加される。
      - >-
        `playwright.config.ts` の `webServer` で Vite dev server を起動し、
        `globalSetup` で次を立ち上げる:
          (a) Go API を memory mode で別ポートに起動。
          (b) コールバック収集用のミニマムな HTTP サーバ (Node 標準モジュール
              のみで実装) を別ポートに起動。受け取った URL を fixture が参照
              できる場所に書く。
    scenarios:
      - >-
        `tests/e2e/authorize-golden-path.spec.ts` を 1 本だけ追加する:
          1. `/authorize?client_id=demo-client&response_type=code&...` を
             開く。
          2. `meta[name="ra-idp:page"][content="login"]` の存在と
             `input[name="username"]` の可視性を assert (dispatcher 回帰
             防止)。
          3. `alice` / `demo-password-1234` を入力して submit。
          4. `meta[name="ra-idp:page"][content="consent"]` を assert。
          5. 「許可する」を押す。
          6. コールバック収集サーバが受けた URL に `code=...` と
             `iss=...` が乗っていることを assert (cross-origin redirect
             の回帰防止)。
    scripts:
      - >-
        `package.json` に `"test:e2e": "playwright test"` と
        `"test:e2e:install": "playwright install chromium"` を追加する。

  documentation:
    - >-
      `ra-idp-go/ui/README.md` (または `ra-idp-go/README.md`) に
      「E2E スモーク」節を追加し、`bun run test:e2e:install` →
      `bun run test:e2e` のローカル実行手順を書く。
    - >-
      README §Phase 9 の "SPA E2E スモークテスト" 行は完了レポートで
      「実装済 (本 WI)」として除去する。

out_of_scope:
  - >-
    Chromium 以外のブラウザ (Firefox / WebKit) でのクロスブラウザ
    実行。本 WI は 1 ブラウザに固定する。
  - >-
    consent 拒否経路、`error` page の表示確認、device flow、PAR の
    E2E。golden path 1 本のみ。
  - >-
    visual regression / screenshot diff。
  - >-
    GitHub Actions / CI へのワイヤリング。ローカル実行可能にして
    完了。CI 化は別 WI とする。
  - >-
    OAuth / OIDC conformance suite。これは別タスク (Phase 9 末尾)。
  - >-
    Storybook / コンポーネント単位の visual テスト。

affected_guarantees:
  - >-
    SPA dispatcher invariant: login / consent / device / error の
    各画面で `meta[name="ra-idp:page"][content=<expected>]` が
    描画される。本 WI では login / consent の 2 つだけ assert する。
  - >-
    Callback fetch behavior: `/authorize` から callback への redirect で
    `code` と `iss` の両方が消えないこと。RFC 9207 の `iss` 検査前提を
    破らない。
  - >-
    Demo seed contract: `demo-client` + `alice` / `demo-password-1234`
    で golden path が成立し続けること。README §デモシードと整合。

verification:
  - cmd: 'bun --cwd ra-idp-go/ui install'
    reason: Playwright 依存の取得を確認する。
  - cmd: 'bun --cwd ra-idp-go/ui test:e2e:install'
    reason: chromium の取得を確認する。
  - cmd: 'bun --cwd ra-idp-go/ui test:e2e'
    reason: スモーク 1 シナリオが pass することを確認する。
  - cmd: 'bun --cwd ra-idp-go/ui typecheck'
  - cmd: 'bun --cwd ra-idp-go/ui lint'
  - cmd: 'bun --cwd ra-idp-go/ui build'
  - >-
    手動: 意図的に `dispatcher` の login / consent 分岐を一行壊して
    `test:e2e` が失敗することを目視確認する (回帰検知が機能している
    ことの自己テスト)。

risk: low
risk_notes: |
  Playwright 自身の維持コスト (chromium バイナリ更新) は CI 化を本 WI で
  しない範囲では限定的。ローカルで `bun run test:e2e` を CI に乗せる
  かは別 WI で判断する。

  1 ブラウザのみで開始するため、Firefox / Safari の SPA 挙動差は
  catch できない。これは現時点での意思決定であり、現状の
  RP / End-user の主要ブラウザは chromium 系で十分に代表できる
  という判断 (本番ターゲットが変わったら拡張する)。
