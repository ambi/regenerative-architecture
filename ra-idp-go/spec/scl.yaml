# OAuth2 / OIDC IdP — Specification Core Language (SCL) Document
#
# Layer 1 — 単一上流ソース。RA §3.1 / SPECIFICATION_CORE_LANGUAGE.md を参照。
# このファイルが保存対象。gen/* と派生ポリシー・監視ルールはすべてここから生成される。
#
# 言語規約: 型/状態/イベント/インターフェース/アクション = PascalCase、
#           フィールド/パラメータ = snake_case（インタフェース・スキーマと一致）。
#           標準仕様の snake_case 名（例: authorization_code）は aliases に置く。

system: ra-idp
spec_version: "1.2"

components:

  Tenancy:
    description: テナント (Realm) 集約、ライフサイクル、HTTP リクエストからのテナント解決、テナント管理 API を所有する。テナントは ra-idp のあらゆる集約に共通する境界文脈。
    owns_models: [Tenant, TenantStatus, TenantCreateRequest, TenantUpdateRequest, TenantSummaryResponse, TenantListResponse, PasswordPolicyOverride, PasswordPolicyDefaults, AdminSettingsResponse, TenantUserAttributeSchema, TenantUserAttributeSchemaResponse, TenantUserAttributeSchemaUpdateRequest, UserAttributeDef, AttributeType, AttrVisibility]
    owns_states: [TenantLifecycle]
    owns_events: [TenantCreated, TenantUpdated, TenantUserAttributeSchemaUpdated, TenantDisabled, TenantEnabled]
    owns_interfaces: [ResolveTenant, ListTenants, GetTenant, CreateTenant, UpdateTenant, DisableTenant, EnableTenant, GetAdminSettings, UpdateAdminSettings]
    owns_permissions: [AdminTenantsManage, AdminSettingsRead, AdminSettingsUpdate]

  Authentication:
    description: エンドユーザ (Subject) の identity、credentials、MFA、ログインセッション、パスワードリセット、および管理 API からの User ライフサイクル操作を所有する。
    owns_models: [User, MfaFactor, MfaFactorType, LoginSession, AuthenticationContext, PasswordResetTokenRecord, BrowserLoginRequest, BrowserTotpRequest, BrowserChangePasswordRequest, BrowserForgotPasswordRequest, BrowserResetPasswordRequest, AdminUserCreateRequest, AdminUserUpdateRequest, AdminRequiredActionRequest, AdminUserListResponse, AdminUserResponse, Group, GroupMember, GroupCreateRequest, GroupUpdateRequest, GroupSummaryResponse, GroupListResponse, GroupMemberResponse, GroupAddMemberRequest, UserGroupsResponse, UserLifecycle, AttributeValue, UserStatus, RequiredAction, AccountProfileResponse, AccountProfileUpdateRequest, AccountSummary, AccountEmailChangeRequest, AccountEmailChangeConfirm, AccountDataExport, AccountMfaFactor, AccountSecurityResponse, TOTPEnrollmentStart, TOTPEnrollmentConfirmRequest, MfaFactorRemoveRequest, UserSignInActivity, UserSignInActivityResponse]
    owns_states: [UserLifecycle, GroupLifecycle]
    owns_events: [UserAuthenticated, AuthenticationFailed, PasswordChanged, LoginThrottled, PasswordResetRequested, EmailSent, EmailChangeRequested, EmailChanged, UserCreated, UserUpdated, UserDisabled, UserEnabled, UserDeleted, UserRequiredActionSet, UserRequiredActionCleared, GroupCreated, GroupUpdated, GroupDeleted, GroupMemberAdded, GroupMemberRemoved, MfaFactorEnrolled, MfaFactorRemoved]
    owns_interfaces: [SubmitBrowserLogin, SubmitBrowserTotp, ChangePassword, GetAccountSummary, GetUserProfile, UpdateUserProfile, RequestEmailChange, ConfirmEmailChange, ExportAccountData, GetAccountSecurity, StartTotpEnrollment, ConfirmTotpEnrollment, RemoveTotpFactor, ListMySignInActivity, ListUserSignInActivity, RequestPasswordReset, ResetPasswordWithToken, ListAdminUsers, GetAdminUser, CreateAdminUser, UpdateAdminUser, DisableAdminUser, EnableAdminUser, DeleteAdminUser, SetUserRequiredAction, ClearUserRequiredAction, ListGroups, GetGroup, CreateGroup, UpdateGroup, DeleteGroup, AddGroupMember, RemoveGroupMember, ListUserGroups]
    owns_invariants: [PasswordHistoryNoReuse, EffectiveRolesComposition, GroupMembershipAuditEmission]
    owns_permissions: [AdminUserRead, AdminUserCreate, AdminUserUpdate, AdminUserDelete, AdminGroupsRead, AdminGroupsWrite]
    owns_objectives: [PiiPurgeAfterDeletion]
    depends_on:
      - { component: Tenancy, reason: User と LoginSession はテナント境界内に閉じ、User 管理 API もテナント単位で動く。 }

  OAuth2:
    description: |
      OAuth 2.0 / OIDC プロトコルファミリーの全責務を所有する。Client metadata
      とその Dynamic Registration、認可判断 (Authorize / Consent /
      Authorization Code / PAR / Device Authorization / RP-Initiated Logout)、
      トークン発行とライフサイクル (AccessToken / RefreshToken / ID Token /
      Introspect / Revoke / UserInfo / proof-of-possession)、信頼基盤 (署名鍵 /
      JWKS / Discovery / Authorization Server Metadata / 健全性報告 / 監査保管)
      を本コンポーネントに集約する。
    owns_models: [OAuth2Client, ClientType, TokenEndpointAuthMethod, FapiProfile, ClientRegistrationRequest, AdminClientCreateRequest, AdminClientUpdateRequest, AdminClientResponse, AdminClientCreateResponse, AdminClientListResponse, InvalidClientError, UnauthorizedClientError, AuthorizationRequest, AuthorizeParameters, Consent, ConsentState, AdminConsentResponse, AdminConsentListResponse, AccountConsentResponse, AccountConsentListResponse, AuthorizationCodeRecord, AuthorizationCodeState, AuthorizationCodeRecordState, ResponseType, ResponseMode, CodeChallengeMethod, GrantType, PARRecord, PARRecordState, ParRequest, ParResponse, BrowserConsentRequest, BrowserTransactionResponse, BrowserFlowResponse, EndSessionParameters, DeviceCodeState, DeviceAuthorization, DeviceAuthorizationRequest, DeviceAuthorizationResponse, BrowserDeviceRequest, BrowserDeviceContextResponse, OAuthError, OAuthErrorCode, InvalidRequestError, InvalidScopeError, AccessDeniedError, ExpiredTokenError, SlowDownError, AuthorizationPendingError, ServerError, TokenRequest, TokenResponse, IntrospectionRequest, IntrospectionResponse, RevokeRequest, UserInfoResponse, RefreshTokenRecord, RefreshTokenState, AccessTokenClaims, IdTokenClaims, TokenType, AccessTokenSenderConstraint, SenderConstraintKind, SenderConstraintCnf, RefreshTokenSenderConstraint, Audience, InvalidGrantError, UnsupportedGrantTypeError, InvalidTokenError, InvalidDpopProofError, InsufficientScopeError, SigningKey, SigningKeyState, JWK, JWKS, DiscoveryDocument, SignatureAlgorithm, Uri, AuditEventQuery, AdminAuditEventResponse, AdminAuditEventListResponse, AdminKeyResponse, AdminKeyListResponse, AdminRotateKeyResponse]
    owns_states: [AuthorizationCodeFlow, AuthorizationCodeRecordLifecycle, ConsentLifecycle, PARRecordLifecycle, DeviceCodeFlow, RefreshTokenLifecycle, SigningKeyLifecycle]
    owns_events: [ClientRegistered, AdminClientCreated, AdminClientUpdated, AdminClientDeleted, AuthorizationCodeIssued, AuthorizationCodeRedeemed, ConsentGranted, ConsentRevoked, PARStored, DeviceAuthorizationRequested, DeviceAuthorizationApproved, DeviceAuthorizationDenied, AccessTokenIssued, RefreshTokenIssued, RefreshTokenRotated, TokenRevoked, TokenIntrospected, RefreshTokenReuseDetected, SigningKeyRotated]
    owns_interfaces: [RegisterClient, ListAdminClients, GetAdminClient, CreateAdminClient, UpdateAdminClient, DeleteAdminClient, Authorize, GetBrowserTransaction, SubmitBrowserConsent, PushAuthorizationRequest, DeviceAuthorization, GetBrowserDeviceContext, SubmitBrowserDevice, EndSession, ListAdminConsents, GetAdminConsent, RevokeAdminConsent, ListMyConsents, RevokeMyConsent, Token, Introspect, Revoke, UserInfo, PostUserInfo, GetJwks, GetOpenidConfiguration, GetOauthAuthorizationServer, Health, ListAdminAuditEvents, GetAdminAuditEvent, ListAdminKeys, GetAdminKey, RotateAdminKey]
    owns_invariants: [ClientAuthFailureUniformity, PkceRoundTrip, AuthCodeStateSafety, DeviceCodeStateSafety, AuthorizationCodeSingleUse, ParRequestUriSingleUse, AuthorizationCodeTtl, AuthorizationCodeEventuallyResolves, DeviceCodeEventuallyResolves, RedirectUriExactMatch, PkceMandatory, AccessTokenIssuedOnlyAfterConsent, RefreshFamilyTransitiveRevoke, RefreshRotationParentInvariants, DpopJtiUniquenessWithinWindow, TokenHashOneWay, RefreshTokenAbsoluteTtl, AllAccessTokensCarryAudience, SigningKeyMaxAge]
    owns_permissions: [AdminClientsManage, AuthorizeInitiate, AdminConsentsManage, TokenGrantAuthorizationCode, TokenGrantRefresh, TokenGrantClientCredentials, TokenGrantDeviceCode, TokenIntrospect, TokenRevoke, UserInfoRead, AdminAuditEventsRead, AdminKeysRead, AdminKeysRotate]
    owns_objectives: [RegisterLatency, RegisterErrorRate, ClientAuthFailureRateLimit, AuthorizeLatency, ParLatency, DeviceAuthorizationLatency, AuthorizeErrorRate, ParErrorRate, DeviceAuthorizationErrorRate, AuthorizeThroughput, AuthorizationCodeLifetime, ParRequestUriLifetime, DeviceCodeLifetime, UserCodeLifetime, DeviceCodePollingDefaultInterval, ConsentRecordsRetention, AuthorizationCodeRedemptionFailureRateLimit, TokenLatency, IntrospectLatency, RevokeLatency, UserInfoLatency, TokenErrorRate, IntrospectErrorRate, RevokeErrorRate, UserInfoErrorRate, TokenEndpointAvailability, TokenThroughput, IntrospectThroughput, AccessTokenLifetime, IdTokenLifetime, RefreshTokenLifetime, RefreshTokenAbsoluteLifetime, DpopProofClockSkewPast, DpopProofClockSkewFuture, DpopJtiReplayWindow, DpopNonceLifetime, RefreshReuseAlertWindow, JwksLatency, DiscoveryLatency, JwksErrorRate, DiscoveryErrorRate, OverallAvailability, SigningKeyMinJwksOverlap, SigningKeyArchiveRetention, AuditLogRetention]
    depends_on:
      - { component: Tenancy,        reason: クライアント・コード・トークン・鍵・監査はテナント境界内に閉じる。 }
      - { component: Authentication, reason: Authorize は AuthenticationContext を Authentication から解決する。 }

# =================================================================
# 0. standards — 適用する外部標準と規範要件
# =================================================================

standards:
  RFC6238:
    title: TOTP Time-Based One-Time Password Algorithm
    version: RFC 6238
    url: https://www.rfc-editor.org/rfc/rfc6238.html
    roles: [Verifier]
    scope: 時刻ベースワンタイムパスワードによる第二要素認証。
    requirements:
      - id: RFC6238-TOTP
        section: "§4"
        strength: MUST
        adoption: optional
        statement: TOTP factor利用時は共有秘密と時間ステップからOTPを生成・検証する。
        relates_to: { models: [MfaFactor, MfaFactorType, AuthenticationContext] }

  RFC6749:
    title: The OAuth 2.0 Authorization Framework
    version: RFC 6749
    url: https://www.rfc-editor.org/rfc/rfc6749.html
    roles: [AuthorizationServer]
    scope: Authorization Code、Refresh Token、Client Credentialsと共通エラー処理。
    requirements:
      - id: RFC6749-AUTHORIZATION-CODE
        section: "§4.1"
        strength: MUST
        adoption: required
        statement: Authorization Code Grantを認可エンドポイントとトークンエンドポイントで提供する。
        relates_to: { interfaces: [Authorize, Token], states: [AuthorizationCodeFlow] }
      - id: RFC6749-CLIENT-CREDENTIALS
        section: "§4.4"
        strength: MAY
        adoption: optional
        statement: confidential clientに限りClient Credentials Grantを許可する。
        relates_to: { interfaces: [Token], permissions: [TokenGrantClientCredentials] }
      - id: RFC6749-IMPLICIT
        section: "§4.2"
        strength: MAY
        adoption: excluded
        statement: Implicit Grantを提供する。
        reason: RFC 9700の勧告に従いAuthorization Code + PKCEへ限定する。
        relates_to: { models: [GrantType] }
      - id: RFC6749-PASSWORD-GRANT
        section: "§4.3"
        strength: MAY
        adoption: excluded
        statement: Resource Owner Password Credentials Grantを提供する。
        reason: RFC 9700により使用しない。
        relates_to: { models: [GrantType] }

  RFC6750:
    title: The OAuth 2.0 Authorization Framework Bearer Token Usage
    version: RFC 6750
    url: https://www.rfc-editor.org/rfc/rfc6750.html
    roles: [AuthorizationServer, ResourceServer]
    scope: Bearer Access Tokenの提示方法とエラー応答。
    requirements:
      - id: RFC6750-AUTHORIZATION-HEADER
        section: "§2.1"
        strength: MUST
        adoption: required
        statement: Bearer Access TokenはAuthorizationヘッダーで受け付ける。
        relates_to: { interfaces: [UserInfo, PostUserInfo] }
      - id: RFC6750-QUERY-TOKEN
        section: "§2.3"
        strength: MAY
        adoption: excluded
        statement: URI query parameterによるAccess Token提示を受け付ける。
        reason: URL、ログ、Refererへのトークン漏洩を避ける。

  RFC7009:
    title: OAuth 2.0 Token Revocation
    version: RFC 7009
    url: https://www.rfc-editor.org/rfc/rfc7009.html
    roles: [AuthorizationServer]
    scope: Access TokenとRefresh Tokenの失効。
    requirements:
      - id: RFC7009-REVOCATION-ENDPOINT
        section: "§2"
        strength: MUST
        adoption: required
        statement: 認証済みクライアントへトークン失効エンドポイントを提供する。
        relates_to: { interfaces: [Revoke], models: [RevokeRequest] }
      - id: RFC7009-UNKNOWN-TOKEN
        section: "§2.2"
        strength: MUST
        adoption: required
        statement: 無効または他クライアント所有のトークンに対しても成功応答を返し情報を漏らさない。
        relates_to: { scenarios: [他クライアントの所有トークンの失効要求は静かに無視される] }

  RFC7517:
    title: JSON Web Key
    version: RFC 7517
    url: https://www.rfc-editor.org/rfc/rfc7517.html
    roles: [AuthorizationServer]
    scope: 署名検証鍵のJWK Set公開。
    requirements:
      - id: RFC7517-JWKS
        section: "§5"
        strength: MUST
        adoption: required
        statement: 公開可能な検証鍵をJWK Setとして配布する。
        relates_to: { interfaces: [GetJwks], models: [JWK, JWKS] }

  RFC7518:
    title: JSON Web Algorithms
    version: RFC 7518
    url: https://www.rfc-editor.org/rfc/rfc7518.html
    roles: [AuthorizationServer]
    scope: JWT署名に用いる暗号アルゴリズム。
    requirements:
      - id: RFC7518-SIGNATURE-ALGORITHMS
        section: "§3"
        strength: MUST
        adoption: required
        statement: JWT署名をPS256またはES256で行い、対称鍵署名をAccess TokenとID Tokenに使用しない。
        relates_to: { models: [SignatureAlgorithm, SigningKey] }

  RFC7519:
    title: JSON Web Token
    version: RFC 7519
    url: https://www.rfc-editor.org/rfc/rfc7519.html
    roles: [AuthorizationServer]
    scope: Access Token、ID Token、client assertionのJWT表現。
    requirements:
      - id: RFC7519-REGISTERED-CLAIMS
        section: "§4.1"
        strength: MUST
        adoption: required
        statement: JWTのissuer、subject、audience、有効期限、発行時刻、一意識別子を用途に応じて検証・発行する。
        relates_to: { models: [AccessTokenClaims, IdTokenClaims, Audience] }

  RFC7523:
    title: JSON Web Token Profile for OAuth 2.0 Client Authentication and Authorization Grants
    version: RFC 7523
    url: https://www.rfc-editor.org/rfc/rfc7523.html
    roles: [AuthorizationServer]
    scope: private_key_jwtによるClient Authentication。
    requirements:
      - id: RFC7523-CLIENT-ASSERTION
        section: "§2.2, §3"
        strength: MAY
        adoption: optional
        statement: client assertionの署名、issuer、subject、audience、有効期限、jtiを検証する。
        relates_to: { models: [TokenEndpointAuthMethod], interfaces: [Token, Introspect, Revoke] }

  RFC7591:
    title: OAuth 2.0 Dynamic Client Registration Protocol
    version: RFC 7591
    url: https://www.rfc-editor.org/rfc/rfc7591.html
    roles: [AuthorizationServer]
    scope: OAuth Client metadataの動的登録。
    requirements:
      - id: RFC7591-REGISTER
        section: "§3"
        strength: MAY
        adoption: optional
        statement: Client metadataを受け取りclient_idと登録結果を返す。
        relates_to: { interfaces: [RegisterClient], models: [ClientRegistrationRequest, OAuth2Client] }
      - id: RFC7591-REDIRECT-URI
        section: "§2"
        strength: MUST
        adoption: required
        statement: Authorization Code Grantを利用するClientにはredirect_uri登録を要求する。
        relates_to: { scenarios: [redirect_uri が無いクライアント登録は拒否される] }

  RFC7636:
    title: Proof Key for Code Exchange by OAuth Public Clients
    version: RFC 7636
    url: https://www.rfc-editor.org/rfc/rfc7636.html
    roles: [AuthorizationServer]
    scope: Authorization Code横取り攻撃への対策。
    requirements:
      - id: RFC7636-VERIFY
        section: "§4.6"
        strength: MUST
        adoption: required
        statement: Token requestのcode_verifierを認可時のcode_challengeと照合する。
        relates_to: { interfaces: [Authorize, Token], invariants: [PkceRoundTrip] }
      - id: RFC7636-S256
        section: "§4.2"
        strength: SHOULD
        adoption: required
        statement: code_challenge_methodはS256だけを許可する。
        relates_to: { models: [CodeChallengeMethod] }
      - id: RFC7636-PLAIN
        section: "§4.2"
        strength: MAY
        adoption: excluded
        statement: plain code challenge methodを許可する。
        reason: 認可コード横取り耐性をS256へ統一する。

  RFC7662:
    title: OAuth 2.0 Token Introspection
    version: RFC 7662
    url: https://www.rfc-editor.org/rfc/rfc7662.html
    roles: [AuthorizationServer]
    scope: Resource Serverによるトークン状態照会。
    requirements:
      - id: RFC7662-INTROSPECT
        section: "§2"
        strength: MUST
        adoption: required
        statement: 認証済みResource Serverへactive状態と許可されたメタデータを返す。
        relates_to: { interfaces: [Introspect], models: [IntrospectionRequest, IntrospectionResponse] }
      - id: RFC7662-INACTIVE
        section: "§2.2"
        strength: MUST
        adoption: required
        statement: 無効なトークンにはactive=falseだけを返す。
        relates_to: { scenarios: [失効済みトークンの introspection は active=false のみ返す] }

  RFC7800:
    title: Proof-of-Possession Key Semantics for JSON Web Tokens
    version: RFC 7800
    url: https://www.rfc-editor.org/rfc/rfc7800.html
    roles: [AuthorizationServer, ResourceServer]
    scope: JWT cnf claimによるproof-of-possession key表現。
    requirements:
      - id: RFC7800-CONFIRMATION
        section: "§3"
        strength: MAY
        adoption: optional
        statement: Sender-constrained tokenの確認鍵情報をcnf claimへ格納する。
        relates_to: { models: [SenderConstraintCnf, AccessTokenClaims] }

  RFC8176:
    title: Authentication Method Reference Values
    version: RFC 8176
    url: https://www.rfc-editor.org/rfc/rfc8176.html
    roles: [OpenIDProvider]
    scope: ID Token等へ記録する認証方法参照値。
    requirements:
      - id: RFC8176-AMR
        section: "§2"
        strength: MAY
        adoption: required
        statement: 実際に成立した認証方法をamr値として記録する。
        relates_to: { models: [AuthenticationContext, IdTokenClaims, AccessTokenClaims] }

  RFC8414:
    title: OAuth 2.0 Authorization Server Metadata
    version: RFC 8414
    url: https://www.rfc-editor.org/rfc/rfc8414.html
    roles: [AuthorizationServer]
    scope: Authorization Server metadataの公開。
    requirements:
      - id: RFC8414-METADATA
        section: "§3"
        strength: MUST
        adoption: required
        statement: issuerと利用可能なエンドポイント・機能をmetadata文書として公開する。
        relates_to: { interfaces: [GetOauthAuthorizationServer], models: [DiscoveryDocument] }

  RFC8628:
    title: OAuth 2.0 Device Authorization Grant
    version: RFC 8628
    url: https://www.rfc-editor.org/rfc/rfc8628.html
    roles: [AuthorizationServer]
    scope: 入力制約のあるデバイス向け認可。
    requirements:
      - id: RFC8628-DEVICE-AUTHORIZATION
        section: "§3.1-3.3"
        strength: MUST
        adoption: optional
        statement: device_code、user_code、verification_uriを発行しResourceOwnerの判断を受け付ける。
        relates_to: { interfaces: [DeviceAuthorization, GetBrowserDeviceContext, SubmitBrowserDevice], states: [DeviceCodeFlow] }
      - id: RFC8628-POLLING
        section: "§3.5"
        strength: MUST
        adoption: required
        statement: authorization_pending、slow_down、expired_tokenのポーリング意味論を守る。
        relates_to: { scenarios: [承認前のデバイス交換は authorization_pending を返す, ポーリング間隔より短い再試行は slow_down を返す, 期限切れの device_code は expired_token を返す] }

  RFC8705:
    title: OAuth 2.0 Mutual-TLS Client Authentication and Certificate-Bound Access Tokens
    version: RFC 8705
    url: https://www.rfc-editor.org/rfc/rfc8705.html
    roles: [AuthorizationServer]
    scope: mTLS Client Authenticationと証明書バインドAccess Token。
    requirements:
      - id: RFC8705-CLIENT-AUTH
        section: "§2"
        strength: MAY
        adoption: optional
        statement: 登録済みSubject DNと検証済みクライアント証明書を照合してClientを認証する。
        relates_to: { interfaces: [Token, Introspect, Revoke] }
      - id: RFC8705-CERT-BOUND
        section: "§3"
        strength: MAY
        adoption: optional
        statement: Access Tokenをクライアント証明書thumbprintへバインドしResource access時に照合する。
        relates_to: { models: [SenderConstraintCnf], interfaces: [UserInfo, PostUserInfo] }

  RFC8707:
    title: Resource Indicators for OAuth 2.0
    version: RFC 8707
    url: https://www.rfc-editor.org/rfc/rfc8707.html
    roles: [AuthorizationServer]
    scope: Access Token audienceの明示と権限最小化。
    requirements:
      - id: RFC8707-AUDIENCE
        section: "§2"
        strength: SHOULD
        adoption: required
        statement: 発行するAccess Tokenへ非空のaudienceを設定し、意図しないResource Serverでの利用を防ぐ。
        relates_to: { invariants: [AllAccessTokensCarryAudience], models: [AccessTokenClaims] }

  RFC9068:
    title: JSON Web Token Profile for OAuth 2.0 Access Tokens
    version: RFC 9068
    url: https://www.rfc-editor.org/rfc/rfc9068.html
    roles: [AuthorizationServer]
    scope: JWT形式Access Tokenのクレームと署名。
    requirements:
      - id: RFC9068-CLAIMS
        section: "§2.2"
        strength: MUST
        adoption: required
        statement: JWT Access Tokenへiss、sub、aud、exp、iat、jti、client_idを含める。
        relates_to: { models: [AccessTokenClaims] }
      - id: RFC9068-ASYMMETRIC-SIGNATURE
        section: "§2.1"
        strength: MUST
        adoption: required
        statement: Access Tokenを非対称アルゴリズムで署名し公開鍵で検証可能にする。
        relates_to: { models: [SignatureAlgorithm, SigningKey], interfaces: [GetJwks] }

  RFC9126:
    title: OAuth 2.0 Pushed Authorization Requests
    version: RFC 9126
    url: https://www.rfc-editor.org/rfc/rfc9126.html
    roles: [AuthorizationServer]
    scope: 認可パラメータの事前送信とrequest_uri参照。
    requirements:
      - id: RFC9126-PAR
        section: "§2"
        strength: MAY
        adoption: optional
        statement: Client認証済みPARを保存し短命なrequest_uriを返す。
        relates_to: { interfaces: [PushAuthorizationRequest, Authorize], models: [PARRecord, ParResponse] }
      - id: RFC9126-SINGLE-USE
        section: "§2.2"
        strength: SHOULD
        adoption: required
        statement: request_uriは短命かつ一度だけ使用可能とする。
        relates_to: { objectives: [ParRequestUriLifetime], states: [PARRecordLifecycle] }

  RFC9207:
    title: OAuth 2.0 Authorization Server Issuer Identification
    version: RFC 9207
    url: https://www.rfc-editor.org/rfc/rfc9207.html
    roles: [AuthorizationServer]
    scope: Authorization responseにおけるmix-up攻撃対策。
    requirements:
      - id: RFC9207-ISS
        section: "§2"
        strength: MUST
        adoption: required
        statement: Authorization responseへissuer識別子を含める。
        relates_to: { interfaces: [Authorize], models: [DiscoveryDocument] }

  RFC9449:
    title: OAuth 2.0 Demonstrating Proof of Possession
    version: RFC 9449
    url: https://www.rfc-editor.org/rfc/rfc9449.html
    roles: [AuthorizationServer, ResourceServer]
    scope: DPoP proofと公開鍵バインドAccess Token。
    requirements:
      - id: RFC9449-PROOF
        section: "§4-7"
        strength: MAY
        adoption: optional
        statement: DPoP proofの署名、htm、htu、iat、jtiを検証する。
        relates_to: { interfaces: [Token, UserInfo, PostUserInfo], invariants: [DpopJtiUniquenessWithinWindow] }
      - id: RFC9449-TOKEN-BINDING
        section: "§6"
        strength: MUST
        adoption: optional
        statement: DPoP利用時はAccess Tokenへjktを含め、提示proofの鍵と照合する。
        relates_to: { models: [SenderConstraintCnf, AccessTokenClaims] }

  RFC9700:
    title: Best Current Practice for OAuth 2.0 Security
    version: RFC 9700 / BCP 240
    url: https://www.rfc-editor.org/rfc/rfc9700.html
    roles: [AuthorizationServer]
    scope: OAuth 2.0の現行セキュリティベストプラクティス。
    requirements:
      - id: RFC9700-REDIRECT-MATCH
        section: "§2.1, §4.1.3"
        strength: MUST
        adoption: required
        statement: redirect_uriは登録値と完全一致させ、未検証URIへリダイレクトしない。
        relates_to: { invariants: [RedirectUriExactMatch], scenarios: [未登録の redirect_uri へはリダイレクトしない] }
      - id: RFC9700-AUTHORIZATION-CODE
        section: "§2.1.1"
        strength: MUST
        adoption: required
        statement: redirect-based flowはAuthorization Code GrantとPKCEで保護する。
        relates_to: { interfaces: [Authorize, Token], invariants: [PkceRoundTrip] }
      - id: RFC9700-SENDER-CONSTRAINT
        section: "§2.2.1"
        strength: SHOULD
        adoption: optional
        statement: 高セキュリティClientではAccess TokenをDPoPまたはmTLSでsender-constrainedにする。
        relates_to: { models: [SenderConstraintKind, SenderConstraintCnf] }
      - id: RFC9700-REFRESH-REPLAY
        section: "§2.2.2, §4.14"
        strength: MUST
        adoption: required
        statement: Refresh Tokenをローテーションし再利用検知時に関連トークンを失効する。
        relates_to: { states: [RefreshTokenLifecycle], invariants: [RefreshFamilyTransitiveRevoke, RefreshRotationParentInvariants] }

  OpenIDConnectCore:
    title: OpenID Connect Core 1.0 incorporating errata set 1
    version: Final
    url: https://openid.net/specs/openid-connect-core-1_0-18.html
    roles: [OpenIDProvider]
    scope: Authorization Code Flow、ID Token、UserInfo、認証セッション。
    requirements:
      - id: OIDC-CORE-CODE-FLOW
        section: "§3.1"
        strength: MUST
        adoption: required
        statement: code response typeによるOpenID Connect Authenticationを提供する。
        relates_to: { interfaces: [Authorize, Token], models: [IdTokenClaims] }
      - id: OIDC-CORE-ID-TOKEN
        section: "§2"
        strength: MUST
        adoption: required
        statement: ID Tokenへiss、sub、aud、exp、iatと認証コンテキストを含める。
        relates_to: { models: [IdTokenClaims, AuthenticationContext] }
      - id: OIDC-CORE-USERINFO
        section: "§5.3"
        strength: SHOULD
        adoption: required
        statement: openid scopeのAccess Tokenに対してsubを含むUserInfoを返す。
        relates_to: { interfaces: [UserInfo, PostUserInfo], models: [UserInfoResponse] }
      - id: OIDC-CORE-HYBRID-IMPLICIT
        section: "§3.2-3.3"
        strength: MAY
        adoption: excluded
        statement: Implicit FlowおよびHybrid Flowを提供する。
        reason: front-channel token発行を避けcode response typeだけを採用する。

  OpenIDConnectDiscovery:
    title: OpenID Connect Discovery 1.0 incorporating errata set 1
    version: Final
    url: https://openid.net/specs/openid-connect-discovery-1_0-21.html
    roles: [OpenIDProvider]
    scope: OpenID Provider metadataの公開。
    requirements:
      - id: OIDC-DISCOVERY-CONFIGURATION
        section: "§4"
        strength: MUST
        adoption: required
        statement: well-known configurationからissuer、endpoints、supported metadataを公開する。
        relates_to: { interfaces: [GetOpenidConfiguration], models: [DiscoveryDocument] }

  OpenIDConnectRPInitiatedLogout:
    title: OpenID Connect RP-Initiated Logout 1.0
    version: Final
    url: https://openid.net/specs/openid-connect-rpinitiated-1_0.html
    roles: [OpenIDProvider]
    scope: RPから開始するEnd-User session終了。
    requirements:
      - id: OIDC-LOGOUT-ENDPOINT
        section: "§2"
        strength: MUST
        adoption: required
        statement: end_session_endpointを公開しRPからのlogout要求を受け付ける。
        relates_to: { interfaces: [EndSession, GetOpenidConfiguration] }
      - id: OIDC-LOGOUT-REDIRECT
        section: "§3"
        strength: MUST
        adoption: required
        statement: post_logout_redirect_uriはClientに登録済みの値だけを許可する。
        relates_to: { scenarios: [RP-Initiated Logout は登録済み post_logout_redirect_uri にだけリダイレクトする, 未登録 post_logout_redirect_uri は拒否される] }

  FAPI2SecurityProfile:
    title: FAPI 2.0 Security Profile
    version: Final
    url: https://openid.net/specs/fapi-security-profile-2_0-final.html
    roles: [AuthorizationServer]
    scope: confidential client向け高セキュリティOAuthプロファイル。
    requirements:
      - id: FAPI2-PROFILE-SELECTION
        section: "§5.3"
        strength: MUST
        adoption: optional
        statement: Fapi2SecurityProfileを選択したClientにだけ本プロファイルの追加制約を適用する。
        relates_to: { models: [FapiProfile, OAuth2Client] }
      - id: FAPI2-PAR-PKCE
        section: "§5.3.2"
        strength: MUST
        adoption: optional
        statement: FAPI ClientはPARとS256 PKCEを使用する。
        relates_to: { interfaces: [PushAuthorizationRequest, Authorize], scenarios: [FAPI クライアントは PAR なしの直接認可リクエストを拒否される] }
      - id: FAPI2-CLIENT-AUTH
        section: "§5.3.2"
        strength: MUST
        adoption: optional
        statement: FAPI Clientはprivate_key_jwtまたはmTLSで認証する。
        relates_to: { models: [TokenEndpointAuthMethod] }
      - id: FAPI2-SENDER-CONSTRAINT
        section: "§5.3.2"
        strength: MUST
        adoption: optional
        statement: FAPI Access TokenをDPoPまたはmTLSでsender-constrainedにする。
        relates_to: { models: [AccessTokenSenderConstraint, SenderConstraintCnf] }

  NISTSP80063B4:
    title: Digital Identity Guidelines — Authentication and Authenticator Management
    version: NIST SP 800-63B-4
    url: https://pages.nist.gov/800-63-4/sp800-63b.html
    roles: [Verifier]
    scope: PasswordとAuthenticatorのライフサイクル・検証要件。
    requirements:
      - id: NIST63B4-PASSWORD-MINIMUM
        section: "§3.1.1.2"
        strength: MUST
        adoption: excluded
        statement: 単一要素認証に使用するPasswordへ15文字以上の最小長を要求する。
        reason: 現行システム要件は12文字であり、NIST SP 800-63B-4への完全準拠は表明しない。
      - id: NIST63B4-NO-COMPOSITION
        section: "§3.1.1.2"
        strength: MUST NOT
        adoption: required
        statement: 文字種混在などPassword composition ruleを課さない。
      - id: NIST63B4-PASSWORD-STORAGE
        section: "§3.1.1.2"
        strength: MUST
        adoption: required
        statement: Passwordをsaltとcost factorを持つoffline attack耐性のあるhashとして保存する。
        relates_to: { models: [User] }

  WebAuthnLevel3:
    title: Web Authentication — An API for accessing Public Key Credentials Level 3
    version: Candidate Recommendation Snapshot
    url: https://www.w3.org/TR/webauthn-3/
    roles: [RelyingParty, UserInterface]
    scope: 公開鍵Credentialを用いたphishing-resistantな認証。
    requirements:
      - id: WEBAUTHN3-AUTHENTICATION
        section: "§5"
        strength: MAY
        adoption: optional
        statement: WebAuthn factor利用時はoriginとRelying Partyにscopeされた公開鍵Credentialを検証する。
        relates_to: { models: [MfaFactor, MfaFactorType, AuthenticationContext] }

  WCAG22:
    title: Web Content Accessibility Guidelines 2.2
    version: W3C Recommendation
    url: https://www.w3.org/TR/WCAG22/
    roles: [UserInterface]
    scope: ブラウザ認証UIのLevel AAアクセシビリティ。
    requirements:
      - id: WCAG22-KEYBOARD
        section: "2.1.1"
        strength: MUST
        adoption: required
        statement: すべての認証操作をキーボードだけで完了可能にする。
      - id: WCAG22-FOCUS
        section: "2.4.7, 2.4.11"
        strength: MUST
        adoption: required
        statement: フォーカスを視認可能にし重要な要素が完全に隠れないようにする。
      - id: WCAG22-LABELS-ERRORS
        section: "3.3.1, 3.3.2"
        strength: MUST
        adoption: required
        statement: 入力にラベルを付け、エラーをテキストで識別して修正方法を示す。
      - id: WCAG22-STATUS
        section: "4.1.3"
        strength: MUST
        adoption: required
        statement: 認証結果や送信エラーをフォーカス移動なしに支援技術へ通知する。

  GDPR:
    title: General Data Protection Regulation
    version: Regulation (EU) 2016/679
    url: https://eur-lex.europa.eu/eli/reg/2016/679/oj
    roles: [DataController]
    scope: 同意、監査、保存期間、削除後の個人データ処理。
    requirements:
      - id: GDPR-CONSENT-WITHDRAWAL
        section: "Article 7(3)"
        strength: MUST
        adoption: required
        statement: ResourceOwnerが同意を撤回でき、撤回後の新規発行へ利用しない。
        relates_to: { models: [Consent], states: [ConsentLifecycle] }
      - id: GDPR-ERASURE
        section: "Article 17"
        strength: MUST
        adoption: required
        statement: 削除要求後は法的保存義務を除くPIIを定義済み期間内に消去する。
        relates_to: { objectives: [PiiPurgeAfterDeletion] }
      - id: GDPR-PROCESSING-RECORDS
        section: "Article 30"
        strength: MUST
        adoption: required
        statement: セキュリティ・認可イベントの監査記録を定義済み期間保持する。
        relates_to: { objectives: [AuditLogRetention] }

# =================================================================
# 1. vocabulary — 用語集
# =================================================================
#
# 本アプリの「ドメイン」は OAuth 2.0 / OIDC の標準仕様。用語集の役割は
# 「標準のどの用語をどう使うか」「標準で並立する語のうちどれを採用するか」
# 「実装側のフィールド名がどの標準語に対応するか」を確定させること。

vocabulary:

  # ---------- アクター (OAuth 2.0 の役割) ----------
  ResourceOwner:
    definition: 保護リソースに対するアクセス権限を付与できる実体。本アプリではエンドユーザー。
    aliases: [resource_owner, リソースオーナー, EndUser]
    not_to_confuse_with:
      - { term: Client, reason: Client はアプリケーション、ResourceOwner は人間。OAuth では明確に区別される。 }
  Client:
    definition: ResourceOwner に代わって保護リソースへのアクセスを要求するアプリケーション。client_id で識別される。
    aliases: [client, クライアント, RelyingParty]
  AuthorizationServer:
    definition: ResourceOwner を認証し Client にトークンを発行するサーバー。本アプリそのもの。OIDC では IdP と同義。
    aliases: [authorization_server, IdP, IdentityProvider]
  ResourceServer:
    definition: AccessToken を提示する Client に対して保護リソースを返すサーバー。本アプリの外部。
    aliases: [resource_server]

  # ---------- クライアントタイプ ----------
  Public:
    definition: client_secret を安全に保持できない Client（SPA, ネイティブアプリ）。PKCE 必須。
    aliases: [public]
  Confidential:
    definition: サーバーサイドで client_secret または private_key を保持できる Client。
    aliases: [confidential]

  # ---------- グラントタイプ ----------
  AuthorizationCode:
    definition: 短命（60秒以下）の一度限り使用される中間トークン。/authorize で発行され /token で交換される。grant_type 値「authorization_code」と同じ文字列を共有する（RFC 6749 §4.1）。
    aliases: [authorization_code, 認可コード]
  RefreshToken:
    definition: AccessToken の再発行に使うトークン。提示のたびにローテーションされる。絶対 TTL 30 日。grant_type 値「refresh_token」と同じ文字列を共有する（RFC 6749 §6）。
    aliases: [refresh_token, リフレッシュトークン]
  ClientCredentials:
    definition: Client 自身が認可主体となる machine-to-machine フロー (RFC 6749 §4.4)。confidential のみ。
    aliases: [client_credentials, M2Mグラント]
  DeviceCode:
    definition: 入力制約のあるデバイス向けのデバイス認可グラント (RFC 8628)。grant_type は URN。
    aliases: ["urn:ietf:params:oauth:grant-type:device_code", device_code, デバイスコード]

  # ---------- トークン ----------
  AccessToken:
    definition: ResourceServer にアクセスする際に提示するトークン。JWT (PS256 / ES256) として発行、TTL 600秒。
    aliases: [access_token, アクセストークン]
    not_to_confuse_with:
      - { term: IdToken, reason: AccessToken は API アクセス用、IdToken は認証情報の表明用。混同してはならない。 }
  IdToken:
    definition: OIDC が定める、ResourceOwner の認証結果を表明する JWT。iss/sub/aud/exp/iat/auth_time/nonce/azp を含む。
    aliases: [id_token, IDトークン]

  # ---------- セキュリティメカニズム ----------
  Pkce:
    definition: Proof Key for Code Exchange (RFC 7636)。code_challenge / code_verifier で認可コード横取り攻撃を防ぐ。本アプリでは例外なく必須。
    aliases: [pkce, PKCE]
    not_to_confuse_with:
      - { term: Dpop, reason: PKCE は認可コード保護、DPoP はトークン保護。攻撃面が異なる。 }
  Dpop:
    definition: Demonstrating Proof of Possession (RFC 9449)。JWK サムプリント (jkt) でトークンを所有鍵にバインドする。
    aliases: [dpop, DPoP]
  Mtls:
    definition: Mutual-TLS Client Authentication (RFC 8705)。TLS クライアント証明書で Client を認証する。
    aliases: [mtls, mTLS, tls_client_auth]
  Par:
    definition: Pushed Authorization Requests (RFC 9126)。/par に認可リクエストを事前 POST し /authorize は request_uri のみで参照する。FAPI 2.0 必須。
    aliases: [par, PAR]
  SenderConstrainedToken:
    definition: 所有証明（DPoP または mTLS）と組み合わさったトークン。所有者以外による再利用を防ぐ。

  # ---------- 標準クレーム / 識別子 ----------
  Issuer:
    definition: トークンを発行した AuthorizationServer の URL 識別子。
    aliases: [iss]
  Subject:
    definition: トークンの主体（通常は ResourceOwner）の仮名化された識別子。削除後も監査ログに残る。
    aliases: [sub]
    not_to_confuse_with:
      - { term: PreferredUsername, reason: sub は仮名化された安定識別子、preferred_username は表示用の文字列。 }
  Audience:
    definition: トークンの想定受信者の識別子。通常は Client の client_id。
    aliases: [aud]
  JwtId:
    definition: JWT 一意識別子。リプレイ防止と監査の追跡に使用。
    aliases: [jti]
  Nonce:
    definition: Client が認可リクエストに含め、ID トークンに含めて返される値。IDトークンのリプレイ防止。
  Scope:
    definition: Client が要求する権限の集合。Client メタデータで宣言された集合の部分集合でなければならない。
  Consent:
    definition: ResourceOwner が Client に対して特定の Scope を付与する意思表示。tenant / subject / client / scopes / granted_at / expires_at を永続化する。管理者は参照と撤回だけが可能で、付与や scope 拡張を代行できない。
    aliases: [consent, 同意]
  AdminConsentManagement:
    definition: Administrator が所属テナント内の Consent を監査目的で参照し、必要時に撤回する管理操作。同意の作成や scope 拡張は含まない。
    aliases: [consent administration, 同意管理]
  PreferredUsername:
    definition: 表示用のユーザー名。可変。
    aliases: [preferred_username]
  Administrator:
    definition: User.roles に admin を持ち、所属テナント内の管理 API を許可された認証済みユーザー (ADR-031 / ADR-032)。テナント境界を越える操作は SystemAdministrator に限定される。
    aliases: [admin, 管理者, TenantAdmin]
    not_to_confuse_with:
      - { term: Client, reason: Administrator は人間の User に付与されるロールであり、OAuth Client の権限ではない。 }
      - { term: SystemAdministrator, reason: Administrator はテナント内に閉じ、SystemAdministrator はテナント境界を越えて tenant lifecycle 操作と cross-tenant 管理を行える。 }
  SystemAdministrator:
    definition: default control-plane tenant に所属し、User.roles に system_admin を持つ認証済みユーザー (ADR-032)。テナント管理 (CRUD・disable・enable) と cross-tenant 操作を許可され、`/realms/default/admin/tenants/*` を呼び出せる。
    aliases: [system_admin, システム管理者]
  UserDisablement:
    definition: User.disabled_at を設定して認証とセッション利用を停止する復活可能な管理操作。削除や PII purge とは異なる。
    aliases: [disable user, アカウント無効化]
  UserDeletion:
    definition: User の tombstone 化と関連 aggregate の cascade 削除 (ADR-036)。`deleted_at` を設定し PII フィールドを匿名化、`sub` のみを audit のため保持する。`Deleted` は終端で復元できない。
    aliases: [delete user, anonymize user, アカウント削除]
    not_to_confuse_with:
      - { term: UserDisablement, reason: Disable は復活可能で PII を残す。Delete は終端で PII を即時 anonymize する。 }
  Deleted:
    definition: User の終端状態 (ADR-036)。`deleted_at != null` で PII が anonymize 済み。login / token / userinfo は active=false 相当。
    aliases: [deleted]
  Delete:
    definition: User を Deleted に遷移させる管理操作 (ADR-036)。tombstone 化と cascade を 1 オペレーションで実施する。
    aliases: [delete]
  Group:
    definition: ADR-038 で導入した tenant-scoped 集約。再利用可能なロール束 (roles[]) を持ち、所属する User にそのロールを一斉付与する。階層・deny ルール・属性自動所属は持たない (union のみ)。
    aliases: [group, グループ, role group, ロールグループ]
    not_to_confuse_with:
      - { term: Tenant, reason: Tenant は認可境界、Group はその境界内のロール束。Group は単独で認証境界を成さない。 }
  GroupMembership:
    definition: User と Group の所属関係 (GroupMember)。membership の追加・削除はそれぞれ監査イベントを伴う。effective_roles(user) = user.roles ∪ ⋃ membership.group.roles。
    aliases: [group membership, グループ所属, membership]
  EffectiveRoles:
    definition: 認可判断で用いる User の有効ロール集合。user.roles と所属 Group の roles の和集合 (ADR-038)。admin RBAC ゲートと /account 自己コンテキストで参照する。
    aliases: [effective roles, 有効ロール]
  Tenant:
    definition: ADR-032 で導入した独立した認可境界。Client / User / Consent / 鍵 / ポリシーがこの境界に閉じる。URL 上は Realm という別名で表現される (ADR-033)。
    aliases: [tenant, テナント, Realm, realm]
    not_to_confuse_with:
      - { term: Client, reason: Tenant は境界、Client は境界内のアプリケーション。Tenant は人間/組織を表し、Client はそのテナント所属のアプリ。 }
  DefaultTenant:
    definition: 起動時に自動作成される `id == "default"` のテナント (ADR-032)。単一テナント運用時の互換と、未 prefix HTTP リクエストの解決先を兼ねる (ADR-033)。
    aliases: [default tenant, デフォルトテナント]
  TenantDisablement:
    definition: Tenant.disabled_at を設定してテナント単位で `/authorize` / `/token` / `/login` 等を停止する復活可能な操作 (ADR-032)。テナント物理削除とは独立。
    aliases: [disable tenant, テナント無効化]

  # ---------- クライアント認証方式 ----------
  ClientSecretBasic:
    definition: HTTP Basic 認証（レガシークライアント向け）。
    aliases: [client_secret_basic]
  ClientSecretPost:
    definition: フォームボディ内のクレデンシャル。
    aliases: [client_secret_post]
  PrivateKeyJwt:
    definition: RFC 7523 — client_assertion による署名済み JWT 認証。confidential 推奨。
    aliases: [private_key_jwt]
  TlsClientAuth:
    definition: RFC 8705 §2 — Mutual-TLS Client Authentication（PKI 結合）。Mtls 機構の一形態を token_endpoint_auth_method の値として表現したもの。
    aliases: [tls_client_auth]
    not_to_confuse_with:
      - { term: Mtls, reason: Mtls は機構（mTLS）の一般名、TlsClientAuth は token_endpoint_auth_method 値として使う具体的な wire 形式。 }
  None:
    definition: クライアント認証なし（public クライアント、PKCE が代替防御）。
    aliases: [none]

  # ---------- 署名アルゴリズム ----------
  PS256:
    definition: RSASSA-PSS using SHA-256 (RFC 7518)。
  ES256:
    definition: ECDSA using P-256 and SHA-256 (RFC 7518)。
  S256:
    definition: PKCE code_challenge_method=S256。code_challenge は BASE64URL-ENCODE(SHA256(code_verifier))。
    aliases: [S256]

  Totp:
    definition: RFC 6238 に基づく time-based one-time password。
    aliases: [totp, otp]
  Webauthn:
    definition: WebAuthn credential による認証。
    aliases: [webauthn]
  Hwk:
    definition: RFC 8176 の hardware-secured key 認証メソッド。
    aliases: [hwk]
  Swk:
    definition: RFC 8176 の software-secured key 認証メソッド。
    aliases: [swk]

  # ---------- レスポンスタイプ ----------
  Code:
    definition: response_type=code。本アプリが対応する唯一のレスポンスタイプ。
    aliases: [code]
  Query:
    definition: authorization response parameters を redirect_uri の query component で返す response_mode。
    aliases: [query]
  FormPost:
    definition: authorization response parameters を自動送信 HTML form で返す response_mode。
    aliases: [form_post]

  # ---------- OAuth エラーコード ----------
  InvalidRequest:
    definition: OAuth error code invalid_request。必須パラメータ欠落、不正値、重複などのリクエスト不備。
    aliases: [invalid_request]
  InvalidClient:
    definition: OAuth error code invalid_client。クライアント認証失敗。
    aliases: [invalid_client]
  InvalidGrant:
    definition: OAuth error code invalid_grant。認可コード、refresh token、device_code などの grant が無効。
    aliases: [invalid_grant]
  UnauthorizedClient:
    definition: OAuth error code unauthorized_client。クライアントが当該 grant_type を使えない。
    aliases: [unauthorized_client]
  UnsupportedGrantType:
    definition: OAuth error code unsupported_grant_type。未対応の grant_type。
    aliases: [unsupported_grant_type]
  InvalidScope:
    definition: OAuth error code invalid_scope。要求 scope が不正、未知、または許可外。
    aliases: [invalid_scope]
  InvalidToken:
    definition: Bearer token error code invalid_token。トークンが無効、期限切れ、改ざん、または失効済み。
    aliases: [invalid_token]
  InvalidDpopProof:
    definition: DPoP error code invalid_dpop_proof。DPoP proof JWT の検証失敗。
    aliases: [invalid_dpop_proof]
  AccessDenied:
    definition: OAuth error code access_denied。ResourceOwner またはポリシーによる拒否。
    aliases: [access_denied]
  ExpiredToken:
    definition: Device Authorization Grant error code expired_token。device_code が期限切れ。
    aliases: [expired_token]
  InsufficientScope:
    definition: Bearer token error code insufficient_scope。提示 token の scope が不足。
    aliases: [insufficient_scope]
  ServerError:
    definition: OAuth error code server_error。AuthorizationServer 側の予期せぬ内部エラー。
    aliases: [server_error]

  # ---------- FAPI プロファイル ----------
  Fapi2SecurityProfile:
    definition: FAPI 2.0 Security Profile。tls_client_auth または private_key_jwt + PAR 必須。
    aliases: [fapi_2_security_profile]

  # ---------- Authorization Code フローの状態 ----------
  Received:
    definition: 認可リクエストを受信した直後の初期状態。
    aliases: [received]
  AuthenticationPending:
    definition: ResourceOwner の認証を待っている状態。
    aliases: [authentication_pending]
  Authenticated:
    definition: ResourceOwner の認証が完了した状態。
    aliases: [authenticated]
  ConsentPending:
    definition: ResourceOwner に Scope への同意を求めている状態。
    aliases: [consent_pending]
  Consented:
    definition: ResourceOwner が要求 Scope に同意した状態。
    aliases: [consented]
  CodeIssued:
    definition: AuthorizationCode を Client に発行した状態。
    aliases: [code_issued]
  Exchanged:
    definition: AuthorizationCode が /token で正常に交換された終端状態。
    aliases: [exchanged]
  Rejected:
    definition: 認可リクエストが拒否された終端状態。
    aliases: [rejected]
  Expired:
    definition: 期限切れにより無効化された終端状態。
    aliases: [expired]

  # ---------- Authorization Code フローのイベント ----------
  Validate:
    definition: 認可リクエストの構文・必須パラメータ・redirect_uri を検証する。検証成功で AuthenticationPending へ遷移し、ログイン UI 提示を含む。
    aliases: [validate]
  AuthenticateUser:
    definition: ResourceOwner の認証を実行する。
    aliases: [authenticate_user]
  RequestConsent:
    definition: ResourceOwner に Scope への同意を求める（同意 UI 表示）。
    aliases: [request_consent]
  GrantConsent:
    definition: ResourceOwner が同意を付与する。
    aliases: [grant_consent]
  IssueCode:
    definition: AuthorizationCode を Client に発行する。
    aliases: [issue_code]
  RedeemCode:
    definition: Client が AuthorizationCode を /token で AccessToken と交換する。
    aliases: [redeem_code]
  Reject:
    definition: 認可リクエストを拒否する。
    aliases: [reject]
  Expire:
    definition: 期限切れにより認可リクエストを無効化する。
    aliases: [expire]

  # ---------- Device Code フローの状態 ----------
  Issued:
    definition: device_code と user_code を発行した初期状態。
    aliases: [issued]
  UserCodeEntered:
    definition: ユーザーが verification_uri で user_code を入力した状態。
    aliases: [user_code_entered]
  AuthorizationPending:
    definition: ユーザー承認待ち状態（device_code フロー）。
    aliases: [authorization_pending]
  Approved:
    definition: ユーザーが承認した状態。
    aliases: [approved]
  Denied:
    definition: ユーザーが拒否した、または user_code 誤り過多で失敗した状態。
    aliases: [denied]

  # ---------- Device Code フローのイベント ----------
  EnterUserCode:
    definition: ユーザーが verification_uri で user_code を入力する。
    aliases: [enter_user_code]
  Approve:
    definition: ユーザーが承認する。
    aliases: [approve]
  Deny:
    definition: ユーザーが拒否する。
    aliases: [deny]
  Exchange:
    definition: デバイスが /token で device_code を交換する。
    aliases: [exchange]
  SlowDown:
    definition: ポーリング間隔を増やすよう指示する。
    aliases: [slow_down]

  # ---------- RefreshToken のライフサイクル状態 ----------
  Active:
    definition: トークンまたは鍵が現在有効で第一線で使われている状態。RefreshToken と SigningKey で共用。
    aliases: [active]
  Rotated:
    definition: 子トークンに引き継がれ親が消費された状態。家族失効の対象になりうる。
    aliases: [rotated]
  Revoked:
    definition: 失効済み。/revoke もしくは家族失効により遷移する。RefreshToken と Consent で共用。
    aliases: [revoked]

  # ---------- RefreshToken のライフサイクルイベント ----------
  Rotate:
    definition: 親 RefreshToken を Rotated とし、新しい子トークンを発行する。
    aliases: [rotate]
  RevokeToken:
    definition: トークンを失効させる（/revoke または家族失効）。
    aliases: [revoke_token]

  # ---------- AuthorizationCodeRecord のライフサイクル状態 ----------
  Redeemed:
    definition: 認可コードが /token で正規に交換された終端状態（AuthorizationCodeRecord）。AuthorizationCodeFlow の Exchanged と並行。
    aliases: [redeemed]

  # ---------- PAR のライフサイクル状態・イベント ----------
  Stored:
    definition: /par で受領済みかつ未参照の request_uri。
    aliases: [stored]
  Used:
    definition: request_uri が一度参照済みの終端状態。再使用不可。
    aliases: [used]
  Use:
    definition: /authorize から request_uri を参照する。一度きり。
    aliases: [use]

  # ---------- Consent のライフサイクル状態・イベント ----------
  Granted:
    definition: 同意が付与された状態（Consent の初期状態）。
    aliases: [granted]
  RevokeConsent:
    definition: ResourceOwner が同意を撤回する（GDPR Art.7(3)）。
    aliases: [revoke_consent]

  # ---------- SigningKey のライフサイクル状態・イベント ----------
  Verifying:
    definition: 署名はしないが、過去発行トークンの検証のため JWKS に残っている状態。
    aliases: [verifying]
  Retired:
    definition: JWKS から除去された状態。新規検証には使われない。
    aliases: [retired]
  Archived:
    definition: 監査用に長期保管されている終端状態。鍵マテリアルは封印。
    aliases: [archived]
  Retire:
    definition: SigningKey を Verifying から Retired に移す。
    aliases: [retire]
  Archive:
    definition: SigningKey を Retired から Archived に移す。
    aliases: [archive]

  # ---------- Tenant のライフサイクル状態・イベント (ADR-032) ----------
  Disabled:
    definition: 復活可能な無効化状態。Tenant と (慣例的に) User の disabled_at 経路で共有される。
    aliases: [disabled]
  Disable:
    definition: 対象を Disabled に遷移させる。Tenant では `/realms/default/admin/tenants/{id}/disable` から発火。
    aliases: [disable]
  Enable:
    definition: Disabled の対象を Active に戻す。Tenant では `/realms/default/admin/tenants/{id}/enable` から発火。
    aliases: [enable]

  # ---------- 用語として使わないもの ----------
  Implicit:
    definition: implicit grant は RFC 9700 §2.1.2 により参照実装から除外する。
    aliases: [__excluded_implicit]
    not_to_confuse_with:
      - { term: AuthorizationCode, reason: 旧 implicit が担っていた SPA 向けトークン発行は authorization_code + nonce + PKCE が代替する。 }
  PasswordGrant:
    definition: Resource Owner Password Credentials grant は RFC 9700 §2.4 により参照実装から除外する。
    aliases: [__excluded_password]


# =================================================================
# 2. models — ドメインモデル
# =================================================================

models:

  # ---------- 列挙 ----------
  ClientType:
    kind: enum
    description: クライアントが client_secret を安全に保持できるかどうかの分類。Public はモバイル/SPA など秘匿不可、Confidential はサーバーサイドで秘密鍵を保持可能。
    values: [Public, Confidential]

  GrantType:
    kind: enum
    description: トークン発行の方式。本アプリがサポートする 4 種を列挙する。各値の意味は vocabulary を参照。
    values: [AuthorizationCode, RefreshToken, ClientCredentials, DeviceCode]

  TokenEndpointAuthMethod:
    kind: enum
    description: /token エンドポイントにおけるクライアント認証方式 (RFC 6749 §2.3 / RFC 7523 / RFC 8705)。None は public client 専用。
    values: [ClientSecretBasic, ClientSecretPost, PrivateKeyJwt, TlsClientAuth, None]

  ResponseType:
    kind: enum
    description: /authorize で要求できる応答種別。本アプリでは Authorization Code フロー専用なので Code のみサポート。
    values: [Code]

  ResponseMode:
    kind: enum
    description: 認可レスポンスのパラメータをクライアントへ返す方式 (OIDC Multiple Response Types §3)。
    values: [Query, FormPost]

  SignatureAlgorithm:
    kind: enum
    description: JWT 署名アルゴリズム。FAPI 2.0 が許容する asymmetric な強度の高いものに限定（HS256 等の対称鍵は除外）。
    values: [PS256, ES256]

  FapiProfile:
    kind: enum
    description: クライアントに適用される FAPI セキュリティプロファイル。None は通常クライアント、Fapi2SecurityProfile は金融グレード API 向け（PAR 必須 / DPoP 必須 等の追加制約）。
    values: [None, Fapi2SecurityProfile]

  TokenType:
    kind: enum
    description: /introspect / /revoke の token_type_hint で指定されるトークン種別。
    values: [AccessToken, RefreshToken]

  SenderConstraintKind:
    kind: enum
    description: トークンを所有者にバインドする方式 (RFC 7800)。Dpop は DPoP 公開鍵サムプリント、Mtls は mTLS クライアント証明書サムプリント。
    values: [Dpop, Mtls]

  AccessTokenSenderConstraint:
    kind: enum
    description: 発行された AccessToken に適用されているセンダー制約。None は Bearer トークン。
    values: [None, Dpop, Mtls]

  CodeChallengeMethod:
    kind: enum
    description: PKCE (RFC 7636) の code_challenge ハッシュ方式。本アプリでは S256 のみ許容（plain は脆弱なため拒否）。
    values: [S256]

  MfaFactorType:
    kind: enum
    description: 第二要素 (MFA) の種別 (RFC 8176 amr 値の本アプリ向けサブセット)。Totp は RFC 6238、Webauthn は WebAuthn Level 3、Hwk / Swk は将来拡張のための予約。
    values: [Totp, Webauthn, Hwk, Swk]

  AuthorizationCodeState:
    kind: enum
    description: AuthorizationCodeFlow 状態機械の取りうる状態列挙。状態機械セクションも参照。
    values: [Received, AuthenticationPending, Authenticated, ConsentPending, Consented, CodeIssued, Exchanged, Rejected, Expired]

  DeviceCodeState:
    kind: enum
    description: DeviceCodeFlow (RFC 8628) 状態機械の取りうる状態列挙。状態機械セクションも参照。
    values: [Issued, UserCodeEntered, Approved, Denied, Exchanged, Expired]

  RefreshTokenState:
    kind: enum
    description: RefreshTokenLifecycle 状態機械の取りうる状態列挙。Rotated は子トークンへ消費済み、Revoked は失効済み、Expired は期限切れ。
    values: [Active, Rotated, Revoked, Expired]

  AuthorizationCodeRecordState:
    kind: enum
    description: AuthorizationCodeRecordLifecycle 状態機械の取りうる状態列挙。AuthorizationCodeFlow とは別軸でコード本体のライフサイクルを表す。
    values: [Issued, Redeemed, Expired]

  ConsentState:
    kind: enum
    description: ConsentLifecycle 状態機械の取りうる状態列挙。GDPR Art.7(3) 撤回権により Granted → Revoked が可能。
    values: [Granted, Revoked, Expired]

  PARRecordState:
    kind: enum
    description: PARRecordLifecycle 状態機械の取りうる状態列挙。Stored から /authorize での参照で Used、期限切れで Expired。
    values: [Stored, Used, Expired]

  SigningKeyState:
    kind: enum
    description: SigningKeyLifecycle 状態機械の取りうる状態列挙。Active が現行署名鍵、Verifying は JWKS に残るが署名はしない、Retired は JWKS から除去済、Archived は監査保管。
    values: [Active, Verifying, Retired, Archived]

  TenantStatus:
    kind: enum
    description: ADR-032 のテナント状態。Active は通常稼働、Disabled はテナント全体のプロトコル受付を停止 (`/authorize` `/token` 等が一律 invalid_request)。
    values: [Active, Disabled]

  OAuthErrorCode:
    kind: enum
    description: OAuth 2.0 / OIDC / DPoP / FAPI / RFC 8628 で規定された標準エラーコード一式。HTTP レスポンスの error フィールド値となる。
    values:
      - InvalidRequest
      - InvalidClient
      - InvalidGrant
      - UnauthorizedClient
      - UnsupportedGrantType
      - InvalidScope
      - InvalidToken
      - ServerError
      - InvalidDpopProof
      - AccessDenied
      - ExpiredToken
      - SlowDown
      - InsufficientScope
      - AuthorizationPending

  # ---------- ユーザー属性拡張の列挙 (wi-19 / ADR-039 / ADR-040) ----------
  UserStatus:
    kind: enum
    description: User の運用状態の唯一の真実 (ADR-039)。状態機械 UserLifecycle (Active / Disabled / Deleted) と一致し、Okta lifecycle_state / Keycloak 相当の Locked / Staged / Suspended を追加する。Active 以外は認証不可、Deleted は終端 (tombstone)。「いつ遷移したか」は監査イベントと status_changed_at が持つ。
    values: [Active, Disabled, Deleted, Locked, Staged, Suspended]

  RequiredAction:
    kind: enum
    description: 次回ログイン時にユーザへ強制するアクション (Keycloak Required Actions / Okta transitioning 相当)。
    values: [UpdatePassword, VerifyEmail, ConfigureTotp, UpdateProfile, TermsAndConditions]

  AttributeType:
    kind: enum
    description: 属性値の sum type discriminator (ADR-040)。OIDC 標準クレームの組み込み属性と tenant 定義 custom 属性の両方で共通。
    values: [String, Number, Boolean, Date, StringArray]

  AttrVisibility:
    kind: enum
    description: 属性の開示範囲 (ADR-040)。ClaimExposed のみ UserInfo / ID Token に出せる。
    values: [Private, SelfReadable, AdminReadable, ClaimExposed]

  # ---------- 永続エンティティ ----------
  Tenant:
    kind: entity
    description: ADR-032 で導入したテナント (realm) 集約。Client / User / Consent / ポリシー / ブランディングはこの境界に閉じる。`default` テナントは起動時に自動作成され、削除・無効化とも不可。
    identity: id
    annotations: { component: Tenancy }
    fields:
      id:                       { type: String, constraints: [non_empty, { max_length: 63 }, { pattern: "^[a-z0-9][a-z0-9-]{0,62}$" }], description: "URL-safe slug。予約語 admin は禁止。" }
      display_name:             { type: String, constraints: [non_empty, { max_length: 200 }], annotations: { pii: true } }
      status:                   { type: TenantStatus, default: Active }
      password_policy_override: { type: PasswordPolicyOverride, optional: true, description: "objectives.PasswordPolicy をこのテナントだけ上書きする値。指定された値のみ上書きされ、それ以外は global default を継承。" }
      created_at:               { type: Timestamp }
      updated_at:               { type: Timestamp, optional: true }
      disabled_at:              { type: Timestamp, optional: true, description: "テナント無効化時刻 (ADR-032)。non-null なら /authorize / /token / /login 等を一律拒否。" }

  PasswordPolicyOverride:
    kind: value_object
    description: |
      テナント固有のパスワードポリシー上書き値 (Phase 4)。Phase 0 で固定値とした
      objectives.PasswordPolicy をテナント解決ポートで差し替えるためのスキーマ。
      省略フィールドは global default を継承し、change_password / reset_password の
      評価経路ではテナント値が global より厳しい方向にのみ働く想定。
    annotations: { component: Tenancy }
    fields:
      min_length:    { type: Integer, optional: true, description: "下限長 (≥ global default を推奨)" }
      max_length:    { type: Integer, optional: true, description: "上限長" }
      history_depth: { type: Integer, optional: true, description: "履歴照合件数 (PasswordHistoryNoReuse)" }

  OAuth2Client:
    kind: entity
    description: RFC 7591 + FAPI 2.0 拡張のクライアント。
    identity: [tenant_id, client_id]
    fields:
      tenant_id:                              { type: String, default: "default", description: "所属テナント ID (ADR-032 / ADR-034)。客は (tenant_id, client_id) で一意。" }
      client_id:                              { type: String, constraints: [non_empty, { max_length: 128 }] }
      client_secret_hash:                     { type: String, optional: true, annotations: { sensitive: true } }
      client_name:                            { type: String, optional: true, constraints: [{ max_length: 200 }] }
      client_type:                            { type: ClientType }
      redirect_uris:                          { type: "Uri[]", constraints: [non_empty] }
      grant_types:                            { type: "GrantType[]", constraints: [non_empty] }
      response_types:                         { type: "ResponseType[]" }
      token_endpoint_auth_method:             { type: TokenEndpointAuthMethod }
      scope:                                  { type: String }
      jwks_uri:                               { type: Uri, optional: true }
      jwks:                                   { type: JSON, optional: true }
      tls_client_auth_subject_dn:             { type: String, optional: true }
      id_token_signed_response_alg:           { type: SignatureAlgorithm, default: PS256 }
      require_pushed_authorization_requests:  { type: Boolean, default: false }
      require_pkce:                           { type: Boolean, optional: true }
      dpop_bound_access_tokens:               { type: Boolean, default: false }
      fapi_profile:                           { type: FapiProfile, default: None }
      created_at:                             { type: Timestamp }

  User:
    kind: entity
    description: |
      IdP の最小コア (ADR-039)。識別・認証・表示名・RBAC・ライフサイクルだけを
      型付きで持つ。それ以外のプロフィール属性 (OIDC §5.1 optional claim / 組織属性 /
      tenant 定義 custom) は attributes に sparse に格納し、テナントが実際に使う属性
      だけが領域を消費する。
    identity: sub
    fields:
      sub:                  { type: String, constraints: [non_empty], description: "global 一意の subject (ADR-034)。tenant 跨ぎでも衝突しない。" }
      tenant_id:            { type: String, default: "default", description: "所属テナント ID (ADR-032)。preferred_username の一意性スコープを決める。" }
      preferred_username:   { type: String, constraints: [non_empty, { max_length: 100 }], annotations: { pii: true } }
      password_hash:        { type: String, annotations: { sensitive: true } }
      name:                 { type: String, optional: true, annotations: { pii: true } }
      given_name:           { type: String, optional: true, annotations: { pii: true } }
      family_name:          { type: String, optional: true, annotations: { pii: true } }
      email:                { type: String, optional: true, constraints: [{ format: email }], annotations: { pii: true } }
      email_verified:       { type: Boolean, default: false }
      mfa_enrolled:         { type: Boolean, default: false }
      roles:                { type: "String[]", default: [], description: "RBAC ロール名の集合 (重複なし)。ADR-031。値 admin を持つ user だけが /admin/* を呼べる。空配列は通常ユーザ。" }
      lifecycle:            { type: UserLifecycle, description: "運用ライフサイクル (status / 各時刻 / required_actions)。status が無効化・削除の唯一の真実。" }
      attributes:           { type: "Map<String,AttributeValue>", optional: true, description: "OIDC optional claim / 組織属性 / custom を統合した sparse 属性。BuiltinUserAttributeDefs + TenantUserAttributeSchema に対して検証する。" }
      created_at:           { type: Timestamp }
      updated_at:           { type: Timestamp, optional: true }

  UserLifecycle:
    kind: value_object
    description: |
      User の運用ライフサイクル属性 (ADR-039)。status は状態機械 UserLifecycle
      (states セクション) と一致する唯一の真実で、旧 disabled_at / deleted_at は
      status + status_changed_at に統合した。tombstone は status == Deleted。
    fields:
      status:              { type: UserStatus, default: Active }
      status_changed_at:   { type: Timestamp, optional: true, description: "現在の status になった時刻。詳細な遷移履歴は監査イベントが持つ。" }
      last_login_at:       { type: Timestamp, optional: true }
      password_changed_at: { type: Timestamp, optional: true }
      required_actions:    { type: "RequiredAction[]", optional: true }

  AttributeValue:
    kind: value_object
    description: 属性 1 件の値 (sum type)。type が示すフィールドだけが設定される。OIDC 組み込み属性と tenant 定義 custom で共通 (ADR-040)。
    fields:
      type:         { type: AttributeType }
      string:       { type: String, optional: true, annotations: { pii: true } }
      number:       { type: Float, optional: true }
      boolean:      { type: Boolean, optional: true }
      date:         { type: String, optional: true }
      string_array: { type: "String[]", optional: true, annotations: { pii: true } }

  UserAttributeDef:
    kind: value_object
    description: 属性 1 件の定義 (ADR-040)。OIDC 組み込みカタログ (BuiltinUserAttributeDefs) と tenant 定義 (TenantUserAttributeSchema) の両方で使う。key は snake_case、英字始まり。
    fields:
      key:              { type: String, constraints: [non_empty, { pattern: "^[a-z][a-z0-9_]{0,62}$" }] }
      label:            { type: String, optional: true, constraints: [{ max_length: 100 }], description: "利用者向けの日本語表示名。未設定なら UI は key を表示する。" }
      type:             { type: AttributeType }
      multi_valued:     { type: Boolean, default: false, description: "type == StringArray のときのみ true。" }
      required:         { type: Boolean, default: false }
      editable_by_user: { type: Boolean, default: false, description: "self-service 経路で end-user が編集できるか。" }
      claim_name:       { type: String, optional: true, description: "露出時に UserInfo / ID Token に出す OIDC claim 名。" }
      oidc_scope:       { type: String, optional: true, description: "露出を解禁する OIDC scope (profile / phone / address 等)。" }
      visibility:       { type: AttrVisibility, default: Private }
      pii:              { type: Boolean, default: true, description: "省略時は PII 扱い (監査 hash 化) が安全側 default。" }

  TenantUserAttributeSchema:
    kind: entity
    description: tenant 単位の custom 属性定義集合 (ADR-040)。組み込み属性はコード (BuiltinUserAttributeDefs) が持ち、本集合は tenant 固有分のみ。tenant aggregate には埋め込まず独立 aggregate として持ち、tenant 削除時に cascade する。
    identity: tenant_id
    annotations: { component: Tenancy }
    fields:
      tenant_id:  { type: String, default: "default", description: "所属テナント ID (ADR-034)。" }
      attributes: { type: "UserAttributeDef[]", description: "key が一意で組み込み属性と衝突しない定義の並び。" }
      updated_at: { type: Timestamp }

  MfaFactor:
    kind: entity
    description: ユーザーが登録した第二要素 (MFA) 1 件。Totp の場合 secret は base32 で保存し、認証時に RFC 6238 (T0=0, STEP=30s, 6-digit) で評価する。User.mfa_enrolled の真値はこの集合の非空性と同義。
    identity: [sub, type]
    fields:
      sub:        { type: String, description: 所有者ユーザの sub。 }
      type:       { type: MfaFactorType }
      secret:     { type: String, optional: true, description: Totp の場合は base32 シークレット。他要素は credential JSON 等を別フィールド化する余地として残す。, annotations: { sensitive: true } }
      label:      { type: String, optional: true, description: ユーザが付ける表示名 (例 "iPhone Authenticator")。 }
      created_at: { type: Timestamp }
      last_used_at: { type: Timestamp, optional: true }

  LoginSession:
    kind: entity
    description: ブラウザログインセッション。Cookie には不透明な session id のみを置き、sub と auth_time はサーバー側ストアに保持する。amr / acr もここに残し、後続の /authorize で step-up 判定に使う。authentication_pending=true は追加 factor 検証を待っている中間状態で、/authorize 完了経路はそのセッションを未認証扱いとし対応する factor challenge に誘導する。
    identity: id
    annotations: { component: Authentication }
    fields:
      id:                      { type: UUID }
      sub:                     { type: String }
      auth_time:               { type: Integer }
      amr:                     { type: "String[]", description: 認証成立時の RFC 8176 メソッド列。 }
      acr:                     { type: String, description: AuthenticationContextPolicy から導出した URN。 }
      authentication_pending:  { type: Boolean, default: false, description: 追加 factor 検証を待っている中間状態か。完了で false。 }
      expires_at:              { type: Timestamp }

  AuthenticationContext:
    kind: value_object
    description: Authentication component が OAuth2/OIDC component に渡す認証結果。OAuth2/OIDC は password、UserRepository、session cookie の詳細を参照しない。
    fields:
      sub:         { type: String }
      auth_time:   { type: Integer }
      amr:         { type: "String[]" }
      acr:         { type: String, optional: true }
      session_id:  { type: String, optional: true }

  Consent:
    kind: entity
    description: GDPR 同意取得記録。状態は ConsentLifecycle 状態機械に従う。
    identity: [tenant_id, sub, client_id]
    fields:
      tenant_id:    { type: String, default: "default", description: "所属テナント ID (ADR-034)。" }
      sub:          { type: String }
      client_id:    { type: String }
      scopes:       { type: "String[]", constraints: [non_empty, unique] }
      state:        { type: ConsentState }
      granted_at:   { type: Timestamp }
      expires_at:   { type: Timestamp, description: 通常 granted_at + 365 日 }
      revoked_at:   { type: Timestamp, optional: true, description: state == Revoked になった時刻（監査）。 }

  RefreshTokenRecord:
    kind: entity
    description: リフレッシュトークンのストアレコード。プレーン値は保存しない。状態は RefreshTokenLifecycle 状態機械に従う。
    identity: id
    fields:
      id:                   { type: UUID }
      tenant_id:            { type: String, default: "default", description: "所属テナント ID (ADR-034)。/token のリプレイ検出を join なしで効かせるため明示する。" }
      hash:                 { type: String, description: SHA-256 ハッシュ。, annotations: { sensitive: true } }
      family_id:            { type: UUID, description: 認可コード交換から派生したすべてのトークンが共有する識別子。 }
      parent_id:            { type: UUID, optional: true }
      client_id:            { type: String }
      sub:                  { type: String }
      scopes:               { type: "String[]" }
      state:                { type: RefreshTokenState }
      issued_at:            { type: Timestamp }
      expires_at:           { type: Timestamp }
      absolute_expires_at:  { type: Timestamp, description: ローテーションされても延長されない絶対期限。 }
      sender_constraint:    { type: RefreshTokenSenderConstraint, optional: true }

  AuthorizationRequest:
    kind: entity
    description: フロー追跡用のサーバー内部中間ステート。
    identity: id
    annotations: { component: OAuth2 }
    fields:
      id:                       { type: UUID }
      tenant_id:                { type: String, default: "default", description: "所属テナント ID (ADR-034)。" }
      state:                    { type: AuthorizationCodeState }
      client_id:                { type: String }
      redirect_uri:             { type: Uri }
      response_type:            { type: ResponseType }
      scope:                    { type: String }
      state_param:              { type: String, optional: true }
      nonce:                    { type: String, optional: true }
      code_challenge:           { type: String }
      code_challenge_method:    { type: CodeChallengeMethod }
      prompt:                   { type: String, optional: true }
      max_age:                  { type: Integer, optional: true, constraints: [{ min: 0 }] }
      par_request_uri:          { type: String, optional: true }
      sub:                      { type: String, optional: true }
      auth_time:                { type: Integer, optional: true }
      amr:                      { type: "String[]", optional: true, description: 認証成功時のメソッド列。advance(authenticate_user) で AuthenticationContext から伝搬。 }
      acr:                      { type: String, optional: true, description: amr から AuthenticationContextPolicy に従って導出した URN。 }
      acr_values:               { type: String, optional: true, description: クライアントが /authorize に与えた acr_values パラメータ (RFC 8176)。step-up 判定に使う。 }
      created_at:               { type: Timestamp }
      expires_at:               { type: Timestamp }

  AuthorizationCodeRecord:
    kind: entity
    description: 発行済み認可コードの永続レコード。code 本体は短命。状態は AuthorizationCodeRecordLifecycle に従う（AuthorizationCodeFlow とは別軸でコード自体のライフサイクルを表す）。
    identity: code
    fields:
      code:                       { type: String, annotations: { sensitive: true } }
      tenant_id:                  { type: String, default: "default", description: "所属テナント ID (ADR-034)。" }
      authorization_request_id:   { type: UUID }
      client_id:                  { type: String }
      sub:                        { type: String }
      scopes:                     { type: "String[]" }
      redirect_uri:               { type: Uri }
      code_challenge:             { type: String }
      code_challenge_method:      { type: CodeChallengeMethod }
      nonce:                      { type: String, optional: true }
      auth_time:                  { type: Integer }
      amr:                        { type: "String[]", optional: true, description: 認可リクエストから引き継いだ認証メソッド列。id_token / access_token に emit する。 }
      acr:                        { type: String, optional: true, description: 認可リクエストから引き継いだ ACR URN。id_token / access_token に emit する。 }
      state:                      { type: AuthorizationCodeRecordState }
      issued_at:                  { type: Timestamp }
      expires_at:                 { type: Timestamp }
      redeemed_at:                { type: Timestamp, optional: true, description: state == Redeemed になった時刻（監査）。 }
      issued_family_id:           { type: UUID, optional: true, description: 成功交換で発行された refresh family（不正リプレイ検知時のファミリー失効に使う） }

  PARRecord:
    kind: entity
    description: Pushed Authorization Request の格納レコード。状態は PARRecordLifecycle に従う。
    identity: request_uri
    fields:
      request_uri:    { type: String }
      tenant_id:      { type: String, default: "default", description: "所属テナント ID (ADR-034)。" }
      client_id:      { type: String }
      parameters:     { type: "Map<String, String>" }
      state:          { type: PARRecordState }
      issued_at:      { type: Timestamp }
      expires_at:     { type: Timestamp }

  DeviceAuthorization:
    kind: entity
    description: RFC 8628 デバイス認可レコード。device_code はハッシュのみで保存する。
    identity: device_code_hash
    fields:
      device_code_hash:     { type: String, annotations: { sensitive: true } }
      tenant_id:            { type: String, default: "default", description: "所属テナント ID (ADR-034)。" }
      user_code:            { type: String, description: 紛らわしい文字を避けた短いコード。 }
      client_id:            { type: String }
      scopes:               { type: "String[]" }
      state:                { type: DeviceCodeState }
      sub:                  { type: String, optional: true }
      auth_time:            { type: Integer, optional: true }
      interval_seconds:     { type: Integer, constraints: [{ min: 1 }] }
      last_polled_at:       { type: Timestamp, optional: true }
      issued_family_id:     { type: UUID, optional: true }
      issued_at:            { type: Timestamp }
      expires_at:           { type: Timestamp }

  SigningKey:
    kind: entity
    description: トークン署名用の非対称鍵。Active 1本＋Verifying 過去鍵 0本以上を JWKS に並べる（ADR-009 / SigningKeyMinJwksOverlap）。
    identity: kid
    fields:
      kid:            { type: String, constraints: [non_empty] }
      alg:            { type: SignatureAlgorithm }
      public_jwk:     { type: JWK }
      state:          { type: SigningKeyState }
      created_at:     { type: Timestamp }
      activated_at:   { type: Timestamp, optional: true, description: 一度 Active となった時刻。 }
      retired_at:     { type: Timestamp, optional: true, description: Retired 状態に遷移した時刻。 }
      archived_at:    { type: Timestamp, optional: true }

  # ---------- 値オブジェクト ----------
  SenderConstraintCnf:
    kind: value_object
    description: Sender-Constrained 証明 (RFC 7800)。
    fields:
      jkt:        { type: String, optional: true, description: DPoP 鍵の SHA-256 サムプリント (RFC 9449 §6.1)。 }
      x5t_s256:   { type: String, optional: true, description: "mTLS クライアント証明書のサムプリント (x5t#S256, RFC 8705)。" }

  RefreshTokenSenderConstraint:
    kind: value_object
    description: RefreshToken に紐づくセンダー制約。発行時のバインド先（DPoP 鍵サムプリントまたは mTLS 証明書サムプリント）を保持する。
    fields:
      type:       { type: SenderConstraintKind }
      jkt:        { type: String, optional: true }
      x5t_s256:   { type: String, optional: true }

  AccessTokenClaims:
    kind: value_object
    description: JWT Access Token クレーム (RFC 9068)。TTL 600 秒。
    fields:
      iss:        { type: Uri }
      sub:        { type: String, description: client_credentials 時は client_id と一致。 }
      aud:        { type: Audience }
      client_id:  { type: String }
      scope:      { type: String, description: スペース区切りスコープ列。 }
      exp:        { type: Integer, description: Unix epoch seconds }
      iat:        { type: Integer }
      nbf:        { type: Integer, optional: true }
      jti:        { type: String }
      auth_time:  { type: Integer, optional: true }
      acr:        { type: String, optional: true }
      amr:        { type: "String[]", optional: true }
      cnf:        { type: SenderConstraintCnf, optional: true }

  IdTokenClaims:
    kind: value_object
    description: OIDC ID Token クレーム。TTL 3600 秒。
    fields:
      iss:                  { type: Uri }
      sub:                  { type: String }
      aud:                  { type: Audience }
      exp:                  { type: Integer }
      iat:                  { type: Integer }
      auth_time:            { type: Integer }
      nonce:                { type: String, optional: true }
      acr:                  { type: String, optional: true }
      amr:                  { type: "String[]", optional: true }
      azp:                  { type: String, optional: true }
      at_hash:              { type: String, optional: true }
      c_hash:               { type: String, optional: true }
      name:                 { type: String, optional: true, annotations: { pii: true } }
      preferred_username:   { type: String, optional: true, annotations: { pii: true } }
      email:                { type: String, optional: true, constraints: [{ format: email }], annotations: { pii: true } }
      email_verified:       { type: Boolean, optional: true }

  Audience:
    kind: value_object
    description: 文字列または1つ以上の文字列の配列（JWT RFC 7519 §4.1.3）。
    fields:
      one_or_many: { type: JSON, description: JSON string または1つ以上の JSON string の配列。 }

  Uri:
    kind: value_object
    description: URI 形式の文字列。
    fields:
      value: { type: String, constraints: [{ format: uri }] }

  JWK:
    kind: value_object
    description: JSON Web Key (RFC 7517)。kid で識別される 1 件の公開鍵情報。
    fields:
      kty:  { type: String }
      use:  { type: String, optional: true }
      kid:  { type: String }
      alg:  { type: String, optional: true }
      extra: { type: JSON, optional: true }

  JWKS:
    kind: value_object
    description: JWK Set (RFC 7517 §5)。/jwks エンドポイントが返す公開鍵集合。クライアントがトークン署名を検証する際に取得する。
    fields:
      keys: { type: "JWK[]" }

  DiscoveryDocument:
    kind: value_object
    description: RFC 8414 / OIDC Discovery 1.0 メタデータ。
    fields:
      issuer:                                        { type: Uri }
      authorization_endpoint:                        { type: Uri }
      token_endpoint:                                { type: Uri }
      userinfo_endpoint:                             { type: Uri }
      jwks_uri:                                      { type: Uri }
      introspection_endpoint:                        { type: Uri }
      revocation_endpoint:                           { type: Uri }
      pushed_authorization_request_endpoint:         { type: Uri }
      device_authorization_endpoint:                 { type: Uri }
      registration_endpoint:                         { type: Uri }
      end_session_endpoint:                          { type: Uri, optional: true }
      scopes_supported:                              { type: "String[]", default: [openid, profile, email, phone, address, custom_attribute, offline_access] }
      response_types_supported:                      { type: "ResponseType[]" }
      response_modes_supported:                      { type: "ResponseMode[]", optional: true }
      grant_types_supported:                         { type: "GrantType[]" }
      token_endpoint_auth_methods_supported:         { type: "TokenEndpointAuthMethod[]" }
      introspection_endpoint_auth_methods_supported: { type: "TokenEndpointAuthMethod[]", default: [ClientSecretBasic, PrivateKeyJwt, TlsClientAuth] }
      revocation_endpoint_auth_methods_supported:    { type: "TokenEndpointAuthMethod[]", default: [ClientSecretBasic, PrivateKeyJwt, TlsClientAuth] }
      id_token_signing_alg_values_supported:         { type: "SignatureAlgorithm[]" }
      code_challenge_methods_supported:              { type: "CodeChallengeMethod[]" }
      require_pushed_authorization_requests:         { type: Boolean }
      require_pkce:                                  { type: Boolean }
      authorization_response_iss_parameter_supported: { type: Boolean, optional: true }
      dpop_signing_alg_values_supported:             { type: "SignatureAlgorithm[]", optional: true }
      tls_client_certificate_bound_access_tokens:    { type: Boolean, optional: true }
      subject_types_supported:                       { type: "String[]", default: [public] }
      claims_supported:                              { type: "String[]", optional: true, default: [sub, iss, aud, exp, iat, auth_time, nonce, acr, amr, azp, name, given_name, family_name, preferred_username, email, email_verified, updated_at] }
      acr_values_supported:                          { type: "String[]", optional: true, default: ["urn:ra-idp:acr:pwd", "urn:ra-idp:acr:mfa"] }
      ui_locales_supported:                          { type: "String[]", optional: true, default: [en, ja] }

  # ---------- リクエスト/レスポンス値オブジェクト ----------
  ClientRegistrationRequest:
    kind: value_object
    description: /register への動的クライアント登録リクエスト本体 (RFC 7591)。登録後の OAuth2Client は本リクエストの内容から派生する。
    fields:
      redirect_uris:                  { type: "Uri[]", constraints: [non_empty] }
      client_name:                    { type: String, optional: true }
      client_type:                    { type: ClientType, optional: true }
      grant_types:                    { type: "GrantType[]", constraints: [non_empty] }
      response_types:                 { type: "ResponseType[]", optional: true }
      token_endpoint_auth_method:     { type: TokenEndpointAuthMethod, optional: true }
      scope:                          { type: String, optional: true }
      jwks_uri:                       { type: Uri, optional: true }
      jwks:                           { type: JSON, optional: true }
      tls_client_auth_subject_dn:     { type: String, optional: true }
      id_token_signed_response_alg:   { type: SignatureAlgorithm, optional: true }
      fapi_profile:                   { type: FapiProfile, optional: true }
      require_pkce:                   { type: Boolean, optional: true }
      require_pushed_authorization_requests: { type: Boolean, optional: true }
      dpop_bound_access_tokens:       { type: Boolean, optional: true }

  PasswordPolicyDefaults:
    kind: value_object
    description: |
      objectives.PasswordPolicy の現行値。テナント設定 UI が「テナント上書きが
      無いときに実際に適用される値」をユーザに具体数字で示せるよう、API レスポンスに
      埋め込む。同時に override がこの値より弱い場合の reject 閾値でもある。
    annotations: { component: Tenancy }
    fields:
      min_length:    { type: Integer, description: "objectives.PasswordPolicy.min_length。" }
      max_length:    { type: Integer, description: "objectives.PasswordPolicy.max_length。" }
      history_depth: { type: Integer, description: "objectives.PasswordPolicy.history_depth。" }

  AdminSettingsResponse:
    kind: value_object
    description: |
      `/api/admin/settings` の返り値。テナント本体ではなく管理 UI 向けの projection で、
      tenant_id / display_name / password_policy_override に加え、UI 表示と weaker
      policy gating に使う objectives 標準値を併せて返す。
    annotations: { component: Tenancy }
    fields:
      tenant_id:                { type: String }
      display_name:             { type: String, annotations: { pii: true } }
      password_policy_override: { type: PasswordPolicyOverride, optional: true }
      password_policy_defaults: { type: PasswordPolicyDefaults }

  TenantUserAttributeSchemaResponse:
    kind: value_object
    description: |
      `/api/admin/tenant/user_attribute_schema` の返り値。tenant 固有の custom 属性定義
      (attributes) に加え、参照用にコードが持つ組み込みカタログ (builtin) を併せて返し、
      UI が key 衝突を避けつつ全属性を一覧できるようにする (ADR-040)。
    annotations: { component: Tenancy }
    fields:
      tenant_id:  { type: String }
      attributes: { type: "UserAttributeDef[]", description: "tenant が編集可能な custom 定義。" }
      builtin:    { type: "UserAttributeDef[]", description: "コード提供の読み取り専用カタログ (BuiltinUserAttributeDefs)。" }
      updated_at: { type: Timestamp }

  TenantUserAttributeSchemaUpdateRequest:
    kind: value_object
    description: tenant の custom 属性定義を全置換する JSON リクエスト (ADR-040)。組み込み属性との key 衝突・重複 key は use case 側で拒否する。
    annotations: { component: Tenancy }
    fields:
      attributes: { type: "UserAttributeDef[]", description: "新しい custom 定義一覧。空配列で全削除。" }

  TenantCreateRequest:
    kind: value_object
    description: 管理者が新規テナントを登録する JSON リクエスト (ADR-032)。`id` は URL-safe slug。
    annotations: { component: Tenancy }
    fields:
      id:           { type: String, constraints: [non_empty, { max_length: 63 }, { pattern: "^[a-z0-9][a-z0-9-]{0,62}$" }] }
      display_name: { type: String, constraints: [non_empty, { max_length: 200 }], annotations: { pii: true } }

  TenantUpdateRequest:
    kind: value_object
    description: 管理者がテナントの表示名 / パスワードポリシー上書きを更新する JSON リクエスト (ADR-032)。`id` と status は変更しない。status 変更は disable/enable 専用 endpoint を経由。
    annotations: { component: Tenancy }
    fields:
      display_name:             { type: String, optional: true, constraints: [non_empty, { max_length: 200 }], annotations: { pii: true } }
      password_policy_override: { type: PasswordPolicyOverride, optional: true, description: "省略時は既存値を維持。null を渡したい場合は明示する。" }

  TenantSummaryResponse:
    kind: value_object
    description: テナント表現。管理 UI の一覧と詳細で同じ表現を返す (ADR-032)。
    annotations: { component: Tenancy }
    fields:
      id:                       { type: String }
      display_name:             { type: String, annotations: { pii: true } }
      status:                   { type: TenantStatus }
      password_policy_override: { type: PasswordPolicyOverride, optional: true }
      created_at:               { type: Timestamp }
      updated_at:               { type: Timestamp, optional: true }
      disabled_at:              { type: Timestamp, optional: true }

  TenantListResponse:
    kind: value_object
    description: 管理 API のテナント一覧 (ADR-032)。
    annotations: { component: Tenancy }
    fields:
      tenants: { type: "TenantSummaryResponse[]" }

  AdminUserCreateRequest:
    kind: value_object
    description: 管理者がユーザーを作成する JSON リクエスト。初期パスワードには PasswordPolicy objective を適用する。
    annotations: { component: Administration }
    fields:
      preferred_username: { type: String, constraints: [non_empty, { max_length: 100 }], annotations: { pii: true } }
      password:           { type: String, annotations: { sensitive: true } }
      name:               { type: String, optional: true, annotations: { pii: true } }
      email:              { type: String, optional: true, constraints: [{ format: email }], annotations: { pii: true } }
      email_verified:     { type: Boolean, default: false }
      roles:              { type: "String[]", default: [] }

  AdminUserUpdateRequest:
    kind: value_object
    description: 管理者がユーザーの可変プロフィールとロールを更新する JSON リクエスト。sub と password_hash は変更しない。
    annotations: { component: Administration }
    fields:
      preferred_username: { type: String, optional: true, constraints: [non_empty, { max_length: 100 }], annotations: { pii: true } }
      name:               { type: String, optional: true, annotations: { pii: true } }
      email:              { type: String, optional: true, constraints: [{ format: email }], annotations: { pii: true } }
      email_verified:     { type: Boolean, optional: true }
      roles:              { type: "String[]", optional: true }

  AdminUserListResponse:
    kind: value_object
    description: 管理 API のユーザー一覧。
    annotations: { component: Administration }
    fields:
      users: { type: "AdminUserResponse[]" }

  AdminUserResponse:
    kind: value_object
    description: 管理 API が返すユーザー表現。password_hash は契約上含めない。
    annotations: { component: Administration }
    fields:
      sub:                { type: String }
      tenant_id:          { type: String, description: "所属テナント ID (ADR-032)。" }
      preferred_username: { type: String, annotations: { pii: true } }
      name:               { type: String, optional: true, annotations: { pii: true } }
      email:              { type: String, optional: true, constraints: [{ format: email }], annotations: { pii: true } }
      email_verified:     { type: Boolean }
      mfa_enrolled:       { type: Boolean }
      roles:              { type: "String[]" }
      required_actions:   { type: "RequiredAction[]", optional: true, description: "次回ログイン時の強制アクション (wi-19)。" }
      last_login_at:      { type: Timestamp, optional: true, description: "直近の認証完了時刻 (wi-19)。" }
      password_changed_at: { type: Timestamp, optional: true, description: "直近のパスワード変更時刻 (wi-19)。" }
      disabled_at:        { type: Timestamp, optional: true }
      created_at:         { type: Timestamp }
      updated_at:         { type: Timestamp, optional: true }

  AdminRequiredActionRequest:
    kind: value_object
    description: SetUserRequiredAction の JSON リクエスト (wi-19)。action は RequiredAction enum の wire 値。
    annotations: { component: Administration }
    fields:
      action: { type: RequiredAction }

  AccountProfileResponse:
    kind: value_object
    description: |
      `/api/account/profile` の返り値 (self-service)。呼び出しユーザ自身の表示用
      projection。attributes は self が読める分 (self_readable / claim_exposed) のみ、
      editable_attributes は editable_by_user=true の定義一覧で、UI のフォーム描画に使う
      (ADR-040 / wi-19)。
    annotations: { component: Authentication }
    fields:
      sub:                 { type: String }
      preferred_username:  { type: String, annotations: { pii: true } }
      name:                { type: String, optional: true, annotations: { pii: true } }
      given_name:          { type: String, optional: true, annotations: { pii: true } }
      family_name:         { type: String, optional: true, annotations: { pii: true } }
      email:               { type: String, optional: true, constraints: [{ format: email }], annotations: { pii: true } }
      email_verified:      { type: Boolean }
      mfa_enrolled:        { type: Boolean }
      status:              { type: UserStatus }
      attributes:          { type: "Map<String,AttributeValue>" }
      editable_attributes: { type: "UserAttributeDef[]" }

  AccountProfileUpdateRequest:
    kind: value_object
    description: |
      self-service プロフィール更新リクエスト。表示名と editable_by_user=true の属性
      のみを受け付ける。attributes は key 単位の merge (指定 key のみ upsert、未指定は
      現状維持) で、admin 管理属性 (status / roles / organization) は対象外 (ADR-040)。
    annotations: { component: Authentication }
    fields:
      name:        { type: String, optional: true, annotations: { pii: true } }
      given_name:  { type: String, optional: true, annotations: { pii: true } }
      family_name: { type: String, optional: true, annotations: { pii: true } }
      attributes:  { type: "Map<String,AttributeValue>", optional: true }

  AccountSummary:
    kind: value_object
    description: |
      `/api/account/summary` の返り値 (end-user account portal のホーム)。呼び出し
      ユーザ自身のアカウント概要で、admin shell 用の AccountContext (/api/auth/account)
      とは別契約。roles は含めず、最終ログイン・パスワード変更日時・MFA 状態・未対応の
      required actions を portal home の summary card 用に返す (wi-21 / ADR-042)。
    annotations: { component: Authentication }
    fields:
      sub:                 { type: String }
      preferred_username:  { type: String, annotations: { pii: true } }
      name:                { type: String, optional: true, annotations: { pii: true } }
      email:               { type: String, optional: true, constraints: [{ format: email }], annotations: { pii: true } }
      email_verified:      { type: Boolean }
      mfa_enrolled:        { type: Boolean }
      status:              { type: UserStatus }
      last_login_at:       { type: Timestamp, optional: true }
      password_changed_at: { type: Timestamp, optional: true }
      required_actions:    { type: "RequiredAction[]" }

  AccountEmailChangeRequest:
    kind: value_object
    description: |
      primary email 変更の起票リクエスト (self-service, wi-21)。新アドレスへ確認リンクを
      送るだけで、User.email の反映は確認完了 (ConfirmEmailChange) まで起きない。
    annotations: { component: Authentication }
    fields:
      new_email: { type: String, constraints: [{ format: email }], annotations: { pii: true } }

  AccountEmailChangeConfirm:
    kind: value_object
    description: |
      新アドレスへ送ったワンタイムリンクの確認リクエスト (self-service, wi-21)。token が
      新アドレス所有の証左なので認証済みセッションは要求しない (reset password と同方針)。
    annotations: { component: Authentication }
    fields:
      token: { type: String, constraints: [non_empty] }

  AccountDataExport:
    kind: value_object
    description: |
      end-user 自身の個人データエクスポート (GDPR 第15条 right of access, wi-21)。本ステージは
      同期生成で、現状 API から得られる profile と接続済みアプリ (consents) をまとめる。
      sign-in activity / sessions の同梱は wi-20 / wi-28 後に追加する。
    annotations: { component: Authentication }
    fields:
      exported_at: { type: Timestamp }
      profile:     { type: AccountProfileResponse }
      consents:    { type: "AccountConsentResponse[]" }

  AccountMfaFactor:
    kind: value_object
    description: |
      self-service セキュリティ画面で提示する MFA factor 1 件の射影 (wi-21)。secret は
      返さず、種別・ラベル・作成/最終利用時刻のみ。現状 TOTP のみ。
    annotations: { component: Authentication }
    fields:
      type:         { type: MfaFactorType }
      label:        { type: String, optional: true }
      created_at:   { type: Timestamp }
      last_used_at: { type: Timestamp, optional: true }

  AccountSecurityResponse:
    kind: value_object
    description: |
      `/api/account/security` の返り値 (end-user account portal のセキュリティ概要, wi-21)。
      パスワード変更日時と MFA (TOTP) の登録状態をまとめる。step-up auth (ADR-043) は本
      ステージでは未導入。
    annotations: { component: Authentication }
    fields:
      password_changed_at: { type: Timestamp, optional: true }
      totp_enrolled:       { type: Boolean }
      factors:             { type: "AccountMfaFactor[]" }

  TOTPEnrollmentStart:
    kind: value_object
    description: |
      TOTP 登録開始の返り値 (self-service, wi-21)。secret はクライアントが確認まで保持し、
      otpauth_uri は QR / 手動登録のために提示する。secret は確認 (ConfirmTotpEnrollment) で
      送り返されるまで永続化しない。
    annotations: { component: Authentication }
    fields:
      secret:       { type: String, annotations: { sensitive: true } }
      otpauth_uri:  { type: String, annotations: { sensitive: true } }
      account_name: { type: String, annotations: { pii: true } }
      issuer:       { type: String }

  TOTPEnrollmentConfirmRequest:
    kind: value_object
    description: |
      TOTP 登録確認リクエスト (self-service, wi-21)。secret は開始時の値、code はその secret
      から生成した現在のコード (所持証明)。
    annotations: { component: Authentication }
    fields:
      secret: { type: String, constraints: [non_empty], annotations: { sensitive: true } }
      code:   { type: String, constraints: [non_empty] }

  MfaFactorRemoveRequest:
    kind: value_object
    description: |
      MFA factor 解除リクエスト (self-service, wi-21)。code は所持証明としての現在の TOTP
      コード。解除は本人 + 所持証明を要求する。
    annotations: { component: Authentication }
    fields:
      code: { type: String, constraints: [non_empty] }

  UserSignInActivity:
    kind: value_object
    description: |
      ユーザー本人のサインイン履歴 1 件の射影 (wi-20 スライス 1)。本スライスは既存の監査
      イベントストア (UserAuthenticated) から導出するため、保持する属性は発生時刻と
      認証手段 (amr) のみ。IP / UA / sessionId / clientId の付加は後続スライス (ADR-041) で
      イベント側を拡張してから足す。
    annotations: { component: Authentication }
    fields:
      occurred_at: { type: Timestamp }
      amr:         { type: "String[]" }

  UserSignInActivityResponse:
    kind: value_object
    description: |
      ListMySignInActivity / ListUserSignInActivity の返り値。発生時刻の降順 (新しい順) で
      直近 N 件を返す。
    annotations: { component: Authentication }
    fields:
      activities: { type: "UserSignInActivity[]" }

  Group:
    kind: entity
    description: ADR-038 で導入した tenant-scoped ロール束集約。所属 User に roles を一斉付与する。id は不変の生成識別子、name はテナント内で一意な編集可能ラベル。
    identity: id
    annotations: { component: Authentication }
    fields:
      id:          { type: String, constraints: [non_empty, { max_length: 64 }], description: "生成識別子 group_<uuid>。不変。" }
      tenant_id:   { type: String, default: "default", description: "所属テナント ID (ADR-032 / ADR-034)。cross-tenant 参照は禁止。" }
      name:        { type: String, constraints: [non_empty, { max_length: 100 }], description: "テナント内で一意な表示名。", annotations: { pii: true } }
      description: { type: String, optional: true, constraints: [{ max_length: 500 }] }
      roles:       { type: "String[]", description: "このグループが付与するロール束。" }
      created_at:  { type: Timestamp }
      updated_at:  { type: Timestamp, optional: true }

  GroupMember:
    kind: entity
    description: User と Group の所属関係 (ADR-038)。group_id × user_sub で一意。
    identity: [group_id, user_sub]
    annotations: { component: Authentication }
    fields:
      group_id: { type: String }
      user_sub: { type: String }
      added_at: { type: Timestamp }

  GroupCreateRequest:
    kind: value_object
    description: 管理者がグループを作成する JSON リクエスト (ADR-038)。
    annotations: { component: Authentication }
    fields:
      name:        { type: String, constraints: [non_empty, { max_length: 100 }], annotations: { pii: true } }
      description: { type: String, optional: true, constraints: [{ max_length: 500 }] }
      roles:       { type: "String[]", optional: true }

  GroupUpdateRequest:
    kind: value_object
    description: 管理者がグループの name / description / roles を更新する JSON リクエスト (ADR-038)。省略フィールドは現状維持。
    annotations: { component: Authentication }
    fields:
      name:        { type: String, optional: true, constraints: [non_empty, { max_length: 100 }], annotations: { pii: true } }
      description: { type: String, optional: true, constraints: [{ max_length: 500 }] }
      roles:       { type: "String[]", optional: true }

  GroupSummaryResponse:
    kind: value_object
    description: グループ表現。管理 UI の一覧と詳細で同じ表現を返す (ADR-038)。
    annotations: { component: Authentication }
    fields:
      id:           { type: String }
      tenant_id:    { type: String }
      name:         { type: String, annotations: { pii: true } }
      description:  { type: String, optional: true }
      roles:        { type: "String[]" }
      member_count: { type: Integer }
      created_at:   { type: Timestamp }
      updated_at:   { type: Timestamp, optional: true }

  GroupListResponse:
    kind: value_object
    description: 管理 API のグループ一覧 (ADR-038)。
    annotations: { component: Authentication }
    fields:
      groups: { type: "GroupSummaryResponse[]" }

  GroupMemberResponse:
    kind: value_object
    description: グループ所属メンバー表現 (ADR-038)。
    annotations: { component: Authentication }
    fields:
      user_sub:           { type: String }
      preferred_username: { type: String, annotations: { pii: true } }
      added_at:           { type: Timestamp }

  GroupAddMemberRequest:
    kind: value_object
    description: User 詳細画面など group_id を body で指定して所属させる際の任意リクエスト (ADR-038)。
    annotations: { component: Authentication }
    fields:
      group_id: { type: String }

  UserGroupsResponse:
    kind: value_object
    description: |
      指定 User の所属グループと有効ロール内訳 (ADR-038)。明示ロール (user.roles) と
      グループ由来ロール、その union を分けて返し、管理 UI が effective roles を
      理解しやすくする。
    annotations: { component: Authentication }
    fields:
      groups:          { type: "GroupSummaryResponse[]" }
      direct_roles:    { type: "String[]", description: "user.roles。" }
      group_roles:     { type: "String[]", description: "所属グループ由来ロールの union。" }
      effective_roles: { type: "String[]", description: "direct_roles ∪ group_roles。" }

  AdminClientCreateRequest:
    kind: value_object
    description: 管理者が所属テナントに OAuth client を作成する。生成された client_secret は作成応答で一度だけ返す。
    annotations: { component: Administration }
    fields:
      redirect_uris:                  { type: "Uri[]", constraints: [non_empty] }
      client_name:                    { type: String, optional: true, constraints: [{ max_length: 200 }] }
      client_type:                    { type: ClientType, optional: true }
      grant_types:                    { type: "GrantType[]", constraints: [non_empty] }
      response_types:                 { type: "ResponseType[]", optional: true }
      token_endpoint_auth_method:     { type: TokenEndpointAuthMethod, optional: true }
      scope:                          { type: String, optional: true }
      jwks_uri:                       { type: Uri, optional: true }
      jwks:                           { type: JSON, optional: true }
      tls_client_auth_subject_dn:     { type: String, optional: true }
      fapi_profile:                   { type: FapiProfile, optional: true }
      require_pushed_authorization_requests: { type: Boolean, optional: true }
      dpop_bound_access_tokens:       { type: Boolean, optional: true }

  AdminClientUpdateRequest:
    kind: value_object
    description: 管理者が client metadata を更新する。client_id、認証方式、秘密情報は変更せず、secret rotation は独立 endpoint で扱う。
    annotations: { component: Administration }
    fields:
      client_name:                    { type: String, optional: true, constraints: [{ max_length: 200 }] }
      redirect_uris:                  { type: "Uri[]", optional: true, constraints: [non_empty] }
      grant_types:                    { type: "GrantType[]", optional: true, constraints: [non_empty] }
      response_types:                 { type: "ResponseType[]", optional: true }
      scope:                          { type: String, optional: true }
      require_pushed_authorization_requests: { type: Boolean, optional: true }
      dpop_bound_access_tokens:       { type: Boolean, optional: true }

  AdminClientResponse:
    kind: value_object
    description: 管理 API の client 表現。client_secret と client_secret_hash は契約上含めない。
    annotations: { component: Administration }
    fields:
      tenant_id:                              { type: String }
      client_id:                              { type: String }
      client_name:                            { type: String, optional: true }
      client_type:                            { type: ClientType }
      redirect_uris:                          { type: "Uri[]" }
      grant_types:                            { type: "GrantType[]" }
      response_types:                         { type: "ResponseType[]" }
      token_endpoint_auth_method:             { type: TokenEndpointAuthMethod }
      scope:                                  { type: String }
      jwks_uri:                               { type: Uri, optional: true }
      jwks:                                   { type: JSON, optional: true }
      tls_client_auth_subject_dn:             { type: String, optional: true }
      id_token_signed_response_alg:           { type: SignatureAlgorithm }
      require_pushed_authorization_requests:  { type: Boolean }
      dpop_bound_access_tokens:               { type: Boolean }
      fapi_profile:                           { type: FapiProfile }
      created_at:                             { type: Timestamp }

  AdminClientCreateResponse:
    kind: value_object
    description: client 作成応答。client_secret は生成された場合に限り一度だけ返す。
    annotations: { component: Administration }
    fields:
      client:        { type: AdminClientResponse }
      client_secret: { type: String, optional: true, annotations: { sensitive: true } }

  AdminClientListResponse:
    kind: value_object
    description: 所属テナント内の client 一覧。
    annotations: { component: Administration }
    fields:
      clients: { type: "AdminClientResponse[]" }

  AdminConsentResponse:
    kind: value_object
    description: 管理 API が返す所属テナント内の Consent 表現。
    annotations: { component: Administration }
    fields:
      tenant_id:  { type: String }
      sub:        { type: String }
      client_id:  { type: String }
      scopes:     { type: "String[]" }
      state:      { type: ConsentState }
      granted_at: { type: Timestamp }
      expires_at: { type: Timestamp }
      revoked_at: { type: Timestamp, optional: true }

  AdminConsentListResponse:
    kind: value_object
    description: 所属テナント内の Consent 一覧。
    annotations: { component: Administration }
    fields:
      consents: { type: "AdminConsentResponse[]" }

  AccountConsentResponse:
    kind: value_object
    description: |
      end-user の account portal が返す「接続済みアプリ」1 件 (self-service, wi-21)。
      自分の sub に固定されるため sub / tenant_id は出さない。client_id・付与 scope・
      付与/失効日時のみを表示用に返す。
    annotations: { component: Authentication }
    fields:
      client_id:  { type: String }
      scopes:     { type: "String[]" }
      state:      { type: ConsentState }
      granted_at: { type: Timestamp }
      expires_at: { type: Timestamp }

  AccountConsentListResponse:
    kind: value_object
    description: end-user 自身の接続済みアプリ (active な Consent) 一覧 (self-service, wi-21)。
    annotations: { component: Authentication }
    fields:
      consents: { type: "AccountConsentResponse[]" }

  AuditEventQuery:
    kind: value_object
    description: |
      ListAdminAuditEvents のクエリパラメータ。tenant_id は context から付与されるため
      フィールドには含めない。type は SCL events セクションの型名。
    annotations: { component: OAuth2 }
    fields:
      type:    { type: String, optional: true, description: "完全一致フィルタ。例: AccessTokenIssued" }
      sub:     { type: String, optional: true, description: "対象ユーザー sub の完全一致フィルタ。" }
      after:   { type: Timestamp, optional: true, description: "occurred_at がこの時刻以降。" }
      before:  { type: Timestamp, optional: true, description: "occurred_at がこの時刻以前。" }
      limit:   { type: Integer, optional: true, description: "返却件数の上限 (default 100, max 1000)。" }

  AdminAuditEventResponse:
    kind: value_object
    description: |
      管理者向けに公開する DomainEvent。payload は構造化 JSON。
      返却時に PII フィールド (email / IP 等) は EventSink 側で redact 済み前提。
    annotations: { component: OAuth2 }
    fields:
      id:          { type: String,    description: "ストア側で割り当てたイベント ID (UUIDv4)。" }
      tenant_id:   { type: String,    description: "イベントが帰属するテナント ID。" }
      type:        { type: String,    description: "DomainEvent.type ワイヤ名。" }
      occurred_at: { type: Timestamp }
      payload:     { type: JSON,      description: "イベント本体 (SCL events セクションの payload 形状)。" }

  AdminAuditEventListResponse:
    kind: value_object
    description: 監査イベントの検索結果。
    annotations: { component: OAuth2 }
    fields:
      events:        { type: "AdminAuditEventResponse[]" }
      next_after:    { type: Timestamp, optional: true, description: "ページング継続用カーソル。" }

  AdminKeyResponse:
    kind: value_object
    description: |
      管理者向けに公開する署名鍵のメタデータ。秘密鍵は当然返さず、JWKS と
      同じ公開鍵 JWK のみを含める。鍵の状態 (active / verifying) と作成時刻で
      ローテーション可否を判断できる粒度を提供する。
    annotations: { component: OAuth2 }
    fields:
      kid:        { type: String,    description: "JWK Key ID。JWKS で配布されるものと同一。" }
      alg:        { type: SignatureAlgorithm, description: "署名アルゴリズム (現状 PS256 のみ)。" }
      active:     { type: Boolean,   description: "true のとき新規 ID Token / Access Token の署名鍵。false は verifying 用途で JWKS 残留。" }
      created_at: { type: Timestamp, description: "鍵生成時刻 (SigningKeyMaxAge / SigningKeyMinJwksOverlap 評価の起点)。" }
      public_jwk: { type: JSON,      description: "公開鍵 JWK。JWKS と同じ表現。" }

  AdminKeyListResponse:
    kind: value_object
    description: 全署名鍵の一覧。active が複数同時に存在することは無い (rotateInternal で旧鍵は非 active 化)。
    annotations: { component: OAuth2 }
    fields:
      keys: { type: "AdminKeyResponse[]" }

  AdminRotateKeyResponse:
    kind: value_object
    description: 鍵ローテーションの結果。新しい active 鍵と直前の active 鍵 (verifying へ降りた) の kid を返す。
    annotations: { component: OAuth2 }
    fields:
      next:     { type: AdminKeyResponse, description: "新しい active 署名鍵。" }
      previous: { type: AdminKeyResponse, optional: true, description: "直前まで active だった鍵 (初回ローテーション時は無し)。" }

  TokenRequest:
    kind: value_object
    description: application/x-www-form-urlencoded で送信される token endpoint リクエスト。
    fields:
      grant_type:               { type: GrantType }
      code:                     { type: String, optional: true }
      redirect_uri:             { type: String, optional: true }
      code_verifier:            { type: String, optional: true }
      refresh_token:            { type: String, optional: true }
      device_code:              { type: String, optional: true }
      client_id:                { type: String, optional: true }
      client_secret:            { type: String, optional: true }
      client_assertion:         { type: String, optional: true }
      client_assertion_type:    { type: String, optional: true }
      scope:                    { type: String, optional: true }

  TokenResponse:
    kind: value_object
    description: /token 成功時のレスポンスボディ (RFC 6749 §5.1)。発行されたトークン一式と種別を返す。
    fields:
      access_token:     { type: String }
      token_type:       { type: String, description: '"Bearer" or "DPoP"' }
      expires_in:       { type: Integer, optional: true }
      refresh_token:    { type: String, optional: true }
      id_token:         { type: String, optional: true }
      scope:            { type: String, optional: true }

  IntrospectionRequest:
    kind: value_object
    description: /introspect リクエスト (RFC 7662 §2.1)。ResourceServer がトークンの有効性を AuthorizationServer に問い合わせる。
    fields:
      token:              { type: String }
      token_type_hint:    { type: TokenType, optional: true }

  IntrospectionResponse:
    kind: value_object
    description: /introspect レスポンス (RFC 7662 §2.2)。トークンの active 状態と有効時のメタデータを返す。
    fields:
      active:       { type: Boolean }
      scope:        { type: String, optional: true }
      client_id:    { type: String, optional: true }
      sub:          { type: String, optional: true }
      exp:          { type: Integer, optional: true }
      iat:          { type: Integer, optional: true }
      token_type:   { type: String, optional: true }
      jti:          { type: String, optional: true }
      cnf:          { type: SenderConstraintCnf, optional: true }

  RevokeRequest:
    kind: value_object
    description: /revoke リクエスト (RFC 7009 §2.1)。指定したトークンを失効させる。
    fields:
      token:              { type: String }
      token_type_hint:    { type: TokenType, optional: true }

  ParRequest:
    kind: value_object
    description: 任意の authorize パラメータを form で受け取る。
    fields:
      parameters: { type: "Map<String, String>" }

  ParResponse:
    kind: value_object
    description: /par レスポンス (RFC 9126 §2.2)。短命の request_uri を発行し、後続の /authorize から参照される。
    fields:
      request_uri:    { type: String }
      expires_in:     { type: Integer }

  DeviceAuthorizationRequest:
    kind: value_object
    description: /device_authorization リクエスト (RFC 8628 §3.1)。入力制約のあるデバイスからのフロー開始要求。
    fields:
      scope:                    { type: String, optional: true }
      client_id:                { type: String, optional: true }
      client_secret:            { type: String, optional: true }
      client_assertion:         { type: String, optional: true }
      client_assertion_type:    { type: String, optional: true }

  DeviceAuthorizationResponse:
    kind: value_object
    description: /device_authorization レスポンス (RFC 8628 §3.2)。device_code・user_code・verification_uri を返し、デバイスはポーリングへ移行する。
    fields:
      device_code:                  { type: String }
      user_code:                    { type: String }
      verification_uri:             { type: Uri }
      verification_uri_complete:    { type: Uri, optional: true }
      expires_in:                   { type: Integer }
      interval:                     { type: Integer, optional: true }

  AuthorizeParameters:
    kind: value_object
    description: GET /authorize クエリパラメータ。
    fields:
      response_type:          { type: ResponseType }
      client_id:              { type: String }
      redirect_uri:           { type: String }
      scope:                  { type: String, optional: true }
      state:                  { type: String, optional: true }
      nonce:                  { type: String, optional: true }
      code_challenge:         { type: String }
      code_challenge_method:  { type: CodeChallengeMethod }
      prompt:                 { type: String, optional: true }
      max_age:                { type: Integer, optional: true }
      id_token_hint:          { type: String, optional: true }
      request_uri:            { type: String, optional: true }

  BrowserLoginRequest:
    kind: value_object
    description: SPA が POST /api/auth/login に送る JSON。通常は authorization request id を HttpOnly transaction cookie から解決する。管理画面への直接ログインでは同一 realm の /admin 配下だけを return_to に指定できる。CSRF は X-CSRF-Token header から解決する。
    annotations: { component: Authentication }
    fields:
      username:      { type: String }
      password:      { type: String, annotations: { sensitive: true } }
      return_to:     { type: String, optional: true, description: 同一 realm の /admin 配下に限定したログイン後遷移先。 }

  BrowserConsentRequest:
    kind: value_object
    description: SPA が POST /api/auth/consent に送る同意判断。
    annotations: { component: Authentication }
    fields:
      action:        { type: String, description: allow または deny。 }

  BrowserDeviceRequest:
    kind: value_object
    description: SPA が POST /api/auth/device に送る device user_code の承認判断。
    annotations: { component: Authentication }
    fields:
      user_code:     { type: String }
      action:        { type: String, description: allow または deny。 }

  BrowserTotpRequest:
    kind: value_object
    description: Browser client が POST /api/auth/totp に送る TOTP コード。authorization request id は HttpOnly transaction cookie、CSRF は X-CSRF-Token header から解決する。他 factor (WebAuthn 等) はHTTP形が大きく異なるため、別endpointと別value objectとして独立に定義する。
    annotations: { component: Authentication }
    fields:
      code:          { type: String, description: Authenticator アプリが生成した数字コード (TotpPolicy の digits 桁)。, annotations: { sensitive: true } }
      return_to:     { type: String, optional: true, description: 管理画面への直接ログインを継続する場合の同一 realm 内遷移先。 }

  BrowserChangePasswordRequest:
    kind: value_object
    description: SPA が POST /api/auth/change_password に送る JSON。認証済みセッション cookie が sub を解決し、CSRF は X-CSRF-Token header で検証する。
    annotations: { component: Authentication }
    fields:
      current_password: { type: String, annotations: { sensitive: true } }
      new_password:     { type: String, annotations: { sensitive: true } }

  BrowserForgotPasswordRequest:
    kind: value_object
    description: SPA が POST /api/auth/forgot_password に送る JSON。未認証経路。anti-enumeration のため email 存在有無に関わらず常に 204 を返す (ADR-030)。
    annotations: { component: Authentication }
    fields:
      email:        { type: String, annotations: { pii: true } }

  BrowserResetPasswordRequest:
    kind: value_object
    description: SPA が POST /api/auth/reset_password に送る JSON。email リンクに含まれた単発消費 token と新パスワードを受ける (ADR-030)。
    annotations: { component: Authentication }
    fields:
      token:        { type: String, annotations: { sensitive: true } }
      new_password: { type: String, annotations: { sensitive: true } }

  PasswordResetTokenRecord:
    kind: entity
    identity: token_hash
    description: |
      パスワードリセット用の単発消費トークン (ADR-030)。
      token は base64url の 32 バイト乱数で、保存時は SHA-256 hash のみ。
      期限切れ / consume 済みの行は GC するが、INSERT 時に同 sub の未消費を
      失効させる軽い掃除も行う。
    annotations: { component: Authentication }
    fields:
      sub:          { type: String }
      token_hash:   { type: String, annotations: { sensitive: true } }
      created_at:   { type: Timestamp }
      expires_at:   { type: Timestamp }
      consumed_at:  { type: Timestamp, optional: true }

  BrowserTransactionResponse:
    kind: value_object
    description: SPA が現在の browser authorization transaction を描画するための no-store JSON。
    fields:
      kind:          { type: String, description: 描画すべき画面の識別子。login / totp / consent / device 等、factor 追加に応じて拡張する。 }
      csrf_token:    { type: String, annotations: { sensitive: true } }
      client_name:   { type: String, optional: true }
      scopes:        { type: "String[]", optional: true }

  BrowserDeviceContextResponse:
    kind: value_object
    description: SPA が device user_code 画面を描画するための no-store JSON。
    fields:
      kind:          { type: String }
      user_code:     { type: String, optional: true }
      csrf_token:    { type: String, annotations: { sensitive: true } }

  BrowserFlowResponse:
    kind: value_object
    description: SPA の認証操作後に表示する次画面またはクライアント redirect URI。
    fields:
      next:          { type: String, optional: true }
      redirect_to:   { type: Uri, optional: true }

  EndSessionParameters:
    kind: value_object
    description: RP-Initiated Logout v1 のクエリ / form パラメータ。client_id で post_logout_redirect_uri を検証する。
    fields:
      client_id:                   { type: String, optional: true }
      id_token_hint:               { type: String, optional: true }
      post_logout_redirect_uri:    { type: Uri, optional: true }
      state:                       { type: String, optional: true }

  UserInfoResponse:
    kind: value_object
    description: OIDC Core §5.3。可変な OIDC クレームを含む。
    fields:
      sub:        { type: String }
      claims:     { type: JSON, optional: true }

  # ---------- エラー ----------
  OAuthError:
    kind: error
    description: OAuth 2.0 / OIDC のエラー応答の共通形 (RFC 6749 §5.2)。具体的なエラー種別は error フィールドの OAuthErrorCode で識別される。
    payload:
      error:                { type: OAuthErrorCode }
      error_description:    { type: String, optional: true }
      error_uri:            { type: String, optional: true }

  InvalidRequestError:
    kind: error
    description: リクエストに必須パラメータの欠落・不正値・重複等がある (RFC 6749 §5.2 invalid_request)。
    payload:
      reason: { type: String, optional: true }
  InvalidClientError:
    kind: error
    description: クライアント認証が失敗した、または未登録のクライアント (RFC 6749 §5.2 invalid_client)。client_id の存在有無を開示しないため詳細は返さない。
  InvalidGrantError:
    kind: error
    description: 認可コード・リフレッシュトークン・device_code 等の付与が無効、期限切れ、再利用、あるいは redirect_uri/PKCE 不一致 (RFC 6749 §5.2 invalid_grant)。
    payload:
      reason: { type: String, optional: true }
  UnauthorizedClientError:
    kind: error
    description: クライアントがこの grant_type を使用する権限を持たない (RFC 6749 §5.2 unauthorized_client)。
  UnsupportedGrantTypeError:
    kind: error
    description: AuthorizationServer がこの grant_type をサポートしていない (RFC 6749 §5.2 unsupported_grant_type)。
  InvalidScopeError:
    kind: error
    description: 要求された scope が不正、未知、またはクライアントに許可されていない (RFC 6749 §5.2 invalid_scope)。
  InvalidTokenError:
    kind: error
    description: アクセストークンが期限切れ、改ざん、不正、または失効済み (RFC 6750 §3.1 invalid_token)。
  InvalidDpopProofError:
    kind: error
    description: DPoP Proof JWT の検証に失敗した（署名・jti・htu/htm・nonce・clock skew 等、RFC 9449 §7.1 invalid_dpop_proof）。
  InsufficientScopeError:
    kind: error
    description: 提示されたトークンの scope では要求された操作に不足している (RFC 6750 §3.1 insufficient_scope)。
  AccessDeniedError:
    kind: error
    description: ResourceOwner が認可を拒否した、またはサーバーポリシーが許可しなかった (RFC 6749 §4.1.2.1 access_denied)。
  ExpiredTokenError:
    kind: error
    description: Device Authorization Grant において device_code が有効期限を過ぎた (RFC 8628 §3.5 expired_token)。
  SlowDownError:
    kind: error
    description: Device Authorization Grant のポーリングが速すぎる。クライアントは interval を 5 秒延長する必要がある (RFC 8628 §3.5 slow_down)。
  AuthorizationPendingError:
    kind: error
    description: Device Authorization Grant においてユーザーがまだ承認していない (RFC 8628 §3.5 authorization_pending)。クライアントは interval 秒待ってから再試行する。
  ServerError:
    kind: error
    description: AuthorizationServer 側の予期せぬ内部エラー (RFC 6749 §4.1.2.1 server_error)。

  # ---------- ドメインイベント ----------
  ClientRegistered:
    kind: event
    description: /register で新しいクライアントが動的登録された (RFC 7591)。クライアント登録監査の起点。
    payload:
      occurredAt:   { type: Timestamp }
      tenantId:     { type: String, description: "クライアントが属するテナント ID。" }
      clientId:     { type: String }
      clientType:   { type: ClientType, optional: true }

  UserAuthenticated:
    kind: event
    description: ResourceOwner の認証が成功した。amr は実際に経由した認証手段の一覧 (OIDC Core §2)。
    annotations: { component: Authentication }
    payload:
      occurredAt:   { type: Timestamp }
      tenantId:     { type: String, description: "認証が起きたテナント ID。監査ビューのテナント絞り込みに使う。" }
      sub:          { type: String }
      amr:          { type: "String[]", optional: true }

  AuthenticationFailed:
    kind: event
    description: ResourceOwner の認証が失敗した。レートリミット・不正検知の入力イベント。username は PII として扱う。
    annotations: { component: Authentication }
    payload:
      occurredAt:   { type: Timestamp }
      tenantId:     { type: String, description: "認証を試みたテナント ID (リクエストパス由来)。" }
      username:     { type: String, optional: true, annotations: { pii: true } }
      reason:       { type: String, optional: true }

  PasswordChanged:
    kind: event
    description: ResourceOwner が /api/auth/change_password で自身のパスワードを変更した。change-password 監査と通知の起点。
    annotations: { component: Authentication }
    payload:
      occurredAt:   { type: Timestamp }
      tenantId:     { type: String, description: "対象 user の所属テナント ID。" }
      sub:          { type: String }

  LoginThrottled:
    kind: event
    description: ログイン試行が per-account / per-IP のスロットリング閾値に到達してロックされた (ADR-029)。SIEM の credential stuffing / brute-force 検知の入力イベント。keyHash は username / IP の SHA-256 で、平文を audit log に流さない。
    annotations: { component: Authentication }
    payload:
      occurredAt:        { type: Timestamp }
      tenantId:          { type: String, description: "スロットリングが起きたテナント ID (リクエストパス由来)。" }
      kind:              { type: String, description: "account または ip" }
      keyHash:           { type: String, description: "username (lowercased) または IP の SHA-256 hex" }
      retryAfterSeconds: { type: Integer }

  PasswordResetRequested:
    kind: event
    description: |
      パスワードリセットリンクを発行した。anti-enumeration のため
      「リクエストが届いた」ことのみ記録し、発行有無 (verified email を持つ
      user が存在したか) は別途 EmailSent イベントで観測する (ADR-030)。
      emailHash は SHA-256 で、平文を audit log に流さない。
    annotations: { component: Authentication }
    payload:
      occurredAt: { type: Timestamp }
      tenantId:   { type: String, description: "リセットを要求したテナント ID (リクエストパス由来)。" }
      emailHash:  { type: String, description: "送信元 email の SHA-256 hex" }

  EmailSent:
    kind: event
    description: |
      EmailSender port 経由でメールを送信した。fail-open の port なので
      送信失敗時も use case 層には伝播しないが、本イベントの有無で
      SIEM 側からは観測できる (ADR-030)。to は SHA-256 hash で記録する。
    annotations: { component: Authentication }
    payload:
      occurredAt: { type: Timestamp }
      toHash:     { type: String, description: "宛先 email の SHA-256 hex" }
      purpose:    { type: String, description: "password_reset / email_change / email_verification など。" }
      delivered:  { type: Boolean }

  EmailChangeRequested:
    kind: event
    description: |
      end-user が primary email の変更を起票し、新アドレスへ確認リンクを送った
      (self-service, wi-21)。実際の email 反映は ConfirmEmailChange まで起きない。
      newEmailHash は SHA-256 で、平文を audit log に流さない。
    annotations: { component: Authentication }
    payload:
      occurredAt:   { type: Timestamp }
      tenantId:     { type: String, description: "対象 user の所属テナント ID。" }
      sub:          { type: String }
      newEmailHash: { type: String, description: "新 email の SHA-256 hex" }

  EmailChanged:
    kind: event
    description: |
      新アドレスへ送ったワンタイムリンクの確認が完了し、primary email を確定した
      (self-service, wi-21)。email_verified=true に更新し、verify_email の
      required action があれば自動解除する。
    annotations: { component: Authentication }
    payload:
      occurredAt: { type: Timestamp }
      tenantId:   { type: String, description: "対象 user の所属テナント ID。" }
      sub:        { type: String }

  MfaFactorEnrolled:
    kind: event
    description: |
      本人が self-service で MFA factor (現状 TOTP) を登録した (wi-21)。secret は audit に
      流さず種別だけを残す。User.mfa_enrolled を true にする。
    annotations: { component: Authentication }
    payload:
      occurredAt: { type: Timestamp }
      tenantId:   { type: String, description: "対象 user の所属テナント ID。" }
      sub:        { type: String }
      factorType: { type: MfaFactorType }

  MfaFactorRemoved:
    kind: event
    description: |
      本人が self-service で MFA factor を解除した (wi-21)。解除は有効な TOTP コードによる
      所持証明を伴う。User.mfa_enrolled を false に戻す。
    annotations: { component: Authentication }
    payload:
      occurredAt: { type: Timestamp }
      tenantId:   { type: String, description: "対象 user の所属テナント ID。" }
      sub:        { type: String }
      factorType: { type: MfaFactorType }

  UserCreated:
    kind: event
    description: 管理者がユーザーを作成した。初期パスワードと password_hash は監査イベントに含めない。
    annotations: { component: Administration }
    payload:
      occurredAt: { type: Timestamp }
      tenantId:   { type: String, description: "操作対象テナント ID。actor / target と一致する。" }
      actorSub:   { type: String }
      targetSub:  { type: String }

  UserUpdated:
    kind: event
    description: 管理者がユーザーのプロフィールまたは roles を更新した。
    annotations: { component: Administration }
    payload:
      occurredAt:    { type: Timestamp }
      tenantId:      { type: String, description: "操作対象テナント ID。actor / target と一致する。" }
      actorSub:      { type: String }
      targetSub:     { type: String }
      changedFields: { type: "String[]" }

  UserDisabled:
    kind: event
    description: 管理者がユーザーを無効化した。対象ユーザーの新規ログインと既存セッション利用を拒否する。
    annotations: { component: Administration }
    payload:
      occurredAt: { type: Timestamp }
      tenantId:   { type: String, description: "操作対象テナント ID。actor / target と一致する。" }
      actorSub:   { type: String }
      targetSub:  { type: String }

  UserEnabled:
    kind: event
    description: 管理者が無効化済みユーザーを再有効化した。
    annotations: { component: Administration }
    payload:
      occurredAt: { type: Timestamp }
      tenantId:   { type: String, description: "操作対象テナント ID。actor / target と一致する。" }
      actorSub:   { type: String }
      targetSub:  { type: String }

  UserDeleted:
    kind: event
    description: 管理者がユーザーを Delete (ADR-036) した。PII は anonymize 済みで、関連 aggregate は cascade 削除されている。reason は admin が任意に残せる自由記述。
    annotations: { component: Administration }
    payload:
      occurredAt: { type: Timestamp }
      tenantId:   { type: String, description: "操作対象テナント ID。actor / target と一致する。" }
      actorSub:   { type: String }
      targetSub:  { type: String }
      reason:     { type: String, optional: true }

  UserRequiredActionSet:
    kind: event
    description: 管理者が次回ログイン時の強制アクション (RequiredAction) を付与した (wi-19)。action は enum 値で、監査に平文で残しても安全。
    annotations: { component: Administration }
    payload:
      occurredAt: { type: Timestamp }
      tenantId:   { type: String, description: "操作対象テナント ID。actor / target と一致する。" }
      actorSub:   { type: String }
      targetSub:  { type: String }
      action:     { type: String, description: "RequiredAction enum 値 (update_password など)。" }

  UserRequiredActionCleared:
    kind: event
    description: 強制アクションが解除された (wi-19)。admin の明示解除のほか、本人がパスワードを変更した結果 update_password が自動解除される場合も発火し、その際 actorSub は対象本人の sub になる。
    annotations: { component: Administration }
    payload:
      occurredAt: { type: Timestamp }
      tenantId:   { type: String, description: "操作対象テナント ID。actor / target と一致する。" }
      actorSub:   { type: String, description: "解除を行った主体。自動解除時は対象本人。" }
      targetSub:  { type: String }
      action:     { type: String, description: "RequiredAction enum 値。" }

  GroupCreated:
    kind: event
    description: 管理者がグループを作成した (ADR-038)。
    annotations: { component: Authentication }
    payload:
      occurredAt: { type: Timestamp }
      tenantId:   { type: String, description: "グループが属するテナント ID。" }
      actorSub:   { type: String }
      groupId:    { type: String }

  GroupUpdated:
    kind: event
    description: 管理者がグループの name / description / roles を更新した (ADR-038)。
    annotations: { component: Authentication }
    payload:
      occurredAt:    { type: Timestamp }
      tenantId:      { type: String, description: "グループが属するテナント ID。" }
      actorSub:      { type: String }
      groupId:       { type: String }
      changedFields: { type: "String[]" }

  GroupDeleted:
    kind: event
    description: 管理者がグループを削除した (ADR-038)。所属 membership は cascade で解除され、各々 GroupMemberRemoved を伴う。
    annotations: { component: Authentication }
    payload:
      occurredAt: { type: Timestamp }
      tenantId:   { type: String, description: "グループが属するテナント ID。" }
      actorSub:   { type: String }
      groupId:    { type: String }

  GroupMemberAdded:
    kind: event
    description: 管理者が User をグループに所属させた (ADR-038)。既に所属済みの場合は emit されない (冪等)。
    annotations: { component: Authentication }
    payload:
      occurredAt: { type: Timestamp }
      tenantId:   { type: String, description: "グループが属するテナント ID。" }
      actorSub:   { type: String }
      groupId:    { type: String }
      userSub:    { type: String }

  GroupMemberRemoved:
    kind: event
    description: 管理者が User をグループから外した、またはグループ削除に伴い解除された (ADR-038)。所属していない場合は emit されない (冪等)。
    annotations: { component: Authentication }
    payload:
      occurredAt: { type: Timestamp }
      tenantId:   { type: String, description: "グループが属するテナント ID。" }
      actorSub:   { type: String }
      groupId:    { type: String }
      userSub:    { type: String }

  AdminClientCreated:
    kind: event
    description: 管理者が所属テナントに OAuth client を作成した。秘密情報は含めない。
    annotations: { component: Administration }
    payload:
      occurredAt: { type: Timestamp }
      tenantId:   { type: String, description: "クライアントが属するテナント ID。actor と一致する。" }
      actorSub:   { type: String }
      clientId:   { type: String }

  AdminClientUpdated:
    kind: event
    description: 管理者が OAuth client metadata を更新した。
    annotations: { component: Administration }
    payload:
      occurredAt:    { type: Timestamp }
      tenantId:      { type: String, description: "クライアントが属するテナント ID。actor と一致する。" }
      actorSub:      { type: String }
      clientId:      { type: String }
      changedFields: { type: "String[]" }

  AdminClientDeleted:
    kind: event
    description: 管理者が所属テナントから OAuth client を削除した。
    annotations: { component: Administration }
    payload:
      occurredAt: { type: Timestamp }
      tenantId:   { type: String, description: "クライアントが属するテナント ID。actor と一致する。" }
      actorSub:   { type: String }
      clientId:   { type: String }

  TenantCreated:
    kind: event
    description: system_admin が新規テナントを作成した (ADR-032)。
    annotations: { component: Tenancy }
    payload:
      occurredAt: { type: Timestamp }
      actorSub:   { type: String }
      tenantId:   { type: String }

  TenantUpdated:
    kind: event
    description: system_admin がテナントの表示名を更新した (ADR-032)。
    annotations: { component: Tenancy }
    payload:
      occurredAt:    { type: Timestamp }
      actorSub:      { type: String }
      tenantId:      { type: String }
      changedFields: { type: "String[]" }

  TenantUserAttributeSchemaUpdated:
    kind: event
    description: テナント内 admin が custom 属性定義 (TenantUserAttributeSchema) を更新した (ADR-040)。値は持たず、変更後の custom 属性 key 一覧のみを記録する。
    annotations: { component: Tenancy }
    payload:
      occurredAt:    { type: Timestamp }
      actorSub:      { type: String }
      tenantId:      { type: String }
      attributeKeys: { type: "String[]" }

  TenantDisabled:
    kind: event
    description: system_admin がテナントを無効化した。当該テナントのすべてのプロトコルルートは invalid_request で拒否される (ADR-032)。
    annotations: { component: Tenancy }
    payload:
      occurredAt: { type: Timestamp }
      actorSub:   { type: String }
      tenantId:   { type: String }

  TenantEnabled:
    kind: event
    description: system_admin が無効化済みテナントを再有効化した (ADR-032)。
    annotations: { component: Tenancy }
    payload:
      occurredAt: { type: Timestamp }
      actorSub:   { type: String }
      tenantId:   { type: String }

  ConsentGranted:
    kind: event
    description: ResourceOwner がクライアントに対する scope の同意を与えた (GDPR Art.6 法的根拠の取得記録)。
    payload:
      occurredAt:   { type: Timestamp }
      tenantId:     { type: String, description: "同意が起きたテナント ID。" }
      sub:          { type: String }
      clientId:     { type: String }
      scopes:       { type: "String[]" }

  ConsentRevoked:
    kind: event
    description: ResourceOwner または所属テナントの Administrator が既存の同意を撤回した (GDPR Art.7(3) 同意撤回権)。以後の発行はブロックされる。
    payload:
      occurredAt:   { type: Timestamp }
      tenantId:     { type: String, description: "同意が属するテナント ID。" }
      actorSub:     { type: String, optional: true, description: "管理 API からの撤回時の Administrator sub。ResourceOwner 自身の撤回では省略可。" }
      sub:          { type: String }
      clientId:     { type: String }

  AuthorizationCodeIssued:
    kind: event
    description: /authorize 完了時に AuthorizationCode を発行した。/token への交換まで 60 秒以内に行う必要がある。
    payload:
      occurredAt:           { type: Timestamp }
      tenantId:             { type: String, description: "認可コードを発行したテナント ID。" }
      clientId:             { type: String }
      sub:                  { type: String }
      scopes:               { type: "String[]" }
      codeChallengeMethod:  { type: String, optional: true }

  AuthorizationCodeRedeemed:
    kind: event
    description: AuthorizationCode が /token で正しく交換された。同一コードの再使用はファミリー失効を引き起こす。
    payload:
      occurredAt:   { type: Timestamp }
      tenantId:     { type: String, description: "交換が起きたテナント ID。" }
      clientId:     { type: String }
      sub:          { type: String }

  AccessTokenIssued:
    kind: event
    description: AccessToken (JWT) を発行した。senderConstraint がある場合は所有証明（DPoP/mTLS）バインド済み。
    payload:
      occurredAt:         { type: Timestamp }
      tenantId:           { type: String, description: "トークンを発行したテナント ID。" }
      jti:                { type: String }
      clientId:           { type: String }
      sub:                { type: String }
      scopes:             { type: "String[]" }
      senderConstraint:   { type: AccessTokenSenderConstraint, default: None }

  RefreshTokenIssued:
    kind: event
    description: RefreshToken を発行した。familyId は元の認可コード由来のファミリーを識別し、ローテーションで継承される。
    payload:
      occurredAt:   { type: Timestamp }
      tenantId:     { type: String, description: "トークンを発行したテナント ID。" }
      tokenId:      { type: String }
      familyId:     { type: String }
      parentId:     { type: String, optional: true }
      clientId:     { type: String }
      sub:          { type: String }

  RefreshTokenRotated:
    kind: event
    description: RefreshToken を /token で交換し、新しい子トークンを発行して親を Rotated 状態にした (ADR-004)。
    payload:
      occurredAt:   { type: Timestamp }
      tenantId:     { type: String, description: "ローテーションが起きたテナント ID。" }
      oldTokenId:   { type: String }
      newTokenId:   { type: String }
      familyId:     { type: String }

  TokenRevoked:
    kind: event
    description: /revoke もしくは管理操作によってトークンが失効された (RFC 7009)。監査・即時性要件あり。
    payload:
      occurredAt:   { type: Timestamp }
      tenantId:     { type: String, description: "失効が起きたテナント ID。" }
      tokenType:    { type: TokenType }
      tokenId:      { type: String }
      reason:       { type: String, optional: true }

  TokenIntrospected:
    kind: event
    description: /introspect が呼ばれてトークン状態を返した (RFC 7662)。ResourceServer の利用パターン分析に使用。
    payload:
      occurredAt:   { type: Timestamp }
      tenantId:     { type: String, description: "introspection が起きたテナント ID。" }
      rsClientId:   { type: String }
      tokenId:      { type: String }
      active:       { type: Boolean }

  RefreshTokenReuseDetected:
    kind: event
    description: Rotated 状態の RefreshToken が再提示された。ファミリー全失効をトリガーする (RFC 9700 §4.14)。
    payload:
      occurredAt:   { type: Timestamp }
      tenantId:     { type: String, description: "再利用が検出されたテナント ID。" }
      familyId:     { type: String }
      tokenId:      { type: String }
      clientId:     { type: String, optional: true }

  SigningKeyRotated:
    kind: event
    description: JWKS の署名鍵が回転した（90 日ごと、または緊急回転、ADR-009/024）。
    payload:
      occurredAt:   { type: Timestamp }
      newKid:       { type: String }
      previousKid:  { type: String, optional: true }

  PARStored:
    kind: event
    description: /par に届いた authorize パラメータをサーバー側に格納し短命の request_uri を発行した (RFC 9126)。
    payload:
      occurredAt:   { type: Timestamp }
      tenantId:     { type: String, description: "PAR を受け付けたテナント ID。" }
      requestUri:   { type: String }
      clientId:     { type: String }

  DeviceAuthorizationRequested:
    kind: event
    description: "RFC 8628 §3.1 — device_code/user_code を発行した。user_code は監査ログに残さない。"
    payload:
      occurredAt:   { type: Timestamp }
      tenantId:     { type: String, description: "デバイス認可を受け付けたテナント ID。" }
      clientId:     { type: String }
      scopes:       { type: "String[]" }

  DeviceAuthorizationApproved:
    kind: event
    description: "RFC 8628 §3.3 — ユーザーが承認した。"
    payload:
      occurredAt:   { type: Timestamp }
      tenantId:     { type: String, description: "承認が起きたテナント ID。" }
      clientId:     { type: String }
      sub:          { type: String }

  DeviceAuthorizationDenied:
    kind: event
    description: "RFC 8628 §3.3 — ユーザーが拒否、または user_code 誤り続けた。"
    payload:
      occurredAt:   { type: Timestamp }
      tenantId:     { type: String, description: "拒否が起きたテナント ID。" }
      clientId:     { type: String }
      sub:          { type: String, optional: true }


# =================================================================
# 3. interfaces — 外部との契約 (HTTP API)
# =================================================================
#
# OAuth 2.0 / OIDC のエンドポイント契約。OpenAPI はここから生成される。

interfaces:

  RegisterClient:
    description: Dynamic Client Registration (RFC 7591)
    steps:
      - "{client_type} クライアント {client_name} を redirect_uri {redirect_uris} で登録する"
    input:
      request: { type: ClientRegistrationRequest }
    output:
      client: { type: OAuth2Client }
    errors: [InvalidRequestError]
    emits: [ClientRegistered]
    bindings:
      - { kind: http, method: POST, path: /register }

  Authorize:
    description: Authorization endpoint (RFC 6749 §4.1.1)
    steps:
      - "{client_id} として scope {scope} で認可リクエストを送る"
      - "{client_id} として redirect_uri {redirect_uri} で認可リクエストを送る"
      - "{client_id} として prompt {prompt} で認可リクエストを送る"
      - "request_uri {request_uri} で認可リクエストを送る"
    input:
      params: { type: AuthorizeParameters }
    errors: [InvalidRequestError, InvalidClientError, AccessDeniedError]
    emits: [AuthorizationCodeIssued, ConsentGranted]
    bindings:
      - { kind: http, method: GET, path: /authorize, request_form: query, successful_status_codes: ["302"] }

  GetBrowserTransaction:
    description: SPA が HttpOnly transaction cookie に対応するログイン・同意コンテキストを取得する。
    output:
      response: { type: BrowserTransactionResponse }
    errors: [InvalidRequestError]
    read_only: true
    bindings:
      - { kind: http, method: GET, path: /api/auth/transaction }

  SubmitBrowserLogin:
    description: SPA JSON API から browser password login を完了する。
    input:
      request: { type: BrowserLoginRequest }
    output:
      response: { type: BrowserFlowResponse }
    errors: [InvalidRequestError, AccessDeniedError]
    emits: [UserAuthenticated, AuthenticationFailed]
    bindings:
      - { kind: http, method: POST, path: /api/auth/login, request_body: json }

  SubmitBrowserConsent:
    description: SPA JSON API から authorization request の同意・拒否を確定する。
    input:
      request: { type: BrowserConsentRequest }
    output:
      response: { type: BrowserFlowResponse }
    errors: [InvalidRequestError, AccessDeniedError]
    emits: [ConsentGranted, AuthorizationCodeIssued]
    bindings:
      - { kind: http, method: POST, path: /api/auth/consent, request_body: json }

  SubmitBrowserDevice:
    description: SPA JSON API から device user_code を承認または拒否する。
    input:
      request: { type: BrowserDeviceRequest }
    output:
      response: { type: BrowserFlowResponse }
    errors: [InvalidRequestError, AccessDeniedError]
    emits: [DeviceAuthorizationApproved, DeviceAuthorizationDenied]
    bindings:
      - { kind: http, method: POST, path: /api/auth/device, request_body: json }

  SubmitBrowserTotp:
    description: SPA JSON API から TOTP コードを検証する。成功すれば LoginSession を認証完了状態に昇格させ、後続フロー (consent / authorization code 発行) に進む。他 factor は別 endpoint として定義する。
    input:
      request: { type: BrowserTotpRequest }
    output:
      response: { type: BrowserFlowResponse }
    errors: [InvalidRequestError, AccessDeniedError]
    emits: [UserAuthenticated, AuthenticationFailed]
    bindings:
      - { kind: http, method: POST, path: /api/auth/totp, request_body: json }

  ChangePassword:
    description: 認証済みユーザーが自身のパスワードを変更する。current_password を verify、new_password を PasswordPolicy objective で検証、PasswordHistoryNoReuse invariant で直近 history_depth 件と照合する。
    steps:
      - "認証済みユーザーが current_password と new_password で change-password を送る"
    input:
      request: { type: BrowserChangePasswordRequest }
    errors: [InvalidRequestError, AccessDeniedError]
    emits: [PasswordChanged]
    bindings:
      - { kind: http, method: POST, path: /api/auth/change_password, request_body: json }

  GetAccountSummary:
    description: |
      認証済みユーザーが自身のアカウント概要を取得する (self-service portal home)。
      対象は actor.sub に固定。roles を含まず、最終ログイン・パスワード変更日時・
      MFA 状態・未対応 required actions を返す。admin shell の AccountContext とは
      別契約 (wi-21 / ADR-042)。
    output:
      summary: { type: AccountSummary }
    errors: [AccessDeniedError]
    read_only: true
    bindings:
      - { kind: http, method: GET, path: /api/account/summary }

  GetUserProfile:
    description: |
      認証済みユーザーが自身のプロフィールを取得する (self-service)。対象は
      actor.sub に固定するため cross-user 参照は構造的に発生しない。attributes は
      self が読める分のみ、editable_attributes に編集可能定義を併せて返す (ADR-040)。
    output:
      profile: { type: AccountProfileResponse }
    errors: [AccessDeniedError]
    read_only: true
    bindings:
      - { kind: http, method: GET, path: /api/account/profile }

  UpdateUserProfile:
    description: |
      認証済みユーザーが自身の表示名と editable_by_user=true の属性を更新する
      (self-service)。actor.sub == target.sub に固定。属性は key 単位の merge とし、
      editable_by_user=false の key は拒否する。status / roles / organization の変更は
      admin 専用で本経路では扱わない (ADR-040)。
    input:
      request: { type: AccountProfileUpdateRequest }
    output:
      profile: { type: AccountProfileResponse }
    errors: [InvalidRequestError, AccessDeniedError]
    emits: [UserUpdated]
    bindings:
      - { kind: http, method: PATCH, path: /api/account/profile, request_form: body }

  RequestEmailChange:
    description: |
      認証済みユーザーが自身の primary email 変更を起票する (self-service)。新アドレスへ
      ワンタイムリンクを送るだけで User.email は変えない。actor.sub に固定し、tenant 内で
      既に使われているアドレスは拒否する (wi-21 / ADR-042)。
    input:
      request: { type: AccountEmailChangeRequest }
    errors: [InvalidRequestError, AccessDeniedError]
    emits: [EmailChangeRequested, EmailSent]
    bindings:
      - { kind: http, method: POST, path: /api/account/email/change_request, request_form: body }

  ConfirmEmailChange:
    description: |
      新アドレスへ送ったワンタイムリンクを消費して primary email を確定する。
      token が新アドレス所有の証左なので認証済みセッションは要求しない。確定時に
      email_verified=true とし、verify_email の required action があれば自動解除する。
    input:
      request: { type: AccountEmailChangeConfirm }
    errors: [InvalidRequestError]
    emits: [EmailChanged]
    bindings:
      - { kind: http, method: POST, path: /api/account/email/verify, request_form: body }

  ExportAccountData:
    description: |
      認証済みユーザーが自身の個人データを JSON で取得する (self-service, GDPR access)。
      対象は actor.sub に固定。本ステージは同期生成で profile と consents を含む。
    output:
      export: { type: AccountDataExport }
    errors: [AccessDeniedError]
    read_only: true
    bindings:
      - { kind: http, method: GET, path: /api/account/data_export }

  GetAccountSecurity:
    description: |
      認証済みユーザーが自身のセキュリティ概要を取得する (self-service)。対象は actor.sub に
      固定。パスワード変更日時と MFA (TOTP) 登録状態を返す (wi-21 / ADR-042)。
    output:
      security: { type: AccountSecurityResponse }
    errors: [AccessDeniedError]
    read_only: true
    bindings:
      - { kind: http, method: GET, path: /api/account/security }

  StartTotpEnrollment:
    description: |
      認証済みユーザーが TOTP 登録を開始する (self-service)。新しい secret と otpauth URI を
      返すだけで永続化はしない。既に TOTP factor がある場合は拒否する。
    output:
      enrollment: { type: TOTPEnrollmentStart }
    errors: [InvalidRequestError, AccessDeniedError]
    bindings:
      - { kind: http, method: POST, path: /api/account/mfa/totp/enroll/start }

  ConfirmTotpEnrollment:
    description: |
      secret に対するコードの所持証明を検証し、TOTP factor を永続化する (self-service)。
      actor.sub に固定し、確定時に User.mfa_enrolled を true にする。
    input:
      request: { type: TOTPEnrollmentConfirmRequest }
    errors: [InvalidRequestError, AccessDeniedError]
    emits: [MfaFactorEnrolled]
    bindings:
      - { kind: http, method: POST, path: /api/account/mfa/totp/enroll/confirm, request_form: body }

  RemoveTotpFactor:
    description: |
      有効な TOTP コード (所持証明) を検証してから TOTP factor を解除する (self-service)。
      actor.sub に固定し、解除時に User.mfa_enrolled を false に戻す。
    input:
      request: { type: MfaFactorRemoveRequest }
    errors: [InvalidRequestError, AccessDeniedError]
    emits: [MfaFactorRemoved]
    bindings:
      - { kind: http, method: POST, path: /api/account/mfa/totp/remove, request_form: body }

  ListMySignInActivity:
    description: |
      認証済みユーザーが自身の直近サインイン履歴を取得する (self-service, wi-20)。対象は
      actor.sub に固定。既存の監査イベントストア (UserAuthenticated) から発生時刻の降順で
      最大 limit 件を返す。limit 既定 10 / 上限 50。
    output:
      activity: { type: UserSignInActivityResponse }
    errors: [AccessDeniedError]
    read_only: true
    bindings:
      - { kind: http, method: GET, path: /api/account/signin_activity }

  ListUserSignInActivity:
    description: |
      admin が対象ユーザーのサインイン履歴を取得する (wi-20)。tenant 境界内に限定し、
      パス sub のユーザーの UserAuthenticated を発生時刻の降順で最大 limit 件返す。
    output:
      activity: { type: UserSignInActivityResponse }
    errors: [AccessDeniedError]
    read_only: true
    bindings:
      - { kind: http, method: GET, path: "/api/admin/users/{sub}/signin_activity" }

  RequestPasswordReset:
    description: |
      未認証ユーザーがパスワードリセットリンクの送信を要求する (ADR-030)。
      anti-enumeration のため、email の存在有無に関わらず常に 204 を返し、
      verified email を持つ user が見つかった場合のみ token を発行して
      EmailSender 経由で送信する。
    steps:
      - "未認証ユーザーが email を指定して reset リンクを要求する"
    input:
      request: { type: BrowserForgotPasswordRequest }
    emits: [PasswordResetRequested, EmailSent]
    bindings:
      - { kind: http, method: POST, path: /api/auth/forgot_password, request_body: json }

  ResetPasswordWithToken:
    description: |
      reset リンクから戻ってきたユーザーが新パスワードを設定する (ADR-030)。
      token を単発消費し、PasswordPolicy objective / PasswordHistoryNoReuse /
      BreachedPasswordChecker を通過した new_password で User.password_hash を
      更新する。成功時 PasswordChanged を emit。
    steps:
      - "未認証ユーザーが reset token と new_password で reset を完了する"
    input:
      request: { type: BrowserResetPasswordRequest }
    errors: [InvalidRequestError, AccessDeniedError]
    emits: [PasswordChanged]
    bindings:
      - { kind: http, method: POST, path: /api/auth/reset_password, request_body: json }

  GetBrowserDeviceContext:
    description: SPA が device user_code と CSRF token を取得する。
    output:
      response: { type: BrowserDeviceContextResponse }
    read_only: true
    bindings:
      - { kind: http, method: GET, path: /api/auth/device }

  EndSession:
    description: RP-Initiated Logout endpoint (OIDC RP-Initiated Logout 1.0)。redirect 検証は OAuth2/OIDC component が行い、session revocation は Authentication component の SessionManager に委譲する。
    steps:
      - "{client_id} として post_logout_redirect_uri {post_logout_redirect_uri} でログアウトする"
    input:
      params: { type: EndSessionParameters }
    errors: [InvalidRequestError]
    bindings:
      - { kind: http, method: GET, path: /end_session, request_form: query, successful_status_codes: ["200", "302"] }
      - { kind: http, method: POST, path: /end_session, request_form: form, successful_status_codes: ["200", "302"] }

  PushAuthorizationRequest:
    description: Pushed Authorization Request (RFC 9126)
    steps:
      - "{client_id} として認可リクエストを事前送信する"
    input:
      request: { type: ParRequest }
    output:
      response: { type: ParResponse }
    errors: [InvalidRequestError, InvalidClientError]
    emits: [PARStored]
    bindings:
      - { kind: http, method: POST, path: /par, request_form: form }

  Token:
    description: Token endpoint (RFC 6749 §3.2 + 9068 + 9449)
    steps:
      - "認可コード {code} を verifier {code_verifier} で交換する"
      - "リフレッシュトークン {refresh_token} を交換する"
      - "device_code {device_code} を交換する"
      - "client_credentials で scope {scope} のトークンを取得する"
    input:
      request: { type: TokenRequest }
    output:
      response: { type: TokenResponse }
    errors:
      - InvalidRequestError
      - InvalidClientError
      - InvalidGrantError
      - UnsupportedGrantTypeError
      - InvalidScopeError
      - InvalidDpopProofError
      - AuthorizationPendingError
      - SlowDownError
      - AccessDeniedError
      - ExpiredTokenError
    emits:
      - AccessTokenIssued
      - RefreshTokenIssued
      - RefreshTokenRotated
      - RefreshTokenReuseDetected
      - AuthorizationCodeRedeemed
    bindings:
      - kind: http
        method: POST
        path: /token
        request_form: form
        headers:
          dpop: { type: String, optional: true }

  Introspect:
    description: Token Introspection (RFC 7662)
    steps:
      - "トークン {token} を検査する"
    input:
      request: { type: IntrospectionRequest }
    output:
      response: { type: IntrospectionResponse }
    errors: [InvalidClientError, InvalidTokenError]
    emits: [TokenIntrospected]
    bindings:
      - { kind: http, method: POST, path: /introspect, request_form: form }

  Revoke:
    description: Token Revocation (RFC 7009)
    steps:
      - "トークン {token} を失効させる"
    input:
      request: { type: RevokeRequest }
    errors: [InvalidClientError]
    emits: [TokenRevoked]
    bindings:
      - { kind: http, method: POST, path: /revoke, request_form: form, successful_status_codes: ["200"] }

  UserInfo:
    description: UserInfo (OIDC Core §5.3)
    steps:
      - "トークン {access_token} でユーザー情報を取得する"
    output:
      response: { type: UserInfoResponse }
    errors: [InvalidTokenError, InsufficientScopeError]
    bindings:
      - kind: http
        method: GET
        path: /userinfo
        headers:
          authorization: { type: String }

  PostUserInfo:
    description: UserInfo の POST binding (OIDC Core §5.3)
    steps:
      - "トークン {access_token} でユーザー情報を取得する"
    output:
      response: { type: UserInfoResponse }
    errors: [InvalidTokenError, InsufficientScopeError]
    bindings:
      - kind: http
        method: POST
        path: /userinfo
        headers:
          authorization: { type: String }

  DeviceAuthorization:
    description: Device Authorization Request (RFC 8628 §3.1)
    steps:
      - "{client_id} として scope {scope} でデバイス認可を開始する"
    input:
      request: { type: DeviceAuthorizationRequest }
    output:
      response: { type: DeviceAuthorizationResponse }
    errors: [InvalidRequestError, InvalidClientError]
    emits: [DeviceAuthorizationRequested]
    bindings:
      - { kind: http, method: POST, path: /device_authorization, request_form: form }

  GetJwks:
    description: JWKS (RFC 7517)
    steps:
      - "JWKS を取得する"
    output:
      jwks: { type: JWKS }
    read_only: true
    bindings:
      - { kind: http, method: GET, path: /jwks }

  GetOpenidConfiguration:
    description: OIDC Discovery
    steps:
      - "Discovery 文書を取得する"
    output:
      discovery: { type: DiscoveryDocument }
    read_only: true
    bindings:
      - { kind: http, method: GET, path: /.well-known/openid-configuration }

  GetOauthAuthorizationServer:
    description: OAuth 2.0 Authorization Server Metadata (RFC 8414)
    steps:
      - "Authorization Server メタデータを取得する"
    output:
      discovery: { type: DiscoveryDocument }
    read_only: true
    bindings:
      - { kind: http, method: GET, path: /.well-known/oauth-authorization-server }

  Health:
    description: Health check
    read_only: true
    bindings:
      - { kind: http, method: GET, path: /health, successful_status_codes: ["200"] }

  ListAdminUsers:
    description: 管理者が削除されていないユーザーを一覧する。
    output:
      response: { type: AdminUserListResponse }
    errors: [AccessDeniedError]
    read_only: true
    bindings:
      - { kind: http, method: GET, path: /api/admin/users }

  GetAdminUser:
    description: 管理者が sub を指定してユーザーを取得する。
    input:
      sub: { type: String }
    output:
      user: { type: AdminUserResponse }
    errors: [InvalidRequestError, AccessDeniedError]
    read_only: true
    bindings:
      - { kind: http, method: GET, path: "/api/admin/users/{sub}" }

  CreateAdminUser:
    description: 管理者が PasswordPolicy objective を満たす初期パスワードでユーザーを作成する。
    input:
      request: { type: AdminUserCreateRequest }
    output:
      user: { type: AdminUserResponse }
    errors: [InvalidRequestError, AccessDeniedError]
    emits: [UserCreated]
    bindings:
      - { kind: http, method: POST, path: /api/admin/users, request_form: body, successful_status_codes: ["201"] }

  UpdateAdminUser:
    description: 管理者がユーザーのプロフィール、email_verified、roles を更新する。
    input:
      sub: { type: String }
      request: { type: AdminUserUpdateRequest }
    output:
      user: { type: AdminUserResponse }
    errors: [InvalidRequestError, AccessDeniedError]
    emits: [UserUpdated]
    bindings:
      - { kind: http, method: PATCH, path: "/api/admin/users/{sub}", request_form: body }

  DisableAdminUser:
    description: 管理者がユーザーを無効化し、新規ログインと既存セッション利用を拒否する。
    input:
      sub: { type: String }
    errors: [InvalidRequestError, AccessDeniedError]
    emits: [UserDisabled]
    bindings:
      - { kind: http, method: POST, path: "/api/admin/users/{sub}/disable", successful_status_codes: ["204"] }

  EnableAdminUser:
    description: 管理者が無効化済みユーザーを再有効化する。
    input:
      sub: { type: String }
    errors: [InvalidRequestError, AccessDeniedError]
    emits: [UserEnabled]
    bindings:
      - { kind: http, method: POST, path: "/api/admin/users/{sub}/enable", successful_status_codes: ["204"] }

  DeleteAdminUser:
    description: |
      管理者がユーザーを Delete する (ADR-036)。tombstone 化と cascade 削除を
      atomic に実施し、`sub` のみを audit 用に保持する。冪等で、既に削除済の
      user に対する再呼び出しは no-op として 204 を返す。自分自身を削除する
      ことはできない (admin / system_admin の自爆防止)。
    input:
      sub:    { type: String }
      reason: { type: String, optional: true, description: 監査用の任意自由記述。 }
    errors: [InvalidRequestError, AccessDeniedError]
    emits: [UserDeleted]
    bindings:
      - { kind: http, method: DELETE, path: "/api/admin/users/{sub}", request_form: body, successful_status_codes: ["204"] }

  SetUserRequiredAction:
    description: |
      管理者が対象ユーザーに次回ログイン時の強制アクション (RequiredAction) を
      付与する (wi-19)。update_password を付与されたユーザーは次回ログイン時に
      change-password 画面へ強制誘導される (本人の変更で自動解除)。冪等で、既に
      付与済みなら現状を返す。admin 専用。
    input:
      sub:     { type: String }
      request: { type: AdminRequiredActionRequest }
    output:
      user: { type: AdminUserResponse }
    errors: [InvalidRequestError, AccessDeniedError]
    emits: [UserRequiredActionSet]
    bindings:
      - { kind: http, method: POST, path: "/api/admin/users/{sub}/required_actions", request_form: body }

  ClearUserRequiredAction:
    description: |
      管理者が対象ユーザーの強制アクションを解除する (wi-19)。冪等で、未付与なら
      現状を返す。admin 専用。本人のパスワード変更に伴う update_password の自動
      解除は ChangePassword / ResetPasswordWithToken 側で発火する。
    input:
      sub:    { type: String }
      action: { type: RequiredAction }
    output:
      user: { type: AdminUserResponse }
    errors: [InvalidRequestError, AccessDeniedError]
    emits: [UserRequiredActionCleared]
    bindings:
      - { kind: http, method: DELETE, path: "/api/admin/users/{sub}/required_actions/{action}" }

  ListGroups:
    description: 管理者が所属テナントのグループを一覧する (ADR-038)。各グループは member_count を含む。
    output:
      response: { type: GroupListResponse }
    errors: [AccessDeniedError]
    read_only: true
    bindings:
      - { kind: http, method: GET, path: /api/admin/groups }

  GetGroup:
    description: 管理者が単一グループとそのメンバー一覧を取得する。別テナントのグループは未存在として扱う (ADR-038)。
    input:
      group_id: { type: String }
    output:
      group:   { type: GroupSummaryResponse }
      members: { type: "GroupMemberResponse[]" }
    errors: [InvalidRequestError, AccessDeniedError]
    read_only: true
    bindings:
      - { kind: http, method: GET, path: "/api/admin/groups/{group_id}" }

  CreateGroup:
    description: 管理者が所属テナントにグループを作成する。name はテナント内で一意 (ADR-038)。
    input:
      request: { type: GroupCreateRequest }
    output:
      group: { type: GroupSummaryResponse }
    errors: [InvalidRequestError, AccessDeniedError]
    emits: [GroupCreated]
    bindings:
      - { kind: http, method: POST, path: /api/admin/groups, request_form: body, successful_status_codes: ["201"] }

  UpdateGroup:
    description: 管理者がグループの name / description / roles を更新する (ADR-038)。
    input:
      group_id: { type: String }
      request:  { type: GroupUpdateRequest }
    output:
      group: { type: GroupSummaryResponse }
    errors: [InvalidRequestError, AccessDeniedError]
    emits: [GroupUpdated]
    bindings:
      - { kind: http, method: PATCH, path: "/api/admin/groups/{group_id}", request_form: body }

  DeleteGroup:
    description: 管理者がグループを削除する。所属 membership は cascade で解除する (ADR-038)。
    input:
      group_id: { type: String }
    errors: [InvalidRequestError, AccessDeniedError]
    emits: [GroupDeleted, GroupMemberRemoved]
    bindings:
      - { kind: http, method: DELETE, path: "/api/admin/groups/{group_id}", successful_status_codes: ["204"] }

  AddGroupMember:
    description: 管理者が User をグループに所属させる。同一テナントの User のみ許可し、既所属なら no-op (冪等) (ADR-038)。
    input:
      group_id: { type: String }
      user_sub: { type: String }
    errors: [InvalidRequestError, AccessDeniedError]
    emits: [GroupMemberAdded]
    idempotent: true
    bindings:
      - { kind: http, method: POST, path: "/api/admin/groups/{group_id}/members/{user_sub}", successful_status_codes: ["204"] }

  RemoveGroupMember:
    description: 管理者が User をグループから外す。非所属なら no-op (冪等) (ADR-038)。
    input:
      group_id: { type: String }
      user_sub: { type: String }
    errors: [InvalidRequestError, AccessDeniedError]
    emits: [GroupMemberRemoved]
    idempotent: true
    bindings:
      - { kind: http, method: DELETE, path: "/api/admin/groups/{group_id}/members/{user_sub}", successful_status_codes: ["204"] }

  ListUserGroups:
    description: 管理者が指定 User の所属グループと有効ロール内訳 (明示 / グループ由来 / union) を取得する (ADR-038)。
    input:
      sub: { type: String }
    output:
      response: { type: UserGroupsResponse }
    errors: [InvalidRequestError, AccessDeniedError]
    read_only: true
    bindings:
      - { kind: http, method: GET, path: "/api/admin/users/{sub}/groups" }

  ListAdminClients:
    description: 管理者が所属テナントの client を一覧する。
    output:
      response: { type: AdminClientListResponse }
    errors: [AccessDeniedError]
    read_only: true
    bindings:
      - { kind: http, method: GET, path: /api/admin/clients }

  GetAdminClient:
    description: 管理者が所属テナントの client を取得する。別テナントの client は未存在として扱う。
    input:
      client_id: { type: String }
    output:
      client: { type: AdminClientResponse }
    errors: [InvalidRequestError, AccessDeniedError]
    read_only: true
    bindings:
      - { kind: http, method: GET, path: "/api/admin/clients/{client_id}" }

  CreateAdminClient:
    description: 管理者が所属テナントに client を作成する。
    input:
      request: { type: AdminClientCreateRequest }
    output:
      response: { type: AdminClientCreateResponse }
    errors: [InvalidRequestError, AccessDeniedError]
    emits: [AdminClientCreated]
    bindings:
      - { kind: http, method: POST, path: /api/admin/clients, request_form: body, successful_status_codes: ["201"] }

  UpdateAdminClient:
    description: 管理者が所属テナントの client metadata を更新する。
    input:
      client_id: { type: String }
      request:   { type: AdminClientUpdateRequest }
    output:
      client: { type: AdminClientResponse }
    errors: [InvalidRequestError, AccessDeniedError]
    emits: [AdminClientUpdated]
    bindings:
      - { kind: http, method: PATCH, path: "/api/admin/clients/{client_id}", request_form: body }

  DeleteAdminClient:
    description: 管理者が所属テナントの client を削除する。
    input:
      client_id: { type: String }
    errors: [InvalidRequestError, AccessDeniedError]
    emits: [AdminClientDeleted]
    bindings:
      - { kind: http, method: DELETE, path: "/api/admin/clients/{client_id}", successful_status_codes: ["204"] }

  ListAdminConsents:
    description: 管理者が所属テナントの Consent を監査目的で一覧する。
    output:
      response: { type: AdminConsentListResponse }
    errors: [AccessDeniedError]
    read_only: true
    bindings:
      - { kind: http, method: GET, path: /admin/consents }

  GetAdminConsent:
    description: 管理者が所属テナントの Consent を subject と client_id で取得する。別テナントの Consent は未存在として扱う。
    input:
      sub:       { type: String }
      client_id: { type: String }
    output:
      consent: { type: AdminConsentResponse }
    errors: [InvalidRequestError, AccessDeniedError]
    read_only: true
    bindings:
      - { kind: http, method: GET, path: "/admin/consents/{sub}/{client_id}" }

  RevokeAdminConsent:
    description: 管理者が所属テナントの Consent を論理撤回する。管理者による Consent の作成・scope 拡張は許可しない。
    input:
      sub:       { type: String }
      client_id: { type: String }
    errors: [InvalidRequestError, AccessDeniedError]
    emits: [ConsentRevoked]
    bindings:
      - { kind: http, method: DELETE, path: "/admin/consents/{sub}/{client_id}", successful_status_codes: ["204"] }

  ListMyConsents:
    description: |
      認証済みユーザーが自身の接続済みアプリ (active な Consent) 一覧を取得する
      (self-service, wi-21)。対象は actor.sub に固定し、他人の Consent は返さない。
    output:
      response: { type: AccountConsentListResponse }
    errors: [AccessDeniedError]
    read_only: true
    bindings:
      - { kind: http, method: GET, path: /api/account/consents }

  RevokeMyConsent:
    description: |
      認証済みユーザーが自身の Consent を client_id 指定で論理撤回する (self-service)。
      actor.sub == target.sub に固定。次回その client の認可では consent が再要求される。
    input:
      client_id: { type: String }
    errors: [InvalidRequestError, AccessDeniedError]
    emits: [ConsentRevoked]
    bindings:
      - { kind: http, method: POST, path: "/api/account/consents/{client_id}/revoke", successful_status_codes: ["204"] }

  ListAdminAuditEvents:
    description: |
      管理者が所属テナントの監査用 DomainEvent を時系列降順で取得する。SOC / コンプライアンス
      用途を想定し、ページング (after / before / limit) と type / sub による絞り込みを提供する。
      system_admin であれば default tenant 経路から全テナント横断、admin は所属テナント内に閉じる。
    input:
      query: { type: AuditEventQuery }
    output:
      response: { type: AdminAuditEventListResponse }
    errors: [InvalidRequestError, AccessDeniedError]
    read_only: true
    bindings:
      - { kind: http, method: GET, path: /api/admin/audit_events }

  GetAdminAuditEvent:
    description: 管理者が監査イベント 1 件を ID で取得する。別テナントのイベントは未存在として扱う。
    input:
      id: { type: String }
    output:
      event: { type: AdminAuditEventResponse }
    errors: [InvalidRequestError, AccessDeniedError]
    read_only: true
    bindings:
      - { kind: http, method: GET, path: "/api/admin/audit_events/{id}" }

  ListAdminKeys:
    description: |
      管理者が JWKS に乗っている全署名鍵 (active + verifying) のメタデータを取得する。
      テナント横断は意味を持たない (現状 KeyStore は global)。Read 専用。
    output:
      response: { type: AdminKeyListResponse }
    errors: [AccessDeniedError]
    read_only: true
    bindings:
      - { kind: http, method: GET, path: /api/admin/keys }

  GetAdminKey:
    description: 管理者が kid を指定して 1 件取得する。存在しない kid は 404。
    input:
      kid: { type: String }
    output:
      key: { type: AdminKeyResponse }
    errors: [InvalidRequestError, AccessDeniedError]
    read_only: true
    bindings:
      - { kind: http, method: GET, path: "/api/admin/keys/{kid}" }

  RotateAdminKey:
    description: |
      新しい署名鍵を生成し active を切り替える。旧 active 鍵は JWKS に
      verifying として残存し、SigningKeyMinJwksOverlap 期間後に Retire される
      (Retire 処理は別の運用ジョブ)。system_admin が default tenant 経路から
      実行できる。emits SigningKeyRotated。
    output:
      response: { type: AdminRotateKeyResponse }
    errors: [AccessDeniedError]
    emits: [SigningKeyRotated]
    bindings:
      - { kind: http, method: POST, path: /api/admin/keys/rotate, successful_status_codes: ["200"] }

  ResolveTenant:
    description: |
      HTTP リクエストの path から所属テナントを解決する内部インターフェース (ADR-033)。
      `/realms/{tenant_id}/...` の prefix が無い場合は `default` テナントに解決する。
      不在テナントは 404 tenant_not_found、disabled テナントは OAuth/OIDC の
      protocol route では 400 invalid_request とし、いずれも存在や状態の詳細を漏らさない。
    input:
      path: { type: String, description: "HTTP リクエスト path" }
    output:
      tenant: { type: Tenant }
    errors: [InvalidRequestError]

  ListTenants:
    description: system_admin がテナント一覧を取得する。default control-plane tenant のセッションで認証する (ADR-032)。
    output:
      response: { type: TenantListResponse }
    errors: [AccessDeniedError]
    read_only: true
    bindings:
      - { kind: http, method: GET, path: /realms/default/admin/tenants }

  GetTenant:
    description: system_admin が単一テナントを取得する。
    input:
      tenant_id: { type: String }
    output:
      tenant: { type: TenantSummaryResponse }
    errors: [InvalidRequestError, AccessDeniedError]
    read_only: true
    bindings:
      - { kind: http, method: GET, path: "/realms/default/admin/tenants/{tenant_id}" }

  CreateTenant:
    description: system_admin が新規テナントを作成する。
    input:
      request: { type: TenantCreateRequest }
    output:
      tenant: { type: TenantSummaryResponse }
    errors: [InvalidRequestError, AccessDeniedError]
    emits: [TenantCreated]
    bindings:
      - { kind: http, method: POST, path: /realms/default/admin/tenants, request_form: body, successful_status_codes: ["201"] }

  UpdateTenant:
    description: system_admin がテナントの表示名を更新する。
    input:
      tenant_id: { type: String }
      request:   { type: TenantUpdateRequest }
    output:
      tenant: { type: TenantSummaryResponse }
    errors: [InvalidRequestError, AccessDeniedError]
    emits: [TenantUpdated]
    bindings:
      - { kind: http, method: PATCH, path: "/realms/default/admin/tenants/{tenant_id}", request_form: body }

  DisableTenant:
    description: system_admin が default 以外のテナントを無効化する。/authorize / /token / /login 等は一律 invalid_request になる。
    input:
      tenant_id: { type: String }
    errors: [InvalidRequestError, AccessDeniedError]
    emits: [TenantDisabled]
    bindings:
      - { kind: http, method: POST, path: "/realms/default/admin/tenants/{tenant_id}/disable", successful_status_codes: ["204"] }

  EnableTenant:
    description: system_admin が無効化済みテナントを再有効化する。
    input:
      tenant_id: { type: String }
    errors: [InvalidRequestError, AccessDeniedError]
    emits: [TenantEnabled]
    bindings:
      - { kind: http, method: POST, path: "/realms/default/admin/tenants/{tenant_id}/enable", successful_status_codes: ["204"] }

  GetAdminSettings:
    description: |
      テナント内 admin が自身のテナントの設定 (表示名 / パスワードポリシー上書き) を取得する。
      対象テナントは actor.tenant_id に固定するため cross-tenant 読み出しは構造的に発生しない。
      `/admin/tenants` (system_admin 専用) とは別経路で、admin にも開放される (ADR-032)。
      レスポンスには objectives.PasswordPolicy の現行値 (password_policy_defaults) を
      含め、UI が「上書きしないときに実際に適用される値」を具体数字で示せるようにする。
    output:
      settings: { type: AdminSettingsResponse }
    errors: [AccessDeniedError]
    read_only: true
    bindings:
      - { kind: http, method: GET, path: /api/admin/settings }

  UpdateAdminSettings:
    description: |
      テナント内 admin が自身のテナントの設定を更新する。display_name と
      password_policy_override のいずれかまたは両方を任意フィールドとして受け取り、
      actor.tenant_id に固定した上で UpdateTenant のロジックを実行する (ADR-032)。
      password_policy_override が objectives.PasswordPolicy の標準値より弱い場合
      (min_length 下回り / max_length 上回り / history_depth 下回り) は use case
      側で拒否する。
    input:
      request: { type: TenantUpdateRequest }
    output:
      settings: { type: AdminSettingsResponse }
    errors: [InvalidRequestError, AccessDeniedError]
    emits: [TenantUpdated]
    bindings:
      - { kind: http, method: PATCH, path: /api/admin/settings, request_form: body }

  GetTenantUserAttributeSchema:
    description: |
      テナント内 admin が自身のテナントの custom 属性定義を取得する (ADR-040)。
      対象テナントは actor.tenant_id に固定し cross-tenant 読み出しを構造的に排除する。
      レスポンスには tenant 固有の custom 定義に加えて組み込みカタログ (builtin) も
      含め、UI が全属性を一覧しつつ key 衝突を避けられるようにする。
    output:
      schema: { type: TenantUserAttributeSchemaResponse }
    errors: [AccessDeniedError]
    read_only: true
    bindings:
      - { kind: http, method: GET, path: /api/admin/tenant/user_attribute_schema }

  UpdateTenantUserAttributeSchema:
    description: |
      テナント内 admin が custom 属性定義を全置換する (ADR-040)。actor.tenant_id に
      固定した上で、各 UserAttributeDef を検証し、組み込み属性との key 衝突・重複 key を
      拒否する。値そのものは保持せず定義のみを扱う。
    input:
      request: { type: TenantUserAttributeSchemaUpdateRequest }
    output:
      schema: { type: TenantUserAttributeSchemaResponse }
    errors: [InvalidRequestError, AccessDeniedError]
    emits: [TenantUserAttributeSchemaUpdated]
    bindings:
      - { kind: http, method: PUT, path: /api/admin/tenant/user_attribute_schema, request_form: body }


# =================================================================
# 4. states — 状態遷移
# =================================================================

states:

  AuthorizationCodeFlow:
    description: /authorize から /token に至る authorization request のライフサイクル。
    target: AuthorizationRequest
    initial: Received
    terminal: [Exchanged, Rejected, Expired]
    transitions:
      - { from: Received,                event: Validate,         to: AuthenticationPending }
      - { from: Received,                event: Reject,           to: Rejected }
      - { from: AuthenticationPending,   event: AuthenticateUser, to: Authenticated }
      - { from: AuthenticationPending,   event: Reject,           to: Rejected }
      - { from: AuthenticationPending,   event: Expire,           to: Expired }
      - { from: Authenticated,           event: RequestConsent,   to: ConsentPending }
      - { from: Authenticated,           event: IssueCode,        to: CodeIssued }
      - { from: Authenticated,           event: Reject,           to: Rejected }
      - { from: ConsentPending,          event: GrantConsent,     to: Consented }
      - { from: ConsentPending,          event: Reject,           to: Rejected }
      - { from: ConsentPending,          event: Expire,           to: Expired }
      - { from: Consented,               event: IssueCode,        to: CodeIssued }
      - { from: Consented,               event: Reject,           to: Rejected }
      - { from: CodeIssued,              event: RedeemCode,       to: Exchanged }
      - { from: CodeIssued,              event: Expire,           to: Expired }

  DeviceCodeFlow:
    description: RFC 8628 デバイス認可グラントのライフサイクル。device_code と user_code がペアで進む。
    target: DeviceAuthorization
    initial: Issued
    terminal: [Exchanged, Denied, Expired]
    transitions:
      - { from: Issued,                  event: EnterUserCode,    to: UserCodeEntered }
      - { from: Issued,                  event: Expire,           to: Expired }
      - { from: UserCodeEntered,         event: Approve,          to: Approved }
      - { from: UserCodeEntered,         event: Deny,             to: Denied }
      - { from: UserCodeEntered,         event: Expire,           to: Expired }
      - { from: Approved,                event: Exchange,         to: Exchanged }
      - { from: Approved,                event: Expire,           to: Expired }
  RefreshTokenLifecycle:
    description: RefreshToken のライフサイクル。Rotate で子トークンに引き継がれ、Revoke で失効、Expire で期限切れ。Rotated 後も家族失効により Revoked へ遷移しうる（RFC 9700 §4.14）。
    target: RefreshTokenRecord
    initial: Active
    terminal: [Revoked, Expired]
    transitions:
      - { from: Active,  event: Rotate,      to: Rotated }
      - { from: Active,  event: RevokeToken, to: Revoked }
      - { from: Active,  event: Expire,      to: Expired }
      - { from: Rotated, event: RevokeToken, to: Revoked }
      - { from: Rotated, event: Expire,      to: Expired }

  AuthorizationCodeRecordLifecycle:
    description: 発行された AuthorizationCode 本体のライフサイクル。AuthorizationCodeFlow（AuthorizationRequest 側）の Exchanged に対応するのが Redeemed。
    target: AuthorizationCodeRecord
    initial: Issued
    terminal: [Redeemed, Expired]
    transitions:
      - { from: Issued, event: RedeemCode, to: Redeemed }
      - { from: Issued, event: Expire,     to: Expired }

  ConsentLifecycle:
    description: 同意レコードのライフサイクル。GDPR Art.7(3) により Granted → Revoked が可能。
    target: Consent
    initial: Granted
    terminal: [Revoked, Expired]
    transitions:
      - { from: Granted, event: RevokeConsent, to: Revoked }
      - { from: Granted, event: Expire,        to: Expired }

  PARRecordLifecycle:
    description: PAR で発行された request_uri のライフサイクル。/authorize から一度だけ参照可能（RFC 9126）。
    target: PARRecord
    initial: Stored
    terminal: [Used, Expired]
    transitions:
      - { from: Stored, event: Use,    to: Used }
      - { from: Stored, event: Expire, to: Expired }

  SigningKeyLifecycle:
    description: 署名鍵のライフサイクル（ADR-009 / SigningKeyMinJwksOverlap）。Active から Rotate で Verifying に降り、Retire で JWKS から外し、Archive で監査保管に入る。
    target: SigningKey
    initial: Active
    terminal: [Archived]
    transitions:
      - { from: Active,    event: Rotate,  to: Verifying }
      - { from: Verifying, event: Retire,  to: Retired }
      - { from: Retired,   event: Archive, to: Archived }

  TenantLifecycle:
    description: テナント (ADR-032) のライフサイクル。Active で通常稼働、Disable で全プロトコルルートを停止、Enable で復帰。物理削除は本フェーズ対象外。
    target: Tenant
    initial: Active
    terminal: []
    transitions:
      - { from: Active,   event: Disable, to: Disabled }
      - { from: Disabled, event: Enable,  to: Active }

  UserLifecycle:
    description: |
      User aggregate のライフサイクル (ADR-031 / ADR-036)。Active が通常稼働、
      Disable で復活可能な無効化、Delete で tombstone 化 (anonymize cascade) と
      なる。Deleted は終端で復元できない。
    target: User
    initial: Active
    terminal: [Deleted]
    transitions:
      - { from: Active,   event: Disable, to: Disabled }
      - { from: Active,   event: Delete,  to: Deleted }
      - { from: Disabled, event: Enable,  to: Active }
      - { from: Disabled, event: Delete,  to: Deleted }

  GroupLifecycle:
    description: |
      Group aggregate のライフサイクル (ADR-038)。単一状態 Active のみを持つ。
      無効化状態は持たず、削除は aggregate 自体の物理削除 (DeleteGroup) で表す。
    target: Group
    initial: Active
    terminal: []
    transitions: []


# =================================================================
# 5. invariants — 不変条件
# =================================================================

invariants:

  # ---------- セキュリティ法則 ----------
  PkceRoundTrip:
    description: |
      任意の verifier in [A-Za-z0-9._~-]{43,128} に対して、
      challenge = base64url(SHA256(verifier)) としたとき、verifyPkce(verifier, challenge, S256) は true。
      反例: PKCE が壊れている。認可コード横取り攻撃の防御がない。
    always: "verifyPkce(verifier, base64url(sha256(verifier)), S256) == true"

  AuthCodeStateSafety:
    description: 任意のイベント列を AuthorizationCodeFlow に逐次適用しても、状態は宣言された値の部分集合に留まる。
    target: AuthorizationRequest
    always:
      in: [state, AuthorizationCodeState.values]

  DeviceCodeStateSafety:
    description: 任意のイベント列を DeviceCodeFlow に逐次適用しても、状態は宣言された値の部分集合に留まる。
    target: DeviceAuthorization
    always:
      in: [state, DeviceCodeState.values]

  RefreshFamilyTransitiveRevoke:
    description: |
      RevokeFamily(f) 後、family_id == f のすべての RefreshToken の state が Revoked になる。
      反例: ファミリー失効の取りこぼし。RFC 9700 §4.14 違反。
    target: RefreshTokenRecord
    assuming: "event == RevokeFamily"
    eventually:
      forall:
        in: RefreshTokenRecords
        satisfies: "x.family_id != event.family_id or x.state == Revoked"
    within: 1s

  RefreshRotationParentInvariants:
    description: |
      親 p を rotate(p, child) した直後の不変条件。
      反例: absolute TTL が延長され、攻撃者が refresh chain を無限延長可能になる。
    target: RefreshTokenRecord
    assuming: "event == RotateRefreshToken"
    always:
      and:
        - "next.parent.state == Rotated"
        - "next.child.parent_id == prev.parent.id"
        - "next.child.family_id == prev.parent.family_id"
        - "next.child.absolute_expires_at == prev.parent.absolute_expires_at"

  DpopJtiUniquenessWithinWindow:
    description: |
      window 秒以内に同一 jti を含む DPoP proof は受理されない。
      反例: DPoP リプレイ攻撃の成功。RFC 9449 違反。
    assuming: "event == AcceptDpopProof"
    never:
      exists:
        in: SeenJtis
        satisfies: "x.jti == event.jti and (event.at - x.seen_at) <= window"

  TokenHashOneWay:
    description: |
      RefreshTokenRecord にはハッシュのみが保存され、平文が残らない。
      反例: トークン平文漏洩、horizontal escalation の可能性。
    target: RefreshTokenRecord
    always:
      and:
        - { exists: hash }
        - { not_exists: plaintext }

  # ---------- 単一使用 ----------
  AuthorizationCodeSingleUse:
    description: 発行された AuthorizationCode は最大1回だけ Redeemed に到達する。再使用は InvalidGrant。
    target: AuthorizationCodeRecord
    assuming: "event == RedeemCode"
    never: "prev.state != Issued"

  ParRequestUriSingleUse:
    description: PAR で発行された request_uri は使用直後に無効化される。
    target: PARRecord
    assuming: "event == Use"
    never: "prev.state != Stored"

  # ---------- TTL / 寿命 ----------
  AuthorizationCodeTtl:
    description: AuthorizationCode の TTL は最大 60 秒（RFC 9700 §4.10）。
    target: AuthorizationCodeRecord
    always: "expires_at - issued_at <= 60s"

  AuthorizationCodeEventuallyResolves:
    description: 発行された AuthorizationCode は必ず Redeemed または Expired に到達する。
    target: AuthorizationCodeRecord
    eventually: { in: [state, [Redeemed, Expired]] }
    within: 60s

  DeviceCodeEventuallyResolves:
    description: 発行された DeviceCode は必ず Exchanged / Denied / Expired のいずれかに到達する。
    target: DeviceAuthorization
    eventually: { in: [state, [Exchanged, Denied, Expired]] }
    within: 15m   # RFC 8628 の代表的なデフォルト expires_in

  RefreshTokenAbsoluteTtl:
    description: RefreshToken の絶対 TTL は通常 TTL 以上（ローテーション越境不可、ADR-004）。
    target: RefreshTokenRecord
    always: "absolute_expires_at >= expires_at"

  # ---------- 署名鍵運用 ----------
  SigningKeyMaxAge:
    description: 有効な署名鍵は 90 日を超えない間隔で回転する（ADR-009）。
    target: SigningKey
    eventually: "event == SigningKeyRotated"
    within: 90d
    assuming: "state == Active"

  # ---------- redirect_uri 厳密一致 ----------
  RedirectUriExactMatch:
    description: 認可リクエストの redirect_uri は登録 URI のいずれかと完全文字列一致しなければならない（RFC 9700 §4.1.3）。
    assuming: "event == ValidateAuthorizeRequest"
    always:
      exists:
        in: client.redirect_uris
        satisfies: "x == request.redirect_uri"

  # ---------- PKCE 必須 ----------
  PkceMandatory:
    description: 認可コードフローのすべての要求に対して code_challenge を必須とする（例外なし、ADR-002）。
    assuming: "event == ValidateAuthorizeRequest"
    always: "exists(request.code_challenge) and request.code_challenge_method == S256"

  AccessTokenIssuedOnlyAfterConsent:
    description: Authorization Code Grant の AccessToken は、対応する Subject × Client × Scope の Consent が Granted の場合のみ発行される。
    assuming: "event == AccessTokenIssued and event.grant_type == AuthorizationCode"
    always:
      exists:
        in: Consents
        satisfies: |
          x.subject == event.subject
          and x.client_id == event.client_id
          and x.state == Granted
          and forall: { in: event.scope, satisfies: "x in x.scopes" }

  AllAccessTokensCarryAudience:
    description: 発行されたすべての AccessToken は非空の audience を持つ（RFC 8707 / RFC 9068）。
    target: AccessToken
    always: "exists(audience) and len(audience) >= 1"

  # ---------- パスワード履歴 ----------
  PasswordHistoryNoReuse:
    description: |
      change-password 受領時、新パスワードは同一 sub の直近 history_depth 件のハッシュと
      一致してはならない。ADR-027 / PasswordPolicy.value.history_depth。
      反例: 直前のパスワードを再設定でき、漏洩済みクレデンシャルでログイン可能なまま。
    assuming: "event == ChangePassword"
    never:
      exists:
        in: "PasswordHistoryEntries(sub=event.sub, depth=PasswordPolicy.value.history_depth)"
        satisfies: "PasswordHasher.verify(event.new_password, x.encoded) == true"

  # ---------- グループ由来ロールの合成 (ADR-038) ----------
  EffectiveRolesComposition:
    description: |
      認可判断で用いる User の有効ロールは、user.roles と所属 Group の roles の
      和集合に等しくなければならない。階層・deny・自動所属は存在しない (union のみ)。
      所属グループが空のとき effective_roles は user.roles に一致する (後方互換)。
    target: User
    always: "EffectiveRoles(user) == union(user.roles, flatten(group.roles for group in GroupsOfUser(user)))"

  GroupMembershipAuditEmission:
    description: |
      グループのライフサイクル操作 (create / update / delete) とメンバーシップ操作
      (add / remove) は、状態を変化させた場合に必ず対応する domain event と
      AdminAuditEvent を emit しなければならない。冪等な no-op (既所属の add /
      非所属の remove) では emit しない。DeleteGroup の cascade では解除メンバー
      ごとに GroupMemberRemoved を emit する。
    target: Group
    always: "(GroupCreate | GroupUpdate | GroupDelete | GroupMemberAdd | GroupMemberRemove) changes state => corresponding domain event and AdminAuditEvent are emitted"

  # ---------- クライアント認証エラー一様化 ----------
  ClientAuthFailureUniformity:
    description: クライアント認証失敗時、client_id の存在有無を開示しない（タイミング差・エラーメッセージ差を出さない）。
    assuming: "event == ClientAuthenticationFailed"
    always:
      and:
        - "error == InvalidClient"
        - "len(error_description) == len(error_description_constant)"  # メッセージは固定文字列


# =================================================================
# 6. scenarios — Given-When-Then の具体例
# =================================================================

scenarios:

  認可コードフローでアクセストークンと ID トークンを取得できる:
    description: 認可リクエスト→認可コード交換と進み、PKCE 検証を経てトークン一式を得る。
    steps:
      - confidential クライアント "web-app" を redirect_uri "https://app.example.com/callback" で登録する
      - ユーザー "alice" が "web-app" に scope "openid profile" を同意済みである
      - '"web-app" として scope "openid profile" で認可リクエストを送る'
      - 発行された認可コードを正しい PKCE verifier で交換する
      - 応答に access_token・id_token・refresh_token が含まれ token_type は Bearer
      - '"UserAuthenticated" が発行される'
      - '"AuthorizationCodeIssued" が発行される'
      - '"AuthorizationCodeRedeemed" が発行される'
      - '"AccessTokenIssued" が発行される'
      - '"RefreshTokenIssued" が発行される'

  PKCE verifier が不一致なら拒否される:
    description: 400 invalid_grant で拒否される。
    steps:
      - 認可コードを誤った code_verifier で交換する
      - 'エラー "InvalidGrantError"'

  認可コードを 2 回交換するとトークンファミリーが全失効する:
    steps:
      - 発行済み認可コード "AC1"（family_id "F1"）を用意する
      - 認可コード "AC1" を verifier "v" で交換する
      - 認可コード "AC1" を verifier "v" で交換する
      - 1 回目の応答には access_token が含まれる
      - '2 回目はエラー "InvalidGrantError"'
      - family_id "F1" のトークンがすべて失効する
      - '"RefreshTokenReuseDetected" が発行される'
      - '"TokenRevoked" が発行される'

  リフレッシュトークンを使うと新トークンが返り旧トークンは無効化される:
    steps:
      - 有効な refresh token "RT1" を用意する
      - リフレッシュトークン "RT1" を交換する
      - 応答に新しい access_token と refresh_token が含まれる
      - '"RT1" の状態は "Rotated"'
      - '"RefreshTokenRotated" が発行される'
      - '"AccessTokenIssued" が発行される'
      - '"RefreshTokenIssued" が発行される'

  旧リフレッシュトークンの再使用はファミリー全体を失効させる:
    steps:
      - 有効な refresh token "RT1"（family_id "F1"）を用意する
      - リフレッシュトークン "RT1" を交換する
      - リフレッシュトークン "RT1" を交換する
      - ローテーションの応答には access_token と refresh_token が含まれる
      - '再使用はエラー "InvalidGrantError"'
      - '"RT1" の状態は "Revoked"'
      - family_id "F1" のトークンがすべて失効する
      - '"RefreshTokenRotated" が発行される'
      - '"RefreshTokenReuseDetected" が発行される'
      - '"TokenRevoked" が発行される'

  不正な client_secret は invalid_client で拒否される:
    description: client_id の存在有無は開示しない。
    steps:
      - 既知のクライアントを誤った client_secret で認可コードを交換する
      - 'エラー "InvalidClientError"'

  未知の client_id も一律 invalid_client で拒否される:
    description: タイミング差が出ないよう一律に拒否する。
    steps:
      - 未知の client_id で認可コードを交換する
      - 'エラー "InvalidClientError"'

  未登録の redirect_uri へはリダイレクトしない:
    steps:
      - '"web-app" として redirect_uri "https://evil.example/cb" で認可リクエストを送る'
      - 'エラー "InvalidRequestError"'
      - リダイレクトは行われず IdP がエラーページを表示する

  既存の同意があれば同意画面はスキップされる:
    steps:
      - ユーザー "alice" が "web-app" に scope "openid profile" を同意済みである
      - '"web-app" として scope "openid profile" で認可リクエストを送る'
      - 認可リクエストの状態は Consented
      - 同意 UI は表示されない

  prompt=consent は既存同意があっても再同意を求める:
    steps:
      - ユーザー "alice" が "web-app" に scope "openid profile" を同意済みである
      - '"web-app" として prompt "consent" で認可リクエストを送る'
      - 認可リクエストの状態は ConsentPending

  PAR 経由の request_uri は一度だけ参照できる:
    description: RFC 9126。使用直後に無効化される。
    steps:
      - クライアント "web-app" を用意する
      - '"web-app" として認可リクエストを事前送信する'
      - 'request_uri "<返された値>" で認可リクエストを送る'
      - PAR 応答に request_uri が含まれ expires_in は 600 以下
      - その PAR レコードの状態は "Used"
      - '"PARStored" が発行される'
      - '"AuthorizationCodeIssued" が発行される'

  FAPI クライアントは PAR なしの直接認可リクエストを拒否される:
    steps:
      - PAR 必須の FAPI クライアント "fapi-app" を用意する
      - '"fapi-app" として scope "openid" で認可リクエストを送る'
      - 'エラー "InvalidRequestError"'

  DPoP 証明付き要求はセンダー制約付きトークンを発行する:
    steps:
      - 有効な DPoP 証明を付けて認可コードを交換する
      - 発行された access token は DPoP 鍵サムプリントに cnf でバインドされる
      - 発行された refresh token のセンダー制約は Dpop

  iat が 60 秒以上古い DPoP 証明は拒否される:
    description: RFC 9449。
    steps:
      - iat "2026-01-01T00:00:00Z" の DPoP 証明を用意する
      - 時刻が "2026-01-01T00:01:30Z" になる
      - その DPoP 証明を付けて認可コードを交換する
      - 'エラー "InvalidDpopProofError"'

  同一 DPoP jti の再使用はリプレイとして拒否される:
    steps:
      - jti "ABC" の DPoP 証明を用意する
      - その証明を付けて認可コードを交換する
      - 同じ jti "ABC" の DPoP 証明を付けて認可コードを交換する
      - 1 回目の応答には access_token が含まれる
      - '2 回目はエラー "InvalidDpopProofError"'

  有効なトークンの introspection は active=true を返す:
    steps:
      - 有効な access token "AT1" を用意する
      - 認証済み ResourceServer としてトークン "AT1" を検査する
      - 応答は active=true で scope・client_id・sub・exp・iat を含む

  失効済みトークンの introspection は active=false のみ返す:
    steps:
      - 失効済み access token "AT1" を用意する
      - トークン "AT1" を検査する
      - 応答は active=false のみで他のフィールドを含まない

  openid スコープ付きトークンでユーザー情報は sub を返す:
    steps:
      - scope "openid profile" の access token "AT1" を用意する
      - トークン "AT1" でユーザー情報を取得する
      - 応答に sub・name・preferred_username が含まれる

  openid スコープのないトークンのユーザー情報取得は拒否される:
    description: 403 insufficient_scope。
    steps:
      - scope "profile" のみの access token "AT1" を用意する
      - トークン "AT1" でユーザー情報を取得する
      - 'エラー "InsufficientScopeError"'

  Discovery 文書は宣言された全エンドポイントを広告する:
    steps:
      - Discovery 文書を取得する
      - 応答に issuer・authorization_endpoint・token_endpoint・userinfo_endpoint・jwks_uri・introspection_endpoint・revocation_endpoint・pushed_authorization_request_endpoint・device_authorization_endpoint・registration_endpoint が含まれる

  鍵回転後も旧 kid の JWKS エントリは保持される:
    steps:
      - kid "kid-old" を "kid-new" に回転した署名鍵を用意する
      - JWKS を取得する
      - 応答に kid "kid-old" と "kid-new" の両方が含まれる

  認可コードの並行交換はちょうど一方だけ成功する:
    description: |
      互いに観測しない並行呼び出しのうち一方のみ成功し、
      成功側のファミリーも再使用検出により最終的に全失効する。
    tags: [concurrency]
    steps:
      - 発行済み認可コード "AC1"（family_id "F1"）を用意する
      - 認可コード "AC1" を verifier "v" で並行に 2 回交換する
      - 'ちょうど一方が成功し、もう一方はエラー "InvalidGrantError"'
      - family_id "F1" のトークンがすべて失効する
      - '"AuthorizationCodeRedeemed" が発行される'
      - '"RefreshTokenReuseDetected" が発行される'
      - '"TokenRevoked" が発行される'

  # ---------- 動的クライアント登録 ----------
  動的クライアント登録は client_id を採番して返す:
    description: RFC 7591 §3.2.1 — 成功応答は client_id と client_metadata を返す。
    steps:
      - confidential クライアント "web-app" を redirect_uri "https://app.example.com/callback" で登録する
      - 応答に client_id と client_secret が含まれる
      - '"ClientRegistered" が発行される'

  redirect_uri が無いクライアント登録は拒否される:
    steps:
      - confidential クライアント "web-app" を redirect_uri "" で登録する
      - 'エラー "InvalidRequestError"'

  # ---------- TTL 越え ----------
  60 秒経過した認可コードの交換は拒否される:
    description: RFC 9700 §4.10 — TTL 60 秒を超えると invalid_grant。
    steps:
      - issued_at "2026-01-01T00:00:00Z" の認可コード "AC1" を用意する
      - 時刻が "2026-01-01T00:01:30Z" になる
      - 認可コード "AC1" を verifier "v" で交換する
      - 'エラー "InvalidGrantError"'
      - '"AC1" の状態は "Expired"'

  absolute_expires_at を超えた refresh token はローテーション不可:
    description: ADR-004 — ローテーションで延長されない絶対 TTL。
    steps:
      - absolute_expires_at "2026-01-01T00:00:00Z" の refresh token "RT1" を用意する
      - 時刻が "2026-01-02T00:00:00Z" になる
      - リフレッシュトークン "RT1" を交換する
      - 'エラー "InvalidGrantError"'

  # ---------- /revoke ----------
  /revoke でリフレッシュトークンを失効できる:
    steps:
      - 有効な refresh token "RT1" を用意する
      - トークン "RT1" を失効させる
      - '"RT1" の状態は "Revoked"'
      - '"TokenRevoked" が発行される'

  他クライアントの所有トークンの失効要求は静かに無視される:
    description: RFC 7009 §2.2 — 所有者でないクライアントからの失効要求は 200 OK のみ返し、実際の失効は行わない（盗難検知防止）。
    steps:
      - クライアント "client-A" が所有する refresh token "RT1" を用意する
      - '"client-B" としてトークン "RT1" を失効させる'
      - '"RT1" の状態は "Active"'

  失効した access_token でユーザー情報取得は invalid_token で拒否される:
    steps:
      - 有効な access token "AT1" を用意する
      - トークン "AT1" を失効させる
      - トークン "AT1" でユーザー情報を取得する
      - 'エラー "InvalidTokenError"'

  # ---------- offline_access / nonce ----------
  offline_access スコープがあれば refresh_token も発行される:
    description: OIDC Core §11 — refresh_token は offline_access 付与時のみ。
    steps:
      - confidential クライアント "web-app" を grant_types に "authorization_code"・"refresh_token" 含めて登録する
      - '"web-app" として scope "openid offline_access" で認可リクエストを送る'
      - 発行された認可コードを verifier "v" で交換する
      - 応答に refresh_token が含まれる
      - '"RefreshTokenIssued" が発行される'

  offline_access が無いと refresh_token は発行されない:
    steps:
      - '"web-app" として scope "openid profile" で認可リクエストを送る'
      - 発行された認可コードを verifier "v" で交換する
      - 応答に refresh_token は含まれない

  認可リクエストの nonce は ID トークンに伝播する:
    description: OIDC Core §3.1.2.1 — リプレイ防止のため nonce は id_token に必須で含む。
    steps:
      - '"web-app" として scope "openid"、nonce "n-12345" で認可リクエストを送る'
      - 発行された認可コードを verifier "v" で交換する
      - 応答の id_token の nonce クレームは "n-12345"

  # ---------- max_age / prompt ----------
  max_age を超えた前回認証では再認証を要求する:
    description: OIDC Core §3.1.2.1 — auth_time が max_age 秒以上前なら再認証必須。
    steps:
      - ユーザー "alice" が auth_time "2026-01-01T00:00:00Z" で認証済みである
      - 時刻が "2026-01-01T02:00:00Z" になる
      - '"web-app" として max_age "60" で認可リクエストを送る'
      - 認可リクエストの状態は AuthenticationPending

  prompt=none でセッションが無い場合は拒否される:
    description: OIDC Core §3.1.2.1 — 対話なし要求に対しセッションが無ければ access_denied。
    steps:
      - 未認証セッションで '"web-app" として prompt "none" で認可リクエストを送る'
      - 'エラー "AccessDeniedError"'

  パスワードログイン後はセッション Cookie で認可を継続できる:
    description: ユーザー名・パスワード認証に成功すると HttpOnly セッション Cookie を発行し、同じ認可リクエストを継続する。
    steps:
      - 未認証セッションで '"web-app" として認可リクエストを送る'
      - browser login API に username "alice" と正しい password を送信する
      - セッション Cookie が発行される
      - 認可コードが redirect_uri に返る
      - '"UserAuthenticated" が発行される'

  browser login API の CSRF 不一致は拒否される:
    description: SameSite cookie と request token が一致しない browser login API は invalid_request。
    steps:
      - 未認証セッションで '"web-app" として認可リクエストを送る'
      - csrf 値を改ざんして browser login API を送信する
      - 'エラー "InvalidRequestError"'

  prompt=login は既存セッションがあっても再認証を要求する:
    description: OIDC Core §3.1.2.1 — prompt=login は既存セッションの再利用を禁止する。
    steps:
      - ユーザー "alice" が現在時刻で認証済みである
      - '"web-app" として prompt "login" で認可リクエストを送る'
      - 認可リクエストの状態は AuthenticationPending

  RP-Initiated Logout は登録済み post_logout_redirect_uri にだけリダイレクトする:
    description: OIDC RP-Initiated Logout 1.0 — logout 後の redirect URI はクライアント登録済み URI に限定する。
    steps:
      - confidential クライアント "web-app" を redirect_uri "https://app.example.com/cb" で登録する
      - '"web-app" として post_logout_redirect_uri "https://app.example.com/cb" でログアウトする'
      - state が post_logout_redirect_uri に伝播する

  未登録 post_logout_redirect_uri は拒否される:
    description: open redirect を避けるため、logout redirect も登録済み URI のみ許可する。
    steps:
      - confidential クライアント "web-app" を redirect_uri "https://app.example.com/cb" で登録する
      - '"web-app" として post_logout_redirect_uri "https://evil.example.com/cb" でログアウトする'
      - 'エラー "InvalidRequestError"'

  # ---------- client_credentials ----------
  client_credentials グラントで M2M トークンが発行される:
    description: RFC 6749 §4.4 — confidential クライアント自身のリソースアクセス。
    steps:
      - confidential クライアント "backend" を grant_types に "client_credentials" 含めて登録する
      - '"backend" として client_credentials で scope "api:read" のトークンを取得する'
      - 応答に access_token が含まれ refresh_token は含まれない
      - 発行された access_token の sub は client_id と一致する
      - '"AccessTokenIssued" が発行される'

  public クライアントは client_credentials を登録できない:
    description: client_credentials は confidential 限定（TokenGrantClientCredentials 認可ルール）。
    steps:
      - public クライアント "spa-app" を grant_types に "client_credentials" 含めて登録する
      - 'エラー "InvalidRequestError"'

  # ---------- device_code ----------
  デバイス認可フローでアクセストークンを取得できる:
    description: RFC 8628 §3 — TV 等の入力制約デバイス向けの完全な正常系。
    steps:
      - confidential クライアント "tv-app" を grant_types に "urn:ietf:params:oauth:grant-type:device_code" 含めて登録する
      - '"tv-app" として scope "openid profile" でデバイス認可を開始する'
      - 応答に device_code・user_code・verification_uri・interval が含まれる
      - ユーザー "alice" が verification_uri で user_code を入力し承認する
      - device_code "DC1" を交換する
      - 応答に access_token と id_token が含まれる
      - '"DeviceAuthorizationRequested" が発行される'
      - '"DeviceAuthorizationApproved" が発行される'
      - '"AccessTokenIssued" が発行される'

  承認前のデバイス交換は authorization_pending を返す:
    description: RFC 8628 §3.5 — ユーザー承認前のポーリングは authorization_pending。
    steps:
      - Issued 状態の device_code "DC1" を用意する
      - device_code "DC1" を交換する
      - 'エラー "AuthorizationPendingError"'

  ポーリング間隔より短い再試行は slow_down を返す:
    description: RFC 8628 §3.5 — interval 秒未満での再試行は slow_down で interval+5 秒に増やす。
    steps:
      - interval 5 秒の device_code "DC1" を Issued 状態で用意する
      - device_code "DC1" を交換する
      - '"2s" 経過する'
      - device_code "DC1" を交換する
      - '2 回目はエラー "SlowDownError"'

  期限切れの device_code は expired_token を返す:
    description: RFC 8628 §3.5 — expires_in を超えた device_code 交換は expired_token。
    steps:
      - issued_at "2026-01-01T00:00:00Z"・expires_at "2026-01-01T00:10:00Z" の device_code "DC1" を用意する
      - 時刻が "2026-01-01T00:11:00Z" になる
      - device_code "DC1" を交換する
      - 'エラー "ExpiredTokenError"'

  # ---------- private_key_jwt / tls_client_auth ----------
  private_key_jwt によるクライアント認証が成功する:
    description: RFC 7523 §2.2 — client_assertion の署名 JWT で認証成立。
    steps:
      - confidential クライアント "fapi-app" を token_endpoint_auth_method "private_key_jwt"・jwks 登録で用意する
      - 認可コード "AC1" を verifier "v"・有効な client_assertion で交換する
      - 応答に access_token が含まれる

  改ざんされた client_assertion は invalid_client で拒否される:
    steps:
      - confidential クライアント "fapi-app" を token_endpoint_auth_method "private_key_jwt"・jwks 登録で用意する
      - 認可コード "AC1" を verifier "v"・改ざんされた client_assertion で交換する
      - 'エラー "InvalidClientError"'

  tls_client_auth で mTLS の Subject DN が一致すれば認証成立:
    description: RFC 8705 §2.1.1。
    steps:
      - confidential クライアント "mtls-app" を token_endpoint_auth_method "tls_client_auth"・tls_client_auth_subject_dn "CN=mtls-app" で用意する
      - 認可コード "AC1" を verifier "v"・mTLS Subject DN "CN=mtls-app" で交換する
      - 応答に access_token が含まれる

  mTLS バインド AT は同じ証明書のリクエストでのみ受理される:
    description: RFC 8705 §3。cnf.x5t#S256 が AT に埋め込まれ、resource access では同一証明書の thumbprint 一致を要求する。
    steps:
      - confidential クライアント "mtls-app" を token_endpoint_auth_method "tls_client_auth" で用意する
      - mTLS 証明書バインドされた access_token を発行する
      - 同じ証明書を提示して userinfo を取得すると 200 を返す
      - 別の証明書を提示すると invalid_token で拒否される

  # ---------- メタデータ ----------
  RFC 8414 メタデータ文書は OIDC Discovery と同等の内容を返す:
    description: 同一のメタデータを別パスでも取得できる。
    steps:
      - Authorization Server メタデータを取得する
      - 応答に issuer・authorization_endpoint・token_endpoint・jwks_uri・grant_types_supported が含まれる

  # ---------- 管理 / RBAC ----------
  admin ロールを持つユーザーはユーザー管理 API を利用できる:
    steps:
      - roles に "admin" を持つユーザー "operator" が認証済みである
      - 管理者 "operator" が preferred_username "bob" のユーザーを作成する
      - 管理者 "operator" がユーザー一覧を取得する
      - 応答にユーザー "bob" が含まれる
      - '"UserCreated" が発行される'

  admin ロールを持たないユーザーは管理 API を利用できない:
    steps:
      - roles が空のユーザー "alice" が認証済みである
      - ユーザー "alice" がユーザー一覧を取得する
      - 'エラー "AccessDeniedError"'

  管理者はグループを作成しユーザーを所属させると有効ロールにグループ由来ロールが乗る:
    description: ADR-038。effective_roles(user) = user.roles ∪ group.roles。membership 操作は監査イベントを伴う。
    steps:
      - 'roles=["admin"] のユーザー "operator" が認証済みである'
      - '管理者 "operator" が roles=["catalog:read"] のグループ "engineering" を作成する'
      - '"GroupCreated" が発行される'
      - 'roles が空のユーザー "alice" が同一テナントに存在する'
      - '管理者 "operator" がユーザー "alice" をグループ "engineering" に所属させる'
      - '"GroupMemberAdded" が発行される'
      - 'ユーザー "alice" の所属グループを取得すると effective_roles に "catalog:read" が含まれる'
      - 'group_roles は "catalog:read" を含み direct_roles は空である'
      - '管理者 "operator" が同じユーザーを同じグループに再度所属させても "GroupMemberAdded" は再発行されない'

  無効化されたユーザーはログインできない:
    steps:
      - 管理者がユーザー "alice" を無効化する
      - ユーザー "alice" が正しい password で browser login API を送信する
      - 'エラー "AccessDeniedError"'
      - '"UserDisabled" が発行される'

  無効化されたユーザーの既存セッションは利用できない:
    steps:
      - ユーザー "alice" が認証済みセッションを持つ
      - 管理者がユーザー "alice" を無効化する
      - ユーザー "alice" が既存セッションで認証必須 API を呼ぶ
      - 'エラー "AccessDeniedError"'

  管理者は無効化したユーザーを再有効化できる:
    steps:
      - 管理者がユーザー "alice" を無効化する
      - 管理者がユーザー "alice" を再有効化する
      - ユーザー "alice" の disabled_at は空である
      - '"UserEnabled" が発行される'

  管理者は所属テナントの client を作成・更新・削除できる:
    steps:
      - 'tenant_id "acme" の roles=["admin"] のユーザー "operator" が認証済みである'
      - '管理者 "operator" が client "portal" を作成する'
      - '作成応答だけが生成された client_secret を含む'
      - '管理者 "operator" が client "portal" の redirect_uris を更新する'
      - '管理者 "operator" が client "portal" を削除する'
      - '"AdminClientCreated"、"AdminClientUpdated"、"AdminClientDeleted" が発行される'

  管理 client API は別テナントの client を公開しない:
    steps:
      - 'tenant_id "acme" に client_id "portal" が存在する'
      - 'tenant_id "default" の管理者が client_id "portal" を取得する'
      - 'エラー "InvalidRequestError"'

  管理者は所属テナントの同意を参照・撤回できるが付与は代行できない:
    steps:
      - 'tenant_id "acme" の roles=["admin"] のユーザー "operator" が認証済みである'
      - 'tenant_id "acme" のユーザー "alice" と client "portal" の Consent が Granted で存在する'
      - '管理者 "operator" が Consent 一覧と単一 Consent を取得する'
      - '管理者 "operator" がユーザー "alice" と client "portal" の Consent を撤回する'
      - 'Consent の state は Revoked で revoked_at が記録される'
      - '"ConsentRevoked" が actorSub "operator" で発行される'
      - '管理者が Consent を作成または scope 拡張する interface は存在しない'

  管理 consent API は別テナントの同意を公開しない:
    steps:
      - 'tenant_id "acme" のユーザー "alice" と client "portal" の Consent が存在する'
      - 'tenant_id "default" の管理者が同じ sub と client_id の Consent を取得する'
      - 'エラー "InvalidRequestError"'

  管理者は管理画面で client を作成・編集・削除できる:
    steps:
      - 'roles=["admin"] のユーザー "operator" が管理画面のアプリケーション一覧を開く'
      - '管理者 "operator" が confidential client を作成する'
      - '画面は生成された client_secret を一度だけ表示する'
      - '管理者 "operator" が redirect_uris と scope を編集する'
      - '管理者 "operator" が client_id を確認して client を削除する'
      - '一覧から対象 client が消える'

  # ---------- テナント (ADR-032 / ADR-033 / ADR-034) ----------
  default テナントは起動時に自動作成され削除不可:
    description: ADR-032 の bootstrap 不変性。
    steps:
      - 'IdP を起動する'
      - 'テナント "default" が status=Active で存在する'
      - 'default テナントを削除する API は提供されない'
      - 'default テナントの disable は InvalidRequestError で拒否される'

  未 prefix のリクエストは default テナントに解決される:
    description: ADR-033 の下位互換。/.well-known や /authorize が prefix なしでも動く。
    steps:
      - "/realms/ 接頭辞を持たない /authorize にリクエストを送る"
      - 解決されたテナントは "default"
      - "iss claim は base URL + /realms/default"

  /realms/{id}/.well-known/openid-configuration は同 prefix の issuer を返す:
    steps:
      - "tenant_id \"acme\" を Active で作成する"
      - "/realms/acme/.well-known/openid-configuration を取得する"
      - "応答の issuer は base URL + /realms/acme"
      - "応答の authorization_endpoint は base URL + /realms/acme/authorize"

  他テナントの client_id を使うと invalid_client で拒否される:
    description: ADR-034 のクロステナントガード。クライアントの所属テナントとリクエストテナントが一致しない場合は existence を漏らさず拒否する。
    steps:
      - 'tenant_id "acme" に client_id "web-app" を登録する'
      - '"/realms/default/token" に client_id "web-app" で交換を要求する'
      - 'エラー "InvalidClientError"'

  他テナントの認可コードを別テナントの token endpoint で交換できない:
    description: ADR-034。code 解決時に record.tenant_id != ctx.tenant_id を確認。
    steps:
      - 'tenant_id "acme" で認可コード "AC1" を発行する'
      - '"/realms/default/token" で認可コード "AC1" を交換する'
      - 'エラー "InvalidGrantError"'

  他テナントのリフレッシュトークンを別テナントの token endpoint で再発行できない:
    description: ADR-034。refresh_token 解決時に record.tenant_id != ctx.tenant_id を確認し、存在しないトークンと同じ応答にする。
    steps:
      - 'tenant_id "acme" でリフレッシュトークン "RT1" を発行する'
      - '"/realms/default/token" でリフレッシュトークン "RT1" を再発行する'
      - 'エラー "InvalidGrantError"'

  他テナントの device_code を別テナントの token endpoint で交換できない:
    description: ADR-034。device flow の record.tenant_id != ctx.tenant_id を確認。
    steps:
      - 'tenant_id "acme" で device_code "DC1" を発行し承認する'
      - '"/realms/default/token" で device_code "DC1" を交換する'
      - 'エラー "InvalidGrantError"'

  無効化されたテナントへの /authorize は invalid_request で拒否される:
    description: ADR-032 の disable 効果。tenant の存在を漏らさないため 404 ではなく invalid_request。
    steps:
      - 'tenant_id "acme" を作成する'
      - 'tenant_id "acme" を無効化する'
      - '"/realms/acme/authorize" にリクエストを送る'
      - 'エラー "InvalidRequestError"'

  system_admin だけが /realms/default/admin/tenants を呼べ admin は 403:
    description: ADR-032 の RBAC 境界。
    steps:
      - 'roles=["system_admin"] のユーザー "ops" が認証済みである'
      - 'ユーザー "ops" が /realms/default/admin/tenants にアクセスする'
      - '応答は 200 でテナント一覧を返す'
      - 'roles=["admin"] のユーザー "tadmin" が認証済みである'
      - 'ユーザー "tadmin" が /realms/default/admin/tenants にアクセスする'
      - 'エラー "AccessDeniedError"'


# =================================================================
# 7. permissions — 認可ルール
# =================================================================
#
# 「誰（Client/User）がどの操作を行えるか」を AuthZEN スタイルで宣言する。
# 評価アダプターは下流（adapters/policy/）で生成される。

permissions:

  TokenGrantAuthorizationCode:
    description: 認可コード交換による access_token / id_token / refresh_token 発行
    actor: Client
    action: TokenGrantAuthorizationCode
    resource: AuthorizationCodeRecord
    allow_when:
      and:
        - "AuthorizationCode in actor.grant_types"
        - "sha256(context.code_verifier) == resource.code_challenge"
        - "context.redirect_uri == resource.redirect_uri"
        - "resource.state == Issued"
        - "now() < resource.expires_at"

  TokenGrantRefresh:
    description: リフレッシュトークンによる再発行
    actor: Client
    action: TokenGrantRefresh
    resource: RefreshTokenRecord
    allow_when:
      and:
        - "RefreshToken in actor.grant_types"
        - "resource.state == Active"
        - "now() < resource.absolute_expires_at"
        - "sender_constraint_satisfied(resource, context)"

  TokenGrantClientCredentials:
    description: クライアント自己認可フロー
    actor: Client
    action: TokenGrantClientCredentials
    resource: AccessTokenClaims
    allow_when:
      and:
        - "actor.client_type == Confidential"
        - "ClientCredentials in actor.grant_types"

  TokenGrantDeviceCode:
    description: デバイスコードフロー
    actor: Client
    action: TokenGrantDeviceCode
    resource: DeviceAuthorization
    allow_when:
      and:
        - "resource.state == Approved"
        - "now() < resource.expires_at"

  TokenIntrospect:
    description: /introspect の呼び出し
    actor: Client
    action: TokenIntrospect
    resource: AccessTokenClaims
    allow_when: "actor.type == Client and context.authenticated == true"

  TokenRevoke:
    description: /revoke の呼び出し
    actor: Client
    action: TokenRevoke
    resource: AccessTokenClaims
    allow_when: "actor.client_id == resource.client_id"

  UserInfoRead:
    description: /userinfo の呼び出し
    actor: Client
    action: UserInfoRead
    resource: User
    allow_when:
      and:
        - "openid in context.token_scopes"
        - "context.token_active == true"

  AuthorizeInitiate:
    description: /authorize でフローを開始する
    actor: Client
    action: AuthorizeInitiate
    resource: AuthorizationRequest
    allow_when:
      and:
        - "actor.registered == true"
        - "context.redirect_uri in actor.redirect_uris"
        - "subset(context.requested_scopes, actor.scopes)"
        - "(actor.require_pkce == false) or (context.code_challenge != null)"
        - "(actor.require_pushed_authorization_requests == false) or (context.par_used == true)"

  AdminUserRead:
    description: 管理ユーザー情報の一覧・取得。
    actor: User
    action: AdminUserRead
    resource: User
    allow_when:
      and:
        - "admin in actor.roles"
        - "actor.disabled_at == null"
        - "context.authenticated == true"

  AdminUserCreate:
    description: 管理者によるユーザー作成。
    actor: User
    action: AdminUserCreate
    resource: User
    allow_when:
      and:
        - "admin in actor.roles"
        - "actor.disabled_at == null"
        - "context.authenticated == true"

  AdminUserUpdate:
    description: 管理者によるプロフィール・roles・有効状態の更新。
    actor: User
    action: AdminUserUpdate
    resource: User
    allow_when:
      and:
        - "admin in actor.roles"
        - "actor.disabled_at == null"
        - "context.authenticated == true"

  AdminUserDelete:
    description: |
      管理者によるユーザー削除 (ADR-036)。tombstone 化と cascade を伴う。
      actor.sub == resource.sub かつ admin / system_admin role を持つ場合は
      use case 側で reject する (自爆防止)。
    actor: User
    action: AdminUserDelete
    resource: User
    allow_when:
      and:
        - "admin in actor.roles"
        - "actor.disabled_at == null"
        - "context.authenticated == true"
        - "actor.tenant_id == resource.tenant_id"

  AdminGroupsRead:
    description: グループ情報の一覧・取得 (ADR-038)。
    actor: User
    action: AdminGroupsRead
    resource: Group
    allow_when:
      and:
        - "admin in actor.roles"
        - "actor.disabled_at == null"
        - "context.authenticated == true"
        - "actor.tenant_id == resource.tenant_id"

  AdminGroupsWrite:
    description: グループの作成・更新・削除とメンバーシップ操作 (ADR-038)。
    actor: User
    action: AdminGroupsWrite
    resource: Group
    allow_when:
      and:
        - "admin in actor.roles"
        - "actor.disabled_at == null"
        - "context.authenticated == true"
        - "actor.tenant_id == resource.tenant_id"

  AdminClientsManage:
    description: 所属テナント内の client 一覧・作成・更新・削除。
    actor: User
    action: AdminClientsManage
    resource: OAuth2Client
    allow_when:
      and:
        - "admin in actor.roles"
        - "actor.disabled_at == null"
        - "context.authenticated == true"
        - "actor.tenant_id == resource.tenant_id"

  AdminConsentsManage:
    description: 所属テナント内の Consent 一覧・取得・撤回。同意の付与と scope 拡張は ResourceOwner に限定する。
    actor: User
    action: AdminConsentsManage
    resource: Consent
    allow_when:
      and:
        - "admin in actor.roles"
        - "actor.disabled_at == null"
        - "context.authenticated == true"
        - "actor.tenant_id == resource.tenant_id"

  AdminTenantsManage:
    description: テナントの作成・更新・無効化・再有効化・一覧取得 (ADR-032)。system_admin ロールに限定する。
    actor: User
    action: AdminTenantsManage
    resource: Tenant
    allow_when:
      and:
        - "system_admin in actor.roles"
        - 'actor.tenant_id == "default"'
        - "actor.disabled_at == null"
        - "context.authenticated == true"

  AdminSettingsRead:
    description: |
      所属テナントの管理設定 (表示名 / パスワードポリシー上書き) を閲覧する。
      tenant 内 admin と system_admin のどちらでも許可する。
      対象は actor.tenant_id に固定するため cross-tenant 読み出しは構造的に発生しない (ADR-032)。
    actor: User
    action: AdminSettingsRead
    resource: Tenant
    allow_when:
      and:
        - "(admin in actor.roles) or (system_admin in actor.roles)"
        - "actor.disabled_at == null"
        - "context.authenticated == true"
        - "actor.tenant_id == resource.tenant_id"

  AdminSettingsUpdate:
    description: |
      所属テナントの管理設定を更新する。tenant 内 admin に解放し、設定対象は
      actor.tenant_id に固定する (ADR-032)。password_policy_override は global
      PasswordPolicy より弱い場合 use case 側で reject する。
    actor: User
    action: AdminSettingsUpdate
    resource: Tenant
    allow_when:
      and:
        - "(admin in actor.roles) or (system_admin in actor.roles)"
        - "actor.disabled_at == null"
        - "context.authenticated == true"
        - "actor.tenant_id == resource.tenant_id"

  AdminAuditEventsRead:
    description: |
      管理者による所属テナントの監査イベント読み出し。admin は所属テナントに閉じ、
      system_admin は default tenant 経路から全テナント横断的に参照できる。
      書き込みエンドポイントは存在しないため Read のみ。
    actor: User
    action: AdminAuditEventsRead
    resource: AdminAuditEventResponse
    allow_when:
      and:
        - "(admin in actor.roles) or (system_admin in actor.roles)"
        - "actor.disabled_at == null"
        - "context.authenticated == true"

  AdminKeysRead:
    description: |
      管理者による JWKS 鍵一覧の読み出し。署名鍵は global なので admin / system_admin
      どちらでも全件参照を許可する。秘密鍵を返さないため漏洩リスクは低い。
    actor: User
    action: AdminKeysRead
    resource: AdminKeyResponse
    allow_when:
      and:
        - "(admin in actor.roles) or (system_admin in actor.roles)"
        - "actor.disabled_at == null"
        - "context.authenticated == true"

  AdminKeysRotate:
    description: |
      署名鍵のローテーション。生成された新鍵が active になり、旧鍵は verifying に
      降りるため、JWKS 配布キャッシュが更新されるまで一時的な検証遅延が起きる。
      失敗は ra-idp 全体のトークン発行を停止させるため、system_admin が default
      tenant 経路から実行する場合のみ許可する。
    actor: User
    action: AdminKeysRotate
    resource: SigningKey
    allow_when:
      and:
        - "system_admin in actor.roles"
        - 'actor.tenant_id == "default"'
        - "actor.disabled_at == null"
        - "context.authenticated == true"


# =================================================================
# 8. objectives — 非機能目標
# =================================================================

objectives:

  # ---------- 性能 SLO ----------
  AuthorizeLatency:
    kind: slo
    description: /authorize の p99 レイテンシ目標。ブラウザリダイレクトを介す対話的フローのため、人間が体感する遅延の上限を 500ms に置く。
    metric: latency_p99
    interface: Authorize
    target: "<500ms"
    window: 30d
  ParLatency:
    kind: slo
    description: /par の p99 レイテンシ目標。FAPI クライアントが /authorize 前段で同期的に呼ぶため、追加遅延を最小化する。
    metric: latency_p99
    interface: PushAuthorizationRequest
    target: "<200ms"
    window: 30d
  TokenLatency:
    kind: slo
    description: /token の p99 レイテンシ目標。トークン交換は機械対機械の同期処理が多いため、300ms 以内に抑える。
    metric: latency_p99
    interface: Token
    target: "<300ms"
    window: 30d
  IntrospectLatency:
    kind: slo
    description: /introspect の p99 レイテンシ目標。ResourceServer が API リクエストごとにインライン検証するため、最も厳しい 50ms を要求する。
    metric: latency_p99
    interface: Introspect
    target: "<50ms"
    window: 30d
  RevokeLatency:
    kind: slo
    description: /revoke の p99 レイテンシ目標。失効処理は遅延すると侵害時の影響範囲が広がるため 100ms に抑える。
    metric: latency_p99
    interface: Revoke
    target: "<100ms"
    window: 30d
  UserInfoLatency:
    kind: slo
    description: /userinfo の p99 レイテンシ目標。ResourceServer 経由ではなくクライアントが直接呼ぶことが多いため 100ms 以内。
    metric: latency_p99
    interface: UserInfo
    target: "<100ms"
    window: 30d
  JwksLatency:
    kind: slo
    description: /jwks の p99 レイテンシ目標。クライアントの署名検証準備のため極めて低レイテンシ（20ms）を要求し、CDN キャッシュも前提とする。
    metric: latency_p99
    interface: GetJwks
    target: "<20ms"
    window: 30d
  DiscoveryLatency:
    kind: slo
    description: /.well-known/openid-configuration の p99 レイテンシ目標。クライアント起動時の自動検出に使われるため CDN キャッシュ前提で 20ms。
    metric: latency_p99
    interface: GetOpenidConfiguration
    target: "<20ms"
    window: 30d
  RegisterLatency:
    kind: slo
    description: /register の p99 レイテンシ目標。Dynamic Client Registration (RFC 7591) はレアパスなので Authorize と同水準で良い。
    metric: latency_p99
    interface: RegisterClient
    target: "<500ms"
    window: 30d
  DeviceAuthorizationLatency:
    kind: slo
    description: /device_authorization の p99 レイテンシ目標 (RFC 8628 §3.1)。デバイス起動直後のユーザー体験のため Token と同等。
    metric: latency_p99
    interface: DeviceAuthorization
    target: "<300ms"
    window: 30d

  # ---------- エラー率 SLO ----------
  AuthorizeErrorRate:
    kind: slo
    description: /authorize の 5xx 比率上限。0.1% を超えるとクライアントのフロー全体が失敗するため対話的経路の許容下限。
    metric: error_rate
    interface: Authorize
    target: "<0.001"
    window: 30d
  ParErrorRate:
    kind: slo
    description: /par の 5xx 比率上限。FAPI クライアントの /authorize 前段なので、失敗は即座にフロー全停止につながる。
    metric: error_rate
    interface: PushAuthorizationRequest
    target: "<0.001"
    window: 30d
  TokenErrorRate:
    kind: slo
    description: /token の 5xx 比率上限。トークン交換失敗はアプリログイン全停止に等価のため 0.1% を上限とする。
    metric: error_rate
    interface: Token
    target: "<0.001"
    window: 30d
  IntrospectErrorRate:
    kind: slo
    description: /introspect の 5xx 比率上限。ResourceServer のリクエスト毎に呼ばれるため、Token より一桁厳しい 0.01% を要求。
    metric: error_rate
    interface: Introspect
    target: "<0.0001"
    window: 30d
  RevokeErrorRate:
    kind: slo
    description: /revoke の 5xx 比率上限。失効処理の信頼性は侵害時のリスク許容に直結するため 0.1% を死守する。
    metric: error_rate
    interface: Revoke
    target: "<0.001"
    window: 30d
  UserInfoErrorRate:
    kind: slo
    description: /userinfo の 5xx 比率上限。クライアントの「ログイン後ユーザー表示」失敗を防ぐため 0.1% に置く。
    metric: error_rate
    interface: UserInfo
    target: "<0.001"
    window: 30d
  JwksErrorRate:
    kind: slo
    description: /jwks の 5xx 比率上限。全てのクライアントの署名検証経路に影響するため一桁厳しい 0.01% を要求。
    metric: error_rate
    interface: GetJwks
    target: "<0.0001"
    window: 30d
  DiscoveryErrorRate:
    kind: slo
    description: /.well-known/* の 5xx 比率上限。クライアント自動構成の起点なので、JWKS と同水準の 0.01% を要求。
    metric: error_rate
    interface: GetOpenidConfiguration
    target: "<0.0001"
    window: 30d
  RegisterErrorRate:
    kind: slo
    description: /register の 5xx 比率上限。利用頻度は低いが新規クライアント登録の信頼性のため 0.1% に抑える。
    metric: error_rate
    interface: RegisterClient
    target: "<0.001"
    window: 30d
  DeviceAuthorizationErrorRate:
    kind: slo
    description: /device_authorization の 5xx 比率上限。デバイスログイン体験の入口なので 0.1% を下限とする。
    metric: error_rate
    interface: DeviceAuthorization
    target: "<0.001"
    window: 30d

  # ---------- 可用性 SLO ----------
  TokenEndpointAvailability:
    kind: slo
    description: /token の月次可用性目標。FAPI 2.0 §6.2 が AS に要求する水準（99.95%）に整合させる。
    metric: availability
    interface: Token
    target: ">=99.95%"
    window: 30d
  OverallAvailability:
    kind: slo
    description: サービス全体の月次可用性目標。エンドポイントを跨いだ統合 SLO（個別 SLO よりやや緩めの 99.9%）。
    metric: availability
    target: ">=99.9%"
    window: 30d

  # ---------- スケール目標 ----------
  TokenThroughput:
    kind: slo
    description: /token のピーク処理能力目標。ログイン集中時間帯にトークン発行が詰まらない水平スケール容量。
    metric: throughput
    interface: Token
    target: ">=5000rps"
  AuthorizeThroughput:
    kind: slo
    description: /authorize のピーク処理能力目標。対話的フローの並列セッション数に応じて要求される。
    metric: throughput
    interface: Authorize
    target: ">=1000rps"
  IntrospectThroughput:
    kind: slo
    description: /introspect のピーク処理能力目標。ResourceServer 毎リクエスト検証の母数を捌くため、最大ボリュームを想定。
    metric: throughput
    interface: Introspect
    target: ">=20000rps"

  # ---------- トークンライフタイム ----------
  AuthorizationCodeLifetime:           { kind: lifetime, target: AuthorizationCodeRecord, ttl: 60s,      single_use: true,  reference: "RFC 9700 §4.10" }
  ParRequestUriLifetime:               { kind: lifetime, target: PARRecord,               ttl: 600s,     single_use: true,  reference: "RFC 9126" }
  AccessTokenLifetime:                 { kind: lifetime, target: AccessTokenClaims,       ttl: 600s,     reference: "ADR-002" }
  IdTokenLifetime:                     { kind: lifetime, target: IdTokenClaims,           ttl: 3600s }
  RefreshTokenLifetime:                { kind: lifetime, target: RefreshTokenRecord,      ttl: 14d }
  RefreshTokenAbsoluteLifetime:        { kind: lifetime, target: RefreshTokenRecord,      ttl: 30d,      reference: "ADR-004", description: ローテーション越境不可 }
  DeviceCodeLifetime:                  { kind: lifetime, target: DeviceAuthorization,     ttl: 600s }
  UserCodeLifetime:                    { kind: lifetime, target: DeviceAuthorization,     ttl: 600s }
  DeviceCodePollingDefaultInterval:    { kind: lifetime, target: DeviceAuthorization,     ttl: 5s,       description: 既定ポーリング間隔 }

  # ---------- セキュリティ運用 ----------
  SigningKeyMaxAge:                            { kind: security, policy: max_age, target: SigningKey, value: 90d,  reference: "ADR-009" }
  SigningKeyMinJwksOverlap:                    { kind: security, policy: min_jwks_overlap, value: 7d }
  ClientAuthFailureRateLimit:                  { kind: security, policy: rate_limit_per_minute, value: 10 }
  AuthorizationCodeRedemptionFailureRateLimit: { kind: security, policy: rate_limit_per_minute, value: 5 }
  DpopProofClockSkewPast:                      { kind: security, policy: clock_skew_seconds, value: 60 }
  DpopProofClockSkewFuture:                    { kind: security, policy: clock_skew_seconds, value: 5 }
  DpopJtiReplayWindow:                         { kind: security, policy: replay_window_minutes, value: 10 }
  DpopNonceLifetime:                           { kind: security, policy: ttl_seconds, value: 60 }
  RefreshReuseAlertWindow:                     { kind: security, policy: alert_window_seconds, value: 60 }
  DeviceCodePollingSlowDownIncrement:           { kind: security, policy: polling_slow_down_increment_seconds, target: DeviceAuthorization, value: 5, reference: "RFC 8628 §3.5" }
  PasswordPolicy:
    kind: security
    policy: password_policy
    target: User
    value: { min_length: 12, max_length: 128, forbid_user_identifier_similarity: true, common_password_dictionary: bundled, history_depth: 5 }
    reference: "ADR-026 / ADR-027 / ADR-028"
  LoginThrottlePolicy:
    kind: security
    policy: login_throttle
    target: SubmitBrowserLogin
    value:
      per_account: { max_failures: 10, window_seconds: 900, lockout_seconds: 900 }
      per_ip:      { max_failures: 30, window_seconds: 900, lockout_seconds: 900 }
    reference: "ADR-029"
  AuthenticationContextPolicy:
    kind: security
    policy: authentication_context
    target: LoginSession
    value:
      values:
        - { urn: "urn:ra-idp:acr:pwd", description: "Password 単独認証 (amr ⊇ [pwd])。" }
        - { urn: "urn:ra-idp:acr:mfa", description: "Password + 第二要素 (amr に otp / webauthn / hwk / swk のいずれかを含む)。" }
      mfa_amr_values: [otp, webauthn, hwk, swk]
    reference: "OIDC Core §2 / RFC 8176"
  TotpPolicy:
    kind: security
    policy: totp_parameters
    target: MfaFactor
    value: { algorithm: SHA1, step_seconds: 30, digits: 6, window: 1, secret_bytes: 20 }
    reference: "RFC 6238 §4 / RFC 4226 §4"
  PasswordResetTokenLifetime:
    kind: lifetime
    target: PasswordResetTokenRecord
    ttl: 1800s
    single_use: true
    reference: "ADR-030"
  LoginSessionSecurity:
    kind: security
    policy: browser_session_cookie
    target: LoginSession
    value: { http_only: true, same_site: Lax }
    reference: "ADR-013"

  # ---------- データ保持 (GDPR / コンプライアンス) ----------
  AuditLogRetention:
    kind: retention
    target: DomainEvent
    policy: append_only
    retention: "7y"
    reference: "GDPR Art. 30"
  PiiPurgeAfterDeletion:
    kind: retention
    target: User
    policy: purge_pii_after
    retention: "0s"
    reference: "GDPR Art. 17"
    note: ADR-036 により Delete は即時 anonymize cascade で実施し、preferred_username / name / email / password_hash / mfa_* / roles を削除と同時に消去する。`sub` のみを audit のため保持する。
  ConsentRecordsRetention:
    kind: retention
    target: Consent
    policy: keep
    retention: "7y"
  SigningKeyArchiveRetention:
    kind: retention
    target: SigningKey
    policy: archive
    retention: "7y"
    description: 旧鍵で署名された監査トークンを検証するため。


# =================================================================
# 9. assurance — 保証義務、合否基準、必要な検証
# =================================================================

assurance:

  AuthorizationCodeExchangeSafety:
    claim: 認可コードは登録済み redirect URI と必要な PKCE 検証を満たした場合に一度だけ交換できる。
    risk: 認可コード横取り、別 Client へのコード注入、コード再利用によるトークン不正発行。
    risk_level: critical
    derived_from:
      standards: [RFC7636, RFC9700]
      interfaces: [Authorize, Token]
      states: [AuthorizationCodeFlow]
      invariants: [PkceRoundTrip, AuthorizationCodeSingleUse, AuthorizationCodeTtl, RedirectUriExactMatch]
      permissions: [AuthorizeInitiate, TokenGrantAuthorizationCode]
    acceptance:
      all:
        - evidence: PkcePropertyTests
          criterion: 有効な verifier は S256 で検証でき、改変された challenge は拒否される。
        - evidence: AuthorizationCodeStoreContract
          criterion: 同じ認可コードの1回目の交換だけが成功し、2回目は失敗する。
        - evidence: AuthorizationPolicyTests
          criterion: redirect URI 不一致、期限切れ、使用済みコード、必要な PKCE の欠落が拒否される。
    evidence:
      PkcePropertyTests:
        kind: property_test
        producer: independent
        evaluation: deterministic
        environments: [ci]
        recheck: affected_change
        covers:
          invariants: [PkceRoundTrip]
        oracle: S256 の定義と反例反転テスト。
      AuthorizationCodeStoreContract:
        kind: contract_test
        producer: independent
        evaluation: deterministic
        environments: [ci]
        recheck: affected_change
        covers:
          invariants: [AuthorizationCodeSingleUse, AuthorizationCodeTtl]
        oracle: 1回目の redeem は成功し、同じコードの2回目は null になる。
      AuthorizationPolicyTests:
        kind: test
        producer: independent
        evaluation: deterministic
        environments: [ci]
        recheck: affected_change
        covers:
          permissions: [AuthorizeInitiate, TokenGrantAuthorizationCode]
          invariants: [RedirectUriExactMatch]
        oracle: 許可条件の各否定ケースが Deny または InvalidGrant になる。
    approval:
      when: [acceptance_not_met, exception_requested, risk_increased, normative_spec_changed]
      role: SecurityOwner

  RefreshTokenReplayContainment:
    claim: Refresh Token は交換ごとにローテーションされ、再利用検出時は同じファミリーがすべて失効する。
    risk: 漏洩した長寿命トークンの継続利用と、攻撃者によるセッション維持。
    risk_level: critical
    derived_from:
      standards: [RFC9700]
      interfaces: [Token, Revoke]
      invariants: [RefreshFamilyTransitiveRevoke, RefreshRotationParentInvariants, RefreshTokenAbsoluteTtl]
      permissions: [TokenGrantRefresh]
      objectives: [RefreshTokenLifetime, RefreshTokenAbsoluteLifetime, RefreshReuseAlertWindow]
    acceptance:
      all:
        - evidence: RefreshRotationPropertyTests
          criterion: 任意長のトークンチェーンでファミリー失効が全要素へ伝播し、絶対期限が延長されない。
        - evidence: RefreshStoreContract
          criterion: rotate は親を使用済みにし、再度の rotate を拒否し、family_id 単位で全件失効する。
    evidence:
      RefreshRotationPropertyTests:
        kind: property_test
        producer: independent
        evaluation: deterministic
        environments: [ci]
        recheck: affected_change
        covers:
          invariants: [RefreshFamilyTransitiveRevoke, RefreshRotationParentInvariants, RefreshTokenAbsoluteTtl]
        oracle: 生成した任意長チェーンの全要素が revoked になり、子の absolute_expires_at が親と一致する。
      RefreshStoreContract:
        kind: contract_test
        producer: independent
        evaluation: deterministic
        environments: [ci]
        recheck: affected_change
        covers:
          permissions: [TokenGrantRefresh]
        oracle: 同一トークンの再利用が成功せず、同じ family_id の全レコードが revoked になる。
    approval:
      when: [acceptance_not_met, exception_requested, risk_increased, normative_spec_changed]
      role: SecurityOwner

  TenantBoundaryIsolation:
    claim: tenant-scoped な Client、認可コード、Client 管理操作はテナント境界を越えない。
    risk: 別組織の認証設定または認可コードへの不正アクセス。
    risk_level: critical
    derived_from:
      models: [Tenant, OAuth2Client, AuthorizationCodeRecord]
      interfaces: [ResolveTenant, ListAdminClients, GetAdminClient, CreateAdminClient, UpdateAdminClient, DeleteAdminClient]
      invariants: [AuthorizationCodeSingleUse]
      permissions: [AdminClientsManage, AdminTenantsManage]
    acceptance:
      all:
        - evidence: TenantUseCaseTests
          criterion: default tenant の保護、disable と enable、予約 ID、重複 ID の規則が検証される。
        - evidence: TenantHttpBoundaryTests
          criterion: 別テナントの Client 管理操作が対象 Client を公開せず、成功しない。
        - evidence: TenantOAuthBoundaryTests
          criterion: 別テナントの Client と認可コードを認可・トークン交換に利用できない。
    evidence:
      TenantUseCaseTests:
        kind: test
        producer: independent
        evaluation: deterministic
        environments: [ci]
        recheck: affected_change
        covers:
          models: [Tenant]
          permissions: [AdminTenantsManage]
        oracle: Tenant lifecycle と default tenant の禁止操作が ADR-032 の規則に一致する。
      TenantHttpBoundaryTests:
        kind: test
        producer: independent
        evaluation: deterministic
        environments: [ci]
        recheck: affected_change
        covers:
          interfaces: [ResolveTenant, ListAdminClients, GetAdminClient, CreateAdminClient, UpdateAdminClient, DeleteAdminClient]
          permissions: [AdminClientsManage, AdminTenantsManage]
        oracle: 認証済み主体の tenant_id と対象 Client の tenant_id が一致しない操作は成功しない。
      TenantOAuthBoundaryTests:
        kind: test
        producer: independent
        evaluation: deterministic
        environments: [ci]
        recheck: affected_change
        covers:
          models: [OAuth2Client, AuthorizationCodeRecord, RefreshTokenRecord, DeviceAuthorization]
          interfaces: [Authorize, Token]
        oracle: tenant_id が一致しない Client・認可コード・リフレッシュトークン・device_code は、存在しない場合と同じ結果になる。
    approval:
      when: [acceptance_not_met, exception_requested, risk_increased, normative_spec_changed]
      role: SecurityOwner

  SecretMaterialProtection:
    claim: パスワード、Refresh Token、パスワードリセットトークンは平文で永続化されず、パスワード再利用も制限される。
    risk: 永続ストア漏洩による即時のアカウントまたはセッション侵害。
    risk_level: critical
    derived_from:
      models: [User, RefreshTokenRecord, PasswordResetTokenRecord]
      invariants: [TokenHashOneWay, PasswordHistoryNoReuse]
      interfaces: [ChangePassword, RequestPasswordReset, ResetPasswordWithToken]
    acceptance:
      all:
        - evidence: PasswordProtectionTests
          criterion: パスワードポリシー、履歴、漏洩パスワード検査が各導入経路で適用される。
        - evidence: ResetTokenStorageTests
          criterion: パスワードリセットトークンはハッシュだけが保存され、単発消費される。
        - evidence: PersistenceSecretContracts
          criterion: Refresh Token はハッシュで検索・保存され、平文フィールドを持たない。
    evidence:
      PasswordProtectionTests:
        kind: test
        producer: independent
        evaluation: deterministic
        environments: [ci]
        recheck: affected_change
        covers:
          invariants: [PasswordHistoryNoReuse]
          interfaces: [ChangePassword]
        oracle: 長さ、識別子類似、共通語、漏洩、履歴再利用の各違反が拒否される。
      ResetTokenStorageTests:
        kind: test
        producer: independent
        evaluation: deterministic
        environments: [ci]
        recheck: affected_change
        covers:
          models: [PasswordResetTokenRecord]
          interfaces: [RequestPasswordReset, ResetPasswordWithToken]
        oracle: 保存値は生トークンと一致せず、成功後の再利用は失敗する。
      PersistenceSecretContracts:
        kind: contract_test
        producer: independent
        evaluation: deterministic
        environments: [ci]
        recheck: affected_change
        covers:
          models: [RefreshTokenRecord]
          invariants: [TokenHashOneWay]
        oracle: RefreshTokenRecord は hash でラウンドトリップし、平文トークンを永続化しない。
    approval:
      when: [acceptance_not_met, exception_requested, risk_increased, normative_spec_changed]
      role: SecurityOwner

  SpecificationAndDerivedArtifactsCoherence:
    claim: SCL の内部参照と、仕様バインディング・契約・イベント・シナリオ検証の対応が継続的に一致する。
    risk: 仕様と実装が乖離し、再生成時またはリリース時に意図しない振る舞いが混入する。
    risk_level: high
    derived_from:
      interfaces: [GetOpenidConfiguration, GetJwks, Authorize, Token]
      states: [AuthorizationCodeFlow, DeviceCodeFlow]
      scenarios: [認可コードフローでアクセストークンと ID トークンを取得できる]
      objectives: [OverallAvailability, TokenEndpointAvailability]
    acceptance:
      all:
        - evidence: SpecificationBindingTests
          criterion: SCL の状態、列挙、ポリシー、シナリオ被覆が仕様バインディングと一致する。
        - evidence: CoherenceCheck
          criterion: SCL の内部参照、外部公開契約、イベント経路、マイグレーションに不整合がない。
    evidence:
      SpecificationBindingTests:
        kind: contract_test
        producer: independent
        evaluation: deterministic
        environments: [ci]
        recheck: every_change
        covers:
          states: [AuthorizationCodeFlow, DeviceCodeFlow]
          scenarios: [認可コードフローでアクセストークンと ID トークンを取得できる]
        oracle: SCL と派生バインディングの集合・参照・被覆が完全一致する。
      CoherenceCheck:
        kind: static_analysis
        producer: independent
        evaluation: deterministic
        environments: [ci]
        recheck: every_change
        covers:
          interfaces: [GetOpenidConfiguration, GetJwks, Authorize, Token]
          objectives: [OverallAvailability, TokenEndpointAvailability]
        oracle: 整合性チェッカーが失敗を0件と報告する。
    approval:
      when: [acceptance_not_met, exception_requested, risk_increased, normative_spec_changed]
      role: Maintainer


# =================================================================
# 10. user_experience — ブラウザ画面、遷移、利用品質
# =================================================================

user_experience:
  accessibility:
    standard: WCAG22
    level: AA
  locales: [ja, en]

  screens:
    Home:
      route: /
      purpose: IdPの稼働状態と認証開始方法を示し、ローカルデモでは認可要求を開始する。
      interfaces: [Authorize, GetOpenidConfiguration]
      states: [ready, unavailable]
    Login:
      route: /login
      purpose: Authorization transactionに結び付いたResourceOwnerの認証情報を取得する。
      interfaces: [GetBrowserTransaction, SubmitBrowserLogin]
      states: [ready, submitting, invalid_credentials, expired_transaction, service_error]
    Totp:
      route: /totp
      purpose: authentication_pending状態のLoginSessionに対し、登録済みTOTP factorのコードを取得する。
      interfaces: [GetBrowserTransaction, SubmitBrowserTotp]
      states: [ready, submitting, invalid_code, expired_transaction, service_error]
    Consent:
      route: /consent
      purpose: Client名と要求Scopeを示し、ResourceOwnerの許可または拒否を取得する。
      interfaces: [GetBrowserTransaction, SubmitBrowserConsent]
      states: [ready, submitting, denied, expired_transaction, service_error]
    Device:
      route: /device
      purpose: 入力制約デバイスのuser_codeを確認し、ResourceOwnerの許可または拒否を取得する。
      interfaces: [GetBrowserDeviceContext, SubmitBrowserDevice]
      states: [ready, submitting, invalid_code, expired_code, approved, denied, authentication_required]
    Status:
      route: /status
      purpose: device承認、拒否、logout、再認証要求などの終端状態を明示する。
      states: [approved, denied, signed_out, authentication_required, error]
    Callback:
      route: /callback
      purpose: ローカルデモClientの認可成功またはOAuthエラーを表示する。
      states: [success, oauth_error, invalid_response]
    AdminUsers:
      route: /admin/users
      purpose: 管理者が所属テナントのユーザー一覧、ロール、アカウント状態を管理する。
      interfaces: [ListAdminUsers, CreateAdminUser, UpdateAdminUser, DisableAdminUser, EnableAdminUser]
      states: [ready, loading, submitting, empty, access_denied, service_error]
    AdminClients:
      route: /admin/clients
      purpose: 管理者が所属テナントのOAuth clientを一覧し、作成、metadata更新、削除を行う。
      interfaces: [ListAdminClients, GetAdminClient, CreateAdminClient, UpdateAdminClient, DeleteAdminClient]
      states: [ready, loading, submitting, empty, secret_issued, delete_confirmation, access_denied, service_error]

  transitions:
    - { from: Home, to: Login, trigger: authorization_started, interface: Authorize }
    - { from: Login, to: Totp, trigger: password_succeeded_and_factor_required, interface: SubmitBrowserLogin }
    - { from: Totp, to: Consent, trigger: factor_succeeded_and_consent_required, interface: SubmitBrowserTotp }
    - { from: Totp, trigger: factor_succeeded_and_consent_exists, interface: SubmitBrowserTotp, external: true }
    - { from: Login, to: Consent, trigger: authentication_succeeded_and_consent_required, interface: SubmitBrowserLogin }
    - { from: Login, trigger: authentication_succeeded_and_consent_exists, interface: SubmitBrowserLogin, external: true }
    - { from: Consent, trigger: consent_allowed, interface: SubmitBrowserConsent, external: true }
    - { from: Consent, trigger: consent_denied, interface: SubmitBrowserConsent, external: true }
    - { from: Device, to: Status, trigger: device_approved, interface: SubmitBrowserDevice }
    - { from: Device, to: Status, trigger: device_denied, interface: SubmitBrowserDevice }
    - { to: Status, trigger: session_ended, interface: EndSession }
    - { to: Callback, trigger: local_demo_authorization_response, external: true }
    - { from: AdminUsers, to: AdminClients, trigger: application_management_selected }
    - { from: AdminClients, to: AdminUsers, trigger: user_management_selected }

  requirements:
    - id: UX-TRANSACTION-BOUND
      category: security
      adoption: required
      statement: Consentは有効なHttpOnly authorization transaction cookieなしでは表示も送信もできない。LoginとTotpは通常同cookieに拘束し、管理画面への直接ログイン時だけ同一realmの/admin配下へ検証済みreturn_toで継続できる。
      screens: [Login, Totp, Consent]
      interfaces: [GetBrowserTransaction, SubmitBrowserLogin, SubmitBrowserTotp, SubmitBrowserConsent]
      standards: [RFC9700]
    - id: UX-CSRF
      category: security
      adoption: required
      statement: 状態変更を伴うブラウザAPIはSameSite cookieとリクエストトークンを照合してCSRFを拒否する。
      screens: [Login, Totp, Consent, Device, AdminUsers, AdminClients]
      interfaces: [SubmitBrowserLogin, SubmitBrowserTotp, SubmitBrowserConsent, SubmitBrowserDevice, CreateAdminUser, UpdateAdminUser, DisableAdminUser, EnableAdminUser, CreateAdminClient, UpdateAdminClient, DeleteAdminClient]
      standards: [RFC9700, FAPI2SecurityProfile]
      scenarios: [browser login API の CSRF 不一致は拒否される]
    - id: UX-NO-STORE
      category: privacy
      adoption: required
      statement: 認証トランザクション、CSRF token、user_code、管理対象データを含むブラウザAPI応答は保存キャッシュを禁止する。
      screens: [Login, Totp, Consent, Device, AdminUsers, AdminClients]
      interfaces: [GetBrowserTransaction, GetBrowserDeviceContext, ListAdminUsers, ListAdminClients, GetAdminClient, CreateAdminClient, UpdateAdminClient]
    - id: UX-NO-CREDENTIAL-ECHO
      category: privacy
      adoption: required
      statement: password、token、内部request idを画面、URL、エラーメッセージへ表示しない。
      screens: [Login, Totp, Consent, Device, Status, Callback]
    - id: UX-ADMIN-CLIENT-SECRET
      category: security
      adoption: required
      statement: AdminClientsは生成されたclient_secretを作成成功直後に一度だけ表示し、再取得できないことを明示する。client_secret_hashは表示しない。
      screens: [AdminClients]
      interfaces: [CreateAdminClient, GetAdminClient, ListAdminClients]
    - id: UX-ADMIN-CLIENT-DELETE-CONFIRMATION
      category: usability
      adoption: required
      statement: AdminClientsはclient削除前に対象client_idと影響を示す確認操作を要求する。
      screens: [AdminClients]
      interfaces: [DeleteAdminClient]
    - id: UX-ADMIN-TENANT-SCOPE
      category: security
      adoption: required
      statement: 管理画面は現在のrealm prefixを維持し、所属テナント内のUserとOAuth2Clientだけを表示・変更する。
      screens: [AdminUsers, AdminClients]
      interfaces: [ListAdminUsers, ListAdminClients, GetAdminClient, CreateAdminClient, UpdateAdminClient, DeleteAdminClient]
    - id: UX-REGISTERED-REDIRECT
      category: security
      adoption: required
      statement: Browser flowの外部遷移先は検証済みredirect_uriまたはpost_logout_redirect_uriだけとする。
      screens: [Login, Totp, Consent, Status]
      interfaces: [Authorize, SubmitBrowserLogin, SubmitBrowserTotp, SubmitBrowserConsent, EndSession]
      standards: [RFC9700, OpenIDConnectRPInitiatedLogout]
      invariants: [RedirectUriExactMatch]
    - id: UX-CLIENT-CONTEXT
      category: usability
      adoption: required
      statement: Consent画面は判断前にClientと要求ScopeをResourceOwnerへ明示する。
      screens: [Consent]
      interfaces: [GetBrowserTransaction]
    - id: UX-KEYBOARD
      category: accessibility
      adoption: required
      statement: すべての入力、表示切替、許可、拒否、再試行をキーボードだけで操作可能にする。
      screens: [Home, Login, Totp, Consent, Device, Status, Callback, AdminUsers, AdminClients]
      standards: [WCAG22]
    - id: UX-FOCUS
      category: accessibility
      adoption: required
      statement: フォーカス位置を常に視認可能にし、画面遷移後は主見出しまたは最初の入力へ論理的に到達可能にする。
      screens: [Login, Totp, Consent, Device, Status, Callback]
      standards: [WCAG22]
    - id: UX-LABELS-ERRORS
      category: accessibility
      adoption: required
      statement: 入力には永続的なラベルを関連付け、エラーを色だけに依存せず対象と修正方法が分かる文章で示す。
      screens: [Login, Totp, Device]
      standards: [WCAG22]
    - id: UX-STATUS-ANNOUNCEMENT
      category: accessibility
      adoption: required
      statement: 非同期送信の失敗と認証結果を支援技術へ通知し、送信中は重複操作を防ぐ。
      screens: [Login, Totp, Consent, Device, Status, Callback, AdminUsers, AdminClients]
      standards: [WCAG22]
    - id: UX-LOCALE
      category: localization
      adoption: required
      statement: UI文言はjaとenを提供し、未対応localeは既定localeへフォールバックする。
      screens: [Home, Login, Totp, Consent, Device, Status, Callback]
      interfaces: [GetOpenidConfiguration]
      standards: [OpenIDConnectDiscovery]
