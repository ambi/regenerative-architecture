# ra-idp Application — SCL
# Generated from ra-idp-go/spec/scl.yaml during SCL 2.0 context split.

system: ra-idp
spec_version: "2.0"
context: Application
glossary:
  Application:
    definition: 運用者が接続・割当・監査する業務アプリケーション。OIDC client、SAML SP、WS-Fed RP は Application に紐づく protocol binding である。
    aliases:
      - アプリケーション
      - Application
  ProtocolBinding:
    definition: "Application を特定 protocol で接続するための設定。例: OAuth2Client、SAML ServiceProvider、WS-Fed RelyingParty。"
    aliases:
      - binding
      - protocol_binding
models:
  ApplicationKind:
    kind: enum
    description: Application の種別。federated は SSO フェデレーションを束ねる業務アプリ、weblink は SSO しない外部リンク、service は M2M / client_credentials の API クライアント (Okta の API Services 相当。ポータルタイル・利用者割当を持たない)。
    values:
      - federated
      - weblink
      - service
  ApplicationStatus:
    kind: enum
    description: Application の有効状態。
    values:
      - active
      - disabled
  ProtocolBindingType:
    kind: enum
    description: "Application に接続する protocol binding の種別。"
    values:
      - oidc
      - saml
      - wsfed
  AssignmentSubjectType:
    kind: enum
    description: Application 割当の対象種別。
    values:
      - user
      - group
  AssignmentVisibility:
    kind: enum
    description: 割当の可視性。hidden はポータル一覧から除外するがプロトコル利用は許可する。
    values:
      - visible
      - hidden
  ApplicationProvisionType:
    kind: enum
    description: 一括作成で選ぶアプリ種別。oidc / wsfed は federated Application と対応する OAuth2 client / WS-Fed RP を同時に作成し、weblink は SSO なしの外部リンク、service は M2M / client_credentials の OAuth2 client (service kind) を作る。
    values:
      - oidc
      - wsfed
      - weblink
      - service
  ProtocolBinding:
    kind: value_object
    description: "Application に紐づく protocol binding。OIDC client / WS-Fed RP / 将来 SAML SP への 参照を opaque key で保持する。binding の wire 挙動は各 protocol context が所有する。"
    fields:
      type:
        type: ProtocolBindingType
        description: binding 種別。
      client_id:
        type: String
        optional: true
        description: oidc binding が指す OAuth2 client_id。
      wtrealm:
        type: String
        optional: true
        description: wsfed binding が指す WS-Fed RP の wtrealm。
  Application:
    kind: entity
    description: "運用者が「接続する業務アプリケーション」として扱う上位 aggregate。OIDC client / SAML SP / WS-Fed RP を protocol binding として束ね、表示名・アイコン・状態・割当を所有する。 weblink kind は binding を持たない外部リンク。"
    identity:
      - tenant_id
      - application_id
    fields:
      tenant_id:
        type: String
        default: default
        description: 所属テナント ID。
      application_id:
        type: UUID
        description: Application 識別子。
      name:
        type: String
        constraints:
          - non_empty
        description: 管理 UI / ポータル表示名。
      kind:
        type: ApplicationKind
        description: federated か weblink か。
      status:
        type: ApplicationStatus
        description: 有効状態。
      icon_url:
        type: String
        optional: true
        description: ポータル一覧に表示するアイコン URL。
      launch_url:
        type: String
        optional: true
        description: weblink kind の起動先 URL。
      bindings:
        type: "ProtocolBinding[]"
        description: 接続済み protocol binding。weblink は空。
      created_at:
        type: Timestamp
      updated_at:
        type: Timestamp
  ApplicationAssignment:
    kind: entity
    description: Application へのユーザー / グループ割当。割当はポータル可視性とフェデレーション利用可否を fail-closed で制御する。hidden は一覧に出さないがプロトコル利用は許可する。
    identity:
      - tenant_id
      - application_id
      - subject_type
      - subject_id
    fields:
      tenant_id:
        type: String
        default: default
        description: 所属テナント ID。
      application_id:
        type: UUID
        description: 対象 Application。
      subject_type:
        type: AssignmentSubjectType
        description: user か group か。
      subject_id:
        type: String
        constraints:
          - non_empty
        description: user の sub または group id。
      visibility:
        type: AssignmentVisibility
        description: visible か hidden か。
      created_at:
        type: Timestamp
  AdminApplicationResponse:
    kind: value_object
    description: 管理 API が返す Application 表現。
    fields:
      application_id:
        type: UUID
      name:
        type: String
      kind:
        type: ApplicationKind
      status:
        type: ApplicationStatus
      icon_url:
        type: String
        optional: true
      launch_url:
        type: String
        optional: true
      bindings:
        type: "ProtocolBinding[]"
      created_at:
        type: Timestamp
      updated_at:
        type: Timestamp
  AdminApplicationListResponse:
    kind: value_object
    description: Application 一覧レスポンス。
    fields:
      applications:
        type: "AdminApplicationResponse[]"
  AdminApplicationCreateRequest:
    kind: value_object
    description: Application 一括作成リクエスト。種別を選び、対応するプロトコル設定もまとめて受け取る。 backend が OAuth2 client / WS-Fed RP を作成し、Application と protocol binding を一括で作る。
    fields:
      name:
        type: String
        constraints:
          - non_empty
      type:
        type: ApplicationProvisionType
        description: oidc / wsfed / weblink。
      icon_url:
        type: String
        optional: true
      launch_url:
        type: String
        optional: true
        description: ポータルのタイルから開く起動 URL。weblink では必須。
      redirect_uris:
        type: "String[]"
        optional: true
        description: type=oidc のとき必須。生成する OAuth2 client のリダイレクト URI。
      scope:
        type: String
        optional: true
        description: 生成する OAuth2 client のスコープ。
      client_type:
        type: ClientType
        optional: true
        description: type=oidc の生成 client 種別。既定は confidential。
      token_endpoint_auth_method:
        type: TokenEndpointAuthMethod
        optional: true
        description: type=oidc の生成 client 認証方式。作成時に確定し以後不変。
      jwks_uri:
        type: Uri
        optional: true
        description: token_endpoint_auth_method=private_key_jwt の公開鍵 JWKS URI。
      tls_client_auth_subject_dn:
        type: String
        optional: true
        description: token_endpoint_auth_method=tls_client_auth の証明書 Subject DN。
      wtrealm:
        type: String
        optional: true
        description: type=wsfed のとき必須。生成する WS-Fed RP の wtrealm。
      reply_urls:
        type: "String[]"
        optional: true
        description: type=wsfed のとき必須。許可する wreply。
      name_id_format:
        type: String
        optional: true
        description: type=wsfed の NameID 形式。
      name_id_source:
        type: String
        optional: true
        description: type=wsfed の NameID ソース属性。
  AdminApplicationCreateResponse:
    kind: value_object
    description: 一括作成の結果。type=oidc のときは生成した OAuth2 client の client_id / client_secret を 一度だけ返す (再表示不可)。
    fields:
      application:
        type: AdminApplicationResponse
      client_id:
        type: String
        optional: true
        description: type=oidc のとき返る生成クライアント ID。
      client_secret:
        type: String
        optional: true
        description: type=oidc のとき一度だけ返るシークレット。
  ApplicationOidcConfig:
    kind: value_object
    description: Application の OIDC binding が指す OAuth2 client の実設定 (アプリ詳細表示用)。advanced 項目を含む。token_endpoint_auth_method / client_type / fapi_profile は更新契約上の不変項目で 表示専用。
    fields:
      client_id:
        type: String
      client_type:
        type: ClientType
      redirect_uris:
        type: "String[]"
      grant_types:
        type: "GrantType[]"
      response_types:
        type: "ResponseType[]"
      token_endpoint_auth_method:
        type: TokenEndpointAuthMethod
      scope:
        type: String
      require_pushed_authorization_requests:
        type: Boolean
      dpop_bound_access_tokens:
        type: Boolean
      fapi_profile:
        type: FapiProfile
  ApplicationWsFedConfig:
    kind: value_object
    description: Application の WS-Fed binding が指す relying party の実設定 (アプリ詳細表示用)。per-RP の advanced 項目 (audience / token_type / claim 規則) を含む。Entra domain federation は テナント単位の設定として別に扱う。
    fields:
      wtrealm:
        type: String
      reply_urls:
        type: "String[]"
      audience:
        type: String
      token_type:
        type: WsFedTokenType
      name_id_format:
        type: String
      name_id_source:
        type: String
      rules:
        type: "ClaimMappingRule[]"
  AdminApplicationDetailResponse:
    kind: value_object
    description: アプリ詳細レスポンス。Application 本体に加え、binding から解決した protocol 実設定を含む。
    fields:
      application:
        type: AdminApplicationResponse
      oidc:
        type: ApplicationOidcConfig
        optional: true
      wsfed:
        type: ApplicationWsFedConfig
        optional: true
  ApplicationOidcConfigUpdateRequest:
    kind: value_object
    description: OIDC binding 設定の更新リクエスト。指定フィールドのみ変更する。advanced 項目を含む。 token_endpoint_auth_method など更新契約上の不変項目は含めない。
    fields:
      redirect_uris:
        type: "String[]"
        optional: true
      grant_types:
        type: "GrantType[]"
        optional: true
      response_types:
        type: "ResponseType[]"
        optional: true
      scope:
        type: String
        optional: true
      require_pushed_authorization_requests:
        type: Boolean
        optional: true
      dpop_bound_access_tokens:
        type: Boolean
        optional: true
  ApplicationWsFedConfigUpdateRequest:
    kind: value_object
    description: WS-Federation binding 設定の更新リクエスト。指定フィールドのみ変更する。per-RP の advanced 項目 (audience / token_type / claim 規則) を含む。Entra domain federation は対象外。
    fields:
      reply_urls:
        type: "String[]"
        optional: true
      audience:
        type: String
        optional: true
      token_type:
        type: WsFedTokenType
        optional: true
      name_id_format:
        type: String
        optional: true
      name_id_source:
        type: String
        optional: true
      rules:
        type: "ClaimMappingRule[]"
        optional: true
  AdminApplicationUpdateRequest:
    kind: value_object
    description: Application 更新リクエスト。指定フィールドのみ変更する。
    fields:
      name:
        type: String
        optional: true
      status:
        type: ApplicationStatus
        optional: true
      icon_url:
        type: String
        optional: true
      launch_url:
        type: String
        optional: true
  ProtocolBindingRequest:
    kind: value_object
    description: protocol binding の接続リクエスト。
    fields:
      type:
        type: ProtocolBindingType
      client_id:
        type: String
        optional: true
      wtrealm:
        type: String
        optional: true
  ApplicationAssignmentRequest:
    kind: value_object
    description: Application 割当リクエスト。visibility 省略時は visible。
    fields:
      subject_type:
        type: AssignmentSubjectType
      subject_id:
        type: String
        constraints:
          - non_empty
      visibility:
        type: AssignmentVisibility
        optional: true
  ApplicationAssignmentResponse:
    kind: value_object
    description: 割当表現。
    fields:
      subject_type:
        type: AssignmentSubjectType
      subject_id:
        type: String
      visibility:
        type: AssignmentVisibility
      created_at:
        type: Timestamp
  ApplicationAssignmentListResponse:
    kind: value_object
    description: 割当一覧レスポンス。
    fields:
      assignments:
        type: "ApplicationAssignmentResponse[]"
  MyApplication:
    kind: value_object
    description: 利用者ポータルに表示する割当済みアプリ 1 件。
    fields:
      application_id:
        type: UUID
      name:
        type: String
      kind:
        type: ApplicationKind
      icon_url:
        type: String
        optional: true
      launch_url:
        type: String
        optional: true
  MyApplicationListResponse:
    kind: value_object
    description: 利用者ポータルの割当済みアプリ一覧。
    fields:
      applications:
        type: "MyApplication[]"
  ApplicationCreated:
    kind: event
    description: Application を作成した。
    payload:
      occurredAt:
        type: Timestamp
      tenantId:
        type: String
      actorSub:
        type: String
      applicationId:
        type: String
  ApplicationUpdated:
    kind: event
    description: Application のメタデータを更新した。
    payload:
      occurredAt:
        type: Timestamp
      tenantId:
        type: String
      actorSub:
        type: String
      applicationId:
        type: String
      changedFields:
        type: "String[]"
  ApplicationDeleted:
    kind: event
    description: Application を削除した。
    payload:
      occurredAt:
        type: Timestamp
      tenantId:
        type: String
      actorSub:
        type: String
      applicationId:
        type: String
  ProtocolBindingAttached:
    kind: event
    description: Application に protocol binding を接続した。
    payload:
      occurredAt:
        type: Timestamp
      tenantId:
        type: String
      actorSub:
        type: String
      applicationId:
        type: String
      bindingType:
        type: String
  ProtocolBindingDetached:
    kind: event
    description: Application から protocol binding を解除した。
    payload:
      occurredAt:
        type: Timestamp
      tenantId:
        type: String
      actorSub:
        type: String
      applicationId:
        type: String
      bindingType:
        type: String
  ApplicationAssigned:
    kind: event
    description: Application にユーザー / グループを割当てた。
    payload:
      occurredAt:
        type: Timestamp
      tenantId:
        type: String
      actorSub:
        type: String
      applicationId:
        type: String
      subjectType:
        type: String
      subjectId:
        type: String
  ApplicationUnassigned:
    kind: event
    description: Application の割当を解除した。
    payload:
      occurredAt:
        type: Timestamp
      tenantId:
        type: String
      actorSub:
        type: String
      applicationId:
        type: String
      subjectType:
        type: String
      subjectId:
        type: String
interfaces:
  ListAdminApplications:
    description: 管理者が所属テナントの Application を一覧する。
    output:
      response:
        type: AdminApplicationListResponse
    errors:
      - AccessDeniedError
    read_only: true
    bindings:
      - kind: http
        method: GET
        path: /api/admin/applications
  GetAdminApplication:
    description: 管理者が Application を取得する。binding から解決した protocol 実設定も含む。別テナントは未存在として扱う。
    input:
      application_id:
        type: String
    output:
      response:
        type: AdminApplicationDetailResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    read_only: true
    bindings:
      - kind: http
        method: GET
        path: "/api/admin/applications/{application_id}"
  CreateAdminApplication:
    description: 管理者が Application を一括作成する。種別に応じて OAuth2 client / WS-Fed RP も同時に作成し、 protocol binding を接続する。
    input:
      request:
        type: AdminApplicationCreateRequest
    output:
      response:
        type: AdminApplicationCreateResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - ApplicationCreated
    bindings:
      - kind: http
        method: POST
        path: /api/admin/applications
        request_form: body
        successful_status_codes:
          - "201"
  UpdateAdminApplication:
    description: 管理者が Application のメタデータを更新する。
    input:
      application_id:
        type: String
      request:
        type: AdminApplicationUpdateRequest
    output:
      application:
        type: AdminApplicationResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - ApplicationUpdated
    bindings:
      - kind: http
        method: PATCH
        path: "/api/admin/applications/{application_id}"
        request_form: body
  DeleteAdminApplication:
    description: 管理者が Application を削除する (冪等)。
    input:
      application_id:
        type: String
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - ApplicationDeleted
    bindings:
      - kind: http
        method: DELETE
        path: "/api/admin/applications/{application_id}"
        successful_status_codes:
          - "204"
  AttachProtocolBinding:
    description: 管理者が Application に protocol binding を接続する。
    input:
      application_id:
        type: String
      request:
        type: ProtocolBindingRequest
    output:
      application:
        type: AdminApplicationResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - ProtocolBindingAttached
    bindings:
      - kind: http
        method: POST
        path: "/api/admin/applications/{application_id}/bindings"
        request_form: body
        successful_status_codes:
          - "201"
  DetachProtocolBinding:
    description: 管理者が Application から protocol binding を解除する (冪等)。
    input:
      application_id:
        type: String
      binding_type:
        type: String
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - ProtocolBindingDetached
    bindings:
      - kind: http
        method: DELETE
        path: "/api/admin/applications/{application_id}/bindings/{binding_type}"
        successful_status_codes:
          - "204"
  UpdateApplicationOidcConfig:
    description: 管理者が Application の OIDC binding が指す OAuth2 client の設定を更新する。
    input:
      application_id:
        type: String
      request:
        type: ApplicationOidcConfigUpdateRequest
    errors:
      - InvalidRequestError
      - AccessDeniedError
    bindings:
      - kind: http
        method: PATCH
        path: "/api/admin/applications/{application_id}/oidc"
        request_form: body
        successful_status_codes:
          - "204"
  UpdateApplicationWsFedConfig:
    description: 管理者が Application の WS-Fed binding が指す relying party の設定を更新する。
    input:
      application_id:
        type: String
      request:
        type: ApplicationWsFedConfigUpdateRequest
    errors:
      - InvalidRequestError
      - AccessDeniedError
    bindings:
      - kind: http
        method: PATCH
        path: "/api/admin/applications/{application_id}/wsfed"
        request_form: body
        successful_status_codes:
          - "204"
  ListApplicationAssignments:
    description: 管理者が Application の割当を一覧する。
    input:
      application_id:
        type: String
    output:
      response:
        type: ApplicationAssignmentListResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    read_only: true
    bindings:
      - kind: http
        method: GET
        path: "/api/admin/applications/{application_id}/assignments"
  AssignApplication:
    description: 管理者が Application にユーザー / グループを割当てる。
    input:
      application_id:
        type: String
      request:
        type: ApplicationAssignmentRequest
    output:
      assignment:
        type: ApplicationAssignmentResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - ApplicationAssigned
    bindings:
      - kind: http
        method: POST
        path: "/api/admin/applications/{application_id}/assignments"
        request_form: body
        successful_status_codes:
          - "201"
  UnassignApplication:
    description: 管理者が Application の割当を解除する (冪等)。
    input:
      application_id:
        type: String
      subject_type:
        type: String
      subject_id:
        type: String
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - ApplicationUnassigned
    bindings:
      - kind: http
        method: DELETE
        path: "/api/admin/applications/{application_id}/assignments/{subject_type}/{subject_id}"
        successful_status_codes:
          - "204"
  ListMyApplications:
    description: 利用者が自分に割当済み (visible) の Application を一覧する。hidden 割当は除外する。
    output:
      response:
        type: MyApplicationListResponse
    errors:
      - AccessDeniedError
    read_only: true
    bindings:
      - kind: http
        method: GET
        path: /api/account/applications
invariants:
  AssignmentGatesProtocol:
    description: "未割当の subject はどの protocol binding でもフェデレーションを開始 / 完了できない。\nauthorize / WS-Fed sign-in / 将来 SAML SSO は割当を fail-closed で確認する。\n反例: 未割当ユーザーがプロトコル経由でアプリにログインできる (アクセス制御の迂回)。\n"
    target: Application
    never: federation_completed and not subject_assigned
  AssignmentGatesPortalVisibility:
    description: "ListMyApplications は visible 割当のみ返す。hidden 割当は一覧から除外するが\nプロトコル利用は引き続き許可する。\n"
    target: ApplicationAssignment
    always: listed_in_portal implies (assigned and visibility == visible)
permissions:
  AdminApplicationsManage:
    description: 所属テナント内の Application 一覧・取得・作成・更新・削除・binding 接続/解除。
    actor: User
    resource: Application
    allow_when:
      and:
        - admin in actor.roles
        - actor.disabled_at == null
        - context.authenticated == true
        - actor.tenant_id == resource.tenant_id
  AdminApplicationAssignmentsManage:
    description: Application へのユーザー / グループ割当の参照・追加・削除。
    actor: User
    resource: ApplicationAssignment
    allow_when:
      and:
        - admin in actor.roles
        - actor.disabled_at == null
        - context.authenticated == true
        - actor.tenant_id == resource.tenant_id
  MyApplicationsRead:
    description: 利用者が自分に割当済みの Application 一覧を参照する。
    actor: User
    resource: ApplicationAssignment
    allow_when:
      and:
        - context.authenticated == true
        - actor.tenant_id == resource.tenant_id
scenarios:
  管理者は所属テナントの client を作成・更新・削除できる:
    goal: 管理者が所属テナントの client を作成・更新・削除する。
    primary_actor: Administrator
    scope: Application
    level: user_goal
    preconditions:
      - "tenant_id \"acme\" の roles=[\"admin\"] のユーザー \"operator\" が認証済みである"
    main_success:
      - "管理者 \"operator\" が client \"portal\" を作成する"
      - 作成応答だけが生成された client_secret を含む
      - "管理者 \"operator\" が client \"portal\" の redirect_uris を更新する"
      - "管理者 \"operator\" が client \"portal\" を削除する"
      - "\"AdminClientCreated\"、\"AdminClientUpdated\"、\"AdminClientDeleted\" が発行される"
    extensions:
      - at: 1
        condition: 管理画面から操作する
        steps:
          - "roles=[\"admin\"] のユーザー \"operator\" が管理画面のアプリケーション一覧を開く"
          - "管理者 \"operator\" が confidential client を作成する"
          - 画面は生成された client_secret を一度だけ表示する
          - "管理者 \"operator\" が redirect_uris と scope を編集する"
          - "管理者 \"operator\" が client_id を確認して client を削除する"
          - 一覧から対象 client が消える
      - condition: 別テナントの client を取得しようとする
        steps:
          - "tenant_id \"acme\" に client_id \"portal\" が存在する"
          - "tenant_id \"default\" の管理者が client_id \"portal\" を取得する"
          - "エラー \"InvalidRequestError\""
  管理 consent API は別テナントの同意を公開しない:
    goal: 管理 consent API がテナント境界を越えた同意を公開しない。
    primary_actor: Administrator
    scope: Application
    level: user_goal
    preconditions:
      - "tenant_id \"acme\" のユーザー \"alice\" と client \"portal\" の Consent が存在する"
    main_success:
      - "tenant_id \"default\" の管理者が同じ sub と client_id の Consent を取得する"
      - "エラー \"InvalidRequestError\""
  管理者は管理画面でアプリケーションを作成し protocol binding を構成できる:
    goal: 管理者が統合 Application 画面でアプリを作成し、protocol binding と割り当てを構成する。
    primary_actor: Administrator
    scope: Application
    level: user_goal
    description: OAuth2 / WS-Federation / service を統合した Application 画面 (commit a5e2ec8)。
    preconditions:
      - "roles=[\"admin\"] のユーザー \"operator\" が管理画面のアプリケーション一覧を開いている"
    main_success:
      - "管理者 \"operator\" が confidential なアプリケーション \"portal\" を作成する"
      - 画面は生成された client_secret を一度だけ表示する
      - "管理者 \"operator\" がアプリケーション \"portal\" に OIDC protocol binding を追加する"
      - "管理者 \"operator\" がアプリケーション \"portal\" の redirect_uris と scope を編集する"
      - "管理者 \"operator\" がアプリケーション \"portal\" をユーザー \"alice\" に割り当てる"
      - "管理者 \"operator\" がアプリケーション \"portal\" を削除する"
      - 一覧から対象アプリケーションが消える
  ダッシュボードは所属テナントの集計を表示する:
    goal: 管理ダッシュボードが所属テナントの集計を表示する。
    primary_actor: Administrator
    scope: Application
    level: user_goal
    preconditions:
      - "roles=[\"admin\"] のユーザー \"operator\" が管理ダッシュボードを開いている"
    main_success:
      - ユーザー数・登録アプリケーション数・付与済み同意数・直近 24 時間の監査イベント数が表示される
      - 最近の監査イベントが表示される
user_experience:
  screens:
    AdminApplications:
      route: /admin/applications
      purpose: "管理者が OAuth2 / WS-Federation / service の各種クライアントを単一の「アプリケーション」として\n一覧・作成・更新・削除し、protocol binding の追加・削除、OIDC / WS-Fed の設定、\nユーザー/グループへの割り当てを行う統合画面。OIDC の高度な設定 (grant / response 種別・PAR・\nDPoP、作成時に確定する認証方式) もここで編集し、専用の低レベル client 画面は持たない。\n生成された client_secret は作成成功直後に一度だけ表示する。\n"
      interfaces:
        - ListAdminApplications
        - GetAdminApplication
        - CreateAdminApplication
        - UpdateAdminApplication
        - DeleteAdminApplication
        - AttachProtocolBinding
        - DetachProtocolBinding
        - UpdateApplicationOidcConfig
        - UpdateApplicationWsFedConfig
        - ListApplicationAssignments
        - AssignApplication
        - UnassignApplication
        - ListAdminUsers
        - ListGroups
      states:
        - ready
        - loading
        - submitting
        - empty
        - secret_issued
        - delete_confirmation
        - access_denied
        - service_error
    AccountApps:
      route: /account/apps
      purpose: end-userが利用できるアプリケーションをタイルで一覧し、起動する。
      interfaces:
        - ListMyApplications
      states:
        - ready
        - loading
        - empty
        - access_denied
        - service_error
  transitions:
    - from: AdminApplications
      to: AdminUsers
      trigger: user_management_selected
  requirements:
    - id: UX-ADMIN-CLIENT-SECRET
      category: security
      adoption: required
      statement: AdminApplicationsはOIDCアプリ作成で生成されたclient_secretを作成成功直後に一度だけ表示し、再取得できないことを明示する。client_secret_hashは表示しない。
      screens:
        - AdminApplications
      interfaces:
        - CreateAdminApplication
        - GetAdminApplication
    - id: UX-ADMIN-CLIENT-DELETE-CONFIRMATION
      category: usability
      adoption: required
      statement: AdminApplicationsはアプリケーション削除前に対象を示す確認操作を要求する。
      screens:
        - AdminApplications
      interfaces:
        - DeleteAdminApplication
