id: wi-4-component-alignment
title: ra-idp-go の package 構成と scl.yaml components の整合性を取る
created_at: 2026-06-14
status: completed
authors: [tn]

motivation: |
  SCL のモジュール (components) は DDD のサブドメイン分割であり、実装はその
  境界に整合していることが RA の必須条件である。現状、Go 側は protocol-family
  ベースで oauth2 / authentication / tenancy / administration の 4 パッケージに
  分かれているが、SCL は Tenancy / Identity / ClientRegistry / Authorization /
  Token / Trust の 6 モジュールに分かれており、両者は 1:1 に対応していない。

  ユーザ判断: Go 側の protocol-family 分割は綺麗に保ち、SCL 側を Go パッケージ
  境界に合わせて再編する。SCL に Go 特有概念は持ち込まない。

target_state:
  package_to_component:
    - { package: "internal/tenancy",         component: Tenancy }
    - { package: "internal/authentication",  component: Authentication }
    - { package: "internal/oauth2",          component: OAuth2 }

scope:
  scl:
    - >-
      components.Identity を components.Authentication にリネームする
      (owns_models / owns_events / owns_interfaces / owns_permissions /
      owns_invariants / owns_objectives / depends_on をそのまま引き継ぐ)。
    - >-
      components.Authorization / Token / Trust / ClientRegistry の 4 つを
      components.OAuth2 単一に統合する。owns_* を union し、depends_on は
      重複排除して Tenancy / Authentication への参照のみ残す。
    - >-
      各セクションの annotations.component に書かれた旧名 4 つを OAuth2 に、
      Identity を Authentication に一括置換する。
  go:
    - >-
      internal/administration/usecases/users.go を
      internal/authentication/usecases/admin_users.go に移動 (test 含む)。
    - >-
      internal/administration/usecases/clients.go を
      internal/oauth2/usecases/admin_clients.go に移動。
    - >-
      internal/administration/usecases/consents.go を
      internal/oauth2/usecases/admin_consents.go に移動。
    - internal/administration/ パッケージを削除。
    - >-
      internal/oauth2/ports/session_store.go を
      internal/authentication/ports/session_store.go に移動 (LoginSession は
      Authentication が所有するため)。
    - 上記移動に伴う import 文を全箇所更新する。

out_of_scope:
  - internal/oauth2/ をさらに細かい Go パッケージに分割する大規模 refactor。
  - Go 側コードのロジック変更や API 互換性に影響するリネーム。
  - SCL の models / interfaces / permissions の追加・削除。

affected_guarantees:
  - >-
    SCL coherence test (internal/spec): permission / interface 名の一覧は
    変えないため、PascalCase mapping は影響を受けない。
  - 'admin RBAC: handler 経路と permission action 名は変えない。'
  - 'HTTP 経路: 変えない (handler は移動しない)。'

verification:
  - go build ./... が成功する。
  - go vet ./... が無警告。
  - go test ./... が全 pass。
  - >-
    SCL の owns_* に列挙された全要素が models / interfaces 等で見つかる
    (coherence test SCLPermissionsCoverage 等)。
  - >-
    rg -n "component: (Identity|Authorization|Token|Trust|ClientRegistry)"
    で旧 component 名が scl.yaml 内に残らないこと。
  - find internal/administration が空 / 不在であること。

risk: medium
risk_notes: |
  SCL 4 components の union は機械的だが、annotations.component の一括置換と
  go の import 修正は広範。途中状態でコミットしないこと。
