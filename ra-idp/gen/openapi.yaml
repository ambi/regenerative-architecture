openapi: 3.0.3
info:
  title: "RA OAuth2 / OIDC IdP"
  version: "1.2"
paths:
  /register:
    post:
      operationId: registerClient
      summary: Dynamic Client Registration (RFC 7591)
      responses:
        200:
          description: Dynamic Client Registration (RFC 7591)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuth2Client"
        400:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthError"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientRegistrationRequest"
  /authorize:
    get:
      operationId: authorize
      summary: Authorization endpoint (RFC 6749 §4.1.1)
      responses:
        302:
          description: Authorization endpoint (RFC 6749 §4.1.1)
        400:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthError"
      parameters:
        - name: response_type
          in: query
          required: true
          schema:
            type: string
            enum:
              - code
        - name: client_id
          in: query
          required: true
          schema:
            type: string
        - name: redirect_uri
          in: query
          required: true
          schema:
            type: string
        - name: scope
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: nonce
          in: query
          required: false
          schema:
            type: string
        - name: code_challenge
          in: query
          required: true
          schema:
            type: string
        - name: code_challenge_method
          in: query
          required: true
          schema:
            type: string
            enum:
              - S256
        - name: prompt
          in: query
          required: false
          schema:
            type: string
        - name: max_age
          in: query
          required: false
          schema:
            type: integer
        - name: id_token_hint
          in: query
          required: false
          schema:
            type: string
        - name: request_uri
          in: query
          required: false
          schema:
            type: string
  /api/auth/transaction:
    get:
      operationId: getBrowserTransaction
      summary: SPA が HttpOnly transaction cookie に対応するログイン・同意コンテキストを取得する。
      responses:
        200:
          description: SPA が HttpOnly transaction cookie に対応するログイン・同意コンテキストを取得する。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrowserTransactionResponse"
        400:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthError"
  /api/auth/login:
    post:
      operationId: submitBrowserLogin
      summary: SPA JSON API から browser password login を完了する。
      responses:
        200:
          description: SPA JSON API から browser password login を完了する。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrowserFlowResponse"
        400:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthError"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BrowserLoginRequest"
  /api/auth/consent:
    post:
      operationId: submitBrowserConsent
      summary: SPA JSON API から authorization request の同意・拒否を確定する。
      responses:
        200:
          description: SPA JSON API から authorization request の同意・拒否を確定する。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrowserFlowResponse"
        400:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthError"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BrowserConsentRequest"
  /api/auth/device:
    post:
      operationId: submitBrowserDevice
      summary: SPA JSON API から device user_code を承認または拒否する。
      responses:
        200:
          description: SPA JSON API から device user_code を承認または拒否する。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrowserFlowResponse"
        400:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthError"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BrowserDeviceRequest"
    get:
      operationId: getBrowserDeviceContext
      summary: SPA が device user_code と CSRF token を取得する。
      responses:
        200:
          description: SPA が device user_code と CSRF token を取得する。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrowserDeviceContextResponse"
  /api/auth/totp:
    post:
      operationId: submitBrowserTotp
      summary: SPA JSON API から TOTP コードを検証する。成功すれば LoginSession を認証完了状態に昇格させ、後続フロー (consent / authorization code 発行) に進む。他 factor は別 endpoint として定義する。
      responses:
        200:
          description: SPA JSON API から TOTP コードを検証する。成功すれば LoginSession を認証完了状態に昇格させ、後続フロー (consent / authorization code 発行) に進む。他 factor は別 endpoint として定義する。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrowserFlowResponse"
        400:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthError"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BrowserTotpRequest"
  /api/auth/change_password:
    post:
      operationId: changePassword
      summary: 認証済みユーザーが自身のパスワードを変更する。current_password を verify、new_password を password_policy で検証、PasswordHistoryNoReuse invariant で直近 history_depth 件と照合する。
      responses:
        200:
          description: 認証済みユーザーが自身のパスワードを変更する。current_password を verify、new_password を password_policy で検証、PasswordHistoryNoReuse invariant で直近 history_depth 件と照合する。
        400:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthError"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BrowserChangePasswordRequest"
  /api/auth/forgot_password:
    post:
      operationId: requestPasswordReset
      summary: "未認証ユーザーがパスワードリセットリンクの送信を要求する (ADR-030)。\nanti-enumeration のため、email の存在有無に関わらず常に 204 を返し、\nverified email を持つ user が見つかった場合のみ token を発行して\nEmailSender 経由で送信する。\n"
      responses:
        200:
          description: "未認証ユーザーがパスワードリセットリンクの送信を要求する (ADR-030)。\nanti-enumeration のため、email の存在有無に関わらず常に 204 を返し、\nverified email を持つ user が見つかった場合のみ token を発行して\nEmailSender 経由で送信する。\n"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BrowserForgotPasswordRequest"
  /api/auth/reset_password:
    post:
      operationId: resetPasswordWithToken
      summary: "reset リンクから戻ってきたユーザーが新パスワードを設定する (ADR-030)。\ntoken を単発消費し、password_policy / PasswordHistoryNoReuse /\nBreachedPasswordChecker を通過した new_password で User.password_hash を\n更新する。成功時 PasswordChanged を emit。\n"
      responses:
        200:
          description: "reset リンクから戻ってきたユーザーが新パスワードを設定する (ADR-030)。\ntoken を単発消費し、password_policy / PasswordHistoryNoReuse /\nBreachedPasswordChecker を通過した new_password で User.password_hash を\n更新する。成功時 PasswordChanged を emit。\n"
        400:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthError"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BrowserResetPasswordRequest"
  /end_session:
    get:
      operationId: endSession
      summary: "RP-Initiated Logout endpoint (OIDC RP-Initiated Logout 1.0)。redirect 検証は OAuth2/OIDC component が行い、session revocation は Authentication component の SessionManager に委譲する。"
      responses:
        200:
          description: "RP-Initiated Logout endpoint (OIDC RP-Initiated Logout 1.0)。redirect 検証は OAuth2/OIDC component が行い、session revocation は Authentication component の SessionManager に委譲する。"
        400:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthError"
      parameters:
        - name: client_id
          in: query
          required: false
          schema:
            type: string
        - name: id_token_hint
          in: query
          required: false
          schema:
            type: string
        - name: post_logout_redirect_uri
          in: query
          required: false
          schema:
            type: string
            format: uri
        - name: state
          in: query
          required: false
          schema:
            type: string
  /par:
    post:
      operationId: pushAuthorizationRequest
      summary: Pushed Authorization Request (RFC 9126)
      responses:
        200:
          description: Pushed Authorization Request (RFC 9126)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParResponse"
        400:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthError"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/ParRequest"
  /token:
    post:
      operationId: token
      summary: Token endpoint (RFC 6749 §3.2 + 9068 + 9449)
      responses:
        200:
          description: Token endpoint (RFC 6749 §3.2 + 9068 + 9449)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        400:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthError"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/TokenRequest"
  /introspect:
    post:
      operationId: introspect
      summary: Token Introspection (RFC 7662)
      responses:
        200:
          description: Token Introspection (RFC 7662)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntrospectionResponse"
        400:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthError"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/IntrospectionRequest"
  /revoke:
    post:
      operationId: revoke
      summary: Token Revocation (RFC 7009)
      responses:
        200:
          description: Token Revocation (RFC 7009)
        400:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthError"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/RevokeRequest"
  /userinfo:
    get:
      operationId: userInfo
      summary: UserInfo (OIDC Core §5.3)
      responses:
        200:
          description: UserInfo (OIDC Core §5.3)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserInfoResponse"
        400:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthError"
    post:
      operationId: postUserInfo
      summary: UserInfo の POST binding (OIDC Core §5.3)
      responses:
        200:
          description: UserInfo の POST binding (OIDC Core §5.3)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserInfoResponse"
        400:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthError"
  /device_authorization:
    post:
      operationId: deviceAuthorization
      summary: Device Authorization Request (RFC 8628 §3.1)
      responses:
        200:
          description: Device Authorization Request (RFC 8628 §3.1)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceAuthorizationResponse"
        400:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthError"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/DeviceAuthorizationRequest"
  /jwks:
    get:
      operationId: getJwks
      summary: JWKS (RFC 7517)
      responses:
        200:
          description: JWKS (RFC 7517)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JWKS"
  /.well-known/openid-configuration:
    get:
      operationId: getOpenidConfiguration
      summary: OIDC Discovery
      responses:
        200:
          description: OIDC Discovery
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscoveryDocument"
  /.well-known/oauth-authorization-server:
    get:
      operationId: getOauthAuthorizationServer
      summary: OAuth 2.0 Authorization Server Metadata (RFC 8414)
      responses:
        200:
          description: OAuth 2.0 Authorization Server Metadata (RFC 8414)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscoveryDocument"
  /health:
    get:
      operationId: health
      summary: Health check
      responses:
        200:
          description: Health check
  /api/admin/users:
    get:
      operationId: listAdminUsers
      summary: 管理者が削除されていないユーザーを一覧する。
      responses:
        200:
          description: 管理者が削除されていないユーザーを一覧する。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserListResponse"
        400:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthError"
    post:
      operationId: createAdminUser
      summary: 管理者が password_policy を満たす初期パスワードでユーザーを作成する。
      responses:
        201:
          description: 管理者が password_policy を満たす初期パスワードでユーザーを作成する。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserResponse"
        400:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthError"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUserCreateRequest"
  /api/admin/users/{sub}:
    get:
      operationId: getAdminUser
      summary: 管理者が sub を指定してユーザーを取得する。
      responses:
        200:
          description: 管理者が sub を指定してユーザーを取得する。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserResponse"
        400:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthError"
      parameters:
        - name: sub
          in: path
          required: true
          schema:
            type: string
    patch:
      operationId: updateAdminUser
      summary: 管理者がユーザーのプロフィール、email_verified、roles を更新する。
      responses:
        200:
          description: 管理者がユーザーのプロフィール、email_verified、roles を更新する。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserResponse"
        400:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthError"
      parameters:
        - name: sub
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUserUpdateRequest"
  /api/admin/users/{sub}/disable:
    post:
      operationId: disableAdminUser
      summary: 管理者がユーザーを無効化し、新規ログインと既存セッション利用を拒否する。
      responses:
        204:
          description: 管理者がユーザーを無効化し、新規ログインと既存セッション利用を拒否する。
        400:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthError"
      parameters:
        - name: sub
          in: path
          required: true
          schema:
            type: string
  /api/admin/users/{sub}/enable:
    post:
      operationId: enableAdminUser
      summary: 管理者が無効化済みユーザーを再有効化する。
      responses:
        204:
          description: 管理者が無効化済みユーザーを再有効化する。
        400:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthError"
      parameters:
        - name: sub
          in: path
          required: true
          schema:
            type: string
  /api/admin/clients:
    get:
      operationId: listAdminClients
      summary: 管理者が所属テナントの client を一覧する。
      responses:
        200:
          description: 管理者が所属テナントの client を一覧する。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminClientListResponse"
        400:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthError"
    post:
      operationId: createAdminClient
      summary: 管理者が所属テナントに client を作成する。
      responses:
        201:
          description: 管理者が所属テナントに client を作成する。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminClientCreateResponse"
        400:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthError"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminClientCreateRequest"
  /api/admin/clients/{client_id}:
    get:
      operationId: getAdminClient
      summary: 管理者が所属テナントの client を取得する。別テナントの client は未存在として扱う。
      responses:
        200:
          description: 管理者が所属テナントの client を取得する。別テナントの client は未存在として扱う。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminClientResponse"
        400:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthError"
      parameters:
        - name: client_id
          in: path
          required: true
          schema:
            type: string
    patch:
      operationId: updateAdminClient
      summary: 管理者が所属テナントの client metadata を更新する。
      responses:
        200:
          description: 管理者が所属テナントの client metadata を更新する。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminClientResponse"
        400:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthError"
      parameters:
        - name: client_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminClientUpdateRequest"
    delete:
      operationId: deleteAdminClient
      summary: 管理者が所属テナントの client を削除する。
      responses:
        204:
          description: 管理者が所属テナントの client を削除する。
        400:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthError"
      parameters:
        - name: client_id
          in: path
          required: true
          schema:
            type: string
  /admin/consents:
    get:
      operationId: listAdminConsents
      summary: 管理者が所属テナントの Consent を監査目的で一覧する。
      responses:
        200:
          description: 管理者が所属テナントの Consent を監査目的で一覧する。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminConsentListResponse"
        400:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthError"
  /admin/consents/{sub}/{client_id}:
    get:
      operationId: getAdminConsent
      summary: 管理者が所属テナントの Consent を subject と client_id で取得する。別テナントの Consent は未存在として扱う。
      responses:
        200:
          description: 管理者が所属テナントの Consent を subject と client_id で取得する。別テナントの Consent は未存在として扱う。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminConsentResponse"
        400:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthError"
      parameters:
        - name: sub
          in: path
          required: true
          schema:
            type: string
        - name: client_id
          in: path
          required: true
          schema:
            type: string
    delete:
      operationId: revokeAdminConsent
      summary: 管理者が所属テナントの Consent を論理撤回する。管理者による Consent の作成・scope 拡張は許可しない。
      responses:
        204:
          description: 管理者が所属テナントの Consent を論理撤回する。管理者による Consent の作成・scope 拡張は許可しない。
        400:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthError"
      parameters:
        - name: sub
          in: path
          required: true
          schema:
            type: string
        - name: client_id
          in: path
          required: true
          schema:
            type: string
  /realms/default/admin/tenants:
    get:
      operationId: listTenants
      summary: "system_admin がテナント一覧を取得する。default control-plane tenant のセッションで認証する (ADR-032)。"
      responses:
        200:
          description: "system_admin がテナント一覧を取得する。default control-plane tenant のセッションで認証する (ADR-032)。"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantListResponse"
        400:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthError"
    post:
      operationId: createTenant
      summary: system_admin が新規テナントを作成する。
      responses:
        201:
          description: system_admin が新規テナントを作成する。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantSummaryResponse"
        400:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthError"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TenantCreateRequest"
  /realms/default/admin/tenants/{tenant_id}:
    get:
      operationId: getTenant
      summary: system_admin が単一テナントを取得する。
      responses:
        200:
          description: system_admin が単一テナントを取得する。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantSummaryResponse"
        400:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthError"
      parameters:
        - name: tenant_id
          in: path
          required: true
          schema:
            type: string
    patch:
      operationId: updateTenant
      summary: system_admin がテナントの表示名を更新する。
      responses:
        200:
          description: system_admin がテナントの表示名を更新する。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantSummaryResponse"
        400:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthError"
      parameters:
        - name: tenant_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TenantUpdateRequest"
  /realms/default/admin/tenants/{tenant_id}/disable:
    post:
      operationId: disableTenant
      summary: system_admin が default 以外のテナントを無効化する。/authorize / /token / /login 等は一律 invalid_request になる。
      responses:
        204:
          description: system_admin が default 以外のテナントを無効化する。/authorize / /token / /login 等は一律 invalid_request になる。
        400:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthError"
      parameters:
        - name: tenant_id
          in: path
          required: true
          schema:
            type: string
  /realms/default/admin/tenants/{tenant_id}/enable:
    post:
      operationId: enableTenant
      summary: system_admin が無効化済みテナントを再有効化する。
      responses:
        204:
          description: system_admin が無効化済みテナントを再有効化する。
        400:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthError"
      parameters:
        - name: tenant_id
          in: path
          required: true
          schema:
            type: string
components:
  schemas:
    ClientType:
      type: string
      enum:
        - public
        - confidential
    GrantType:
      type: string
      enum:
        - authorization_code
        - refresh_token
        - client_credentials
        - "urn:ietf:params:oauth:grant-type:device_code"
    TokenEndpointAuthMethod:
      type: string
      enum:
        - client_secret_basic
        - client_secret_post
        - private_key_jwt
        - tls_client_auth
        - none
    ResponseType:
      type: string
      enum:
        - code
    ResponseMode:
      type: string
      enum:
        - query
        - form_post
    SignatureAlgorithm:
      type: string
      enum:
        - PS256
        - ES256
    FapiProfile:
      type: string
      enum:
        - none
        - fapi_2_security_profile
    TokenType:
      type: string
      enum:
        - access_token
        - refresh_token
    SenderConstraintKind:
      type: string
      enum:
        - dpop
        - mtls
    AccessTokenSenderConstraint:
      type: string
      enum:
        - none
        - dpop
        - mtls
    CodeChallengeMethod:
      type: string
      enum:
        - S256
    MfaFactorType:
      type: string
      enum:
        - totp
        - webauthn
        - hwk
        - swk
    AuthorizationCodeState:
      type: string
      enum:
        - received
        - authentication_pending
        - authenticated
        - consent_pending
        - consented
        - code_issued
        - exchanged
        - rejected
        - expired
    DeviceCodeState:
      type: string
      enum:
        - issued
        - user_code_entered
        - authorization_pending
        - approved
        - denied
        - exchanged
        - expired
    RefreshTokenState:
      type: string
      enum:
        - active
        - rotated
        - revoked
        - expired
    AuthorizationCodeRecordState:
      type: string
      enum:
        - issued
        - redeemed
        - expired
    ConsentState:
      type: string
      enum:
        - granted
        - revoked
        - expired
    PARRecordState:
      type: string
      enum:
        - stored
        - used
        - expired
    SigningKeyState:
      type: string
      enum:
        - active
        - verifying
        - retired
        - archived
    TenantStatus:
      type: string
      enum:
        - active
        - disabled
    OAuthErrorCode:
      type: string
      enum:
        - invalid_request
        - invalid_client
        - invalid_grant
        - unauthorized_client
        - unsupported_grant_type
        - invalid_scope
        - invalid_token
        - server_error
        - invalid_dpop_proof
        - access_denied
        - expired_token
        - slow_down
        - insufficient_scope
        - authorization_pending
    Tenant:
      type: object
      additionalProperties: false
      description: "ADR-032 で導入したテナント (realm) 集約。Client / User / Consent / ポリシー / ブランディングはこの境界に閉じる。`default` テナントは起動時に自動作成され、削除・無効化とも不可。"
      properties:
        id:
          type: string
          minLength: 1
          maxLength: 63
          pattern: "^[a-z0-9][a-z0-9-]{0,62}$"
        display_name:
          type: string
          minLength: 1
          maxLength: 200
        status:
          type: string
          enum:
            - active
            - disabled
        created_at:
          type: string
          format: "date-time"
        updated_at:
          type: string
          format: "date-time"
        disabled_at:
          type: string
          format: "date-time"
      required:
        - id
        - display_name
        - status
        - created_at
    OAuth2Client:
      type: object
      additionalProperties: false
      description: RFC 7591 + FAPI 2.0 拡張のクライアント。
      properties:
        tenant_id:
          type: string
        client_id:
          type: string
          minLength: 1
          maxLength: 128
        client_secret_hash:
          type: string
        client_name:
          type: string
          maxLength: 200
        client_type:
          type: string
          enum:
            - public
            - confidential
        redirect_uris:
          type: array
          items:
            type: string
            format: uri
          minItems: 1
        grant_types:
          type: array
          items:
            type: string
            enum:
              - authorization_code
              - refresh_token
              - client_credentials
              - "urn:ietf:params:oauth:grant-type:device_code"
          minItems: 1
        response_types:
          type: array
          items:
            type: string
            enum:
              - code
        token_endpoint_auth_method:
          type: string
          enum:
            - client_secret_basic
            - client_secret_post
            - private_key_jwt
            - tls_client_auth
            - none
        scope:
          type: string
        jwks_uri:
          type: string
          format: uri
        jwks: {}
        tls_client_auth_subject_dn:
          type: string
        id_token_signed_response_alg:
          type: string
          enum:
            - PS256
            - ES256
        require_pushed_authorization_requests:
          type: boolean
        require_pkce:
          type: boolean
        dpop_bound_access_tokens:
          type: boolean
        fapi_profile:
          type: string
          enum:
            - none
            - fapi_2_security_profile
        created_at:
          type: string
          format: "date-time"
      required:
        - tenant_id
        - client_id
        - client_type
        - redirect_uris
        - grant_types
        - response_types
        - token_endpoint_auth_method
        - scope
        - id_token_signed_response_alg
        - require_pushed_authorization_requests
        - dpop_bound_access_tokens
        - fapi_profile
        - created_at
    User:
      type: object
      additionalProperties: false
      description: OIDC Core §5.1 標準クレーム + PII 注釈付きユーザー。
      properties:
        sub:
          type: string
          minLength: 1
        tenant_id:
          type: string
        preferred_username:
          type: string
          minLength: 1
          maxLength: 100
        password_hash:
          type: string
        name:
          type: string
        given_name:
          type: string
        family_name:
          type: string
        email:
          type: string
          format: email
        email_verified:
          type: boolean
        mfa_enrolled:
          type: boolean
        roles:
          type: array
          items:
            type: string
        disabled_at:
          type: string
          format: "date-time"
        created_at:
          type: string
          format: "date-time"
        updated_at:
          type: string
          format: "date-time"
        deleted_at:
          type: string
          format: "date-time"
      required:
        - sub
        - tenant_id
        - preferred_username
        - password_hash
        - email_verified
        - mfa_enrolled
        - roles
        - created_at
    MfaFactor:
      type: object
      additionalProperties: false
      description: "ユーザーが登録した第二要素 (MFA) 1 件。Totp の場合 secret は base32 で保存し、認証時に RFC 6238 (T0=0, STEP=30s, 6-digit) で評価する。User.mfa_enrolled の真値はこの集合の非空性と同義。"
      properties:
        sub:
          type: string
        type:
          type: string
          enum:
            - totp
            - webauthn
            - hwk
            - swk
        secret:
          type: string
        label:
          type: string
        created_at:
          type: string
          format: "date-time"
        last_used_at:
          type: string
          format: "date-time"
      required:
        - sub
        - type
        - created_at
    LoginSession:
      type: object
      additionalProperties: false
      description: "ブラウザログインセッション。Cookie には不透明な session id のみを置き、sub と auth_time はサーバー側ストアに保持する。amr / acr もここに残し、後続の /authorize で step-up 判定に使う。authentication_pending=true は追加 factor 検証を待っている中間状態で、/authorize 完了経路はそのセッションを未認証扱いとし対応する factor challenge に誘導する。"
      properties:
        id:
          type: string
          format: uuid
        sub:
          type: string
        auth_time:
          type: integer
        amr:
          type: array
          items:
            type: string
        acr:
          type: string
        authentication_pending:
          type: boolean
        expires_at:
          type: string
          format: "date-time"
      required:
        - id
        - sub
        - auth_time
        - amr
        - acr
        - authentication_pending
        - expires_at
    AuthenticationContext:
      type: object
      additionalProperties: false
      description: Authentication component が OAuth2/OIDC component に渡す認証結果。OAuth2/OIDC は password、UserRepository、session cookie の詳細を参照しない。
      properties:
        sub:
          type: string
        auth_time:
          type: integer
        amr:
          type: array
          items:
            type: string
        acr:
          type: string
        session_id:
          type: string
      required:
        - sub
        - auth_time
        - amr
    Consent:
      type: object
      additionalProperties: false
      description: GDPR 同意取得記録。状態は ConsentLifecycle 状態機械に従う。
      properties:
        tenant_id:
          type: string
        sub:
          type: string
        client_id:
          type: string
        scopes:
          type: array
          items:
            type: string
          minItems: 1
          uniqueItems: true
        state:
          type: string
          enum:
            - granted
            - revoked
            - expired
        granted_at:
          type: string
          format: "date-time"
        expires_at:
          type: string
          format: "date-time"
        revoked_at:
          type: string
          format: "date-time"
      required:
        - tenant_id
        - sub
        - client_id
        - scopes
        - state
        - granted_at
        - expires_at
    RefreshTokenRecord:
      type: object
      additionalProperties: false
      description: リフレッシュトークンのストアレコード。プレーン値は保存しない。状態は RefreshTokenLifecycle 状態機械に従う。
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
        hash:
          type: string
        family_id:
          type: string
          format: uuid
        parent_id:
          type: string
          format: uuid
        client_id:
          type: string
        sub:
          type: string
        scopes:
          type: array
          items:
            type: string
        state:
          type: string
          enum:
            - active
            - rotated
            - revoked
            - expired
        issued_at:
          type: string
          format: "date-time"
        expires_at:
          type: string
          format: "date-time"
        absolute_expires_at:
          type: string
          format: "date-time"
        sender_constraint:
          $ref: "#/components/schemas/RefreshTokenSenderConstraint"
      required:
        - id
        - tenant_id
        - hash
        - family_id
        - client_id
        - sub
        - scopes
        - state
        - issued_at
        - expires_at
        - absolute_expires_at
    AuthorizationRequest:
      type: object
      additionalProperties: false
      description: フロー追跡用のサーバー内部中間ステート。
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
        state:
          type: string
          enum:
            - received
            - authentication_pending
            - authenticated
            - consent_pending
            - consented
            - code_issued
            - exchanged
            - rejected
            - expired
        client_id:
          type: string
        redirect_uri:
          type: string
          format: uri
        response_type:
          type: string
          enum:
            - code
        scope:
          type: string
        state_param:
          type: string
        nonce:
          type: string
        code_challenge:
          type: string
        code_challenge_method:
          type: string
          enum:
            - S256
        prompt:
          type: string
        max_age:
          type: integer
          minimum: 0
        par_request_uri:
          type: string
        sub:
          type: string
        auth_time:
          type: integer
        amr:
          type: array
          items:
            type: string
        acr:
          type: string
        acr_values:
          type: string
        created_at:
          type: string
          format: "date-time"
        expires_at:
          type: string
          format: "date-time"
      required:
        - id
        - tenant_id
        - state
        - client_id
        - redirect_uri
        - response_type
        - scope
        - code_challenge
        - code_challenge_method
        - created_at
        - expires_at
    AuthorizationCodeRecord:
      type: object
      additionalProperties: false
      description: 発行済み認可コードの永続レコード。code 本体は短命。状態は AuthorizationCodeRecordLifecycle に従う（AuthorizationCodeFlow とは別軸でコード自体のライフサイクルを表す）。
      properties:
        code:
          type: string
        tenant_id:
          type: string
        authorization_request_id:
          type: string
          format: uuid
        client_id:
          type: string
        sub:
          type: string
        scopes:
          type: array
          items:
            type: string
        redirect_uri:
          type: string
          format: uri
        code_challenge:
          type: string
        code_challenge_method:
          type: string
          enum:
            - S256
        nonce:
          type: string
        auth_time:
          type: integer
        amr:
          type: array
          items:
            type: string
        acr:
          type: string
        state:
          type: string
          enum:
            - issued
            - redeemed
            - expired
        issued_at:
          type: string
          format: "date-time"
        expires_at:
          type: string
          format: "date-time"
        redeemed_at:
          type: string
          format: "date-time"
        issued_family_id:
          type: string
          format: uuid
      required:
        - code
        - tenant_id
        - authorization_request_id
        - client_id
        - sub
        - scopes
        - redirect_uri
        - code_challenge
        - code_challenge_method
        - auth_time
        - state
        - issued_at
        - expires_at
    PARRecord:
      type: object
      additionalProperties: false
      description: Pushed Authorization Request の格納レコード。状態は PARRecordLifecycle に従う。
      properties:
        request_uri:
          type: string
        tenant_id:
          type: string
        client_id:
          type: string
        parameters:
          type: object
          additionalProperties:
            type: string
        state:
          type: string
          enum:
            - stored
            - used
            - expired
        issued_at:
          type: string
          format: "date-time"
        expires_at:
          type: string
          format: "date-time"
      required:
        - request_uri
        - tenant_id
        - client_id
        - parameters
        - state
        - issued_at
        - expires_at
    DeviceAuthorization:
      type: object
      additionalProperties: false
      description: RFC 8628 デバイス認可レコード。device_code はハッシュのみで保存する。
      properties:
        device_code_hash:
          type: string
        tenant_id:
          type: string
        user_code:
          type: string
        client_id:
          type: string
        scopes:
          type: array
          items:
            type: string
        state:
          type: string
          enum:
            - issued
            - user_code_entered
            - authorization_pending
            - approved
            - denied
            - exchanged
            - expired
        sub:
          type: string
        auth_time:
          type: integer
        interval_seconds:
          type: integer
          minimum: 1
        last_polled_at:
          type: string
          format: "date-time"
        issued_family_id:
          type: string
          format: uuid
        issued_at:
          type: string
          format: "date-time"
        expires_at:
          type: string
          format: "date-time"
      required:
        - device_code_hash
        - tenant_id
        - user_code
        - client_id
        - scopes
        - state
        - interval_seconds
        - issued_at
        - expires_at
    SigningKey:
      type: object
      additionalProperties: false
      description: "トークン署名用の非対称鍵。Active 1本＋Verifying 過去鍵 0本以上を JWKS に並べる（ADR-009 / SigningKeyMinJwksOverlap）。"
      properties:
        kid:
          type: string
          minLength: 1
        alg:
          type: string
          enum:
            - PS256
            - ES256
        public_jwk:
          $ref: "#/components/schemas/JWK"
        state:
          type: string
          enum:
            - active
            - verifying
            - retired
            - archived
        created_at:
          type: string
          format: "date-time"
        activated_at:
          type: string
          format: "date-time"
        retired_at:
          type: string
          format: "date-time"
        archived_at:
          type: string
          format: "date-time"
      required:
        - kid
        - alg
        - public_jwk
        - state
        - created_at
    SenderConstraintCnf:
      type: object
      additionalProperties: false
      description: "Sender-Constrained 証明 (RFC 7800)。"
      properties:
        jkt:
          type: string
        x5t_s256:
          type: string
    RefreshTokenSenderConstraint:
      type: object
      additionalProperties: false
      description: RefreshToken に紐づくセンダー制約。発行時のバインド先（DPoP 鍵サムプリントまたは mTLS 証明書サムプリント）を保持する。
      properties:
        type:
          type: string
          enum:
            - dpop
            - mtls
        jkt:
          type: string
        x5t_s256:
          type: string
      required:
        - type
    AccessTokenClaims:
      type: object
      additionalProperties: false
      description: JWT Access Token クレーム (RFC 9068)。TTL 600 秒。
      properties:
        iss:
          type: string
          format: uri
        sub:
          type: string
        aud:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
        client_id:
          type: string
        scope:
          type: string
        exp:
          type: integer
        iat:
          type: integer
        nbf:
          type: integer
        jti:
          type: string
        auth_time:
          type: integer
        acr:
          type: string
        amr:
          type: array
          items:
            type: string
        cnf:
          $ref: "#/components/schemas/SenderConstraintCnf"
      required:
        - iss
        - sub
        - aud
        - client_id
        - scope
        - exp
        - iat
        - jti
    IdTokenClaims:
      type: object
      additionalProperties: false
      description: OIDC ID Token クレーム。TTL 3600 秒。
      properties:
        iss:
          type: string
          format: uri
        sub:
          type: string
        aud:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
        exp:
          type: integer
        iat:
          type: integer
        auth_time:
          type: integer
        nonce:
          type: string
        acr:
          type: string
        amr:
          type: array
          items:
            type: string
        azp:
          type: string
        at_hash:
          type: string
        c_hash:
          type: string
        name:
          type: string
        preferred_username:
          type: string
        email:
          type: string
          format: email
        email_verified:
          type: boolean
      required:
        - iss
        - sub
        - aud
        - exp
        - iat
        - auth_time
    Audience:
      type: object
      additionalProperties: false
      description: 文字列または1つ以上の文字列の配列（JWT RFC 7519 §4.1.3）。
      properties:
        one_or_many: {}
      required:
        - one_or_many
    Uri:
      type: object
      additionalProperties: false
      description: URI 形式の文字列。
      properties:
        value:
          type: string
          format: uri
      required:
        - value
    JWK:
      type: object
      additionalProperties: false
      description: JSON Web Key (RFC 7517)。kid で識別される 1 件の公開鍵情報。
      properties:
        kty:
          type: string
        use:
          type: string
        kid:
          type: string
        alg:
          type: string
        extra: {}
      required:
        - kty
        - kid
    JWKS:
      type: object
      additionalProperties: false
      description: JWK Set (RFC 7517 §5)。/jwks エンドポイントが返す公開鍵集合。クライアントがトークン署名を検証する際に取得する。
      properties:
        keys:
          type: array
          items:
            $ref: "#/components/schemas/JWK"
      required:
        - keys
    DiscoveryDocument:
      type: object
      additionalProperties: false
      description: RFC 8414 / OIDC Discovery 1.0 メタデータ。
      properties:
        issuer:
          type: string
          format: uri
        authorization_endpoint:
          type: string
          format: uri
        token_endpoint:
          type: string
          format: uri
        userinfo_endpoint:
          type: string
          format: uri
