id: wi-12-user-soft-delete-with-restore
title: ユーザ削除を「Soft-delete + 復元期間 → 確定 anonymize」の 2 段階にする
created_at: 2026-06-16
status: pending
authors: [tn]

motivation: |
  wi-8 (ADR-036) で実装した DELETE `/api/admin/users/:sub` は、1 クリック
  で deleted_at セット + 即時 PII 匿名化 + 関連 aggregate cascade を全部
  走らせる「論理マーカーと物理 PII 消去を同時にやる片方向の操作」になっ
  ている。これは GDPR Art.17 の即時履行という見方では強い保証だが、運用
  上の問題が 2 つある:

  1. **admin の誤操作を救えない**。"delete" を押した瞬間に Consent / Refresh
     Token / Session / MFA / Password History がすべて消える。"あ、これ
     違うユーザだった" が成立しない。industry standard (Google /
     Microsoft / Apple) は 7〜30 日の grace 期間で復元できる。
  2. **「とりあえず触らないようにしたい」と「完全に消したい」が同じ動線**
     になっている。Disabled は復活可能、Deleted は終端だが、その間の
     「削除予約中・PII はまだあるが見えない」を欲しい場面 (退職処理の
     90 日宙ぶらり、本人申請の取り消し受付期間など) が表現できない。

  本 WI は wi-8 の anonymize cascade を捨てず、その前段に **Soft-delete
  (PendingDeletion)** 状態を追加して 2 段階に分ける。デフォルトの
  DELETE は soft 化、grace 経過 or 明示的な "完全削除" で wi-8 の
  anonymize cascade に落ちる。

scope:
  decision:
    - >-
      ADR-036 を改定する (ADR-036.v2 として上書き or "Soft-delete" 節を
      追加)。論理削除 (deleted_at marker、PII 温存、N 日以内なら restore
      可能) と確定削除 (anonymize cascade、本 WI で wi-8 の挙動を引き継ぐ)
      の 2 段階に分ける方針、grace 期間のデフォルト値 (推奨 30 日)、
      Disabled と PendingDeletion の意味的区別、復元時に session / refresh
      token を再発行しない (login は通常通り) こと、grace 経過後の自動
      purge の責務 (background job or lazy-on-access) を明記する。

  scl:
    - >-
      User model にフィールドを追加する。
      `pending_deletion_at: Timestamp?` (soft-delete マーカー)。既存
      `deleted_at` の意味は「anonymize 済みの terminal」のままで、
      pending_deletion_at が transient mark を担う。
    - >-
      state_machines.UserLifecycle を更新する。状態を Active / Disabled /
      PendingDeletion / Deleted に拡張し、transitions に:
      - Active → SoftDelete → PendingDeletion
      - Disabled → SoftDelete → PendingDeletion (disabled_at は維持)
      - PendingDeletion → Restore → Active (pending_deletion_at をクリア)
      - PendingDeletion → Purge → Deleted (anonymize cascade)
      - Active → Purge → Deleted (緊急用に残す)
      - Disabled → Purge → Deleted (緊急用に残す)
      を追加する。Delete event は廃止 or 残しつつ SoftDelete / Restore /
      Purge の 3 event に分ける。
    - >-
      interfaces を 3 つに増やす:
      - SoftDeleteAdminUser: DELETE `/api/admin/users/{sub}` (デフォルト
        挙動を soft 化)。emits: UserSoftDeleted。
      - RestoreAdminUser: POST `/api/admin/users/{sub}/restore`。
        emits: UserRestored。
      - PurgeAdminUser: DELETE `/api/admin/users/{sub}?purge=true`
        (or `?force=true`)。emits: UserDeleted (既存 event を流用)。
    - >-
      events に `UserSoftDeleted` / `UserRestored` を追加。`UserDeleted` は
      wi-8 のものを引き継ぐ (今後は "最終 anonymize" 専用)。
    - >-
      permissions に `AdminUserSoftDelete` / `AdminUserRestore` /
      `AdminUserPurge` を追加 (wi-8 の `AdminUserDelete` は Purge に
      改名 or alias)。
    - >-
      objectives に `UserSoftDeleteGracePeriod` (kind: lifetime, target:
      User, ttl: 30d) を追加。grace 期間の SLA を仕様で固定する。

  go:
    domain:
      - >-
        internal/spec/schemas.go: User struct に `PendingDeletionAt
        *time.Time` を追加。`IsSoftDeleted()` / `IsActive()` ヘルパを
        追加する (IsActive == disabled_at == null && pending_deletion_at
        == null && deleted_at == null)。
    usecases:
      - >-
        authusecases.SoftDeleteUser: 新設。`pending_deletion_at = now`
        をセットし、UserSoftDeleted event を emit。cascade は
        **しない** (PII / Consent / RefreshToken / Session を残す)。
        new login と既存 session 利用は拒否するよう、Disabled と
        同じ判定に合流させる。
      - >-
        authusecases.RestoreUser: 新設。`pending_deletion_at` を null
        に戻し、UserRestored event を emit。actor の RBAC 確認・tenant
        一致確認は既存と同じ。grace 期間を過ぎていれば reject
        (`invalid_state`)。
      - >-
        authusecases.PurgeUser: 既存 DeleteUser を改名 (or alias) し、
        anonymize cascade を担当。grace 経過後の background job からも、
        admin の明示的 force purge からも呼べる。冪等・自爆防止は維持。
      - >-
        既存 DeleteUser をどう扱うかは ADR で決める (推奨: 内部 helper
        として PurgeUser を呼ぶラッパに退避し、外部 API は新 3 経路に
        統一)。
    persistence:
      - >-
        memory / postgres の UserRepository.Save が
        `pending_deletion_at` を round-trip するように対応する (DB に
        カラム追加が必要なので migration 0008 を 1 本)。
      - >-
        memory.FindBySub / FindByUsername / FindByEmail / FindAll は
        `deleted_at IS NULL` の既存フィルタを継続し、新たに
        "soft-deleted は表示するが login 拒否" の挙動を Save に依存
        させる (FindBySub は soft-deleted user を返す。auth 経路で
        IsSoftDeleted を見る)。
      - >-
        postgres も同様。`users_preferred_username_active_idx` の WHERE
        節を `deleted_at IS NULL AND pending_deletion_at IS NULL` に
        するかは検討事項 (soft-deleted の preferred_username 再利用を
        admin に許すかどうか)。推奨は許さない (誤操作で同名 user が
        2 つできるのを防ぐ)。
    http:
      - >-
        DELETE `/api/admin/users/:sub` の挙動を変える。デフォルトは
        SoftDeleteUser を呼ぶ。クエリ `?purge=true` (or body 内
        `force=true`) で PurgeUser に分岐。互換性のため当面 wi-8
        callers には影響しない: UI は wi-12 で同時に書き換える。
      - >-
        POST `/api/admin/users/:sub/restore` を追加。
        verifyBrowserRequest + requireAdmin。restore 後の user
        オブジェクトを返す (200)。
      - >-
        既存の deleted-user 経路 (login / authorize / token / userinfo
        / introspect) を `IsSoftDeleted() || IsDeleted()` で fail-close
        に拡張する。soft-deleted user の login は invalid_credentials、
        既存 session は無効、refresh は invalid_grant、introspect は
        active=false、userinfo は 401 invalid_token。挙動は wi-8 の
        Deleted と同等にする (見えるかどうかと PII 復元可能性のみが
        違う)。
    background:
      - >-
        任意。grace 期間経過後の自動 purge は本 WI ではいったん
        **lazy-on-access** で済ませる: admin が一覧を読むときに
        `pending_deletion_at + grace < now` の user を見つけたら、
        その場で PurgeUser を呼ぶ (audit に "auto_purge" として残す)。
        専用 cron / scheduler の導入は別 WI に切り出す。これにより
        本 WI のスコープが膨らまない。
      - >-
        background が走るタイミング: AdminUsersPage の loadPageData で
        listAdminUsers が呼ばれた瞬間、もしくは soft-delete API 経由で
        ユーザに触れた瞬間。

  ui:
    - >-
      AdminUsersPage の "アカウントを削除" ボタンを soft-delete 経路に
      切り替える。ダイアログ文言を変更: "30 日以内なら復元できます。
      復元期間中もログイン・トークン更新は拒否されます" を強調する。
      preferred_username typing 確認は残す (誤操作の最終防御)。
    - >-
      状態フィルタに "削除予約中 (Pending deletion)" を追加。デフォルト
      フィルタは "有効" のままにし、admin が明示的に切り替えたときだけ
      pending を表示する。
    - >-
      詳細パネルに "復元" ボタン (PendingDeletion 状態時のみ表示) と
      "完全削除する" 危険ボタン (warning ダイアログを挟む) を追加。
      完全削除ダイアログは wi-8 の現行ダイアログを流用する。
    - >-
      PendingDeletion 状態の StatusBadge を追加 (color: amber, 文言:
      "削除予約")。grace 残日数 (deleted_at - now の補数) を詳細
      パネルの "アカウント状態" セクションに表示する。

  documentation:
    - ra-idp-go/README.md "範囲" 節と Phase 4 ロードマップ表を更新し、
      "ユーザ削除は soft-delete + restore + purge の 3 段" であることを
      明記する。

out_of_scope:
  - >-
    専用の cron / scheduler による自動 purge job。本 WI は
    lazy-on-access で済ませる。
  - >-
    "削除予約中" の user に対するメール通知 (本人 / 監査側双方)。
    Phase 5 側の DSAR / プライバシースコープに送る。
  - >-
    復元時の credential 再発行 (current_password の force reset 等)。
    復元 = 元の状態に戻すだけで、credential は触らない。
  - cross-tenant の bulk purge / 自動退職 batch 処理。
  - >-
    "保留中ユーザ" 用の専用 SCL 状態 (Pending としか呼ばない単純な
    state machine 追加 1 個に留める)。

affected_guarantees:
  - >-
    tenant isolation: soft-delete / restore / purge いずれも tenant 内
    操作。`requireAdmin` の tenant 一致と use case 側の二重確認を継承。
  - >-
    自爆防止: actor.Sub == target.Sub かつ admin / system_admin role の
    場合は soft-delete / restore / purge すべて reject する。wi-8 の
    `ErrSelfDeleteForbidden` を流用。
  - >-
    SCL coherence: UserLifecycle に PendingDeletion 状態と 3 transitions
    が増える。terminal は Deleted のまま。SCLPermissionsCoverage と
    state-machine coherence test が pass することを確認する。
  - >-
    auth fail-close: soft-deleted user の `/authorize` / `/login` /
    `/token` (refresh / exchange / device) / `/userinfo` / `/introspect`
    は wi-8 の Deleted と同等に失敗する。Disabled と同じ "invalid_*"
    family の error を返す。
  - >-
    既発行 access token: short-lived JWT は expiry まで RS で検証は通る
    のは変わらず。Back-Channel Logout / CAEP は引き続き Phase 3
    スコープ外。
  - >-
    監査保全: UserSoftDeleted / UserRestored / UserDeleted の 3 event を
    AdminAuditEvent として記録。actor_sub / target_sub / reason
    (SoftDelete のみ任意 free-text) を残す。
  - >-
    Grace 期間: 30 日。`UserSoftDeleteGracePeriod` objective として
    SCL に固定し、テスト用に SCL 経由で短縮できるようにする (実装の
    constant としても deps 経由で注入できる形にする)。

verification:
  - cmd: 'go test ./...'
    in: ra-idp-go
    reason: SoftDeleteUser / RestoreUser / PurgeUser use case + 既存
      auth / token / userinfo 経路の soft-deleted user 挙動 + 冪等性 +
      grace 経過時の auto-purge をテーブルテストで検証する。
  - cmd: 'golangci-lint run ./...'
    in: ra-idp-go
  - cmd: 'go build ./...'
    in: ra-idp-go
  - cmd: 'bun --cwd ra-idp-go/ui typecheck'
  - cmd: 'bun --cwd ra-idp-go/ui lint'
  - cmd: 'bun --cwd ra-idp-go/ui build'
  - >-
    手動 1 (SoftDelete): alice を AdminUsersPage で削除 → 一覧から
    消える (default filter)・状態フィルタ "削除予約中" で表示される・
    login invalid_credentials・refresh invalid_grant・userinfo 401・
    introspect active=false を確認。
  - >-
    手動 2 (Restore): alice を復元 → 一覧に再表示・login 成功・
    PII 健全 (Email や roles が消えていない) を確認。
  - >-
    手動 3 (Purge): alice を soft-delete 後、AdminUsersPage の
    "完全削除" で wi-8 の anonymize cascade が走り、preferred_username
    が deleted:<sub> に置換、PII 全消去、Consent / RefreshToken /
    Session / MfaFactor が cascade 削除されることを確認。
  - >-
    手動 4 (Auto-purge): SCL の grace 期間を 1 分に下書きで短縮した
    状態で soft-delete → 待機 → listAdminUsers リフレッシュ →
    自動的に Purge された anonymize cascade の audit event が
    記録されることを確認。
  - >-
    手動 5 (自爆防止): admin 自身を soft-delete / restore / purge
    いずれも self_delete_forbidden で reject されることを確認。

risk: medium
risk_notes: |
  4 状態 + 6 transition への拡張は state_machine の coherence test と
  既存 auth / token 経路の deleted user 判定 (現在は IsDeleted のみ) を
  ぜんぶ書き換える範囲。`IsActive()` ヘルパ + `IsBlockedFromAuth() =
  disabled_at != null || pending_deletion_at != null || deleted_at != null`
  ヘルパに集約して、point-of-decision を一箇所に閉じる。

  lazy-on-access の auto-purge は admin の一覧 GET タイミングで purge を
  走らせるため、一覧 latency が増える可能性がある (purge 対象が多いとき)。
  本 WI ではこの設計を許容するが、observability で latency を計測し、
  必要なら次の WI で cron 化する。

  既存 wi-8 callers (現在の DELETE = 即 anonymize cascade を期待する
  external script 等) は本 WI の挙動変更で破壊される。デモ IdP の範囲
  なので backward compatibility は維持しないが、completion に
  明記する。
