apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ra-oauth2-idp-dev

resources:
  - ../../base

images:
  - name: ghcr.io/example/ra-oauth2-idp
    newTag: dev

configMapGenerator:
  - name: ra-oauth2-idp-config
    behavior: replace
    literals:
      - issuer=http://ra-oauth2-idp.ra-oauth2-idp-dev.svc.cluster.local

secretGenerator:
  - name: ra-oauth2-idp-secrets
    literals:
      - database_url=postgres://idp:idp@postgres.ra-oauth2-idp-dev.svc.cluster.local:5432/idp
      - redis_url=redis://redis.ra-oauth2-idp-dev.svc.cluster.local:6379

patches:
  - patch: |
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: ra-oauth2-idp
