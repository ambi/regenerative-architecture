id: wi-17-tenant-settings-page
title: 管理画面に設定ページを追加してテナント単位の設定を集約する
completed_at: 2026-06-17
work_item: work-item.yaml
status: completed

summary: |
  テナント内 admin と system_admin が自テナントの表示名・パスワードポリシー上書きを
  閲覧・更新できる `/api/admin/settings` (GET / PATCH) と `/admin/settings` ページを
  追加した。対象は actor.tenant_id に固定し cross-tenant 操作は構造的に発生しない。
  password_policy_override が global PasswordPolicy より弱い値を含む場合は use case
  側で reject する。既存 `/admin/tenants` (system_admin) の挙動は不変だが、
  password_policy_override が UpdateTenant に到達しなかった既存バグも併せて修正した。

semantic_diff:
  before: |
    admin は所属テナントの表示名と password_policy_override を UI から触れない。
    UpdateTenant は display_name しか反映せず、AdminTenantsPage が送る
    password_policy_override は silently に無視されていた。
  after: |
    admin が `/admin/settings` から自テナントの表示名と password_policy_override を
    変更できる。global より弱い override は HTTP 400 policy_override_weaker で
    拒否される。system_admin の `/admin/tenants` 経由でも override が反映される。

