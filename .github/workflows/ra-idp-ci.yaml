name: ra-idp CI

on:
  push:
    branches: [main]
    paths:
      - ra-idp/**
      - ra-idp-go/**
      - .github/workflows/ra-idp-ci.yaml
  pull_request:
    paths:
      - ra-idp/**
      - ra-idp-go/**
      - .github/workflows/ra-idp-ci.yaml

permissions:
  contents: read
  security-events: write
  packages: write

defaults:
  run:
    working-directory: ra-idp

jobs:
  # =================================================================
  # Spec & code coherence
  # =================================================================
  verify:
    name: Verify (typecheck, tests, drift)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: idp
          POSTGRES_PASSWORD: idp
          POSTGRES_DB: idp
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U idp"
          --health-interval 5s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgres://idp:idp@localhost:5432/idp
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: actions/setup-go@v5
        with:
          go-version-file: ra-idp-go/go.mod
          cache-dependency-path: ra-idp-go/go.sum

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Lint & format check (Biome)
        run: bun run lint

      - name: Type check
        run: bun run typecheck

      - name: DB migrations
        run: bun run migrate:up

      - name: Tests (in-memory + Postgres + Redis 契約テスト含む)
        run: bun test

      - name: Go tests and assurance evidence
        working-directory: ra-idp-go
        run: go test -race ./...

      - name: Generate derived artifacts
        run: bun run gen:all

      - name: Drift detection (spec → derived artifacts)
        run: git diff --exit-code

      - name: Spec cross-reference coherence (ADR-022)
        run: bun run check:coherence

  # =================================================================
  # Security
  # =================================================================
  sast:
    name: SAST (CodeQL + semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"

  container:
    name: Container build + Trivy scan
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./ra-idp
          file: ./ra-idp/infra/docker/Dockerfile
          push: false
          tags: ra-idp:ci
          load: true
          platforms: linux/amd64
      - name: Trivy scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ra-idp:ci
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'
      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ra-idp/trivy.sarif
