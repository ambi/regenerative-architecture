# OAuth2 / OIDC IdP — Specification Core Language (SCL) Document
#
# Layer 1 — 単一上流ソース。RA §3.1 / SPECIFICATION_CORE_LANGUAGE.md を参照。
# このファイルが保存対象。gen/* と派生ポリシー・監視ルールはすべてここから生成される。
#
# 言語規約: 型/状態/イベント/インターフェース/アクション = PascalCase、
#           フィールド/パラメータ = snake_case（ワイヤ形式と一致）。
#           標準仕様の snake_case 名（例: authorization_code）は aliases に置く。

system: ra-idp
spec_version: "1.1"

components:
  Authentication:
    description: ユーザー認証、パスワード検証、ブラウザログインセッション、AuthenticationContext 復元を所有する。
    owns_models: [User, LoginSession, BrowserLoginRequest, BrowserTotpRequest, MfaFactor, MfaFactorType, AuthenticationContext]
    owns_events: [UserAuthenticated, AuthenticationFailed]
    owns_interfaces: [SubmitBrowserLogin, SubmitBrowserTotp]
  OAuth2:
    description: OAuth 2.0 / OIDC の認可判断、同意、コード・トークン発行、RP-Initiated Logout endpoint を所有する。
    owns_models: [AuthorizationRequest, Consent, AuthorizationCodeRecord, TokenRequest, TokenResponse, EndSessionParameters]
    owns_events: [AuthorizationCodeIssued, ConsentGranted, AccessTokenIssued, RefreshTokenIssued]
    owns_interfaces: [Authorize, EndSession, Token]
    depends_on:
      - { component: Authentication, reason: /authorize は AuthenticationContext を解決し、/end_session は session revocation を委譲する。 }

# =================================================================
# 0. standards — 適用する外部標準と規範要件
# =================================================================

standards:
  RFC6238:
    title: TOTP Time-Based One-Time Password Algorithm
    version: RFC 6238
    url: https://www.rfc-editor.org/rfc/rfc6238.html
    roles: [Verifier]
    scope: 時刻ベースワンタイムパスワードによる第二要素認証。
    requirements:
      - id: RFC6238-TOTP
        section: "§4"
        strength: MUST
        adoption: optional
        statement: TOTP factor利用時は共有秘密と時間ステップからOTPを生成・検証する。
        relates_to: { models: [MfaFactor, MfaFactorType, AuthenticationContext] }

  RFC6749:
    title: The OAuth 2.0 Authorization Framework
    version: RFC 6749
    url: https://www.rfc-editor.org/rfc/rfc6749.html
    roles: [AuthorizationServer]
    scope: Authorization Code、Refresh Token、Client Credentialsと共通エラー処理。
    requirements:
      - id: RFC6749-AUTHORIZATION-CODE
        section: "§4.1"
        strength: MUST
        adoption: required
        statement: Authorization Code Grantを認可エンドポイントとトークンエンドポイントで提供する。
        relates_to: { interfaces: [Authorize, Token], state_machines: [AuthorizationCodeFlow] }
      - id: RFC6749-CLIENT-CREDENTIALS
        section: "§4.4"
        strength: MAY
        adoption: optional
        statement: confidential clientに限りClient Credentials Grantを許可する。
        relates_to: { interfaces: [Token], permissions: [TokenGrantClientCredentials] }
      - id: RFC6749-IMPLICIT
        section: "§4.2"
        strength: MAY
        adoption: excluded
        statement: Implicit Grantを提供する。
        reason: RFC 9700の勧告に従いAuthorization Code + PKCEへ限定する。
        relates_to: { models: [GrantType] }
      - id: RFC6749-PASSWORD-GRANT
        section: "§4.3"
        strength: MAY
        adoption: excluded
        statement: Resource Owner Password Credentials Grantを提供する。
        reason: RFC 9700により使用しない。
        relates_to: { models: [GrantType] }

  RFC6750:
    title: The OAuth 2.0 Authorization Framework Bearer Token Usage
    version: RFC 6750
    url: https://www.rfc-editor.org/rfc/rfc6750.html
    roles: [AuthorizationServer, ResourceServer]
    scope: Bearer Access Tokenの提示方法とエラー応答。
    requirements:
      - id: RFC6750-AUTHORIZATION-HEADER
        section: "§2.1"
        strength: MUST
        adoption: required
        statement: Bearer Access TokenはAuthorizationヘッダーで受け付ける。
        relates_to: { interfaces: [UserInfo, PostUserInfo] }
      - id: RFC6750-QUERY-TOKEN
        section: "§2.3"
        strength: MAY
        adoption: excluded
        statement: URI query parameterによるAccess Token提示を受け付ける。
        reason: URL、ログ、Refererへのトークン漏洩を避ける。

  RFC7009:
    title: OAuth 2.0 Token Revocation
    version: RFC 7009
    url: https://www.rfc-editor.org/rfc/rfc7009.html
    roles: [AuthorizationServer]
    scope: Access TokenとRefresh Tokenの失効。
    requirements:
      - id: RFC7009-REVOCATION-ENDPOINT
        section: "§2"
        strength: MUST
        adoption: required
        statement: 認証済みクライアントへトークン失効エンドポイントを提供する。
        relates_to: { interfaces: [Revoke], models: [RevokeRequest] }
      - id: RFC7009-UNKNOWN-TOKEN
        section: "§2.2"
        strength: MUST
        adoption: required
        statement: 無効または他クライアント所有のトークンに対しても成功応答を返し情報を漏らさない。
        relates_to: { scenarios: [他クライアントの所有トークンの失効要求は静かに無視される] }

  RFC7517:
    title: JSON Web Key
    version: RFC 7517
    url: https://www.rfc-editor.org/rfc/rfc7517.html
    roles: [AuthorizationServer]
    scope: 署名検証鍵のJWK Set公開。
    requirements:
      - id: RFC7517-JWKS
        section: "§5"
        strength: MUST
        adoption: required
        statement: 公開可能な検証鍵をJWK Setとして配布する。
        relates_to: { interfaces: [GetJwks], models: [JWK, JWKS] }

  RFC7518:
    title: JSON Web Algorithms
    version: RFC 7518
    url: https://www.rfc-editor.org/rfc/rfc7518.html
    roles: [AuthorizationServer]
    scope: JWT署名に用いる暗号アルゴリズム。
    requirements:
      - id: RFC7518-SIGNATURE-ALGORITHMS
        section: "§3"
        strength: MUST
        adoption: required
        statement: JWT署名をPS256またはES256で行い、対称鍵署名をAccess TokenとID Tokenに使用しない。
        relates_to: { models: [SignatureAlgorithm, SigningKey] }

  RFC7519:
    title: JSON Web Token
    version: RFC 7519
    url: https://www.rfc-editor.org/rfc/rfc7519.html
    roles: [AuthorizationServer]
    scope: Access Token、ID Token、client assertionのJWT表現。
    requirements:
      - id: RFC7519-REGISTERED-CLAIMS
        section: "§4.1"
        strength: MUST
        adoption: required
        statement: JWTのissuer、subject、audience、有効期限、発行時刻、一意識別子を用途に応じて検証・発行する。
        relates_to: { models: [AccessTokenClaims, IdTokenClaims, Audience] }

  RFC7523:
    title: JSON Web Token Profile for OAuth 2.0 Client Authentication and Authorization Grants
    version: RFC 7523
    url: https://www.rfc-editor.org/rfc/rfc7523.html
    roles: [AuthorizationServer]
    scope: private_key_jwtによるClient Authentication。
    requirements:
      - id: RFC7523-CLIENT-ASSERTION
        section: "§2.2, §3"
        strength: MAY
        adoption: optional
        statement: client assertionの署名、issuer、subject、audience、有効期限、jtiを検証する。
        relates_to: { models: [TokenEndpointAuthMethod], interfaces: [Token, Introspect, Revoke] }

  RFC7591:
    title: OAuth 2.0 Dynamic Client Registration Protocol
    version: RFC 7591
    url: https://www.rfc-editor.org/rfc/rfc7591.html
    roles: [AuthorizationServer]
    scope: OAuth Client metadataの動的登録。
    requirements:
      - id: RFC7591-REGISTER
        section: "§3"
        strength: MAY
        adoption: optional
        statement: Client metadataを受け取りclient_idと登録結果を返す。
        relates_to: { interfaces: [RegisterClient], models: [ClientRegistrationRequest, OAuth2Client] }
      - id: RFC7591-REDIRECT-URI
        section: "§2"
        strength: MUST
        adoption: required
        statement: Authorization Code Grantを利用するClientにはredirect_uri登録を要求する。
        relates_to: { scenarios: [redirect_uri が無いクライアント登録は拒否される] }

  RFC7636:
    title: Proof Key for Code Exchange by OAuth Public Clients
    version: RFC 7636
    url: https://www.rfc-editor.org/rfc/rfc7636.html
    roles: [AuthorizationServer]
    scope: Authorization Code横取り攻撃への対策。
    requirements:
      - id: RFC7636-VERIFY
        section: "§4.6"
        strength: MUST
        adoption: required
        statement: Token requestのcode_verifierを認可時のcode_challengeと照合する。
        relates_to: { interfaces: [Authorize, Token], properties: [PkceRoundTrip] }
      - id: RFC7636-S256
        section: "§4.2"
        strength: SHOULD
        adoption: required
        statement: code_challenge_methodはS256だけを許可する。
        relates_to: { models: [CodeChallengeMethod] }
      - id: RFC7636-PLAIN
        section: "§4.2"
        strength: MAY
        adoption: excluded
        statement: plain code challenge methodを許可する。
        reason: 認可コード横取り耐性をS256へ統一する。

  RFC7662:
    title: OAuth 2.0 Token Introspection
    version: RFC 7662
    url: https://www.rfc-editor.org/rfc/rfc7662.html
    roles: [AuthorizationServer]
    scope: Resource Serverによるトークン状態照会。
    requirements:
      - id: RFC7662-INTROSPECT
        section: "§2"
        strength: MUST
        adoption: required
        statement: 認証済みResource Serverへactive状態と許可されたメタデータを返す。
        relates_to: { interfaces: [Introspect], models: [IntrospectionRequest, IntrospectionResponse] }
      - id: RFC7662-INACTIVE
        section: "§2.2"
        strength: MUST
        adoption: required
        statement: 無効なトークンにはactive=falseだけを返す。
        relates_to: { scenarios: [失効済みトークンの introspection は active=false のみ返す] }

  RFC7800:
    title: Proof-of-Possession Key Semantics for JSON Web Tokens
    version: RFC 7800
    url: https://www.rfc-editor.org/rfc/rfc7800.html
    roles: [AuthorizationServer, ResourceServer]
    scope: JWT cnf claimによるproof-of-possession key表現。
    requirements:
      - id: RFC7800-CONFIRMATION
        section: "§3"
        strength: MAY
        adoption: optional
        statement: Sender-constrained tokenの確認鍵情報をcnf claimへ格納する。
        relates_to: { models: [SenderConstraintCnf, AccessTokenClaims] }

  RFC8176:
    title: Authentication Method Reference Values
    version: RFC 8176
    url: https://www.rfc-editor.org/rfc/rfc8176.html
    roles: [OpenIDProvider]
    scope: ID Token等へ記録する認証方法参照値。
    requirements:
      - id: RFC8176-AMR
        section: "§2"
        strength: MAY
        adoption: required
        statement: 実際に成立した認証方法をamr値として記録する。
        relates_to: { models: [AuthenticationContext, IdTokenClaims, AccessTokenClaims] }

  RFC8414:
    title: OAuth 2.0 Authorization Server Metadata
    version: RFC 8414
    url: https://www.rfc-editor.org/rfc/rfc8414.html
    roles: [AuthorizationServer]
    scope: Authorization Server metadataの公開。
    requirements:
      - id: RFC8414-METADATA
        section: "§3"
        strength: MUST
        adoption: required
        statement: issuerと利用可能なエンドポイント・機能をmetadata文書として公開する。
        relates_to: { interfaces: [GetOauthAuthorizationServer], models: [DiscoveryDocument] }

  RFC8628:
    title: OAuth 2.0 Device Authorization Grant
    version: RFC 8628
    url: https://www.rfc-editor.org/rfc/rfc8628.html
    roles: [AuthorizationServer]
    scope: 入力制約のあるデバイス向け認可。
    requirements:
      - id: RFC8628-DEVICE-AUTHORIZATION
        section: "§3.1-3.3"
        strength: MUST
        adoption: optional
        statement: device_code、user_code、verification_uriを発行しResourceOwnerの判断を受け付ける。
        relates_to: { interfaces: [DeviceAuthorization, GetBrowserDeviceContext, SubmitBrowserDevice], state_machines: [DeviceCodeFlow] }
      - id: RFC8628-POLLING
        section: "§3.5"
        strength: MUST
        adoption: required
        statement: authorization_pending、slow_down、expired_tokenのポーリング意味論を守る。
        relates_to: { scenarios: [承認前のデバイス交換は authorization_pending を返す, ポーリング間隔より短い再試行は slow_down を返す, 期限切れの device_code は expired_token を返す] }

  RFC8705:
    title: OAuth 2.0 Mutual-TLS Client Authentication and Certificate-Bound Access Tokens
    version: RFC 8705
    url: https://www.rfc-editor.org/rfc/rfc8705.html
    roles: [AuthorizationServer]
    scope: mTLS Client Authenticationと証明書バインドAccess Token。
    requirements:
      - id: RFC8705-CLIENT-AUTH
        section: "§2"
        strength: MAY
        adoption: optional
        statement: 登録済みSubject DNと検証済みクライアント証明書を照合してClientを認証する。
        relates_to: { interfaces: [Token, Introspect, Revoke] }
      - id: RFC8705-CERT-BOUND
        section: "§3"
        strength: MAY
        adoption: optional
        statement: Access Tokenをクライアント証明書thumbprintへバインドしResource access時に照合する。
        relates_to: { models: [SenderConstraintCnf], interfaces: [UserInfo, PostUserInfo] }

  RFC8707:
    title: Resource Indicators for OAuth 2.0
    version: RFC 8707
    url: https://www.rfc-editor.org/rfc/rfc8707.html
    roles: [AuthorizationServer]
    scope: Access Token audienceの明示と権限最小化。
    requirements:
      - id: RFC8707-AUDIENCE
        section: "§2"
        strength: SHOULD
        adoption: required
        statement: 発行するAccess Tokenへ非空のaudienceを設定し、意図しないResource Serverでの利用を防ぐ。
        relates_to: { properties: [AllAccessTokensCarryAudience], models: [AccessTokenClaims] }

  RFC9068:
    title: JSON Web Token Profile for OAuth 2.0 Access Tokens
    version: RFC 9068
    url: https://www.rfc-editor.org/rfc/rfc9068.html
    roles: [AuthorizationServer]
    scope: JWT形式Access Tokenのクレームと署名。
    requirements:
      - id: RFC9068-CLAIMS
        section: "§2.2"
        strength: MUST
        adoption: required
        statement: JWT Access Tokenへiss、sub、aud、exp、iat、jti、client_idを含める。
        relates_to: { models: [AccessTokenClaims] }
      - id: RFC9068-ASYMMETRIC-SIGNATURE
        section: "§2.1"
        strength: MUST
        adoption: required
        statement: Access Tokenを非対称アルゴリズムで署名し公開鍵で検証可能にする。
        relates_to: { models: [SignatureAlgorithm, SigningKey], interfaces: [GetJwks] }

  RFC9126:
    title: OAuth 2.0 Pushed Authorization Requests
    version: RFC 9126
    url: https://www.rfc-editor.org/rfc/rfc9126.html
    roles: [AuthorizationServer]
    scope: 認可パラメータの事前送信とrequest_uri参照。
    requirements:
      - id: RFC9126-PAR
        section: "§2"
        strength: MAY
        adoption: optional
        statement: Client認証済みPARを保存し短命なrequest_uriを返す。
        relates_to: { interfaces: [PushAuthorizationRequest, Authorize], models: [PARRecord, ParResponse] }
      - id: RFC9126-SINGLE-USE
        section: "§2.2"
        strength: SHOULD
        adoption: required
        statement: request_uriは短命かつ一度だけ使用可能とする。
        relates_to: { objectives: [ParRequestUriLifetime], state_machines: [PARRecordLifecycle] }

  RFC9207:
    title: OAuth 2.0 Authorization Server Issuer Identification
    version: RFC 9207
    url: https://www.rfc-editor.org/rfc/rfc9207.html
    roles: [AuthorizationServer]
    scope: Authorization responseにおけるmix-up攻撃対策。
    requirements:
      - id: RFC9207-ISS
        section: "§2"
        strength: MUST
        adoption: required
        statement: Authorization responseへissuer識別子を含める。
        relates_to: { interfaces: [Authorize], models: [DiscoveryDocument] }

  RFC9449:
    title: OAuth 2.0 Demonstrating Proof of Possession
    version: RFC 9449
    url: https://www.rfc-editor.org/rfc/rfc9449.html
    roles: [AuthorizationServer, ResourceServer]
    scope: DPoP proofと公開鍵バインドAccess Token。
    requirements:
      - id: RFC9449-PROOF
        section: "§4-7"
        strength: MAY
        adoption: optional
        statement: DPoP proofの署名、htm、htu、iat、jtiを検証する。
        relates_to: { interfaces: [Token, UserInfo, PostUserInfo], properties: [DpopJtiUniquenessWithinWindow] }
      - id: RFC9449-TOKEN-BINDING
        section: "§6"
        strength: MUST
        adoption: optional
        statement: DPoP利用時はAccess Tokenへjktを含め、提示proofの鍵と照合する。
        relates_to: { models: [SenderConstraintCnf, AccessTokenClaims] }

  RFC9700:
    title: Best Current Practice for OAuth 2.0 Security
    version: RFC 9700 / BCP 240
    url: https://www.rfc-editor.org/rfc/rfc9700.html
    roles: [AuthorizationServer]
    scope: OAuth 2.0の現行セキュリティベストプラクティス。
    requirements:
      - id: RFC9700-REDIRECT-MATCH
        section: "§2.1, §4.1.3"
        strength: MUST
        adoption: required
        statement: redirect_uriは登録値と完全一致させ、未検証URIへリダイレクトしない。
        relates_to: { properties: [RedirectUriExactMatch], scenarios: [未登録の redirect_uri へはリダイレクトしない] }
      - id: RFC9700-AUTHORIZATION-CODE
        section: "§2.1.1"
        strength: MUST
        adoption: required
        statement: redirect-based flowはAuthorization Code GrantとPKCEで保護する。
        relates_to: { interfaces: [Authorize, Token], properties: [PkceRoundTrip] }
      - id: RFC9700-SENDER-CONSTRAINT
        section: "§2.2.1"
        strength: SHOULD
        adoption: optional
        statement: 高セキュリティClientではAccess TokenをDPoPまたはmTLSでsender-constrainedにする。
        relates_to: { models: [SenderConstraintKind, SenderConstraintCnf] }
      - id: RFC9700-REFRESH-REPLAY
        section: "§2.2.2, §4.14"
        strength: MUST
        adoption: required
        statement: Refresh Tokenをローテーションし再利用検知時に関連トークンを失効する。
        relates_to: { state_machines: [RefreshTokenLifecycle], properties: [RefreshFamilyTransitiveRevoke, RefreshRotationParentInvariants] }

  OpenIDConnectCore:
    title: OpenID Connect Core 1.0 incorporating errata set 1
    version: Final
    url: https://openid.net/specs/openid-connect-core-1_0-18.html
    roles: [OpenIDProvider]
    scope: Authorization Code Flow、ID Token、UserInfo、認証セッション。
    requirements:
      - id: OIDC-CORE-CODE-FLOW
        section: "§3.1"
        strength: MUST
        adoption: required
        statement: code response typeによるOpenID Connect Authenticationを提供する。
        relates_to: { interfaces: [Authorize, Token], models: [IdTokenClaims] }
      - id: OIDC-CORE-ID-TOKEN
        section: "§2"
        strength: MUST
        adoption: required
        statement: ID Tokenへiss、sub、aud、exp、iatと認証コンテキストを含める。
        relates_to: { models: [IdTokenClaims, AuthenticationContext] }
      - id: OIDC-CORE-USERINFO
        section: "§5.3"
        strength: SHOULD
        adoption: required
        statement: openid scopeのAccess Tokenに対してsubを含むUserInfoを返す。
        relates_to: { interfaces: [UserInfo, PostUserInfo], models: [UserInfoResponse] }
      - id: OIDC-CORE-HYBRID-IMPLICIT
        section: "§3.2-3.3"
        strength: MAY
        adoption: excluded
        statement: Implicit FlowおよびHybrid Flowを提供する。
        reason: front-channel token発行を避けcode response typeだけを採用する。

  OpenIDConnectDiscovery:
    title: OpenID Connect Discovery 1.0 incorporating errata set 1
    version: Final
    url: https://openid.net/specs/openid-connect-discovery-1_0-21.html
    roles: [OpenIDProvider]
    scope: OpenID Provider metadataの公開。
    requirements:
      - id: OIDC-DISCOVERY-CONFIGURATION
        section: "§4"
        strength: MUST
        adoption: required
        statement: well-known configurationからissuer、endpoints、supported metadataを公開する。
        relates_to: { interfaces: [GetOpenidConfiguration], models: [DiscoveryDocument] }

  OpenIDConnectRPInitiatedLogout:
    title: OpenID Connect RP-Initiated Logout 1.0
    version: Final
    url: https://openid.net/specs/openid-connect-rpinitiated-1_0.html
    roles: [OpenIDProvider]
    scope: RPから開始するEnd-User session終了。
    requirements:
      - id: OIDC-LOGOUT-ENDPOINT
        section: "§2"
        strength: MUST
        adoption: required
        statement: end_session_endpointを公開しRPからのlogout要求を受け付ける。
        relates_to: { interfaces: [EndSession, GetOpenidConfiguration] }
      - id: OIDC-LOGOUT-REDIRECT
        section: "§3"
        strength: MUST
        adoption: required
        statement: post_logout_redirect_uriはClientに登録済みの値だけを許可する。
        relates_to: { scenarios: [RP-Initiated Logout は登録済み post_logout_redirect_uri にだけリダイレクトする, 未登録 post_logout_redirect_uri は拒否される] }

  FAPI2SecurityProfile:
    title: FAPI 2.0 Security Profile
    version: Final
    url: https://openid.net/specs/fapi-security-profile-2_0-final.html
    roles: [AuthorizationServer]
    scope: confidential client向け高セキュリティOAuthプロファイル。
    requirements:
      - id: FAPI2-PROFILE-SELECTION
        section: "§5.3"
        strength: MUST
        adoption: optional
        statement: Fapi2SecurityProfileを選択したClientにだけ本プロファイルの追加制約を適用する。
        relates_to: { models: [FapiProfile, OAuth2Client] }
      - id: FAPI2-PAR-PKCE
        section: "§5.3.2"
        strength: MUST
        adoption: optional
        statement: FAPI ClientはPARとS256 PKCEを使用する。
        relates_to: { interfaces: [PushAuthorizationRequest, Authorize], scenarios: [FAPI クライアントは PAR なしの直接認可リクエストを拒否される] }
      - id: FAPI2-CLIENT-AUTH
        section: "§5.3.2"
        strength: MUST
        adoption: optional
        statement: FAPI Clientはprivate_key_jwtまたはmTLSで認証する。
        relates_to: { models: [TokenEndpointAuthMethod] }
      - id: FAPI2-SENDER-CONSTRAINT
        section: "§5.3.2"
        strength: MUST
        adoption: optional
        statement: FAPI Access TokenをDPoPまたはmTLSでsender-constrainedにする。
        relates_to: { models: [AccessTokenSenderConstraint, SenderConstraintCnf] }

  NISTSP80063B4:
    title: Digital Identity Guidelines — Authentication and Authenticator Management
    version: NIST SP 800-63B-4
    url: https://pages.nist.gov/800-63-4/sp800-63b.html
    roles: [Verifier]
    scope: PasswordとAuthenticatorのライフサイクル・検証要件。
    requirements:
      - id: NIST63B4-PASSWORD-MINIMUM
        section: "§3.1.1.2"
        strength: MUST
        adoption: excluded
        statement: 単一要素認証に使用するPasswordへ15文字以上の最小長を要求する。
        reason: 現行システム要件は12文字であり、NIST SP 800-63B-4への完全準拠は表明しない。
      - id: NIST63B4-NO-COMPOSITION
        section: "§3.1.1.2"
        strength: MUST NOT
        adoption: required
        statement: 文字種混在などPassword composition ruleを課さない。
      - id: NIST63B4-PASSWORD-STORAGE
        section: "§3.1.1.2"
        strength: MUST
        adoption: required
        statement: Passwordをsaltとcost factorを持つoffline attack耐性のあるhashとして保存する。
        relates_to: { models: [User] }

  WebAuthnLevel3:
    title: Web Authentication — An API for accessing Public Key Credentials Level 3
    version: Candidate Recommendation Snapshot
    url: https://www.w3.org/TR/webauthn-3/
    roles: [RelyingParty, UserInterface]
    scope: 公開鍵Credentialを用いたphishing-resistantな認証。
    requirements:
      - id: WEBAUTHN3-AUTHENTICATION
        section: "§5"
        strength: MAY
        adoption: optional
        statement: WebAuthn factor利用時はoriginとRelying Partyにscopeされた公開鍵Credentialを検証する。
        relates_to: { models: [MfaFactor, MfaFactorType, AuthenticationContext] }

  WCAG22:
    title: Web Content Accessibility Guidelines 2.2
    version: W3C Recommendation
    url: https://www.w3.org/TR/WCAG22/
    roles: [UserInterface]
    scope: ブラウザ認証UIのLevel AAアクセシビリティ。
    requirements:
      - id: WCAG22-KEYBOARD
        section: "2.1.1"
        strength: MUST
        adoption: required
        statement: すべての認証操作をキーボードだけで完了可能にする。
      - id: WCAG22-FOCUS
        section: "2.4.7, 2.4.11"
        strength: MUST
        adoption: required
        statement: フォーカスを視認可能にし重要な要素が完全に隠れないようにする。
      - id: WCAG22-LABELS-ERRORS
        section: "3.3.1, 3.3.2"
        strength: MUST
        adoption: required
        statement: 入力にラベルを付け、エラーをテキストで識別して修正方法を示す。
      - id: WCAG22-STATUS
        section: "4.1.3"
        strength: MUST
        adoption: required
        statement: 認証結果や送信エラーをフォーカス移動なしに支援技術へ通知する。

  GDPR:
    title: General Data Protection Regulation
    version: Regulation (EU) 2016/679
    url: https://eur-lex.europa.eu/eli/reg/2016/679/oj
    roles: [DataController]
    scope: 同意、監査、保存期間、削除後の個人データ処理。
    requirements:
      - id: GDPR-CONSENT-WITHDRAWAL
        section: "Article 7(3)"
        strength: MUST
        adoption: required
        statement: ResourceOwnerが同意を撤回でき、撤回後の新規発行へ利用しない。
        relates_to: { models: [Consent], state_machines: [ConsentLifecycle] }
      - id: GDPR-ERASURE
        section: "Article 17"
        strength: MUST
        adoption: required
        statement: 削除要求後は法的保存義務を除くPIIを定義済み期間内に消去する。
        relates_to: { objectives: [PiiPurgeAfterDeletion] }
      - id: GDPR-PROCESSING-RECORDS
        section: "Article 30"
        strength: MUST
        adoption: required
        statement: セキュリティ・認可イベントの監査記録を定義済み期間保持する。
        relates_to: { objectives: [AuditLogRetention] }

# =================================================================
# 1. vocabulary — ユビキタス言語
# =================================================================
#
# 本アプリの「ドメイン」は OAuth 2.0 / OIDC の標準仕様。語彙の役割は
# 「標準のどの用語をどう使うか」「標準で並立する語のうちどれを採用するか」
# 「実装側のフィールド名がどの標準語に対応するか」を確定させること。

vocabulary:

  # ---------- アクター (OAuth 2.0 の役割) ----------
  ResourceOwner:
    definition: 保護リソースに対するアクセス権限を付与できる実体。本アプリではエンドユーザー。
    aliases: [resource_owner, リソースオーナー, EndUser]
    not_to_confuse_with:
      - { term: Client, reason: Client はアプリケーション、ResourceOwner は人間。OAuth では明確に区別される。 }
  Client:
    definition: ResourceOwner に代わって保護リソースへのアクセスを要求するアプリケーション。client_id で識別される。
    aliases: [client, クライアント, RelyingParty]
  AuthorizationServer:
    definition: ResourceOwner を認証し Client にトークンを発行するサーバー。本アプリそのもの。OIDC では IdP と同義。
    aliases: [authorization_server, IdP, IdentityProvider]
  ResourceServer:
    definition: AccessToken を提示する Client に対して保護リソースを返すサーバー。本アプリの外部。
    aliases: [resource_server]

  # ---------- クライアントタイプ ----------
  Public:
    definition: client_secret を安全に保持できない Client（SPA, ネイティブアプリ）。PKCE 必須。
    aliases: [public]
  Confidential:
    definition: サーバーサイドで client_secret または private_key を保持できる Client。
    aliases: [confidential]

  # ---------- グラントタイプ ----------
  AuthorizationCode:
    definition: 短命（60秒以下）の一度限り使用される中間トークン。/authorize で発行され /token で交換される。grant_type 値「authorization_code」と同じ文字列を共有する（RFC 6749 §4.1）。
    aliases: [authorization_code, 認可コード]
  RefreshToken:
    definition: AccessToken の再発行に使うトークン。提示のたびにローテーションされる。絶対 TTL 30 日。grant_type 値「refresh_token」と同じ文字列を共有する（RFC 6749 §6）。
    aliases: [refresh_token, リフレッシュトークン]
  ClientCredentials:
    definition: Client 自身が認可主体となる machine-to-machine フロー (RFC 6749 §4.4)。confidential のみ。
    aliases: [client_credentials, M2Mグラント]
  DeviceCode:
    definition: 入力制約のあるデバイス向けのデバイス認可グラント (RFC 8628)。grant_type は URN。
    aliases: ["urn:ietf:params:oauth:grant-type:device_code", device_code, デバイスコード]

  # ---------- トークン ----------
  AccessToken:
    definition: ResourceServer にアクセスする際に提示するトークン。JWT (PS256 / ES256) として発行、TTL 600秒。
    aliases: [access_token, アクセストークン]
    not_to_confuse_with:
      - { term: IdToken, reason: AccessToken は API アクセス用、IdToken は認証情報の表明用。混同してはならない。 }
  IdToken:
    definition: OIDC が定める、ResourceOwner の認証結果を表明する JWT。iss/sub/aud/exp/iat/auth_time/nonce/azp を含む。
    aliases: [id_token, IDトークン]

  # ---------- セキュリティメカニズム ----------
  Pkce:
    definition: Proof Key for Code Exchange (RFC 7636)。code_challenge / code_verifier で認可コード横取り攻撃を防ぐ。本アプリでは例外なく必須。
    aliases: [pkce, PKCE]
    not_to_confuse_with:
      - { term: Dpop, reason: PKCE は認可コード保護、DPoP はトークン保護。攻撃面が異なる。 }
  Dpop:
    definition: Demonstrating Proof of Possession (RFC 9449)。JWK サムプリント (jkt) でトークンを所有鍵にバインドする。
    aliases: [dpop, DPoP]
  Mtls:
    definition: Mutual-TLS Client Authentication (RFC 8705)。TLS クライアント証明書で Client を認証する。
    aliases: [mtls, mTLS, tls_client_auth]
  Par:
    definition: Pushed Authorization Requests (RFC 9126)。/par に認可リクエストを事前 POST し /authorize は request_uri のみで参照する。FAPI 2.0 必須。
    aliases: [par, PAR]
  SenderConstrainedToken:
    definition: 所有証明（DPoP または mTLS）と組み合わさったトークン。所有者以外による再利用を防ぐ。

  # ---------- 標準クレーム / 識別子 ----------
  Issuer:
    definition: トークンを発行した AuthorizationServer の URL 識別子。
    aliases: [iss]
  Subject:
    definition: トークンの主体（通常は ResourceOwner）の仮名化された識別子。削除後も監査ログに残る。
    aliases: [sub]
    not_to_confuse_with:
      - { term: PreferredUsername, reason: sub は仮名化された安定識別子、preferred_username は表示用の文字列。 }
  Audience:
    definition: トークンの想定受信者の識別子。通常は Client の client_id。
    aliases: [aud]
  JwtId:
    definition: JWT 一意識別子。リプレイ防止と監査の追跡に使用。
    aliases: [jti]
  Nonce:
    definition: Client が認可リクエストに含め、ID トークンに含めて返される値。IDトークンのリプレイ防止。
  Scope:
    definition: Client が要求する権限の集合。Client メタデータで宣言された集合の部分集合でなければならない。
  Consent:
    definition: ResourceOwner が Client に対して特定の Scope を付与する意思表示。subject / client / scopes / granted_at / expires_at の5項目で永続化される。
    aliases: [consent, 同意]
  PreferredUsername:
    definition: 表示用のユーザー名。可変。
    aliases: [preferred_username]

  # ---------- クライアント認証方式 ----------
  ClientSecretBasic:
    definition: HTTP Basic 認証（レガシークライアント向け）。
    aliases: [client_secret_basic]
  ClientSecretPost:
    definition: フォームボディ内のクレデンシャル。
    aliases: [client_secret_post]
  PrivateKeyJwt:
    definition: RFC 7523 — client_assertion による署名済み JWT 認証。confidential 推奨。
    aliases: [private_key_jwt]
  TlsClientAuth:
    definition: RFC 8705 §2 — Mutual-TLS Client Authentication（PKI 結合）。Mtls 機構の一形態を token_endpoint_auth_method の値として表現したもの。
    aliases: [tls_client_auth]
    not_to_confuse_with:
      - { term: Mtls, reason: Mtls は機構（mTLS）の一般名、TlsClientAuth は token_endpoint_auth_method 値として使う具体的な wire 形式。 }
  None:
    definition: クライアント認証なし（public クライアント、PKCE が代替防御）。
    aliases: [none]

  # ---------- 署名アルゴリズム ----------
  PS256:
    definition: RSASSA-PSS using SHA-256 (RFC 7518)。
  ES256:
    definition: ECDSA using P-256 and SHA-256 (RFC 7518)。
  S256:
    definition: PKCE code_challenge_method=S256。code_challenge は BASE64URL-ENCODE(SHA256(code_verifier))。
    aliases: [S256]

  Totp:
    definition: RFC 6238 に基づく time-based one-time password。
    aliases: [totp, otp]
  Webauthn:
    definition: WebAuthn credential による認証。
    aliases: [webauthn]
  Hwk:
    definition: RFC 8176 の hardware-secured key 認証メソッド。
    aliases: [hwk]
  Swk:
    definition: RFC 8176 の software-secured key 認証メソッド。
    aliases: [swk]

  # ---------- レスポンスタイプ ----------
  Code:
    definition: response_type=code。本アプリが対応する唯一のレスポンスタイプ。
    aliases: [code]
  Query:
    definition: authorization response parameters を redirect_uri の query component で返す response_mode。
    aliases: [query]
  FormPost:
    definition: authorization response parameters を自動送信 HTML form で返す response_mode。
    aliases: [form_post]

  # ---------- OAuth エラーコード ----------
  InvalidRequest:
    definition: OAuth error code invalid_request。必須パラメータ欠落、不正値、重複などのリクエスト不備。
    aliases: [invalid_request]
  InvalidClient:
    definition: OAuth error code invalid_client。クライアント認証失敗。
    aliases: [invalid_client]
  InvalidGrant:
    definition: OAuth error code invalid_grant。認可コード、refresh token、device_code などの grant が無効。
    aliases: [invalid_grant]
  UnauthorizedClient:
    definition: OAuth error code unauthorized_client。クライアントが当該 grant_type を使えない。
    aliases: [unauthorized_client]
  UnsupportedGrantType:
    definition: OAuth error code unsupported_grant_type。未対応の grant_type。
    aliases: [unsupported_grant_type]
  InvalidScope:
    definition: OAuth error code invalid_scope。要求 scope が不正、未知、または許可外。
    aliases: [invalid_scope]
  InvalidToken:
    definition: Bearer token error code invalid_token。トークンが無効、期限切れ、改ざん、または失効済み。
    aliases: [invalid_token]
  InvalidDpopProof:
    definition: DPoP error code invalid_dpop_proof。DPoP proof JWT の検証失敗。
    aliases: [invalid_dpop_proof]
  AccessDenied:
    definition: OAuth error code access_denied。ResourceOwner またはポリシーによる拒否。
    aliases: [access_denied]
  ExpiredToken:
    definition: Device Authorization Grant error code expired_token。device_code が期限切れ。
    aliases: [expired_token]
  InsufficientScope:
    definition: Bearer token error code insufficient_scope。提示 token の scope が不足。
    aliases: [insufficient_scope]
  ServerError:
    definition: OAuth error code server_error。AuthorizationServer 側の予期せぬ内部エラー。
    aliases: [server_error]

  # ---------- FAPI プロファイル ----------
  Fapi2SecurityProfile:
    definition: FAPI 2.0 Security Profile。tls_client_auth または private_key_jwt + PAR 必須。
    aliases: [fapi_2_security_profile]

  # ---------- Authorization Code フローの状態 ----------
  Received:
    definition: 認可リクエストを受信した直後の初期状態。
    aliases: [received]
  AuthenticationPending:
    definition: ResourceOwner の認証を待っている状態。
    aliases: [authentication_pending]
  Authenticated:
    definition: ResourceOwner の認証が完了した状態。
    aliases: [authenticated]
  ConsentPending:
    definition: ResourceOwner に Scope への同意を求めている状態。
    aliases: [consent_pending]
  Consented:
    definition: ResourceOwner が要求 Scope に同意した状態。
    aliases: [consented]
  CodeIssued:
    definition: AuthorizationCode を Client に発行した状態。
    aliases: [code_issued]
  Exchanged:
    definition: AuthorizationCode が /token で正常に交換された終端状態。
    aliases: [exchanged]
  Rejected:
    definition: 認可リクエストが拒否された終端状態。
    aliases: [rejected]
  Expired:
    definition: 期限切れにより無効化された終端状態。
    aliases: [expired]

  # ---------- Authorization Code フローのイベント ----------
  Validate:
    definition: 認可リクエストの構文・必須パラメータ・redirect_uri を検証する。検証成功で AuthenticationPending へ遷移し、ログイン UI 提示を含む。
    aliases: [validate]
  AuthenticateUser:
    definition: ResourceOwner の認証を実行する。
    aliases: [authenticate_user]
  RequestConsent:
    definition: ResourceOwner に Scope への同意を求める（同意 UI 表示）。
    aliases: [request_consent]
  GrantConsent:
    definition: ResourceOwner が同意を付与する。
    aliases: [grant_consent]
  IssueCode:
    definition: AuthorizationCode を Client に発行する。
    aliases: [issue_code]
  RedeemCode:
    definition: Client が AuthorizationCode を /token で AccessToken と交換する。
    aliases: [redeem_code]
  Reject:
    definition: 認可リクエストを拒否する。
    aliases: [reject]
  Expire:
    definition: 期限切れにより認可リクエストを無効化する。
    aliases: [expire]

  # ---------- Device Code フローの状態 ----------
  Issued:
    definition: device_code と user_code を発行した初期状態。
    aliases: [issued]
  UserCodeEntered:
    definition: ユーザーが verification_uri で user_code を入力した状態。
    aliases: [user_code_entered]
  AuthorizationPending:
    definition: ユーザー承認待ち状態（device_code フロー）。
    aliases: [authorization_pending]
  Approved:
    definition: ユーザーが承認した状態。
    aliases: [approved]
  Denied:
    definition: ユーザーが拒否した、または user_code 誤り過多で失敗した状態。
    aliases: [denied]

  # ---------- Device Code フローのイベント ----------
  EnterUserCode:
    definition: ユーザーが verification_uri で user_code を入力する。
    aliases: [enter_user_code]
  Approve:
    definition: ユーザーが承認する。
    aliases: [approve]
  Deny:
    definition: ユーザーが拒否する。
    aliases: [deny]
  Exchange:
    definition: デバイスが /token で device_code を交換する。
    aliases: [exchange]
  SlowDown:
    definition: ポーリング間隔を増やすよう指示する。
    aliases: [slow_down]

  # ---------- RefreshToken のライフサイクル状態 ----------
  Active:
    definition: トークンまたは鍵が現在有効で第一線で使われている状態。RefreshToken と SigningKey で共用。
    aliases: [active]
  Rotated:
    definition: 子トークンに引き継がれ親が消費された状態。家族失効の対象になりうる。
    aliases: [rotated]
  Revoked:
    definition: 失効済み。/revoke もしくは家族失効により遷移する。RefreshToken と Consent で共用。
    aliases: [revoked]

  # ---------- RefreshToken のライフサイクルイベント ----------
  Rotate:
    definition: 親 RefreshToken を Rotated とし、新しい子トークンを発行する。
    aliases: [rotate]
  RevokeToken:
    definition: トークンを失効させる（/revoke または家族失効）。
    aliases: [revoke_token]

  # ---------- AuthorizationCodeRecord のライフサイクル状態 ----------
  Redeemed:
    definition: 認可コードが /token で正規に交換された終端状態（AuthorizationCodeRecord）。AuthorizationCodeFlow の Exchanged と並行。
    aliases: [redeemed]

  # ---------- PAR のライフサイクル状態・イベント ----------
  Stored:
    definition: /par で受領済みかつ未参照の request_uri。
    aliases: [stored]
  Used:
    definition: request_uri が一度参照済みの終端状態。再使用不可。
    aliases: [used]
  Use:
    definition: /authorize から request_uri を参照する。一度きり。
    aliases: [use]

  # ---------- Consent のライフサイクル状態・イベント ----------
  Granted:
    definition: 同意が付与された状態（Consent の初期状態）。
    aliases: [granted]
  RevokeConsent:
    definition: ResourceOwner が同意を撤回する（GDPR Art.7(3)）。
    aliases: [revoke_consent]

  # ---------- SigningKey のライフサイクル状態・イベント ----------
  Verifying:
    definition: 署名はしないが、過去発行トークンの検証のため JWKS に残っている状態。
    aliases: [verifying]
  Retired:
    definition: JWKS から除去された状態。新規検証には使われない。
    aliases: [retired]
  Archived:
    definition: 監査用に長期保管されている終端状態。鍵マテリアルは封印。
    aliases: [archived]
  Retire:
    definition: SigningKey を Verifying から Retired に移す。
    aliases: [retire]
  Archive:
    definition: SigningKey を Retired から Archived に移す。
    aliases: [archive]

  # ---------- 用語として使わないもの ----------
  Implicit:
    definition: implicit grant は RFC 9700 §2.1.2 により参照実装から除外する。
    aliases: [__excluded_implicit]
    not_to_confuse_with:
      - { term: AuthorizationCode, reason: 旧 implicit が担っていた SPA 向けトークン発行は authorization_code + nonce + PKCE が代替する。 }
  PasswordGrant:
    definition: Resource Owner Password Credentials grant は RFC 9700 §2.4 により参照実装から除外する。
    aliases: [__excluded_password]


# =================================================================
# 2. models — ドメインモデル
# =================================================================

models:

  # ---------- 列挙 ----------
  ClientType:
    kind: enum
    description: クライアントが client_secret を安全に保持できるかどうかの分類。Public はモバイル/SPA など秘匿不可、Confidential はサーバーサイドで秘密鍵を保持可能。
    values: [Public, Confidential]

  GrantType:
    kind: enum
    description: トークン発行の方式。本アプリがサポートする 4 種を列挙する。各値の意味は vocabulary を参照。
    values: [AuthorizationCode, RefreshToken, ClientCredentials, DeviceCode]

  TokenEndpointAuthMethod:
    kind: enum
    description: /token エンドポイントにおけるクライアント認証方式 (RFC 6749 §2.3 / RFC 7523 / RFC 8705)。None は public client 専用。
    values: [ClientSecretBasic, ClientSecretPost, PrivateKeyJwt, TlsClientAuth, None]

  ResponseType:
    kind: enum
    description: /authorize で要求できる応答種別。本アプリでは Authorization Code フロー専用なので Code のみサポート。
    values: [Code]

  ResponseMode:
    kind: enum
    description: 認可レスポンスのパラメータをクライアントへ返す方式 (OIDC Multiple Response Types §3)。
    values: [Query, FormPost]

  SignatureAlgorithm:
    kind: enum
    description: JWT 署名アルゴリズム。FAPI 2.0 が許容する asymmetric な強度の高いものに限定（HS256 等の対称鍵は除外）。
    values: [PS256, ES256]

  FapiProfile:
    kind: enum
    description: クライアントに適用される FAPI セキュリティプロファイル。None は通常クライアント、Fapi2SecurityProfile は金融グレード API 向け（PAR 必須 / DPoP 必須 等の追加制約）。
    values: [None, Fapi2SecurityProfile]

  TokenType:
    kind: enum
    description: /introspect / /revoke の token_type_hint で指定されるトークン種別。
    values: [AccessToken, RefreshToken]

  SenderConstraintKind:
    kind: enum
    description: トークンを所有者にバインドする方式 (RFC 7800)。Dpop は DPoP 公開鍵サムプリント、Mtls は mTLS クライアント証明書サムプリント。
    values: [Dpop, Mtls]

  AccessTokenSenderConstraint:
    kind: enum
    description: 発行された AccessToken に適用されているセンダー制約。None は Bearer トークン。
    values: [None, Dpop, Mtls]

  CodeChallengeMethod:
    kind: enum
    description: PKCE (RFC 7636) の code_challenge ハッシュ方式。本アプリでは S256 のみ許容（plain は脆弱なため拒否）。
    values: [S256]

  MfaFactorType:
    kind: enum
    description: 第二要素 (MFA) の種別 (RFC 8176 amr 値の本アプリ向けサブセット)。Totp は RFC 6238、Webauthn は WebAuthn Level 3、Hwk / Swk は将来拡張のための予約。
    values: [Totp, Webauthn, Hwk, Swk]

  AuthorizationCodeState:
    kind: enum
    description: AuthorizationCodeFlow 状態機械の取りうる状態列挙。状態機械セクションも参照。
    values: [Received, AuthenticationPending, Authenticated, ConsentPending, Consented, CodeIssued, Exchanged, Rejected, Expired]

  DeviceCodeState:
    kind: enum
    description: DeviceCodeFlow (RFC 8628) 状態機械の取りうる状態列挙。状態機械セクションも参照。
    values: [Issued, UserCodeEntered, AuthorizationPending, Approved, Denied, Exchanged, Expired]

  RefreshTokenState:
    kind: enum
    description: RefreshTokenLifecycle 状態機械の取りうる状態列挙。Rotated は子トークンへ消費済み、Revoked は失効済み、Expired は期限切れ。
    values: [Active, Rotated, Revoked, Expired]

  AuthorizationCodeRecordState:
    kind: enum
    description: AuthorizationCodeRecordLifecycle 状態機械の取りうる状態列挙。AuthorizationCodeFlow とは別軸でコード本体のライフサイクルを表す。
    values: [Issued, Redeemed, Expired]

  ConsentState:
    kind: enum
    description: ConsentLifecycle 状態機械の取りうる状態列挙。GDPR Art.7(3) 撤回権により Granted → Revoked が可能。
    values: [Granted, Revoked, Expired]

  PARRecordState:
    kind: enum
    description: PARRecordLifecycle 状態機械の取りうる状態列挙。Stored から /authorize での参照で Used、期限切れで Expired。
    values: [Stored, Used, Expired]

  SigningKeyState:
    kind: enum
    description: SigningKeyLifecycle 状態機械の取りうる状態列挙。Active が現行署名鍵、Verifying は JWKS に残るが署名はしない、Retired は JWKS から除去済、Archived は監査保管。
    values: [Active, Verifying, Retired, Archived]

  OAuthErrorCode:
    kind: enum
    description: OAuth 2.0 / OIDC / DPoP / FAPI / RFC 8628 で規定された標準エラーコード一式。HTTP レスポンスの error フィールド値となる。
    values:
      - InvalidRequest
      - InvalidClient
      - InvalidGrant
      - UnauthorizedClient
      - UnsupportedGrantType
      - InvalidScope
      - InvalidToken
      - ServerError
      - InvalidDpopProof
      - AccessDenied
      - ExpiredToken
      - SlowDown
      - InsufficientScope
      - AuthorizationPending

  # ---------- 永続エンティティ ----------
  OAuth2Client:
    kind: entity
    description: RFC 7591 + FAPI 2.0 拡張のクライアント。
    identity: client_id
    annotations: { audit_required: true, retention_days: 2555 }
    fields:
      client_id:                              { type: String, constraints: [non_empty, { max_length: 128 }] }
      client_secret_hash:                     { type: String, optional: true, annotations: { sensitive: true } }
      client_name:                            { type: String, optional: true, constraints: [{ max_length: 200 }] }
      client_type:                            { type: ClientType }
      redirect_uris:                          { type: "List<Uri>", constraints: [non_empty] }
      grant_types:                            { type: "List<GrantType>", constraints: [non_empty] }
      response_types:                         { type: "List<ResponseType>" }
      token_endpoint_auth_method:             { type: TokenEndpointAuthMethod }
      scope:                                  { type: String }
      jwks_uri:                               { type: Uri, optional: true }
      jwks:                                   { type: JSON, optional: true }
      tls_client_auth_subject_dn:             { type: String, optional: true }
      id_token_signed_response_alg:           { type: SignatureAlgorithm, default: PS256 }
      require_pushed_authorization_requests:  { type: Boolean, default: false }
      require_pkce:                           { type: Boolean, optional: true }
      dpop_bound_access_tokens:               { type: Boolean, default: false }
      fapi_profile:                           { type: FapiProfile, default: None }
      created_at:                             { type: Timestamp }

  User:
    kind: entity
    description: OIDC Core §5.1 標準クレーム + PII 注釈付きユーザー。
    identity: sub
    annotations: { audit_required: true, retention_days: 2555 }
    fields:
      sub:                  { type: String, constraints: [non_empty] }
      preferred_username:   { type: String, constraints: [non_empty, { max_length: 100 }], annotations: { pii: true } }
      password_hash:        { type: String, annotations: { sensitive: true, purge_on_deletion: true } }
      name:                 { type: String, optional: true, annotations: { pii: true, purge_on_deletion: true, purge_deadline_days: 30 } }
      given_name:           { type: String, optional: true, annotations: { pii: true, purge_on_deletion: true, purge_deadline_days: 30 } }
      family_name:          { type: String, optional: true, annotations: { pii: true, purge_on_deletion: true, purge_deadline_days: 30 } }
      email:                { type: String, optional: true, constraints: [{ format: email }], annotations: { pii: true, purge_on_deletion: true, purge_deadline_days: 30 } }
      email_verified:       { type: Boolean, default: false }
      mfa_enrolled:         { type: Boolean, default: false }
      created_at:           { type: Timestamp }
      updated_at:           { type: Timestamp, optional: true }
      deleted_at:           { type: Timestamp, optional: true, description: ソフトデリート時刻。+30日でPII物理消去。 }

  MfaFactor:
    kind: entity
    description: ユーザーが登録した第二要素 (MFA) 1 件。Totp の場合 secret は base32 で保存し、認証時に RFC 6238 (T0=0, STEP=30s, 6-digit) で評価する。User.mfa_enrolled の真値はこの集合の非空性と同義。
    identity: [sub, type]
    annotations: { audit_required: true, retention_days: 2555 }
    fields:
      sub:        { type: String, description: 所有者ユーザの sub。 }
      type:       { type: MfaFactorType }
      secret:     { type: String, optional: true, description: Totp の場合は base32 シークレット。他要素は credential JSON 等を別フィールド化する余地として残す。, annotations: { sensitive: true } }
      label:      { type: String, optional: true, description: ユーザが付ける表示名 (例 "iPhone Authenticator")。 }
      created_at: { type: Timestamp }
      last_used_at: { type: Timestamp, optional: true }

  LoginSession:
    kind: entity
    description: ブラウザログインセッション。Cookie には不透明な session id のみを置き、sub と auth_time はサーバー側ストアに保持する。amr / acr もここに残し、後続の /authorize で step-up 判定に使う。authentication_pending=true は追加 factor 検証を待っている中間状態で、/authorize 完了経路はそのセッションを未認証扱いとし対応する factor challenge に誘導する。
    identity: id
    annotations: { component: Authentication, ttl_seconds: 3600, cookie_http_only: true, same_site: Lax }
    fields:
      id:                      { type: UUID }
      sub:                     { type: String }
      auth_time:               { type: Integer }
      amr:                     { type: "List<String>", description: 認証成立時の RFC 8176 メソッド列。 }
      acr:                     { type: String, description: annotations.acr_vocabulary から導出した URN。 }
      authentication_pending:  { type: Boolean, default: false, description: 追加 factor 検証を待っている中間状態か。完了で false。 }
      expires_at:              { type: Timestamp }

  AuthenticationContext:
    kind: value_object
    description: Authentication component が OAuth2/OIDC component に渡す認証結果。OAuth2/OIDC は password、UserRepository、session cookie の詳細を参照しない。
    fields:
      sub:         { type: String }
      auth_time:   { type: Integer }
      amr:         { type: "List<String>" }
      acr:         { type: String, optional: true }
      session_id:  { type: String, optional: true }

  Consent:
    kind: entity
    description: GDPR 同意取得記録。状態は ConsentLifecycle 状態機械に従う。
    identity: [sub, client_id]
    annotations: { audit_required: true }
    fields:
      sub:          { type: String }
      client_id:    { type: String }
      scopes:       { type: "List<String>", constraints: [non_empty, unique] }
      state:        { type: ConsentState }
      granted_at:   { type: Timestamp }
      expires_at:   { type: Timestamp, description: 通常 granted_at + 365 日 }
      revoked_at:   { type: Timestamp, optional: true, description: state == Revoked になった時刻（監査）。 }

  RefreshTokenRecord:
    kind: entity
    description: リフレッシュトークンのストアレコード。プレーン値は保存しない。状態は RefreshTokenLifecycle 状態機械に従う。
    identity: id
    annotations: { token_ttl_seconds: 1209600, absolute_ttl_seconds: 2592000, rotation_required: true }
    fields:
      id:                   { type: UUID }
      hash:                 { type: String, description: SHA-256 ハッシュ。, annotations: { sensitive: true } }
      family_id:            { type: UUID, description: 認可コード交換から派生したすべてのトークンが共有する識別子。 }
      parent_id:            { type: UUID, optional: true }
      client_id:            { type: String }
      sub:                  { type: String }
      scopes:               { type: "List<String>" }
      state:                { type: RefreshTokenState }
      issued_at:            { type: Timestamp }
      expires_at:           { type: Timestamp }
      absolute_expires_at:  { type: Timestamp, description: ローテーションされても延長されない絶対期限。 }
      sender_constraint:    { type: RefreshTokenSenderConstraint, optional: true }

  AuthorizationRequest:
    kind: entity
    description: フロー追跡用のサーバー内部中間ステート。
    identity: id
    annotations: { component: OAuth2 }
    fields:
      id:                       { type: UUID }
      state:                    { type: AuthorizationCodeState }
      client_id:                { type: String }
      redirect_uri:             { type: Uri }
      response_type:            { type: ResponseType }
      scope:                    { type: String }
      state_param:              { type: String, optional: true }
      nonce:                    { type: String, optional: true }
      code_challenge:           { type: String }
      code_challenge_method:    { type: CodeChallengeMethod }
      prompt:                   { type: String, optional: true }
      max_age:                  { type: Integer, optional: true, constraints: [{ min: 0 }] }
      par_request_uri:          { type: String, optional: true }
      sub:                      { type: String, optional: true }
      auth_time:                { type: Integer, optional: true }
      amr:                      { type: "List<String>", optional: true, description: 認証成功時のメソッド列。advance(authenticate_user) で AuthenticationContext から伝搬。 }
      acr:                      { type: String, optional: true, description: amr から annotations.acr_vocabulary に従って導出した URN。 }
      acr_values:               { type: String, optional: true, description: クライアントが /authorize に与えた acr_values パラメータ (RFC 8176)。step-up 判定に使う。 }
      created_at:               { type: Timestamp }
      expires_at:               { type: Timestamp }

  AuthorizationCodeRecord:
    kind: entity
    description: 発行済み認可コードの永続レコード。code 本体は短命。状態は AuthorizationCodeRecordLifecycle に従う（AuthorizationCodeFlow とは別軸でコード自体のライフサイクルを表す）。
    identity: code
    fields:
      code:                       { type: String, annotations: { sensitive: true } }
      authorization_request_id:   { type: UUID }
      client_id:                  { type: String }
      sub:                        { type: String }
      scopes:                     { type: "List<String>" }
      redirect_uri:               { type: Uri }
      code_challenge:             { type: String }
      code_challenge_method:      { type: CodeChallengeMethod }
      nonce:                      { type: String, optional: true }
      auth_time:                  { type: Integer }
      amr:                        { type: "List<String>", optional: true, description: 認可リクエストから引き継いだ認証メソッド列。id_token / access_token に emit する。 }
      acr:                        { type: String, optional: true, description: 認可リクエストから引き継いだ ACR URN。id_token / access_token に emit する。 }
      state:                      { type: AuthorizationCodeRecordState }
      issued_at:                  { type: Timestamp }
      expires_at:                 { type: Timestamp }
      redeemed_at:                { type: Timestamp, optional: true, description: state == Redeemed になった時刻（監査）。 }
      issued_family_id:           { type: UUID, optional: true, description: 成功交換で発行された refresh family（不正リプレイ検知時のファミリー失効に使う） }

  PARRecord:
    kind: entity
    description: Pushed Authorization Request の格納レコード。状態は PARRecordLifecycle に従う。
    identity: request_uri
    fields:
      request_uri:    { type: String }
      client_id:      { type: String }
      parameters:     { type: "Map<String, String>" }
      state:          { type: PARRecordState }
      issued_at:      { type: Timestamp }
      expires_at:     { type: Timestamp }

  DeviceAuthorization:
    kind: entity
    description: RFC 8628 デバイス認可レコード。device_code はハッシュのみで保存する。
    identity: device_code_hash
    fields:
      device_code_hash:     { type: String, annotations: { sensitive: true } }
      user_code:            { type: String, description: 紛らわしい文字を避けた短いコード。 }
      client_id:            { type: String }
      scopes:               { type: "List<String>" }
      state:                { type: DeviceCodeState }
      sub:                  { type: String, optional: true }
      auth_time:            { type: Integer, optional: true }
      interval_seconds:     { type: Integer, constraints: [{ min: 1 }] }
      last_polled_at:       { type: Timestamp, optional: true }
      issued_family_id:     { type: UUID, optional: true }
      issued_at:            { type: Timestamp }
      expires_at:           { type: Timestamp }

  SigningKey:
    kind: entity
    description: トークン署名用の非対称鍵。Active 1本＋Verifying 過去鍵 0本以上を JWKS に並べる（ADR-009 / SigningKeyMinJwksOverlap）。
    identity: kid
    annotations: { audit_required: true, retention_days: 2555 }
    fields:
      kid:            { type: String, constraints: [non_empty] }
      alg:            { type: SignatureAlgorithm }
      public_jwk:     { type: JWK }
      state:          { type: SigningKeyState }
      created_at:     { type: Timestamp }
      activated_at:   { type: Timestamp, optional: true, description: 一度 Active となった時刻。 }
      retired_at:     { type: Timestamp, optional: true, description: Retired 状態に遷移した時刻。 }
      archived_at:    { type: Timestamp, optional: true }

  # ---------- 値オブジェクト ----------
  SenderConstraintCnf:
    kind: value_object
    description: Sender-Constrained 証明 (RFC 7800)。
    fields:
      jkt:        { type: String, optional: true, description: DPoP 鍵の SHA-256 サムプリント (RFC 9449 §6.1)。 }
      x5t_s256:   { type: String, optional: true, description: "mTLS クライアント証明書のサムプリント (x5t#S256, RFC 8705)。" }

  RefreshTokenSenderConstraint:
    kind: value_object
    description: RefreshToken に紐づくセンダー制約。発行時のバインド先（DPoP 鍵サムプリントまたは mTLS 証明書サムプリント）を保持する。
    fields:
      type:       { type: SenderConstraintKind }
      jkt:        { type: String, optional: true }
      x5t_s256:   { type: String, optional: true }

  AccessTokenClaims:
    kind: value_object
    description: JWT Access Token クレーム (RFC 9068)。TTL 600 秒。
    annotations: { token_ttl_seconds: 600, signature_algorithms: [PS256, ES256] }
    fields:
      iss:        { type: Uri }
      sub:        { type: String, description: client_credentials 時は client_id と一致。 }
      aud:        { type: Audience }
      client_id:  { type: String }
      scope:      { type: String, description: スペース区切りスコープ列。 }
      exp:        { type: Integer, description: Unix epoch seconds }
      iat:        { type: Integer }
      nbf:        { type: Integer, optional: true }
      jti:        { type: String }
      auth_time:  { type: Integer, optional: true }
      acr:        { type: String, optional: true }
      amr:        { type: "List<String>", optional: true }
      cnf:        { type: SenderConstraintCnf, optional: true }

  IdTokenClaims:
    kind: value_object
    description: OIDC ID Token クレーム。TTL 3600 秒。
    annotations: { token_ttl_seconds: 3600, signature_algorithms: [PS256, ES256] }
    fields:
      iss:                  { type: Uri }
      sub:                  { type: String }
      aud:                  { type: Audience }
      exp:                  { type: Integer }
      iat:                  { type: Integer }
      auth_time:            { type: Integer }
      nonce:                { type: String, optional: true }
      acr:                  { type: String, optional: true }
      amr:                  { type: "List<String>", optional: true }
      azp:                  { type: String, optional: true }
      at_hash:              { type: String, optional: true }
      c_hash:               { type: String, optional: true }
      name:                 { type: String, optional: true, annotations: { pii: true } }
      preferred_username:   { type: String, optional: true, annotations: { pii: true } }
      email:                { type: String, optional: true, constraints: [{ format: email }], annotations: { pii: true } }
      email_verified:       { type: Boolean, optional: true }

  Audience:
    kind: value_object
    description: 文字列または1つ以上の文字列の配列（JWT RFC 7519 §4.1.3）。
    fields:
      one_or_many: { type: "OneOf<String, List<String>>" }

  Uri:
    kind: value_object
    description: URI 形式の文字列。
    fields:
      value: { type: String, constraints: [{ format: uri }] }

  JWK:
    kind: value_object
    description: JSON Web Key (RFC 7517)。kid で識別される 1 件の公開鍵情報。
    fields:
      kty:  { type: String }
      use:  { type: String, optional: true }
      kid:  { type: String }
      alg:  { type: String, optional: true }
      extra: { type: JSON, optional: true }

  JWKS:
    kind: value_object
    description: JWK Set (RFC 7517 §5)。/jwks エンドポイントが返す公開鍵集合。クライアントがトークン署名を検証する際に取得する。
    fields:
      keys: { type: "List<JWK>" }

  DiscoveryDocument:
    kind: value_object
    description: RFC 8414 / OIDC Discovery 1.0 メタデータ。
    fields:
      issuer:                                        { type: Uri }
      authorization_endpoint:                        { type: Uri }
      token_endpoint:                                { type: Uri }
      userinfo_endpoint:                             { type: Uri }
      jwks_uri:                                      { type: Uri }
      introspection_endpoint:                        { type: Uri }
      revocation_endpoint:                           { type: Uri }
      pushed_authorization_request_endpoint:         { type: Uri }
      device_authorization_endpoint:                 { type: Uri }
      registration_endpoint:                         { type: Uri }
      end_session_endpoint:                          { type: Uri, optional: true }
      scopes_supported:                              { type: "List<String>" }
      response_types_supported:                      { type: "List<ResponseType>" }
      response_modes_supported:                      { type: "List<ResponseMode>", optional: true }
      grant_types_supported:                         { type: "List<GrantType>" }
      token_endpoint_auth_methods_supported:         { type: "List<TokenEndpointAuthMethod>" }
      id_token_signing_alg_values_supported:         { type: "List<SignatureAlgorithm>" }
      code_challenge_methods_supported:              { type: "List<CodeChallengeMethod>" }
      require_pushed_authorization_requests:         { type: Boolean }
      require_pkce:                                  { type: Boolean }
      authorization_response_iss_parameter_supported: { type: Boolean, optional: true }
      dpop_signing_alg_values_supported:             { type: "List<SignatureAlgorithm>", optional: true }
      tls_client_certificate_bound_access_tokens:    { type: Boolean, optional: true }
      claims_supported:                              { type: "List<String>", optional: true }
      acr_values_supported:                          { type: "List<String>", optional: true }

  # ---------- リクエスト/レスポンス値オブジェクト ----------
  ClientRegistrationRequest:
    kind: value_object
    description: /register への動的クライアント登録リクエスト本体 (RFC 7591)。登録後の OAuth2Client は本リクエストの内容から派生する。
    fields:
      redirect_uris:                  { type: "List<Uri>", constraints: [non_empty] }
      client_name:                    { type: String, optional: true }
      client_type:                    { type: ClientType, optional: true }
      grant_types:                    { type: "List<GrantType>", constraints: [non_empty] }
      response_types:                 { type: "List<ResponseType>", optional: true }
      token_endpoint_auth_method:     { type: TokenEndpointAuthMethod, optional: true }
      scope:                          { type: String, optional: true }
      jwks_uri:                       { type: Uri, optional: true }
      jwks:                           { type: JSON, optional: true }
      tls_client_auth_subject_dn:     { type: String, optional: true }
      id_token_signed_response_alg:   { type: SignatureAlgorithm, optional: true }
      fapi_profile:                   { type: FapiProfile, optional: true }
      require_pkce:                   { type: Boolean, optional: true }
      require_pushed_authorization_requests: { type: Boolean, optional: true }
      dpop_bound_access_tokens:       { type: Boolean, optional: true }

  TokenRequest:
    kind: value_object
    description: application/x-www-form-urlencoded で送信される token endpoint リクエスト。
    fields:
      grant_type:               { type: GrantType }
      code:                     { type: String, optional: true }
      redirect_uri:             { type: String, optional: true }
      code_verifier:            { type: String, optional: true }
      refresh_token:            { type: String, optional: true }
      device_code:              { type: String, optional: true }
      client_id:                { type: String, optional: true }
      client_secret:            { type: String, optional: true }
      client_assertion:         { type: String, optional: true }
      client_assertion_type:    { type: String, optional: true }
      scope:                    { type: String, optional: true }

  TokenResponse:
    kind: value_object
    description: /token 成功時のレスポンスボディ (RFC 6749 §5.1)。発行されたトークン一式と種別を返す。
    fields:
      access_token:     { type: String }
      token_type:       { type: String, description: '"Bearer" or "DPoP"' }
      expires_in:       { type: Integer, optional: true }
      refresh_token:    { type: String, optional: true }
      id_token:         { type: String, optional: true }
      scope:            { type: String, optional: true }

  IntrospectionRequest:
    kind: value_object
    description: /introspect リクエスト (RFC 7662 §2.1)。ResourceServer がトークンの有効性を AuthorizationServer に問い合わせる。
    fields:
      token:              { type: String }
      token_type_hint:    { type: TokenType, optional: true }

  IntrospectionResponse:
    kind: value_object
    description: /introspect レスポンス (RFC 7662 §2.2)。トークンの active 状態と有効時のメタデータを返す。
    fields:
      active:       { type: Boolean }
      scope:        { type: String, optional: true }
      client_id:    { type: String, optional: true }
      sub:          { type: String, optional: true }
      exp:          { type: Integer, optional: true }
      iat:          { type: Integer, optional: true }
      token_type:   { type: String, optional: true }
      jti:          { type: String, optional: true }
      cnf:          { type: SenderConstraintCnf, optional: true }

  RevokeRequest:
    kind: value_object
    description: /revoke リクエスト (RFC 7009 §2.1)。指定したトークンを失効させる。
    fields:
      token:              { type: String }
      token_type_hint:    { type: TokenType, optional: true }

  ParRequest:
    kind: value_object
    description: 任意の authorize パラメータを form で受け取る。
    fields:
      parameters: { type: "Map<String, String>" }

  ParResponse:
    kind: value_object
    description: /par レスポンス (RFC 9126 §2.2)。短命の request_uri を発行し、後続の /authorize から参照される。
    fields:
      request_uri:    { type: String }
      expires_in:     { type: Integer }

  DeviceAuthorizationRequest:
    kind: value_object
    description: /device_authorization リクエスト (RFC 8628 §3.1)。入力制約のあるデバイスからのフロー開始要求。
    fields:
      scope:                    { type: String, optional: true }
      client_id:                { type: String, optional: true }
      client_secret:            { type: String, optional: true }
      client_assertion:         { type: String, optional: true }
      client_assertion_type:    { type: String, optional: true }

  DeviceAuthorizationResponse:
    kind: value_object
    description: /device_authorization レスポンス (RFC 8628 §3.2)。device_code・user_code・verification_uri を返し、デバイスはポーリングへ移行する。
    fields:
      device_code:                  { type: String }
      user_code:                    { type: String }
      verification_uri:             { type: Uri }
      verification_uri_complete:    { type: Uri, optional: true }
      expires_in:                   { type: Integer }
      interval:                     { type: Integer, optional: true }

  AuthorizeParameters:
    kind: value_object
    description: GET /authorize クエリパラメータ。
    fields:
      response_type:          { type: ResponseType }
      client_id:              { type: String }
      redirect_uri:           { type: String }
      scope:                  { type: String, optional: true }
      state:                  { type: String, optional: true }
      nonce:                  { type: String, optional: true }
      code_challenge:         { type: String }
      code_challenge_method:  { type: CodeChallengeMethod }
      prompt:                 { type: String, optional: true }
      max_age:                { type: Integer, optional: true }
      id_token_hint:          { type: String, optional: true }
      request_uri:            { type: String, optional: true }

  BrowserLoginRequest:
    kind: value_object
    description: SPA が POST /api/auth/login に送る JSON。authorization request id は HttpOnly transaction cookie、CSRF は X-CSRF-Token header から解決する。
    annotations: { component: Authentication }
    fields:
      username:      { type: String }
      password:      { type: String, annotations: { sensitive: true } }

  BrowserConsentRequest:
    kind: value_object
    description: SPA が POST /api/auth/consent に送る同意判断。
    annotations: { component: Authentication }
    fields:
      action:        { type: String, description: allow または deny。 }

  BrowserDeviceRequest:
    kind: value_object
    description: SPA が POST /api/auth/device に送る device user_code の承認判断。
    annotations: { component: Authentication }
    fields:
      user_code:     { type: String }
      action:        { type: String, description: allow または deny。 }

  BrowserTotpRequest:
    kind: value_object
    description: Browser client が POST /api/auth/totp に送る TOTP コード。authorization request id は HttpOnly transaction cookie、CSRF は X-CSRF-Token header から解決する。他 factor (WebAuthn 等) はHTTP形が大きく異なるため、別endpointと別value objectとして独立に定義する。
    annotations: { component: Authentication }
    fields:
      code:          { type: String, description: Authenticator アプリが生成した数字コード (annotations.totp_policy.digits 桁)。, annotations: { sensitive: true } }

  BrowserTransactionResponse:
    kind: value_object
    description: SPA が現在の browser authorization transaction を描画するための no-store JSON。
    fields:
      kind:          { type: String, description: 描画すべき画面の識別子。login / totp / consent / device 等、factor 追加に応じて拡張する。 }
      csrf_token:    { type: String, annotations: { sensitive: true } }
      client_name:   { type: String, optional: true }
      scopes:        { type: "List<String>", optional: true }

  BrowserDeviceContextResponse:
    kind: value_object
    description: SPA が device user_code 画面を描画するための no-store JSON。
    fields:
      kind:          { type: String }
      user_code:     { type: String, optional: true }
      csrf_token:    { type: String, annotations: { sensitive: true } }

  BrowserFlowResponse:
    kind: value_object
    description: SPA の認証操作後に表示する次画面またはクライアント redirect URI。
    fields:
      next:          { type: String, optional: true }
      redirect_to:   { type: Uri, optional: true }

  EndSessionParameters:
    kind: value_object
    description: RP-Initiated Logout v1 のクエリ / form パラメータ。client_id で post_logout_redirect_uri を検証する。
    fields:
      client_id:                   { type: String, optional: true }
      id_token_hint:               { type: String, optional: true }
      post_logout_redirect_uri:    { type: Uri, optional: true }
      state:                       { type: String, optional: true }

  UserInfoResponse:
    kind: value_object
    description: OIDC Core §5.3。可変な OIDC クレームを含む。
    fields:
      sub:        { type: String }
      claims:     { type: JSON, optional: true }

  # ---------- エラー ----------
  OAuthError:
    kind: error
    description: OAuth 2.0 / OIDC のエラー応答の共通形 (RFC 6749 §5.2)。具体的なエラー種別は error フィールドの OAuthErrorCode で識別される。
    payload:
      error:                { type: OAuthErrorCode }
      error_description:    { type: String, optional: true }
      error_uri:            { type: String, optional: true }

  InvalidRequestError:
    kind: error
    description: リクエストに必須パラメータの欠落・不正値・重複等がある (RFC 6749 §5.2 invalid_request)。
    payload:
      reason: { type: String, optional: true }
  InvalidClientError:
    kind: error
    description: クライアント認証が失敗した、または未登録のクライアント (RFC 6749 §5.2 invalid_client)。client_id の存在有無を開示しないため詳細は返さない。
  InvalidGrantError:
    kind: error
    description: 認可コード・リフレッシュトークン・device_code 等の付与が無効、期限切れ、再利用、あるいは redirect_uri/PKCE 不一致 (RFC 6749 §5.2 invalid_grant)。
    payload:
      reason: { type: String, optional: true }
  UnauthorizedClientError:
    kind: error
    description: クライアントがこの grant_type を使用する権限を持たない (RFC 6749 §5.2 unauthorized_client)。
  UnsupportedGrantTypeError:
    kind: error
    description: AuthorizationServer がこの grant_type をサポートしていない (RFC 6749 §5.2 unsupported_grant_type)。
  InvalidScopeError:
    kind: error
    description: 要求された scope が不正、未知、またはクライアントに許可されていない (RFC 6749 §5.2 invalid_scope)。
  InvalidTokenError:
    kind: error
    description: アクセストークンが期限切れ、改ざん、不正、または失効済み (RFC 6750 §3.1 invalid_token)。
  InvalidDpopProofError:
    kind: error
    description: DPoP Proof JWT の検証に失敗した（署名・jti・htu/htm・nonce・clock skew 等、RFC 9449 §7.1 invalid_dpop_proof）。
  InsufficientScopeError:
    kind: error
    description: 提示されたトークンの scope では要求された操作に不足している (RFC 6750 §3.1 insufficient_scope)。
  AccessDeniedError:
    kind: error
    description: ResourceOwner が認可を拒否した、またはサーバーポリシーが許可しなかった (RFC 6749 §4.1.2.1 access_denied)。
  ExpiredTokenError:
    kind: error
    description: Device Authorization Grant において device_code が有効期限を過ぎた (RFC 8628 §3.5 expired_token)。
  SlowDownError:
    kind: error
    description: Device Authorization Grant のポーリングが速すぎる。クライアントは interval を 5 秒延長する必要がある (RFC 8628 §3.5 slow_down)。
  AuthorizationPendingError:
    kind: error
    description: Device Authorization Grant においてユーザーがまだ承認していない (RFC 8628 §3.5 authorization_pending)。クライアントは interval 秒待ってから再試行する。
  ServerError:
    kind: error
    description: AuthorizationServer 側の予期せぬ内部エラー (RFC 6749 §4.1.2.1 server_error)。

  # ---------- ドメインイベント ----------
  ClientRegistered:
    kind: event
    description: /register で新しいクライアントが動的登録された (RFC 7591)。クライアント登録監査の起点。
    payload:
      occurredAt:   { type: Timestamp }
      clientId:     { type: String }
      clientType:   { type: ClientType, optional: true }

  UserAuthenticated:
    kind: event
    description: ResourceOwner の認証が成功した。amr は実際に経由した認証手段の一覧 (OIDC Core §2)。
    annotations: { component: Authentication }
    payload:
      occurredAt:   { type: Timestamp }
      sub:          { type: String }
      amr:          { type: "List<String>", optional: true }

  AuthenticationFailed:
    kind: event
    description: ResourceOwner の認証が失敗した。レートリミット・不正検知の入力イベント。username は PII として扱う。
    annotations: { component: Authentication }
    payload:
      occurredAt:   { type: Timestamp }
      username:     { type: String, optional: true, annotations: { pii: true } }
      reason:       { type: String, optional: true }

  ConsentGranted:
    kind: event
    description: ResourceOwner がクライアントに対する scope の同意を与えた (GDPR Art.6 法的根拠の取得記録)。
    payload:
      occurredAt:   { type: Timestamp }
      sub:          { type: String }
      clientId:     { type: String }
      scopes:       { type: "List<String>" }

  ConsentRevoked:
    kind: event
    description: ResourceOwner が既存の同意を撤回した (GDPR Art.7(3) 同意撤回権)。以後の発行はブロックされる。
    payload:
      occurredAt:   { type: Timestamp }
      sub:          { type: String }
      clientId:     { type: String }

  AuthorizationCodeIssued:
    kind: event
    description: /authorize 完了時に AuthorizationCode を発行した。/token への交換まで 60 秒以内に行う必要がある。
    payload:
      occurredAt:           { type: Timestamp }
      clientId:             { type: String }
      sub:                  { type: String }
      scopes:               { type: "List<String>" }
      codeChallengeMethod:  { type: String, optional: true }

  AuthorizationCodeRedeemed:
    kind: event
    description: AuthorizationCode が /token で正しく交換された。同一コードの再使用はファミリー失効を引き起こす。
    payload:
      occurredAt:   { type: Timestamp }
      clientId:     { type: String }
      sub:          { type: String }

  AccessTokenIssued:
    kind: event
    description: AccessToken (JWT) を発行した。senderConstraint がある場合は所有証明（DPoP/mTLS）バインド済み。
    payload:
      occurredAt:         { type: Timestamp }
      jti:                { type: String }
      clientId:           { type: String }
      sub:                { type: String }
      scopes:             { type: "List<String>" }
      senderConstraint:   { type: AccessTokenSenderConstraint, default: None }

  RefreshTokenIssued:
    kind: event
    description: RefreshToken を発行した。familyId は元の認可コード由来のファミリーを識別し、ローテーションで継承される。
    payload:
      occurredAt:   { type: Timestamp }
      tokenId:      { type: String }
      familyId:     { type: String }
      parentId:     { type: String, optional: true }
      clientId:     { type: String }
      sub:          { type: String }

  RefreshTokenRotated:
    kind: event
    description: RefreshToken を /token で交換し、新しい子トークンを発行して親を Rotated 状態にした (ADR-004)。
    payload:
      occurredAt:   { type: Timestamp }
      oldTokenId:   { type: String }
      newTokenId:   { type: String }
      familyId:     { type: String }

  TokenRevoked:
    kind: event
    description: /revoke もしくは管理操作によってトークンが失効された (RFC 7009)。監査・即時性要件あり。
    payload:
      occurredAt:   { type: Timestamp }
      tokenType:    { type: TokenType }
      tokenId:      { type: String }
      reason:       { type: String, optional: true }

  TokenIntrospected:
    kind: event
    description: /introspect が呼ばれてトークン状態を返した (RFC 7662)。ResourceServer の利用パターン分析に使用。
    payload:
      occurredAt:   { type: Timestamp }
      rsClientId:   { type: String }
      tokenId:      { type: String }
      active:       { type: Boolean }

  RefreshTokenReuseDetected:
    kind: event
    description: Rotated 状態の RefreshToken が再提示された。ファミリー全失効をトリガーする (RFC 9700 §4.14)。
    payload:
      occurredAt:   { type: Timestamp }
      familyId:     { type: String }
      tokenId:      { type: String }
      clientId:     { type: String, optional: true }

  SigningKeyRotated:
    kind: event
    description: JWKS の署名鍵が回転した（90 日ごと、または緊急回転、ADR-009/024）。
    payload:
      occurredAt:   { type: Timestamp }
      newKid:       { type: String }
      previousKid:  { type: String, optional: true }

  PARStored:
    kind: event
    description: /par に届いた authorize パラメータをサーバー側に格納し短命の request_uri を発行した (RFC 9126)。
    payload:
      occurredAt:   { type: Timestamp }
      requestUri:   { type: String }
      clientId:     { type: String }

  DeviceAuthorizationRequested:
    kind: event
    description: "RFC 8628 §3.1 — device_code/user_code を発行した。user_code は監査ログに残さない。"
    payload:
      occurredAt:   { type: Timestamp }
      clientId:     { type: String }
      scopes:       { type: "List<String>" }

  DeviceAuthorizationApproved:
    kind: event
    description: "RFC 8628 §3.3 — ユーザーが承認した。"
    payload:
      occurredAt:   { type: Timestamp }
      clientId:     { type: String }
      sub:          { type: String }

  DeviceAuthorizationDenied:
    kind: event
    description: "RFC 8628 §3.3 — ユーザーが拒否、または user_code 誤り続けた。"
    payload:
      occurredAt:   { type: Timestamp }
      clientId:     { type: String }
      sub:          { type: String, optional: true }


# =================================================================
# 3. interfaces — 外部との契約 (HTTP API)
# =================================================================
#
# OAuth 2.0 / OIDC のエンドポイント契約。OpenAPI はここから生成される。

interfaces:

  RegisterClient:
    description: Dynamic Client Registration (RFC 7591)
    steps:
      - "{client_type} クライアント {client_name} を redirect_uri {redirect_uris} で登録する"
    input:
      request: { type: ClientRegistrationRequest }
    output:
      client: { type: OAuth2Client }
    errors: [InvalidRequestError]
    emits: [ClientRegistered]
    bindings:
      - { kind: http, method: POST, path: /register }

  Authorize:
    description: Authorization endpoint (RFC 6749 §4.1.1)
    steps:
      - "{client_id} として scope {scope} で認可リクエストを送る"
      - "{client_id} として redirect_uri {redirect_uri} で認可リクエストを送る"
      - "{client_id} として prompt {prompt} で認可リクエストを送る"
      - "request_uri {request_uri} で認可リクエストを送る"
    input:
      params: { type: AuthorizeParameters }
    errors: [InvalidRequestError, InvalidClientError, AccessDeniedError]
    emits: [AuthorizationCodeIssued, ConsentGranted]
    bindings:
      - { kind: http, method: GET, path: /authorize, request_form: query, successful_status_codes: ["302"] }

  GetBrowserTransaction:
    description: SPA が HttpOnly transaction cookie に対応するログイン・同意コンテキストを取得する。
    output:
      response: { type: BrowserTransactionResponse }
    errors: [InvalidRequestError]
    read_only: true
    bindings:
      - { kind: http, method: GET, path: /api/auth/transaction }

  SubmitBrowserLogin:
    description: SPA JSON API から browser password login を完了する。
    input:
      request: { type: BrowserLoginRequest }
    output:
      response: { type: BrowserFlowResponse }
    errors: [InvalidRequestError, AccessDeniedError]
    emits: [UserAuthenticated, AuthenticationFailed]
    bindings:
      - { kind: http, method: POST, path: /api/auth/login, request_body: json }

  SubmitBrowserConsent:
    description: SPA JSON API から authorization request の同意・拒否を確定する。
    input:
      request: { type: BrowserConsentRequest }
    output:
      response: { type: BrowserFlowResponse }
    errors: [InvalidRequestError, AccessDeniedError]
    emits: [ConsentGranted, AuthorizationCodeIssued]
    bindings:
      - { kind: http, method: POST, path: /api/auth/consent, request_body: json }

  SubmitBrowserDevice:
    description: SPA JSON API から device user_code を承認または拒否する。
    input:
      request: { type: BrowserDeviceRequest }
    output:
      response: { type: BrowserFlowResponse }
    errors: [InvalidRequestError, AccessDeniedError]
    emits: [DeviceAuthorizationApproved, DeviceAuthorizationDenied]
    bindings:
      - { kind: http, method: POST, path: /api/auth/device, request_body: json }

  SubmitBrowserTotp:
    description: SPA JSON API から TOTP コードを検証する。成功すれば LoginSession を認証完了状態に昇格させ、後続フロー (consent / authorization code 発行) に進む。他 factor は別 endpoint として定義する。
    input:
      request: { type: BrowserTotpRequest }
    output:
      response: { type: BrowserFlowResponse }
    errors: [InvalidRequestError, AccessDeniedError]
    emits: [UserAuthenticated, AuthenticationFailed]
    bindings:
      - { kind: http, method: POST, path: /api/auth/totp, request_body: json }

  GetBrowserDeviceContext:
    description: SPA が device user_code と CSRF token を取得する。
    output:
      response: { type: BrowserDeviceContextResponse }
    read_only: true
    bindings:
      - { kind: http, method: GET, path: /api/auth/device }

  EndSession:
    description: RP-Initiated Logout endpoint (OIDC RP-Initiated Logout 1.0)。redirect 検証は OAuth2/OIDC component が行い、session revocation は Authentication component の SessionManager に委譲する。
    steps:
      - "{client_id} として post_logout_redirect_uri {post_logout_redirect_uri} でログアウトする"
    input:
      params: { type: EndSessionParameters }
    errors: [InvalidRequestError]
    bindings:
      - { kind: http, method: GET, path: /end_session, request_form: query, successful_status_codes: ["200", "302"] }
      - { kind: http, method: POST, path: /end_session, request_form: form, successful_status_codes: ["200", "302"] }

  PushAuthorizationRequest:
    description: Pushed Authorization Request (RFC 9126)
    steps:
      - "{client_id} として認可リクエストを事前送信する"
    input:
      request: { type: ParRequest }
    output:
      response: { type: ParResponse }
    errors: [InvalidRequestError, InvalidClientError]
    emits: [PARStored]
    bindings:
      - { kind: http, method: POST, path: /par, request_form: form }

  Token:
    description: Token endpoint (RFC 6749 §3.2 + 9068 + 9449)
    steps:
      - "認可コード {code} を verifier {code_verifier} で交換する"
      - "リフレッシュトークン {refresh_token} を交換する"
      - "device_code {device_code} を交換する"
      - "client_credentials で scope {scope} のトークンを取得する"
    input:
      request: { type: TokenRequest }
    output:
      response: { type: TokenResponse }
    errors:
      - InvalidRequestError
      - InvalidClientError
      - InvalidGrantError
      - UnsupportedGrantTypeError
      - InvalidScopeError
      - InvalidDpopProofError
      - AuthorizationPendingError
      - SlowDownError
      - AccessDeniedError
      - ExpiredTokenError
    emits:
      - AccessTokenIssued
      - RefreshTokenIssued
      - RefreshTokenRotated
      - RefreshTokenReuseDetected
      - AuthorizationCodeRedeemed
    bindings:
      - kind: http
        method: POST
        path: /token
        request_form: form
        headers:
          dpop: { type: String, optional: true }

  Introspect:
    description: Token Introspection (RFC 7662)
    steps:
      - "トークン {token} を検査する"
    input:
      request: { type: IntrospectionRequest }
    output:
      response: { type: IntrospectionResponse }
    errors: [InvalidClientError, InvalidTokenError]
    emits: [TokenIntrospected]
    bindings:
      - { kind: http, method: POST, path: /introspect, request_form: form }

  Revoke:
    description: Token Revocation (RFC 7009)
    steps:
      - "トークン {token} を失効させる"
    input:
      request: { type: RevokeRequest }
    errors: [InvalidClientError]
    emits: [TokenRevoked]
    bindings:
      - { kind: http, method: POST, path: /revoke, request_form: form, successful_status_codes: ["200"] }

  UserInfo:
    description: UserInfo (OIDC Core §5.3)
    steps:
      - "トークン {access_token} でユーザー情報を取得する"
    output:
      response: { type: UserInfoResponse }
    errors: [InvalidTokenError, InsufficientScopeError]
    bindings:
      - kind: http
        method: GET
        path: /userinfo
        headers:
          authorization: { type: String }

  PostUserInfo:
    description: UserInfo の POST binding (OIDC Core §5.3)
    steps:
      - "トークン {access_token} でユーザー情報を取得する"
    output:
      response: { type: UserInfoResponse }
    errors: [InvalidTokenError, InsufficientScopeError]
    bindings:
      - kind: http
        method: POST
        path: /userinfo
        headers:
          authorization: { type: String }

  DeviceAuthorization:
    description: Device Authorization Request (RFC 8628 §3.1)
    steps:
      - "{client_id} として scope {scope} でデバイス認可を開始する"
    input:
      request: { type: DeviceAuthorizationRequest }
    output:
      response: { type: DeviceAuthorizationResponse }
    errors: [InvalidRequestError, InvalidClientError]
    emits: [DeviceAuthorizationRequested]
    bindings:
      - { kind: http, method: POST, path: /device_authorization, request_form: form }

  GetJwks:
    description: JWKS (RFC 7517)
    steps:
      - "JWKS を取得する"
    output:
      jwks: { type: JWKS }
    read_only: true
    bindings:
      - { kind: http, method: GET, path: /jwks }

  GetOpenidConfiguration:
    description: OIDC Discovery
    steps:
      - "Discovery 文書を取得する"
    output:
      discovery: { type: DiscoveryDocument }
    read_only: true
    bindings:
      - { kind: http, method: GET, path: /.well-known/openid-configuration }

  GetOauthAuthorizationServer:
    description: OAuth 2.0 Authorization Server Metadata (RFC 8414)
    steps:
      - "Authorization Server メタデータを取得する"
    output:
      discovery: { type: DiscoveryDocument }
    read_only: true
    bindings:
      - { kind: http, method: GET, path: /.well-known/oauth-authorization-server }

  Health:
    description: Health check
    read_only: true
    bindings:
      - { kind: http, method: GET, path: /health, successful_status_codes: ["200"] }


# =================================================================
# 4. state_machines — 状態遷移
# =================================================================

state_machines:

  AuthorizationCodeFlow:
    description: /authorize から /token に至る authorization request のライフサイクル。
    target: AuthorizationRequest
    initial: Received
    terminal: [Exchanged, Rejected, Expired]
    transitions:
      - { from: Received,                event: Validate,         to: AuthenticationPending }
      - { from: Received,                event: Reject,           to: Rejected }
      - { from: AuthenticationPending,   event: AuthenticateUser, to: Authenticated }
      - { from: AuthenticationPending,   event: Reject,           to: Rejected }
      - { from: AuthenticationPending,   event: Expire,           to: Expired }
      - { from: Authenticated,           event: RequestConsent,   to: ConsentPending }
      - { from: Authenticated,           event: IssueCode,        to: CodeIssued }
      - { from: Authenticated,           event: Reject,           to: Rejected }
      - { from: ConsentPending,          event: GrantConsent,     to: Consented }
      - { from: ConsentPending,          event: Reject,           to: Rejected }
      - { from: ConsentPending,          event: Expire,           to: Expired }
      - { from: Consented,               event: IssueCode,        to: CodeIssued }
      - { from: Consented,               event: Reject,           to: Rejected }
      - { from: CodeIssued,              event: RedeemCode,       to: Exchanged }
      - { from: CodeIssued,              event: Expire,           to: Expired }

  DeviceCodeFlow:
    description: RFC 8628 デバイス認可グラントのライフサイクル。device_code と user_code がペアで進む。
    target: DeviceAuthorization
    initial: Issued
    terminal: [Exchanged, Denied, Expired]
    transitions:
      - { from: Issued,                  event: EnterUserCode,    to: UserCodeEntered }
      - { from: Issued,                  event: Expire,           to: Expired }
      - { from: UserCodeEntered,         event: Approve,          to: Approved }
      - { from: UserCodeEntered,         event: Deny,             to: Denied }
      - { from: UserCodeEntered,         event: Expire,           to: Expired }
      - { from: AuthorizationPending,    event: Approve,          to: Approved }
      - { from: AuthorizationPending,    event: Deny,             to: Denied }
      - { from: AuthorizationPending,    event: Expire,           to: Expired }
      - { from: Approved,                event: Exchange,         to: Exchanged }
      - { from: Approved,                event: Expire,           to: Expired }
    polling:
      description: "RFC 8628 §3.5 のポーリング動作仕様。"
      default_interval_seconds: 5
      slow_down_increment_seconds: 5
      responses:
        AuthorizationPending: "クライアントは interval 秒待ってから再試行する"
        SlowDown:             "クライアントは interval + 5 秒待ってから再試行する"
        AccessDenied:         "クライアントはポーリングを停止する"
        ExpiredToken:         "クライアントはポーリングを停止する"

  RefreshTokenLifecycle:
    description: RefreshToken のライフサイクル。Rotate で子トークンに引き継がれ、Revoke で失効、Expire で期限切れ。Rotated 後も家族失効により Revoked へ遷移しうる（RFC 9700 §4.14）。
    target: RefreshTokenRecord
    initial: Active
    terminal: [Revoked, Expired]
    transitions:
      - { from: Active,  event: Rotate,      to: Rotated }
      - { from: Active,  event: RevokeToken, to: Revoked }
      - { from: Active,  event: Expire,      to: Expired }
      - { from: Rotated, event: RevokeToken, to: Revoked }
      - { from: Rotated, event: Expire,      to: Expired }

  AuthorizationCodeRecordLifecycle:
    description: 発行された AuthorizationCode 本体のライフサイクル。AuthorizationCodeFlow（AuthorizationRequest 側）の Exchanged に対応するのが Redeemed。
    target: AuthorizationCodeRecord
    initial: Issued
    terminal: [Redeemed, Expired]
    transitions:
      - { from: Issued, event: RedeemCode, to: Redeemed }
      - { from: Issued, event: Expire,     to: Expired }

  ConsentLifecycle:
    description: 同意レコードのライフサイクル。GDPR Art.7(3) により Granted → Revoked が可能。
    target: Consent
    initial: Granted
    terminal: [Revoked, Expired]
    transitions:
      - { from: Granted, event: RevokeConsent, to: Revoked }
      - { from: Granted, event: Expire,        to: Expired }

  PARRecordLifecycle:
    description: PAR で発行された request_uri のライフサイクル。/authorize から一度だけ参照可能（RFC 9126）。
    target: PARRecord
    initial: Stored
    terminal: [Used, Expired]
    transitions:
      - { from: Stored, event: Use,    to: Used }
      - { from: Stored, event: Expire, to: Expired }

  SigningKeyLifecycle:
    description: 署名鍵のライフサイクル（ADR-009 / SigningKeyMinJwksOverlap）。Active から Rotate で Verifying に降り、Retire で JWKS から外し、Archive で監査保管に入る。
    target: SigningKey
    initial: Active
    terminal: [Archived]
    transitions:
      - { from: Active,    event: Rotate,  to: Verifying }
      - { from: Verifying, event: Retire,  to: Retired }
      - { from: Retired,   event: Archive, to: Archived }


# =================================================================
# 5. properties — 不変条件
# =================================================================

properties:

  # ---------- セキュリティ法則 ----------
  PkceRoundTrip:
    description: |
      任意の verifier in [A-Za-z0-9._~-]{43,128} に対して、
      challenge = base64url(SHA256(verifier)) としたとき、verifyPkce(verifier, challenge, S256) は true。
      反例: PKCE が壊れている。認可コード横取り攻撃の防御がない。
    always: "verifyPkce(verifier, base64url(sha256(verifier)), S256) == true"

  AuthCodeStateSafety:
    description: 任意のイベント列を AuthorizationCodeFlow に逐次適用しても、状態は宣言された値の部分集合に留まる。
    target: AuthorizationRequest
    always:
      in: [state, AuthorizationCodeState.values]

  DeviceCodeStateSafety:
    description: 任意のイベント列を DeviceCodeFlow に逐次適用しても、状態は宣言された値の部分集合に留まる。
    target: DeviceAuthorization
    always:
      in: [state, DeviceCodeState.values]

  RefreshFamilyTransitiveRevoke:
    description: |
      RevokeFamily(f) 後、family_id == f のすべての RefreshToken の state が Revoked になる。
      反例: ファミリー失効の取りこぼし。RFC 9700 §4.14 違反。
    target: RefreshTokenRecord
    assuming: "event == RevokeFamily"
    eventually:
      forall:
        in: RefreshTokenRecords
        satisfies: "x.family_id != event.family_id or x.state == Revoked"
    within: 1s

  RefreshRotationParentInvariants:
    description: |
      親 p を rotate(p, child) した直後の不変条件。
      反例: absolute TTL が延長され、攻撃者が refresh chain を無限延長可能になる。
    target: RefreshTokenRecord
    assuming: "event == RotateRefreshToken"
    always:
      and:
        - "next.parent.state == Rotated"
        - "next.child.parent_id == prev.parent.id"
        - "next.child.family_id == prev.parent.family_id"
        - "next.child.absolute_expires_at == prev.parent.absolute_expires_at"

  DpopJtiUniquenessWithinWindow:
    description: |
      window 秒以内に同一 jti を含む DPoP proof は受理されない。
      反例: DPoP リプレイ攻撃の成功。RFC 9449 違反。
    assuming: "event == AcceptDpopProof"
    never:
      exists:
        in: SeenJtis
        satisfies: "x.jti == event.jti and (event.at - x.seen_at) <= window"

  TokenHashOneWay:
    description: |
      RefreshTokenRecord にはハッシュのみが保存され、平文が残らない。
      反例: トークン平文漏洩、horizontal escalation の可能性。
    target: RefreshTokenRecord
    always:
      and:
        - { exists: hash }
        - { not_exists: plaintext }

  # ---------- 単一使用 ----------
  AuthorizationCodeSingleUse:
    description: 発行された AuthorizationCode は最大1回だけ Redeemed に到達する。再使用は InvalidGrant。
    target: AuthorizationCodeRecord
    assuming: "event == RedeemCode"
    never: "prev.state != Issued"

  ParRequestUriSingleUse:
    description: PAR で発行された request_uri は使用直後に無効化される。
    target: PARRecord
    assuming: "event == Use"
    never: "prev.state != Stored"

  # ---------- TTL / 寿命 ----------
  AuthorizationCodeTtl:
    description: AuthorizationCode の TTL は最大 60 秒（RFC 9700 §4.10）。
    target: AuthorizationCodeRecord
    always: "expires_at - issued_at <= 60s"

  AuthorizationCodeEventuallyResolves:
    description: 発行された AuthorizationCode は必ず Redeemed または Expired に到達する。
    target: AuthorizationCodeRecord
    eventually: { in: [state, [Redeemed, Expired]] }
    within: 60s

  DeviceCodeEventuallyResolves:
    description: 発行された DeviceCode は必ず Exchanged / Denied / Expired のいずれかに到達する。
    target: DeviceAuthorization
    eventually: { in: [state, [Exchanged, Denied, Expired]] }
    within: 15m   # RFC 8628 の代表的なデフォルト expires_in

  RefreshTokenAbsoluteTtl:
    description: RefreshToken の絶対 TTL は通常 TTL 以上（ローテーション越境不可、ADR-004）。
    target: RefreshTokenRecord
    always: "absolute_expires_at >= expires_at"

  # ---------- 署名鍵運用 ----------
  SigningKeyMaxAge:
    description: 有効な署名鍵は 90 日を超えない間隔で回転する（ADR-009）。
    target: SigningKey
    eventually: "event == SigningKeyRotated"
    within: 90d
    assuming: "state == Active"

  # ---------- redirect_uri 厳密一致 ----------
  RedirectUriExactMatch:
    description: 認可リクエストの redirect_uri は登録 URI のいずれかと完全文字列一致しなければならない（RFC 9700 §4.1.3）。
    assuming: "event == ValidateAuthorizeRequest"
    always:
      exists:
        in: client.redirect_uris
        satisfies: "x == request.redirect_uri"

  # ---------- PKCE 必須 ----------
  PkceMandatory:
    description: 認可コードフローのすべての要求に対して code_challenge を必須とする（例外なし、ADR-002）。
    assuming: "event == ValidateAuthorizeRequest"
    always: "exists(request.code_challenge) and request.code_challenge_method == S256"

  AccessTokenIssuedOnlyAfterConsent:
    description: AccessToken は、対応する Subject × Client × Scope の Consent が Granted の場合のみ発行される。
    assuming: "event == AccessTokenIssued"
    always:
      exists:
        in: Consents
        satisfies: |
          x.subject == event.subject
          and x.client_id == event.client_id
          and x.state == Granted
          and forall: { in: event.scope, satisfies: "x in x.scopes" }

  AllAccessTokensCarryAudience:
    description: 発行されたすべての AccessToken は非空の audience を持つ（RFC 8707 / RFC 9068）。
    target: AccessToken
    always: "exists(audience) and len(audience) >= 1"

  # ---------- クライアント認証エラー一様化 ----------
  ClientAuthFailureUniformity:
    description: クライアント認証失敗時、client_id の存在有無を開示しない（タイミング差・エラーメッセージ差を出さない）。
    assuming: "event == ClientAuthenticationFailed"
    always:
      and:
        - "error == InvalidClient"
        - "len(error_description) == len(error_description_constant)"  # メッセージは固定文字列


# =================================================================
# 6. scenarios — Given-When-Then の具体例
# =================================================================

scenarios:

  認可コードフローでアクセストークンと ID トークンを取得できる:
    description: 認可リクエスト→認可コード交換と進み、PKCE 検証を経てトークン一式を得る。
    steps:
      - confidential クライアント "web-app" を redirect_uri "https://app.example.com/callback" で登録する
      - ユーザー "alice" が "web-app" に scope "openid profile" を同意済みである
      - '"web-app" として scope "openid profile" で認可リクエストを送る'
      - 発行された認可コードを正しい PKCE verifier で交換する
      - 応答に access_token・id_token・refresh_token が含まれ token_type は Bearer
      - '"UserAuthenticated" が発行される'
      - '"AuthorizationCodeIssued" が発行される'
      - '"AuthorizationCodeRedeemed" が発行される'
      - '"AccessTokenIssued" が発行される'
      - '"RefreshTokenIssued" が発行される'

  PKCE verifier が不一致なら拒否される:
    description: 400 invalid_grant で拒否される。
    steps:
      - 認可コードを誤った code_verifier で交換する
      - 'エラー "InvalidGrantError"'

  認可コードを 2 回交換するとトークンファミリーが全失効する:
    steps:
      - 発行済み認可コード "AC1"（family_id "F1"）を用意する
      - 認可コード "AC1" を verifier "v" で交換する
      - 認可コード "AC1" を verifier "v" で交換する
      - 1 回目の応答には access_token が含まれる
      - '2 回目はエラー "InvalidGrantError"'
      - family_id "F1" のトークンがすべて失効する
      - '"RefreshTokenReuseDetected" が発行される'
      - '"TokenRevoked" が発行される'

  リフレッシュトークンを使うと新トークンが返り旧トークンは無効化される:
    steps:
      - 有効な refresh token "RT1" を用意する
      - リフレッシュトークン "RT1" を交換する
      - 応答に新しい access_token と refresh_token が含まれる
      - '"RT1" の状態は "Rotated"'
      - '"RefreshTokenRotated" が発行される'
      - '"AccessTokenIssued" が発行される'
      - '"RefreshTokenIssued" が発行される'

  旧リフレッシュトークンの再使用はファミリー全体を失効させる:
    steps:
      - 有効な refresh token "RT1"（family_id "F1"）を用意する
      - リフレッシュトークン "RT1" を交換する
      - リフレッシュトークン "RT1" を交換する
      - ローテーションの応答には access_token と refresh_token が含まれる
      - '再使用はエラー "InvalidGrantError"'
      - '"RT1" の状態は "Revoked"'
      - family_id "F1" のトークンがすべて失効する
      - '"RefreshTokenRotated" が発行される'
      - '"RefreshTokenReuseDetected" が発行される'
      - '"TokenRevoked" が発行される'

  不正な client_secret は invalid_client で拒否される:
    description: client_id の存在有無は開示しない。
    steps:
      - 既知のクライアントを誤った client_secret で認可コードを交換する
      - 'エラー "InvalidClientError"'

  未知の client_id も一律 invalid_client で拒否される:
    description: タイミング差が出ないよう一律に拒否する。
    steps:
      - 未知の client_id で認可コードを交換する
      - 'エラー "InvalidClientError"'

  未登録の redirect_uri へはリダイレクトしない:
    steps:
      - '"web-app" として redirect_uri "https://evil.example/cb" で認可リクエストを送る'
      - 'エラー "InvalidRequestError"'
      - リダイレクトは行われず IdP がエラーページを表示する

  既存の同意があれば同意画面はスキップされる:
    steps:
      - ユーザー "alice" が "web-app" に scope "openid profile" を同意済みである
      - '"web-app" として scope "openid profile" で認可リクエストを送る'
      - 認可リクエストの状態は Consented
      - 同意 UI は表示されない

  prompt=consent は既存同意があっても再同意を求める:
    steps:
      - ユーザー "alice" が "web-app" に scope "openid profile" を同意済みである
      - '"web-app" として prompt "consent" で認可リクエストを送る'
      - 認可リクエストの状態は ConsentPending

  PAR 経由の request_uri は一度だけ参照できる:
    description: RFC 9126。使用直後に無効化される。
    steps:
      - クライアント "web-app" を用意する
      - '"web-app" として認可リクエストを事前送信する'
      - 'request_uri "<返された値>" で認可リクエストを送る'
      - PAR 応答に request_uri が含まれ expires_in は 600 以下
      - その PAR レコードの状態は "Used"
      - '"PARStored" が発行される'
      - '"AuthorizationCodeIssued" が発行される'

  FAPI クライアントは PAR なしの直接認可リクエストを拒否される:
    steps:
      - PAR 必須の FAPI クライアント "fapi-app" を用意する
      - '"fapi-app" として scope "openid" で認可リクエストを送る'
      - 'エラー "InvalidRequestError"'

  DPoP 証明付き要求はセンダー制約付きトークンを発行する:
    steps:
      - 有効な DPoP 証明を付けて認可コードを交換する
      - 発行された access token は DPoP 鍵サムプリントに cnf でバインドされる
      - 発行された refresh token のセンダー制約は Dpop

  iat が 60 秒以上古い DPoP 証明は拒否される:
    description: RFC 9449。
    steps:
      - iat "2026-01-01T00:00:00Z" の DPoP 証明を用意する
      - 時刻が "2026-01-01T00:01:30Z" になる
      - その DPoP 証明を付けて認可コードを交換する
      - 'エラー "InvalidDpopProofError"'

  同一 DPoP jti の再使用はリプレイとして拒否される:
    steps:
      - jti "ABC" の DPoP 証明を用意する
      - その証明を付けて認可コードを交換する
      - 同じ jti "ABC" の DPoP 証明を付けて認可コードを交換する
      - 1 回目の応答には access_token が含まれる
      - '2 回目はエラー "InvalidDpopProofError"'

  有効なトークンの introspection は active=true を返す:
    steps:
      - 有効な access token "AT1" を用意する
      - 認証済み ResourceServer としてトークン "AT1" を検査する
      - 応答は active=true で scope・client_id・sub・exp・iat を含む

  失効済みトークンの introspection は active=false のみ返す:
    steps:
      - 失効済み access token "AT1" を用意する
      - トークン "AT1" を検査する
      - 応答は active=false のみで他のフィールドを含まない

  openid スコープ付きトークンでユーザー情報は sub を返す:
    steps:
      - scope "openid profile" の access token "AT1" を用意する
      - トークン "AT1" でユーザー情報を取得する
      - 応答に sub・name・preferred_username が含まれる

  openid スコープのないトークンのユーザー情報取得は拒否される:
    description: 403 insufficient_scope。
    steps:
      - scope "profile" のみの access token "AT1" を用意する
      - トークン "AT1" でユーザー情報を取得する
      - 'エラー "InsufficientScopeError"'

  Discovery 文書は宣言された全エンドポイントを広告する:
    steps:
      - Discovery 文書を取得する
      - 応答に issuer・authorization_endpoint・token_endpoint・userinfo_endpoint・jwks_uri・introspection_endpoint・revocation_endpoint・pushed_authorization_request_endpoint・device_authorization_endpoint・registration_endpoint が含まれる

  鍵回転後も旧 kid の JWKS エントリは保持される:
    steps:
      - kid "kid-old" を "kid-new" に回転した署名鍵を用意する
      - JWKS を取得する
      - 応答に kid "kid-old" と "kid-new" の両方が含まれる

  認可コードの並行交換はちょうど一方だけ成功する:
    description: |
      互いに観測しない並行呼び出しのうち一方のみ成功し、
      成功側のファミリーも再使用検出により最終的に全失効する。
    tags: [concurrency]
    steps:
      - 発行済み認可コード "AC1"（family_id "F1"）を用意する
      - 認可コード "AC1" を verifier "v" で並行に 2 回交換する
      - 'ちょうど一方が成功し、もう一方はエラー "InvalidGrantError"'
      - family_id "F1" のトークンがすべて失効する
      - '"AuthorizationCodeRedeemed" が発行される'
      - '"RefreshTokenReuseDetected" が発行される'
      - '"TokenRevoked" が発行される'

  # ---------- 動的クライアント登録 ----------
  動的クライアント登録は client_id を採番して返す:
    description: RFC 7591 §3.2.1 — 成功応答は client_id と client_metadata を返す。
    steps:
      - confidential クライアント "web-app" を redirect_uri "https://app.example.com/callback" で登録する
      - 応答に client_id と client_secret が含まれる
      - '"ClientRegistered" が発行される'

  redirect_uri が無いクライアント登録は拒否される:
    steps:
      - confidential クライアント "web-app" を redirect_uri "" で登録する
      - 'エラー "InvalidRequestError"'

  # ---------- TTL 越え ----------
  60 秒経過した認可コードの交換は拒否される:
    description: RFC 9700 §4.10 — TTL 60 秒を超えると invalid_grant。
    steps:
      - issued_at "2026-01-01T00:00:00Z" の認可コード "AC1" を用意する
      - 時刻が "2026-01-01T00:01:30Z" になる
      - 認可コード "AC1" を verifier "v" で交換する
      - 'エラー "InvalidGrantError"'
      - '"AC1" の状態は "Expired"'

  absolute_expires_at を超えた refresh token はローテーション不可:
    description: ADR-004 — ローテーションで延長されない絶対 TTL。
    steps:
      - absolute_expires_at "2026-01-01T00:00:00Z" の refresh token "RT1" を用意する
      - 時刻が "2026-01-02T00:00:00Z" になる
      - リフレッシュトークン "RT1" を交換する
      - 'エラー "InvalidGrantError"'

  # ---------- /revoke ----------
  /revoke でリフレッシュトークンを失効できる:
    steps:
      - 有効な refresh token "RT1" を用意する
      - トークン "RT1" を失効させる
      - '"RT1" の状態は "Revoked"'
      - '"TokenRevoked" が発行される'

  他クライアントの所有トークンの失効要求は静かに無視される:
    description: RFC 7009 §2.2 — 所有者でないクライアントからの失効要求は 200 OK のみ返し、実際の失効は行わない（盗難検知防止）。
    steps:
      - クライアント "client-A" が所有する refresh token "RT1" を用意する
      - '"client-B" としてトークン "RT1" を失効させる'
      - '"RT1" の状態は "Active"'

  失効した access_token でユーザー情報取得は invalid_token で拒否される:
    steps:
      - 有効な access token "AT1" を用意する
      - トークン "AT1" を失効させる
      - トークン "AT1" でユーザー情報を取得する
      - 'エラー "InvalidTokenError"'

  # ---------- offline_access / nonce ----------
  offline_access スコープがあれば refresh_token も発行される:
    description: OIDC Core §11 — refresh_token は offline_access 付与時のみ。
    steps:
      - confidential クライアント "web-app" を grant_types に "authorization_code"・"refresh_token" 含めて登録する
      - '"web-app" として scope "openid offline_access" で認可リクエストを送る'
      - 発行された認可コードを verifier "v" で交換する
      - 応答に refresh_token が含まれる
      - '"RefreshTokenIssued" が発行される'

  offline_access が無いと refresh_token は発行されない:
    steps:
      - '"web-app" として scope "openid profile" で認可リクエストを送る'
      - 発行された認可コードを verifier "v" で交換する
      - 応答に refresh_token は含まれない

  認可リクエストの nonce は ID トークンに伝播する:
    description: OIDC Core §3.1.2.1 — リプレイ防止のため nonce は id_token に必須で含む。
    steps:
      - '"web-app" として scope "openid"、nonce "n-12345" で認可リクエストを送る'
      - 発行された認可コードを verifier "v" で交換する
      - 応答の id_token の nonce クレームは "n-12345"

  # ---------- max_age / prompt ----------
  max_age を超えた前回認証では再認証を要求する:
    description: OIDC Core §3.1.2.1 — auth_time が max_age 秒以上前なら再認証必須。
    steps:
      - ユーザー "alice" が auth_time "2026-01-01T00:00:00Z" で認証済みである
      - 時刻が "2026-01-01T02:00:00Z" になる
      - '"web-app" として max_age "60" で認可リクエストを送る'
      - 認可リクエストの状態は AuthenticationPending

  prompt=none でセッションが無い場合は拒否される:
    description: OIDC Core §3.1.2.1 — 対話なし要求に対しセッションが無ければ access_denied。
    steps:
      - 未認証セッションで '"web-app" として prompt "none" で認可リクエストを送る'
      - 'エラー "AccessDeniedError"'

  パスワードログイン後はセッション Cookie で認可を継続できる:
    description: ユーザー名・パスワード認証に成功すると HttpOnly セッション Cookie を発行し、同じ認可リクエストを継続する。
    steps:
      - 未認証セッションで '"web-app" として認可リクエストを送る'
      - browser login API に username "alice" と正しい password を送信する
      - セッション Cookie が発行される
      - 認可コードが redirect_uri に返る
      - '"UserAuthenticated" が発行される'

  browser login API の CSRF 不一致は拒否される:
    description: SameSite cookie と request token が一致しない browser login API は invalid_request。
    steps:
      - 未認証セッションで '"web-app" として認可リクエストを送る'
      - csrf 値を改ざんして browser login API を送信する
      - 'エラー "InvalidRequestError"'

  prompt=login は既存セッションがあっても再認証を要求する:
    description: OIDC Core §3.1.2.1 — prompt=login は既存セッションの再利用を禁止する。
    steps:
      - ユーザー "alice" が現在時刻で認証済みである
      - '"web-app" として prompt "login" で認可リクエストを送る'
      - 認可リクエストの状態は AuthenticationPending

  RP-Initiated Logout は登録済み post_logout_redirect_uri にだけリダイレクトする:
    description: OIDC RP-Initiated Logout 1.0 — logout 後の redirect URI はクライアント登録済み URI に限定する。
    steps:
      - confidential クライアント "web-app" を redirect_uri "https://app.example.com/cb" で登録する
      - '"web-app" として post_logout_redirect_uri "https://app.example.com/cb" でログアウトする'
      - state が post_logout_redirect_uri に伝播する

  未登録 post_logout_redirect_uri は拒否される:
    description: open redirect を避けるため、logout redirect も登録済み URI のみ許可する。
    steps:
      - confidential クライアント "web-app" を redirect_uri "https://app.example.com/cb" で登録する
      - '"web-app" として post_logout_redirect_uri "https://evil.example.com/cb" でログアウトする'
      - 'エラー "InvalidRequestError"'

  # ---------- client_credentials ----------
  client_credentials グラントで M2M トークンが発行される:
    description: RFC 6749 §4.4 — confidential クライアント自身のリソースアクセス。
    steps:
      - confidential クライアント "backend" を grant_types に "client_credentials" 含めて登録する
      - '"backend" として client_credentials で scope "api:read" のトークンを取得する'
      - 応答に access_token が含まれ refresh_token は含まれない
      - 発行された access_token の sub は client_id と一致する
      - '"AccessTokenIssued" が発行される'

  public クライアントは client_credentials を登録できない:
    description: client_credentials は confidential 限定（TokenGrantClientCredentials 認可ルール）。
    steps:
      - public クライアント "spa-app" を grant_types に "client_credentials" 含めて登録する
      - 'エラー "InvalidRequestError"'

  # ---------- device_code ----------
  デバイス認可フローでアクセストークンを取得できる:
    description: RFC 8628 §3 — TV 等の入力制約デバイス向けの完全な正常系。
    steps:
      - confidential クライアント "tv-app" を grant_types に "urn:ietf:params:oauth:grant-type:device_code" 含めて登録する
      - '"tv-app" として scope "openid profile" でデバイス認可を開始する'
      - 応答に device_code・user_code・verification_uri・interval が含まれる
      - ユーザー "alice" が verification_uri で user_code を入力し承認する
      - device_code "DC1" を交換する
      - 応答に access_token と id_token が含まれる
      - '"DeviceAuthorizationRequested" が発行される'
      - '"DeviceAuthorizationApproved" が発行される'
      - '"AccessTokenIssued" が発行される'

  承認前のデバイス交換は authorization_pending を返す:
    description: RFC 8628 §3.5 — ユーザー承認前のポーリングは authorization_pending。
    steps:
      - AuthorizationPending 状態の device_code "DC1" を用意する
      - device_code "DC1" を交換する
      - 'エラー "AuthorizationPendingError"'

  ポーリング間隔より短い再試行は slow_down を返す:
    description: RFC 8628 §3.5 — interval 秒未満での再試行は slow_down で interval+5 秒に増やす。
    steps:
      - interval 5 秒の device_code "DC1" を AuthorizationPending 状態で用意する
      - device_code "DC1" を交換する
      - '"2s" 経過する'
      - device_code "DC1" を交換する
      - '2 回目はエラー "SlowDownError"'

  期限切れの device_code は expired_token を返す:
    description: RFC 8628 §3.5 — expires_in を超えた device_code 交換は expired_token。
    steps:
      - issued_at "2026-01-01T00:00:00Z"・expires_at "2026-01-01T00:10:00Z" の device_code "DC1" を用意する
      - 時刻が "2026-01-01T00:11:00Z" になる
      - device_code "DC1" を交換する
      - 'エラー "ExpiredTokenError"'

  # ---------- private_key_jwt / tls_client_auth ----------
  private_key_jwt によるクライアント認証が成功する:
    description: RFC 7523 §2.2 — client_assertion の署名 JWT で認証成立。
    steps:
      - confidential クライアント "fapi-app" を token_endpoint_auth_method "private_key_jwt"・jwks 登録で用意する
      - 認可コード "AC1" を verifier "v"・有効な client_assertion で交換する
      - 応答に access_token が含まれる

  改ざんされた client_assertion は invalid_client で拒否される:
    steps:
      - confidential クライアント "fapi-app" を token_endpoint_auth_method "private_key_jwt"・jwks 登録で用意する
      - 認可コード "AC1" を verifier "v"・改ざんされた client_assertion で交換する
      - 'エラー "InvalidClientError"'

  tls_client_auth で mTLS の Subject DN が一致すれば認証成立:
    description: RFC 8705 §2.1.1。
    steps:
      - confidential クライアント "mtls-app" を token_endpoint_auth_method "tls_client_auth"・tls_client_auth_subject_dn "CN=mtls-app" で用意する
      - 認可コード "AC1" を verifier "v"・mTLS Subject DN "CN=mtls-app" で交換する
      - 応答に access_token が含まれる

  mTLS バインド AT は同じ証明書のリクエストでのみ受理される:
    description: RFC 8705 §3。cnf.x5t#S256 が AT に埋め込まれ、resource access では同一証明書の thumbprint 一致を要求する。
    steps:
      - confidential クライアント "mtls-app" を token_endpoint_auth_method "tls_client_auth" で用意する
      - mTLS 証明書バインドされた access_token を発行する
      - 同じ証明書を提示して userinfo を取得すると 200 を返す
      - 別の証明書を提示すると invalid_token で拒否される

  # ---------- メタデータ ----------
  RFC 8414 メタデータ文書は OIDC Discovery と同等の内容を返す:
    description: 同一のメタデータを別パスでも取得できる。
    steps:
      - Authorization Server メタデータを取得する
      - 応答に issuer・authorization_endpoint・token_endpoint・jwks_uri・grant_types_supported が含まれる


# =================================================================
# 7. permissions — 認可ルール
# =================================================================
#
# 「誰（Client/User）がどの操作を行えるか」を AuthZEN スタイルで宣言する。
# 評価アダプターは下流（adapters/policy/）で生成される。

permissions:

  TokenGrantAuthorizationCode:
    description: 認可コード交換による access_token / id_token / refresh_token 発行
    actor: Client
    action: TokenGrantAuthorizationCode
    resource: AuthorizationCodeRecord
    allow_when:
      and:
        - "AuthorizationCode in actor.grant_types"
        - "sha256(context.code_verifier) == resource.code_challenge"
        - "context.redirect_uri == resource.redirect_uri"
        - "resource.state == Issued"
        - "now() < resource.expires_at"

  TokenGrantRefresh:
    description: リフレッシュトークンによる再発行
    actor: Client
    action: TokenGrantRefresh
    resource: RefreshTokenRecord
    allow_when:
      and:
        - "RefreshToken in actor.grant_types"
        - "resource.state == Active"
        - "now() < resource.absolute_expires_at"
        - "sender_constraint_satisfied(resource, context)"

  TokenGrantClientCredentials:
    description: クライアント自己認可フロー
    actor: Client
    action: TokenGrantClientCredentials
    resource: AccessTokenClaims
    allow_when:
      and:
        - "actor.client_type == Confidential"
        - "ClientCredentials in actor.grant_types"

  TokenGrantDeviceCode:
    description: デバイスコードフロー
    actor: Client
    action: TokenGrantDeviceCode
    resource: DeviceAuthorization
    allow_when:
      and:
        - "resource.state == Approved"
        - "now() < resource.expires_at"

  TokenIntrospect:
    description: /introspect の呼び出し
    actor: Client
    action: TokenIntrospect
    resource: AccessTokenClaims
    allow_when: "actor.type == Client and context.authenticated == true"

  TokenRevoke:
    description: /revoke の呼び出し
    actor: Client
    action: TokenRevoke
    resource: AccessTokenClaims
    allow_when: "actor.client_id == resource.client_id"

  UserInfoRead:
    description: /userinfo の呼び出し
    actor: Client
    action: UserInfoRead
    resource: User
    allow_when:
      and:
        - "openid in context.token_scopes"
        - "context.token_active == true"

  AuthorizeInitiate:
    description: /authorize でフローを開始する
    actor: Client
    action: AuthorizeInitiate
    resource: AuthorizationRequest
    allow_when:
      and:
        - "actor.registered == true"
        - "context.redirect_uri in actor.redirect_uris"
        - "subset(context.requested_scopes, actor.scopes)"
        - "(actor.require_pkce == false) or (context.code_challenge != null)"
        - "(actor.require_pushed_authorization_requests == false) or (context.par_used == true)"


# =================================================================
# 8. objectives — 非機能目標
# =================================================================

objectives:

  # ---------- 性能 SLO ----------
  AuthorizeLatency:
    kind: slo
    description: /authorize の p99 レイテンシ目標。ブラウザリダイレクトを介す対話的フローのため、人間が体感する遅延の上限を 500ms に置く。
    metric: latency_p99
    interface: Authorize
    target: "<500ms"
    window: 30d
  ParLatency:
    kind: slo
    description: /par の p99 レイテンシ目標。FAPI クライアントが /authorize 前段で同期的に呼ぶため、追加遅延を最小化する。
    metric: latency_p99
    interface: PushAuthorizationRequest
    target: "<200ms"
    window: 30d
  TokenLatency:
    kind: slo
    description: /token の p99 レイテンシ目標。トークン交換は機械対機械の同期処理が多いため、300ms 以内に抑える。
    metric: latency_p99
    interface: Token
    target: "<300ms"
    window: 30d
  IntrospectLatency:
    kind: slo
    description: /introspect の p99 レイテンシ目標。ResourceServer が API リクエストごとにインライン検証するため、最も厳しい 50ms を要求する。
    metric: latency_p99
    interface: Introspect
    target: "<50ms"
    window: 30d
  RevokeLatency:
    kind: slo
    description: /revoke の p99 レイテンシ目標。失効処理は遅延すると侵害時の影響範囲が広がるため 100ms に抑える。
    metric: latency_p99
    interface: Revoke
    target: "<100ms"
    window: 30d
  UserInfoLatency:
    kind: slo
    description: /userinfo の p99 レイテンシ目標。ResourceServer 経由ではなくクライアントが直接呼ぶことが多いため 100ms 以内。
    metric: latency_p99
    interface: UserInfo
    target: "<100ms"
    window: 30d
  JwksLatency:
    kind: slo
    description: /jwks の p99 レイテンシ目標。クライアントの署名検証準備のため極めて低レイテンシ（20ms）を要求し、CDN キャッシュも前提とする。
    metric: latency_p99
    interface: GetJwks
    target: "<20ms"
    window: 30d
  DiscoveryLatency:
    kind: slo
    description: /.well-known/openid-configuration の p99 レイテンシ目標。クライアント起動時の自動検出に使われるため CDN キャッシュ前提で 20ms。
    metric: latency_p99
    interface: GetOpenidConfiguration
    target: "<20ms"
    window: 30d
  RegisterLatency:
    kind: slo
    description: /register の p99 レイテンシ目標。Dynamic Client Registration (RFC 7591) はレアパスなので Authorize と同水準で良い。
    metric: latency_p99
    interface: RegisterClient
    target: "<500ms"
    window: 30d
  DeviceAuthorizationLatency:
    kind: slo
    description: /device_authorization の p99 レイテンシ目標 (RFC 8628 §3.1)。デバイス起動直後のユーザー体験のため Token と同等。
    metric: latency_p99
    interface: DeviceAuthorization
    target: "<300ms"
    window: 30d

  # ---------- エラー率 SLO ----------
  AuthorizeErrorRate:
    kind: slo
    description: /authorize の 5xx 比率上限。0.1% を超えるとクライアントのフロー全体が失敗するため対話的経路の許容下限。
    metric: error_rate
    interface: Authorize
    target: "<0.001"
    window: 30d
  ParErrorRate:
    kind: slo
    description: /par の 5xx 比率上限。FAPI クライアントの /authorize 前段なので、失敗は即座にフロー全停止につながる。
    metric: error_rate
    interface: PushAuthorizationRequest
    target: "<0.001"
    window: 30d
  TokenErrorRate:
    kind: slo
    description: /token の 5xx 比率上限。トークン交換失敗はアプリログイン全停止に等価のため 0.1% を上限とする。
    metric: error_rate
    interface: Token
    target: "<0.001"
    window: 30d
  IntrospectErrorRate:
    kind: slo
    description: /introspect の 5xx 比率上限。ResourceServer のリクエスト毎に呼ばれるため、Token より一桁厳しい 0.01% を要求。
    metric: error_rate
    interface: Introspect
    target: "<0.0001"
    window: 30d
  RevokeErrorRate:
    kind: slo
    description: /revoke の 5xx 比率上限。失効処理の信頼性は侵害時のリスク許容に直結するため 0.1% を死守する。
    metric: error_rate
    interface: Revoke
    target: "<0.001"
    window: 30d
  UserInfoErrorRate:
    kind: slo
    description: /userinfo の 5xx 比率上限。クライアントの「ログイン後ユーザー表示」失敗を防ぐため 0.1% に置く。
    metric: error_rate
    interface: UserInfo
    target: "<0.001"
    window: 30d
  JwksErrorRate:
    kind: slo
    description: /jwks の 5xx 比率上限。全てのクライアントの署名検証経路に影響するため一桁厳しい 0.01% を要求。
    metric: error_rate
    interface: GetJwks
    target: "<0.0001"
    window: 30d
  DiscoveryErrorRate:
    kind: slo
    description: /.well-known/* の 5xx 比率上限。クライアント自動構成の起点なので、JWKS と同水準の 0.01% を要求。
    metric: error_rate
    interface: GetOpenidConfiguration
    target: "<0.0001"
    window: 30d
  RegisterErrorRate:
    kind: slo
    description: /register の 5xx 比率上限。利用頻度は低いが新規クライアント登録の信頼性のため 0.1% に抑える。
    metric: error_rate
    interface: RegisterClient
    target: "<0.001"
    window: 30d
  DeviceAuthorizationErrorRate:
    kind: slo
    description: /device_authorization の 5xx 比率上限。デバイスログイン体験の入口なので 0.1% を下限とする。
    metric: error_rate
    interface: DeviceAuthorization
    target: "<0.001"
    window: 30d

  # ---------- 可用性 SLO ----------
  TokenEndpointAvailability:
    kind: slo
    description: /token の月次可用性目標。FAPI 2.0 §6.2 が AS に要求する水準（99.95%）に整合させる。
    metric: availability
    interface: Token
    target: ">=99.95%"
    window: 30d
  OverallAvailability:
    kind: slo
    description: サービス全体の月次可用性目標。エンドポイントを跨いだ統合 SLO（個別 SLO よりやや緩めの 99.9%）。
    metric: availability
    target: ">=99.9%"
    window: 30d

  # ---------- スケール目標 ----------
  TokenThroughput:
    kind: slo
    description: /token のピーク処理能力目標。ログイン集中時間帯にトークン発行が詰まらない水平スケール容量。
    metric: throughput
    interface: Token
    target: ">=5000rps"
  AuthorizeThroughput:
    kind: slo
    description: /authorize のピーク処理能力目標。対話的フローの並列セッション数に応じて要求される。
    metric: throughput
    interface: Authorize
    target: ">=1000rps"
  IntrospectThroughput:
    kind: slo
    description: /introspect のピーク処理能力目標。ResourceServer 毎リクエスト検証の母数を捌くため、最大ボリュームを想定。
    metric: throughput
    interface: Introspect
    target: ">=20000rps"

  # ---------- トークンライフタイム ----------
  AuthorizationCodeLifetime:           { kind: lifetime, target: AuthorizationCodeRecord, ttl: 60s,      single_use: true,  reference: "RFC 9700 §4.10" }
  ParRequestUriLifetime:               { kind: lifetime, target: PARRecord,               ttl: 600s,     single_use: true,  reference: "RFC 9126" }
  AccessTokenLifetime:                 { kind: lifetime, target: AccessTokenClaims,       ttl: 600s,     reference: "ADR-002" }
  IdTokenLifetime:                     { kind: lifetime, target: IdTokenClaims,           ttl: 3600s }
  RefreshTokenLifetime:                { kind: lifetime, target: RefreshTokenRecord,      ttl: 14d }
  RefreshTokenAbsoluteLifetime:        { kind: lifetime, target: RefreshTokenRecord,      ttl: 30d,      reference: "ADR-004", description: ローテーション越境不可 }
  DeviceCodeLifetime:                  { kind: lifetime, target: DeviceAuthorization,     ttl: 600s }
  UserCodeLifetime:                    { kind: lifetime, target: DeviceAuthorization,     ttl: 600s }
  DeviceCodePollingDefaultInterval:    { kind: lifetime, target: DeviceAuthorization,     ttl: 5s,       description: 既定ポーリング間隔 }

  # ---------- セキュリティ運用 ----------
  SigningKeyMaxAge:                            { kind: security, policy: max_age, target: SigningKey, value: 90d,  reference: "ADR-009" }
  SigningKeyMinJwksOverlap:                    { kind: security, policy: min_jwks_overlap, value: 7d }
  ClientAuthFailureRateLimit:                  { kind: security, policy: rate_limit_per_minute, value: 10 }
  AuthorizationCodeRedemptionFailureRateLimit: { kind: security, policy: rate_limit_per_minute, value: 5 }
  DpopProofClockSkewPast:                      { kind: security, policy: clock_skew_seconds, value: 60 }
  DpopProofClockSkewFuture:                    { kind: security, policy: clock_skew_seconds, value: 5 }
  DpopJtiReplayWindow:                         { kind: security, policy: replay_window_minutes, value: 10 }
  DpopNonceLifetime:                           { kind: security, policy: ttl_seconds, value: 60 }
  RefreshReuseAlertWindow:                     { kind: security, policy: alert_window_seconds, value: 60 }

  # ---------- データ保持 (GDPR / コンプライアンス) ----------
  AuditLogRetention:
    kind: retention
    target: DomainEvent
    policy: append_only
    retention: "7y"
    reference: "GDPR Art. 30"
  PiiPurgeAfterDeletion:
    kind: retention
    target: User
    policy: purge_pii_after
    retention: "30d"
    reference: "GDPR Art. 17"
    note: 監査ログには仮名化された sub のみ残る。
  ConsentRecordsRetention:
    kind: retention
    target: Consent
    policy: keep
    retention: "7y"
  SigningKeyArchiveRetention:
    kind: retention
    target: SigningKey
    policy: archive
    retention: "7y"
    description: 旧鍵で署名された監査トークンを検証するため。


# =================================================================
# 9. user_experience — ブラウザ画面、遷移、利用品質
# =================================================================

user_experience:
  accessibility:
    standard: WCAG22
    level: AA
  locales: [ja, en]

  screens:
    Home:
      route: /
      purpose: IdPの稼働状態と認証開始方法を示し、ローカルデモでは認可要求を開始する。
      interfaces: [Authorize, GetOpenidConfiguration]
      states: [ready, unavailable]
    Login:
      route: /login
      purpose: Authorization transactionに結び付いたResourceOwnerの認証情報を取得する。
      interfaces: [GetBrowserTransaction, SubmitBrowserLogin]
      states: [ready, submitting, invalid_credentials, expired_transaction, service_error]
    Totp:
      route: /totp
      purpose: authentication_pending状態のLoginSessionに対し、登録済みTOTP factorのコードを取得する。
      interfaces: [GetBrowserTransaction, SubmitBrowserTotp]
      states: [ready, submitting, invalid_code, expired_transaction, service_error]
    Consent:
      route: /consent
      purpose: Client名と要求Scopeを示し、ResourceOwnerの許可または拒否を取得する。
      interfaces: [GetBrowserTransaction, SubmitBrowserConsent]
      states: [ready, submitting, denied, expired_transaction, service_error]
    Device:
      route: /device
      purpose: 入力制約デバイスのuser_codeを確認し、ResourceOwnerの許可または拒否を取得する。
      interfaces: [GetBrowserDeviceContext, SubmitBrowserDevice]
      states: [ready, submitting, invalid_code, expired_code, approved, denied, authentication_required]
    Status:
      route: /status
      purpose: device承認、拒否、logout、再認証要求などの終端状態を明示する。
      states: [approved, denied, signed_out, authentication_required, error]
    Callback:
      route: /callback
      purpose: ローカルデモClientの認可成功またはOAuthエラーを表示する。
      states: [success, oauth_error, invalid_response]

  transitions:
    - { from: Home, to: Login, trigger: authorization_started, interface: Authorize }
    - { from: Login, to: Totp, trigger: password_succeeded_and_factor_required, interface: SubmitBrowserLogin }
    - { from: Totp, to: Consent, trigger: factor_succeeded_and_consent_required, interface: SubmitBrowserTotp }
    - { from: Totp, trigger: factor_succeeded_and_consent_exists, interface: SubmitBrowserTotp, external: true }
    - { from: Login, to: Consent, trigger: authentication_succeeded_and_consent_required, interface: SubmitBrowserLogin }
    - { from: Login, trigger: authentication_succeeded_and_consent_exists, interface: SubmitBrowserLogin, external: true }
    - { from: Consent, trigger: consent_allowed, interface: SubmitBrowserConsent, external: true }
    - { from: Consent, trigger: consent_denied, interface: SubmitBrowserConsent, external: true }
    - { from: Device, to: Status, trigger: device_approved, interface: SubmitBrowserDevice }
    - { from: Device, to: Status, trigger: device_denied, interface: SubmitBrowserDevice }
    - { to: Status, trigger: session_ended, interface: EndSession }
    - { to: Callback, trigger: local_demo_authorization_response, external: true }

  requirements:
    - id: UX-TRANSACTION-BOUND
      category: security
      adoption: required
      statement: Login、Totp、Consentは有効なHttpOnly authorization transaction cookieなしでは表示も送信もできない。
      screens: [Login, Totp, Consent]
      interfaces: [GetBrowserTransaction, SubmitBrowserLogin, SubmitBrowserTotp, SubmitBrowserConsent]
      standards: [RFC9700]
    - id: UX-CSRF
      category: security
      adoption: required
      statement: 状態変更を伴うブラウザAPIはSameSite cookieとリクエストトークンを照合してCSRFを拒否する。
      screens: [Login, Totp, Consent, Device]
      interfaces: [SubmitBrowserLogin, SubmitBrowserTotp, SubmitBrowserConsent, SubmitBrowserDevice]
      standards: [RFC9700, FAPI2SecurityProfile]
      scenarios: [browser login API の CSRF 不一致は拒否される]
    - id: UX-NO-STORE
      category: privacy
      adoption: required
      statement: 認証トランザクション、CSRF token、user_codeを含むブラウザAPI応答は保存キャッシュを禁止する。
      screens: [Login, Totp, Consent, Device]
      interfaces: [GetBrowserTransaction, GetBrowserDeviceContext]
    - id: UX-NO-CREDENTIAL-ECHO
      category: privacy
      adoption: required
      statement: password、token、内部request idを画面、URL、エラーメッセージへ表示しない。
      screens: [Login, Totp, Consent, Device, Status, Callback]
    - id: UX-REGISTERED-REDIRECT
      category: security
      adoption: required
      statement: Browser flowの外部遷移先は検証済みredirect_uriまたはpost_logout_redirect_uriだけとする。
      screens: [Login, Totp, Consent, Status]
      interfaces: [Authorize, SubmitBrowserLogin, SubmitBrowserTotp, SubmitBrowserConsent, EndSession]
      standards: [RFC9700, OpenIDConnectRPInitiatedLogout]
      properties: [RedirectUriExactMatch]
    - id: UX-CLIENT-CONTEXT
      category: usability
      adoption: required
      statement: Consent画面は判断前にClientと要求ScopeをResourceOwnerへ明示する。
      screens: [Consent]
      interfaces: [GetBrowserTransaction]
    - id: UX-KEYBOARD
      category: accessibility
      adoption: required
      statement: すべての入力、表示切替、許可、拒否、再試行をキーボードだけで操作可能にする。
      screens: [Home, Login, Totp, Consent, Device, Status, Callback]
      standards: [WCAG22]
    - id: UX-FOCUS
      category: accessibility
      adoption: required
      statement: フォーカス位置を常に視認可能にし、画面遷移後は主見出しまたは最初の入力へ論理的に到達可能にする。
      screens: [Login, Totp, Consent, Device, Status, Callback]
      standards: [WCAG22]
    - id: UX-LABELS-ERRORS
      category: accessibility
      adoption: required
      statement: 入力には永続的なラベルを関連付け、エラーを色だけに依存せず対象と修正方法が分かる文章で示す。
      screens: [Login, Totp, Device]
      standards: [WCAG22]
    - id: UX-STATUS-ANNOUNCEMENT
      category: accessibility
      adoption: required
      statement: 非同期送信の失敗と認証結果を支援技術へ通知し、送信中は重複操作を防ぐ。
      screens: [Login, Totp, Consent, Device, Status, Callback]
      standards: [WCAG22]
    - id: UX-LOCALE
      category: localization
      adoption: required
      statement: UI文言はjaとenを提供し、未対応localeは既定localeへフォールバックする。
      screens: [Home, Login, Totp, Consent, Device, Status, Callback]
      interfaces: [GetOpenidConfiguration]
      standards: [OpenIDConnectDiscovery]

# =================================================================
# 10. annotations — 補助情報（任意・規約外、生成器が利用）
# =================================================================

annotations:

  password_policy:
    description: |
      プレーンパスワードがシステムに導入されるすべての経路（registration / change-password /
      admin による作成 / demo seed）に適用される。長さのみを強制し、文字種混在ルールは
      課さない。最小12文字は本システム固有ポリシーであり、単一要素認証に15文字以上を要求する
      NIST SP 800-63B-4への完全準拠は表明しない。漏洩パスワード検査は password_policyとは別に
      BreachedPasswordChecker portを経由して行う。
    min_length: 12
    max_length: 128

  acr_vocabulary:
    description: |
      Authentication Context Class Reference の URN 列挙。OIDC Core §2 では acr の値域は
      AS が自由に定められるため、本 IdP が発行する acr の語彙をここに固定する。
      amr (Authentication Methods References, RFC 8176) から下記マッピングで導出する。
      step-up reauth は /authorize の acr_values パラメータでこの URN を指定する。
    values:
      - { urn: "urn:ra-idp:acr:pwd", description: "Password 単独認証 (amr ⊇ [pwd])。" }
      - { urn: "urn:ra-idp:acr:mfa", description: "Password + 第二要素 (amr に otp / webauthn / hwk のいずれかを含む)。" }
    mfa_amr_values: [otp, webauthn, hwk, swk]

  totp_policy:
    description: |
      MfaFactor (type=Totp) の生成・検証パラメータ。RFC 6238 §4 の式に従い、
      Google Authenticator / 1Password 等の主要 Authenticator アプリと互換になるよう
      algorithm=SHA1 / step_seconds=30 / digits=6 を固定する。window は時刻ズレ吸収のため
      ±1 ステップを許容する。secret_bytes は RFC 4226 §4 推奨の 160-bit。
    algorithm: SHA1
    step_seconds: 30
    digits: 6
    window: 1
    secret_bytes: 20

  discovery_template:
    scopes_supported: [openid, profile, email, offline_access]
    subject_types_supported: [public]
    claims_supported:
      [sub, iss, aud, exp, iat, auth_time, nonce, acr, amr, azp,
       name, given_name, family_name, preferred_username, email, email_verified, updated_at]
    acr_values_supported: ["urn:ra-idp:acr:pwd", "urn:ra-idp:acr:mfa"]
    ui_locales_supported: [en, ja]
    introspection_endpoint_auth_methods: [ClientSecretBasic, PrivateKeyJwt, TlsClientAuth]
    revocation_endpoint_auth_methods:    [ClientSecretBasic, PrivateKeyJwt, TlsClientAuth]

  scenario_coverage:
    "認可コードフローでアクセストークンと ID トークンを取得できる":
      status: covered
      evidence:
        - { file: src/oauth2/usecases/exchange-code-for-token.test.ts, test: "access_token / refresh_token / id_token を返す + 監査情報を含む" }
        - { file: src/spec-bindings/golden.test.ts, test: "full happy path: received → ... → exchanged" }
    "PKCE verifier が不一致なら拒否される":
      status: covered
      evidence:
        - { file: src/oauth2/usecases/exchange-code-for-token.test.ts, test: "PKCE verifier が不一致なら invalid_grant" }
    "認可コードを 2 回交換するとトークンファミリーが全失効する":
      status: covered
      evidence:
        - { file: src/oauth2/usecases/exchange-code-for-token.test.ts, test: "再利用検出時に最初のリフレッシュトークンファミリーが失効する" }
    "リフレッシュトークンを使うと新トークンが返り旧トークンは無効化される":
      status: covered
      evidence:
        - { file: src/spec-bindings/persistence-contract.test.ts, test: "rotate は parent を rotated にし、新トークンを保存する" }
    "旧リフレッシュトークンの再使用はファミリー全体を失効させる":
      status: covered
      evidence:
        - { file: src/spec-bindings/property/refresh-rotation.property.test.ts, test: "任意のチェーン長で revokeFamily が全トークンを revoked にする" }
    "不正な client_secret は invalid_client で拒否される":
      status: partial
      evidence:
        - { file: demo.sh, test: "不正な client_secret → 401 invalid_client" }
      note: client_secret_basic の自動シナリオテストは未分離。
    "未知の client_id も一律 invalid_client で拒否される":
      status: partial
      evidence:
        - { file: src/spec-bindings/persistence-contract.test.ts, test: "未登録 client_id は null を返す" }
      note: HTTP エラー一様化の自動シナリオテストは未分離。
    "未登録の redirect_uri へはリダイレクトしない":
