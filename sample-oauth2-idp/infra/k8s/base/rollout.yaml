# Argo Rollouts canary 定義 (ADR-021)
#
# prod overlay でのみ有効化する。
# dev overlay では Deployment のままにする。
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: oauth2-idp
spec:
  replicas: 4
  selector:
    matchLabels:
      app.kubernetes.io/name: oauth2-idp
  strategy:
    canary:
      maxSurge: 1
      maxUnavailable: 0
      steps:
        - setWeight: 5
        - pause: { duration: 3m }
        - analysis:
            templates:
              - templateName: token-slo-check
        - setWeight: 25
        - pause: { duration: 3m }
        - analysis:
            templates:
              - templateName: token-slo-check
        - setWeight: 50
        - pause: { duration: 5m }
        - analysis:
            templates:
              - templateName: token-slo-check
        - setWeight: 100
  template:
    # spec は deployment.yaml と同じ。kustomize で patch される。
    metadata:
      labels:
        app.kubernetes.io/name: oauth2-idp
    spec:
      containers:
        - name: idp
          image: ghcr.io/example/oauth2-idp:latest
---
# AnalysisTemplate — Prometheus メトリクスで SLO を検証
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: token-slo-check
spec:
  metrics:
    - name: token-p99-latency
      interval: 30s
      successCondition: result[0] < 0.3       # scl.yaml objectives.TokenLatency p99 = 300ms
      failureLimit: 1
      provider:
        prometheus:
          address: http://prometheus.observability.svc.cluster.local:9090
          query: oauth2_token_request_duration_seconds:p99
    - name: token-error-rate
      interval: 30s
      successCondition: result[0] < 0.001     # scl.yaml objectives.TokenErrorRate
      failureLimit: 1
      provider:
        prometheus:
          address: http://prometheus.observability.svc.cluster.local:9090
          query: |
            rate(oauth2_token_requests_total{result="error"}[5m])
            / rate(oauth2_token_requests_total[5m])
    - name: refresh-reuse-detected
      interval: 30s
      successCondition: result[0] == 0
      failureLimit: 1
      provider:
        prometheus:
          address: http://prometheus.observability.svc.cluster.local:9090
          query: increase(oauth2_refresh_token_reuse_detected_total[1m])
