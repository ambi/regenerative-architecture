# default-deny + 明示 allow (ADR-019)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ra-idp-default-deny
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: ra-idp
  policyTypes: [Ingress, Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ra-idp-allow
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: ra-idp
  policyTypes: [Ingress, Egress]
  ingress:
    # ingress controller からのみ受ける
    - from:
        - namespaceSelector:
            matchLabels:
              ingress: "true"
      ports:
        - protocol: TCP
          port: 3000
  egress:
    # DNS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
    # Postgres
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgres
      ports:
        - protocol: TCP
          port: 5432
    # Redis
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
      ports:
        - protocol: TCP
          port: 6379
    # OTel Collector
    - to:
        - namespaceSelector:
            matchLabels:
              name: observability
          podSelector:
            matchLabels:
              app.kubernetes.io/name: otel-collector
      ports:
        - protocol: TCP
          port: 4318
